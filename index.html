臭を防ぐ","厨房内に長時間放置する","分別せずまとめて置く","ふたをせず放置する"],"answer":0,"explain":"廃棄物は分別し、ふた付き容器で保管して害虫や悪臭・二次汚染を防ぎます。速やかに処理します。","why_wrong":{"1":"長時間放置は害虫・悪臭の元。","2":"分別しないのは不適切。","3":"ふたなし放置は不衛生。"}},{"sect":"tenpo","part":"gakka","q":"「原価率」の計算式として正しいものはどれか。","options":["原価 ÷ 売価 × 100","売価 ÷ 原価 × 100","原価 × 売価","原価 − 売価"],"answer":0,"explain":"原価率＝原価÷売価×100（%）。原価率が高いほど利益が薄くなります。","why_wrong":{"1":"分母分子が逆。","2":"掛け算ではない。","3":"引き算ではない。"}},{"sect":"tenpo","part":"gakka","q":"人時売上高の計算式として正しいものはどれか。","options":["売上高 ÷ 総労働時間","売上高 × 総労働時間","総労働時間 ÷ 売上高","客数 ÷ 総労働時間"],"answer":0,"explain":"人時売上高＝売上高÷総労働時間。従業員1人1時間あたりの売上で、目安は最低5,000円以上とされます。","why_wrong":{"1":"掛け算ではない。","2":"逆にしてはいけない。","3":"客数÷労働時間は人時接客数。"}},{"sect":"tenpo","part":"gakka","q":"人件費を管理する指標「労働分配率」の計算式として正しいものはどれか。","options":["人件費 ÷ 粗利益 × 100","粗利益 ÷ 人件費 × 100","人件費 ÷ 売上高 × 100","人件費 × 粗利益"],"answer":0,"explain":"労働分配率＝人件費÷粗利益×100。適正はおおむね35〜40%。人件費÷売上高は人件費率で別の指標です。","why_wrong":{"1":"分母分子が逆。","2":"売上で割るのは人件費率。","3":"掛け算ではない。"}},{"sect":"tenpo","part":"gakka","q":"店舗の売上を上げる要素として、客単価とともに重要なものはどれか。","options":["客数（来店数・回転率）","原価率","人件費率","家賃"],"answer":0,"explain":"売上＝客数×客単価。客単価とともに客数（来店数・回転率）を増やすことが売上向上の柱です。","why_wrong":{"1":"原価率は費用側の指標。","2":"人件費率は費用側の指標。","3":"家賃は固定費。"}},{"sect":"tenpo","part":"gakka","q":"シフト（勤務表）を組むときに考慮すべきことはどれか。","options":["来客の多い時間帯に人員を厚く配置する","暇な時間に人を集中させる","人数は毎日同じにする","労働時間の上限は無視する"],"answer":0,"explain":"シフトは来客の多い時間帯（ピーク）に人員を厚く、暇な時間は薄く配置して人時売上高を保ちます。労働時間の上限も守ります。","why_wrong":{"1":"暇な時間に集中は非効率。","2":"毎日同じ人数は非効率。","3":"労働時間の上限は守る必要がある。"}},{"sect":"tenpo","part":"gakka","q":"「粗利益率（荒利益率）」の計算式として正しいものはどれか。","options":["粗利益 ÷ 売上高 × 100","売上高 ÷ 粗利益 × 100","粗利益 × 売上高","粗利益 − 売上高"],"answer":0,"explain":"粗利益率＝粗利益÷売上高×100。原価率＋粗利益率＝100%の関係があります。","why_wrong":{"1":"分母分子が逆。","2":"掛け算ではない。","3":"引き算ではない。"}},{"sect":"tenpo","part":"gakka","q":"防火管理者の役割として正しいものはどれか。","options":["消防計画の作成や避難訓練など防火管理を統括する","調理だけを行う","会計だけを行う","接客だけを行う"],"answer":0,"explain":"一定規模以上の施設では防火管理者を選任し、消防計画作成・避難訓練・設備点検など防火管理を統括します。","why_wrong":{"1":"調理担当ではない。","2":"会計担当ではない。","3":"接客担当ではない。"}},{"sect":"tenpo","part":"gakka","q":"メニュー分析（ABC分析＋人気度）で、売上も人気も高い「看板商品」の扱いとして適切なものはどれか。","options":["品質を維持し目立たせて売り伸ばす","メニューから外す","値上げして売れなくする","品質を下げる"],"answer":0,"explain":"売上・人気ともに高い看板商品は品質を維持し、メニューで目立たせて積極的に売り伸ばします。","why_wrong":{"1":"外すのは機会損失。","2":"売れなくするのは逆効果。","3":"品質低下は信頼を損なう。"}},{"sect":"tenpo","part":"gakka","q":"従業員のモチベーションを高める取り組みとして適切なものはどれか。","options":["適切な評価・教育・良好な職場環境を整える","評価をしない","一方的に叱るだけにする","教育をしない"],"answer":0,"explain":"適切な評価、教育（OJT/OFF-JT）、働きやすい職場環境がモチベーション向上と定着につながります。","why_wrong":{"1":"評価しないのは逆効果。","2":"叱るだけは逆効果。","3":"教育なしは成長を妨げる。"}},{"sect":"tenpo","part":"gakka","q":"「客単価」を上げる方法として適切なものはどれか。","options":["セットやサイド・ドリンクなどの提案（サジェスト）を行う","料理の量を勝手に減らす","接客をやめる","メニューを隠す"],"answer":0,"explain":"客単価はセット・サイド・ドリンク等の提案（サジェスト）や付加価値の高いメニューで上げられます。押し売りは避けます。","why_wrong":{"1":"量を減らすのは信頼を損なう。","2":"接客をやめるのは逆効果。","3":"メニューを隠すのは逆効果。"}},{"sect":"tenpo","part":"gakka","q":"「時間帯責任者」に求められる役割として正しいものはどれか。","options":["その時間帯の店舗運営を統括し、判断・指示を行う","掃除だけを担当する","レジだけを担当する","何もしない"],"answer":0,"explain":"時間帯責任者はその時間帯の店舗運営を統括し、店長に代わって判断・指示を行う責任者です。","why_wrong":{"1":"掃除だけではない。","2":"レジだけではない。","3":"何もしないは誤り。"}},{"sect":"tenpo","part":"gakka","q":"適正在庫を保つ利点として正しいものはどれか。","options":["品切れと廃棄ロスの両方を抑え、資金効率がよくなる","必ず原価が上がる","客単価が下がる","人件費が上がる"],"answer":0,"explain":"適正在庫は品切れ（チャンスロス）と過剰在庫（廃棄ロス・資金の固定化）の両方を抑え、資金効率を高めます。","why_wrong":{"1":"原価が上がるとは限らない。","2":"客単価とは無関係。","3":"人件費とは無関係。"}},{"sect":"tenpo","part":"gakka","q":"「マニュアル」を整備する主な目的はどれか。","options":["作業やサービスの品質を標準化し、教育を効率化するため","従業員を減らすため","接客をなくすため","原価を上げるため"],"answer":0,"explain":"マニュアルは作業・サービスの品質を標準化し、誰が行っても一定水準を保ち、新人教育を効率化します。","why_wrong":{"1":"従業員削減が目的ではない。","2":"接客をなくす目的ではない。","3":"原価を上げる目的ではない。"}},{"sect":"tenpo","part":"gakka","q":"労働条件を明示する「労働条件通知書」に記載すべきものはどれか。","options":["賃金・労働時間・休日・業務内容など","お客様の個人情報","仕入先の秘密","競合店の売上"],"answer":0,"explain":"労働条件通知書には賃金・労働時間・休日・休暇・業務内容・契約期間などを明示します。採用時のトラブル防止になります。","why_wrong":{"1":"顧客情報は記載対象ではない。","2":"仕入先の秘密ではない。","3":"競合の売上ではない。"}},{"sect":"tenpo","part":"gakka","q":"店舗の売上を分析する「日報・売上日報」の活用として適切なものはどれか。","options":["日々の売上・客数などを記録し、傾向を分析し改善に活かす","書くだけで見返さない","客に配布する","適当に数字を書く"],"answer":0,"explain":"売上日報は日々の売上・客数・客単価などを記録し、傾向を分析して仕入れ・シフト・販促の改善に活かします。","why_wrong":{"1":"見返さないと意味がない。","2":"客に配布するものではない。","3":"適当な数字では分析できない。"}},{"sect":"tenpo","part":"gakka","q":"コンプライアンス（法令遵守）の観点で適切な行動はどれか。","options":["食品表示・労働法・営業許可など関係法令を守って運営する","バレなければ違反してよい","表示を偽る","無許可で営業する"],"answer":0,"explain":"コンプライアンスは食品表示・労働関係法令・営業許可など関係法令を守ること。違反は信頼失墜や罰則につながります。","why_wrong":{"1":"バレなければよいという考えは不適切。","2":"表示偽装は違法。","3":"無許可営業は違法。"}},{"sect":"tenpo","part":"gakka","q":"「販売促進（販促）」の例として適切なものはどれか。","options":["クーポン・季節フェア・SNS発信など集客の工夫","清掃をやめること","接客を減らすこと","メニューを隠すこと"],"answer":0,"explain":"販促はクーポン・季節フェア・SNS発信・POPなどで集客や客単価向上を図る取り組みです。","why_wrong":{"1":"清掃をやめるのは逆効果。","2":"接客を減らすのは逆効果。","3":"メニューを隠すのは逆効果。"}},{"sect":"tenpo","part":"gakka","q":"設備・機器の「定期点検」を行う主な目的はどれか。","options":["故障や事故を未然に防ぎ、安全と衛生を保つため","電気代を増やすため","作業を遅くするため","点検は不要である"],"answer":0,"explain":"定期点検は故障・事故を未然に防ぎ、冷蔵庫の温度維持など安全・衛生を保つために重要です。","why_wrong":{"1":"電気代を増やす目的ではない。","2":"作業を遅くする目的ではない。","3":"点検は必要。"}},{"sect":"tenpo","part":"gakka","q":"「歩留まり」を店舗運営で使う場面として正しいものはどれか。","options":["仕入量や原価を計算するとき","接客の言葉遣いを決めるとき","営業時間を決めるとき","BGMを選ぶとき"],"answer":0,"explain":"歩留まり（可食部の割合）は、必要な仕入量や正確な原価を計算するときに使います。","why_wrong":{"1":"接客の言葉遣いとは無関係。","2":"営業時間の決定とは無関係。","3":"BGM選びとは無関係。"}},{"sect":"tenpo","part":"jitsugi","q":"売価800円の料理の原価が240円のとき、原価率はいくらか。","options":["30%","24%","33%","70%"],"answer":0,"explain":"原価率＝240÷800×100＝30%。粗利益は800−240＝560円、粗利益率は70%です。","why_wrong":{"1":"24%は計算違い。","2":"33%は概算の誤り。","3":"70%は粗利益率のほう。"}},{"sect":"tenpo","part":"jitsugi","q":"原価率を30%にしたい料理の原価が210円のとき、売価はいくらにすればよいか。","options":["700円","630円","273円","300円"],"answer":0,"explain":"売価＝原価÷原価率＝210÷0.3＝700円。原価率30%なら売価の30%が原価になります。","why_wrong":{"1":"630円は0.3を掛けた誤り。","2":"273円は計算違い。","3":"300円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"ある日の来客数が150人、座席数が50席のとき、回転率はいくらか。","options":["3回転","0.33回転","100回転","200回転"],"answer":0,"explain":"回転率＝来客数÷座席数＝150÷50＝3回転。1席が平均3回使われたことを示します。","why_wrong":{"1":"0.33は逆に割った誤り。","2":"100は誤り。","3":"200は誤り。"}},{"sect":"tenpo","part":"jitsugi","q":"1か月の売上が600万円、食材費が180万円、人件費が180万円のとき、FL比率はいくらか。","options":["60%","30%","90%","36%"],"answer":0,"explain":"FL比率＝(食材費+人件費)÷売上×100＝(180+180)÷600×100＝60%。目安の60%程度に収まっています。","why_wrong":{"1":"30%は片方だけの割合。","2":"90%は計算違い。","3":"36%は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"1か月の粗利益が400万円、人件費が160万円のとき、労働分配率はいくらか。","options":["40%","25%","64%","250%"],"answer":0,"explain":"労働分配率＝人件費÷粗利益×100＝160÷400×100＝40%。適正値（35〜40%）の範囲内です。","why_wrong":{"1":"25%は計算違い。","2":"64%は計算違い。","3":"250%は逆にした誤り。"}},{"sect":"tenpo","part":"jitsugi","q":"客単価を上げるため「1品平均単価」を450円から500円に上げ、注文点数が平均3点で変わらないとき、客単価はいくらになるか。","options":["1,500円","1,350円","500円","950円"],"answer":0,"explain":"客単価＝注文点数×一品平均単価＝3×500＝1,500円。値上げ前は3×450＝1,350円でした。","why_wrong":{"1":"1,350円は値上げ前の値。","2":"500円は1品分。","3":"950円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"固定費が1か月120万円、粗利益率が60%のとき、損益分岐点売上高はおよそいくらか。","options":["200万円","72万円","120万円","300万円"],"answer":0,"explain":"損益分岐点売上高＝固定費÷粗利益率＝120万÷0.6＝200万円。この売上で費用と利益がちょうど釣り合います。","why_wrong":{"1":"72万は掛けた誤り。","2":"120万は固定費そのもの。","3":"300万は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"棚卸の結果、実際原価率が標準原価率より2%高かった。考えられる原因として適切なものはどれか。","options":["ポーション超過・廃棄・盗難・棚卸ミスなどのロス","客単価が上がったから","回転率が上がったから","接客が良かったから"],"answer":0,"explain":"実際原価率が標準より高いのは、量の出しすぎ・廃棄・盗難・棚卸ミスなどのロスが原因。原因を特定し改善します。","why_wrong":{"1":"客単価上昇は原価率上昇の直接原因ではない。","2":"回転率とは無関係。","3":"接客の良し悪しとは無関係。"}},{"sect":"tenpo","part":"jitsugi","q":"6時間を超え8時間以下の勤務の場合、与えるべき休憩時間はどれか。","options":["少なくとも45分","少なくとも60分","少なくとも15分","休憩は不要"],"answer":0,"explain":"労働時間が6時間を超える場合は45分以上、8時間を超える場合は60分以上の休憩を途中に与えます。","why_wrong":{"1":"60分は8時間超の場合。","2":"15分は法定に満たない。","3":"休憩は必要。"}},{"sect":"tenpo","part":"jitsugi","q":"時給1,200円の従業員が、深夜（22時〜翌5時）に2時間働いた。深夜割増(25%)を含む2時間分の賃金はいくらか。","options":["3,000円","2,400円","3,600円","2,700円"],"answer":0,"explain":"深夜割増込みの時給＝1,200×1.25＝1,500円。2時間分＝1,500×2＝3,000円。","why_wrong":{"1":"2,400円は割増なしの2時間分。","2":"3,600円は割増率を誤った値。","3":"2,700円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"在庫を発注する際、過去の売上傾向をふまえて数量を決める理由として最も適切なものはどれか。","options":["需要に合わせ、品切れと廃棄ロスを防ぐため","とにかく多く仕入れるため","仕入先を喜ばせるため","倉庫を埋めるため"],"answer":0,"explain":"過去の売上傾向（曜日・天候・イベント等）をふまえて発注量を決めると、需要に合い、品切れと廃棄ロスを防げます。","why_wrong":{"1":"多く仕入れるだけでは廃棄ロスが増える。","2":"仕入先を喜ばせるためではない。","3":"倉庫を埋めるためではない。"}},{"sect":"tenpo","part":"jitsugi","q":"ピークタイムに人手が足りず提供が遅れている。店舗運営上の対応として適切なものはどれか。","options":["役割分担を見直し、ピークに合わせた人員配置・段取りを改善する","何もしない","品質を落として急がせる","お客様を減らすため入店を断り続ける"],"answer":0,"explain":"ピーク時の遅れは、役割分担・人員配置・仕込みの段取りを見直して改善します。シフト計画（人時売上高）とも連動させます。","why_wrong":{"1":"放置は改善にならない。","2":"品質低下は信頼を損なう。","3":"入店拒否は売上機会の損失。"}},{"sect":"tenpo","part":"jitsugi","q":"月間売上目標800万円、目標人時売上高を5,000円とするとき、月間の計画総労働時間はおよそ何時間か。","options":["1,600時間","160時間","40,000時間","400時間"],"answer":0,"explain":"計画総労働時間＝月間売上目標÷人時売上高＝8,000,000÷5,000＝1,600時間。","why_wrong":{"1":"160時間は桁の誤り。","2":"40,000時間は掛けた誤り。","3":"400時間は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"売価500円の商品Aが1日120個、売価800円の商品Bが1日50個売れた。Aの1日の売上はいくらか。","options":["60,000円","40,000円","6,000円","100,000円"],"answer":0,"explain":"Aの売上＝売価×数量＝500×120＝60,000円。ちなみにBは800×50＝40,000円です。","why_wrong":{"1":"40,000円はBの売上。","2":"6,000円は桁の誤り。","3":"100,000円は計算違い。"}},{"sect":"tenpo","part":"gakka","q":"「先入れ先出し（FIFO）」を在庫管理で徹底する主な目的はどれか。","options":["古い在庫から使い、期限切れや品質劣化のロスを防ぐため","新しいものから使うため","在庫を増やすため","原価を隠すため"],"answer":0,"explain":"FIFOは先に入れた（古い）在庫から使うことで、期限切れや品質劣化による廃棄ロスを防ぎます。棚の手前に古いものを置きます。","why_wrong":{"1":"新しいものから使うのは逆。","2":"在庫を増やす目的ではない。","3":"原価を隠す目的ではない。"}},{"sect":"tenpo","part":"gakka","q":"店舗の「4S・5S」活動が店舗運営にもたらす効果として適切なものはどれか。","options":["作業効率・安全・衛生・印象が向上する","必ず売上が下がる","作業が遅くなる","効果はない"],"answer":0,"explain":"5S（整理・整頓・清掃・清潔・しつけ）は作業効率・安全・衛生・お客様への印象を高め、店舗運営の基盤になります。","why_wrong":{"1":"売上が下がるとは限らない。","2":"作業は効率化される。","3":"効果はある。"}}]</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const QUESTION_BANK = JSON.parse(document.getElementById("question-bank").textContent);
const WEBHOOK_DEFAULT = "https://hook.us2.make.com/jpntp3uy57g9dtdp9r6qsqmaub263ujd";

const BLUEPRINT = {
  gakka: [
    { key:"eisei", jp:"衛生管理", n:10, per:4 },
    { key:"chori", jp:"飲食物調理", n:5, per:2 },
    { key:"sekkyaku", jp:"接客全般", n:10, per:3 },
    { key:"tenpo", jp:"店舗運営", n:10, per:4 },
  ],
  jitsugi: [
    { key:"eisei", jp:"衛生管理", n:5, per:8 },
    { key:"chori", jp:"飲食物調理", n:5, per:4 },
    { key:"sekkyaku", jp:"接客全般", n:5, per:6 },
    { key:"tenpo", jp:"店舗運営", n:5, per:8 },
  ],
};
const SECT_LABEL = { eisei:"衛生管理", chori:"飲食物調理", sekkyaku:"接客全般", tenpo:"店舗運営" };
const PASS_MARK = 163, TOTAL_MARK = 250, EXAM_MINUTES = 70;

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildExam(){
  const out=[];
  ["gakka","jitsugi"].forEach(part=>{
    BLUEPRINT[part].forEach(sect=>{
      let pool=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part===part);
      let extra=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part!==part);
      let picks=shuffle(pool).slice(0,sect.n);
      if(picks.length<sect.n){ picks=picks.concat(shuffle(extra).slice(0,sect.n-picks.length)); }
      picks.forEach(q=>{
        const order=shuffle([0,1,2,3]);
        const newOptions=order.map(i=>q.options[i]);
        const newAnswer=order.indexOf(q.answer);
        const remap={}; order.forEach((oldI,newI)=>{ remap[oldI]=newI; });
        const newWhy={};
        if(q.why_wrong){ Object.entries(q.why_wrong).forEach(([oldI,txt])=>{ newWhy[remap[oldI]]=txt; }); }
        out.push({ part, sect:sect.key, per:sect.per, _sectJP:sect.jp,
          q:q.q, options:newOptions, answer:newAnswer, explain:q.explain, why_wrong:newWhy });
      });
    });
  });
  return out.map((q,i)=>({...q,id:i}));
}

function App(){
  const [screen,setScreen]=useState("start");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [phone,setPhone]=useState("");
  const [webhook,setWebhook]=useState(WEBHOOK_DEFAULT);
  const [questions,setQuestions]=useState([]);
  const [answers,setAnswers]=useState({});
  const [cur,setCur]=useState(0);
  const [remaining,setRemaining]=useState(EXAM_MINUTES*60);
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);
  const [saveState,setSaveState]=useState({status:"idle",msg:""});
  const timerRef=useRef(null);

  useEffect(()=>{
    if(screen!=="quiz") return;
    timerRef.current=setInterval(()=>{
      setRemaining(r=>{ if(r<=1){clearInterval(timerRef.current); finishExam(); return 0;} return r-1; });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[screen]); // eslint-disable-line

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  function startExam(){
    if(!name.trim()){ setError("お名前を入力してください。"); return; }
    setError("");
    const q=buildExam();
    setQuestions(q); setAnswers({}); setCur(0); setRemaining(EXAM_MINUTES*60);
    setScreen("quiz");
    window.scrollTo(0,0);
  }

  function finishExam(){
    clearInterval(timerRef.current);
    const sectScore={}; let total=0, maxTotal=0;
    questions.forEach(q=>{
      const s=(sectScore[q.sect] ||= {got:0,max:0});
      s.max+=q.per; maxTotal+=q.per;
      if(answers[q.id]===q.answer){ s.got+=q.per; total+=q.per; }
    });
    const passed=total>=PASS_MARK;
    const res={
      name:name.trim(), email:email.trim(), phone:phone.trim(),
      datetime:new Date().toISOString(), datetimeLocal:new Date().toLocaleString("ja-JP"),
      total, maxTotal, passMark:PASS_MARK, passed, sectScore,
      answered:Object.keys(answers).length, questionCount:questions.length,
      detail:questions.map(q=>({ id:q.id, part:q.part, sect:q.sect, q:q.q,
        chosen:answers[q.id]??null, correct:q.answer, isCorrect:answers[q.id]===q.answer, points:q.per })),
    };
    setResult(res); setScreen("result"); window.scrollTo(0,0);
    sendResult(res);
  }

  async function sendResult(res){
    const url=webhook.trim();
    if(!url){ setSaveState({status:"skip",msg:""}); return; }
    setSaveState({status:"sending",msg:"保存中…"});
    const payload={
      studentName:res.name, email:res.email, phone:res.phone,
      submittedAt:res.datetime, submittedAtLocal:res.datetimeLocal,
      totalScore:res.total, maxScore:res.maxTotal, passMark:res.passMark,
      totalDisplay:`${res.total}/${res.maxTotal}`,
      result:res.passed?"合格":"不合格",
      answered:res.answered, questionCount:res.questionCount,
      score_eisei:res.sectScore.eisei?`${res.sectScore.eisei.got}/${res.sectScore.eisei.max}`:"",
      score_chori:res.sectScore.chori?`${res.sectScore.chori.got}/${res.sectScore.chori.max}`:"",
      score_sekkyaku:res.sectScore.sekkyaku?`${res.sectScore.sekkyaku.got}/${res.sectScore.sekkyaku.max}`:"",
      score_tenpo:res.sectScore.tenpo?`${res.sectScore.tenpo.got}/${res.sectScore.tenpo.max}`:"",
      detailJson:JSON.stringify(res.detail),
    };
    try{
      const form=new URLSearchParams();
      Object.entries(payload).forEach(([k,v])=>form.append(k, v==null?"":String(v)));
      await fetch(url,{ method:"POST", mode:"no-cors", body:form });
      setSaveState({status:"ok",msg:"結果を保存しました。先生が確認できます。"});
    }catch(e){
      setSaveState({status:"err",msg:"保存に失敗しました。ネットワークまたはURLをご確認ください。"});
    }
  }

  function Masthead(){
    return (
      <div className="masthead">
        <div className="brandline">
          <div className="seal">外食<br/>2号</div>
          <div className="titles">
            <h1>外食業 特定技能２号 技能測定試験</h1>
            <div className="romaji">Gaishokugyō Tokutei Ginō 2-gō 練習アプリ</div>
          </div>
        </div>
        <div className="exam-facts">
          <div className="fact"><div className="num">55</div><div className="lab">問</div></div>
          <div className="fact"><div className="num">70</div><div className="lab">分</div></div>
          <div className="fact"><div className="num">250</div><div className="lab">満点</div></div>
          <div className="fact"><div className="num">163</div><div className="lab">合格点</div></div>
        </div>
      </div>
    );
  }

  if(screen==="start"){
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <h2>受験者情報 <span style={{marginLeft:"auto",fontSize:10,color:"var(--pass)",fontWeight:800,border:"1px solid var(--pass)",borderRadius:10,padding:"1px 8px"}}>v3</span></h2>
          <p className="hint">試験を始める前に情報を入力してください。</p>
          <label className="field">
            <span className="lbl">氏名 <span className="vn-s">（必須）</span></span>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例：グエン・ヴァン・アン" />
          </label>
          <label className="field">
            <span className="lbl">メールアドレス</span>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="例：example@mail.com" />
          </label>
          <label className="field">
            <span className="lbl">電話番号</span>
            <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="例：090-1234-5678" />
          </label>
          <label className="field" style={{marginBottom:4}}>
            <span className="lbl">結果保存先 Webhook URL <span className="vn-s">（設定済み）</span></span>
            <input type="url" value={webhook} onChange={e=>setWebhook(e.target.value)} placeholder="https://hook.…make.com/…" />
          </label>
          <p className="hint" style={{marginTop:8}}>
            提出すると結果は自動的に会社のGoogleスプレッドシートに保存され、先生が進捗を確認できます。（このURLを空にすると、結果は端末に表示されるのみで保存されません。）
          </p>
          {error && <div className="err-box">{error}</div>}
          <button className="btn btn-seal" style={{width:"100%",marginTop:10}} onClick={startExam}>試験を始める</button>
        </div>
        <div className="panel">
          <h2>出題構成</h2>
          <p className="hint">学科100点分＋実技150点分＝250点満点。合格基準は合計163点以上。</p>
          <div style={{fontSize:12.5,fontWeight:700,margin:"4px 0 6px",color:"var(--indigo)"}}>学科試験 — 35問 / 120点</div>
          <div className="sect-breakdown">
            {BLUEPRINT.gakka.map(s=>(
              <div className="sect-row" key={"g"+s.key}>
                <span className="jp">{s.jp}</span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:12.5,fontWeight:700,margin:"14px 0 6px",color:"var(--indigo)"}}>実技試験 — 20問 / 130点（判断・計画立案）</div>
          <div className="sect-breakdown">
            {BLUEPRINT.jitsugi.map(s=>(
              <div className="sect-row" key={"j"+s.key}>
                <span className="jp">{s.jp}</span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <p className="hint" style={{marginTop:14,marginBottom:0}}>
            出典：一般社団法人日本フードサービス協会 学習テキスト（衛生管理・飲食物調理・接客全般・店舗運営）。問題と解説は当該テキストに基づき作成。
          </p>
        </div>
      </div>
    );
  }

  if(screen==="quiz"){
    const q=questions[cur];
    const answeredCount=Object.keys(answers).length;
    const partJP=q.part==="gakka"?"学科":"実技";
    return (
      <div className="wrap">
        <div className="panel">
          <div className="quiz-top">
            <div>
              <div className={"timer"+(remaining<=300?" warn":"")}>{fmt(remaining)}</div>
              <div className="progress-text">残り時間</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="progress-text">{answeredCount} / {questions.length} 回答済</div>
              <div className="progress-bar" style={{width:120}}>
                <span style={{width:(answeredCount/questions.length*100)+"%"}}/>
              </div>
            </div>
          </div>
          <div className="q-card">
            <span className="q-eyebrow">{partJP} <span className="div">·</span> {q._sectJP} <span className="div">·</span> {q.per}点</span>
            <div className="q-num">問 {cur+1} / {questions.length}</div>
            <div className="q-jp">{q.q}</div>
            <div className="choices">
              {q.options.map((opt,i)=>(
                <button key={i} className={"choice"+(answers[q.id]===i?" sel":"")}
                  onClick={()=>setAnswers(a=>({...a,[q.id]:i}))}>
                  <span className="key">{"ABCD"[i]}</span>
                  <span className="ctext">{opt}</span>
                </button>
              ))}
            </div>
            <div className="nav-row">
              <button className="btn btn-ghost" style={{flex:1}} disabled={cur===0} onClick={()=>setCur(c=>Math.max(0,c-1))}>← 前へ</button>
              {cur<questions.length-1 ? (
                <button className="btn btn-primary" style={{flex:1}} onClick={()=>setCur(c=>Math.min(questions.length-1,c+1))}>次へ →</button>
              ) : (
                <button className="btn btn-seal" style={{flex:1}} onClick={finishExam}>提出する</button>
              )}
            </div>
            <div className="palette">
              {questions.map((qq,i)=>(
                <button key={i} className={"pnum"+(answers[qq.id]!=null?" done":"")+(i===cur?" cur":"")} onClick={()=>setCur(i)}>{i+1}</button>
              ))}
            </div>
            <button className="btn btn-seal" style={{width:"100%",marginTop:18}} onClick={finishExam}>採点する（提出）</button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==="result" && result){
    const pct=Math.round(result.total/result.maxTotal*100);
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <div className={"score-hero "+(result.passed?"pass":"fail")}>
            <div className="verdict-seal">{result.passed?"合":"否"}</div>
            <div className="score-big">{result.total}<span className="of"> / {result.maxTotal}</span></div>
            <div className="score-sub">{result.name} 様 · {pct}% · 合格基準 {PASS_MARK}点</div>
            <div className="verdict-label">{result.passed?"合格":"不合格"}</div>
          </div>
          <div className="sect-scores">
            {Object.entries(result.sectScore).map(([k,v])=>(
              <div className="ss-row" key={k}>
                <div className="ss-name">{SECT_LABEL[k]}</div>
                <div className="ss-track"><div className="ss-fill" style={{width:(v.got/v.max*100)+"%"}}/></div>
                <div className="ss-pts">{v.got}/{v.max}</div>
              </div>
            ))}
          </div>
          {saveState.status!=="idle" && saveState.status!=="skip" && (
            <div className={"save-status "+(saveState.status==="ok"?"ok":saveState.status==="err"?"err":"")}>
              {saveState.status==="sending" && "⏳ "}{saveState.msg}
            </div>
          )}
          {saveState.status==="skip" && (
            <div className="save-status">Webhook未設定のため、結果はこの画面に表示されるのみです。</div>
          )}
          <div className="btn-row">
            <button className="btn btn-ghost" onClick={()=>{setScreen("start"); setResult(null);}}>もう一度（新しい問題）</button>
          </div>
        </div>
        <div className="panel">
          <h2>解説</h2>
          <p className="hint">正解の理由と、各誤答が違う理由を確認しましょう。</p>
          {questions.map((q,idx)=>{
            const chosen=answers[q.id]; const ok=chosen===q.answer;
            return (
              <div className="rev-item" key={q.id}>
                <div className="rev-head">
                  <div className={"rev-badge "+(ok?"ok":"no")}>{ok?"✓":"✕"}</div>
                  <div>
                    <div className="rev-qmeta">問{idx+1} · {q.part==="gakka"?"学科":"実技"} · {q._sectJP} · {q.per}点</div>
                    <div className="rev-q">{q.q}</div>
                  </div>
                </div>
                <div className="rev-body">
                  {q.options.map((opt,i)=>{
                    const isCorrect=i===q.answer;
                    const isChosenWrong=i===chosen && chosen!==q.answer;
                    return (
                      <div key={i} className={"rev-opt"+(isCorrect?" correct":"")+(isChosenWrong?" chosen-wrong":"")}>
                        <b>{"ABCD"[i]}.</b> {opt}
                        {isCorrect && <span className="tag">正解</span>}
                        {isChosenWrong && <span className="tag">あなたの解答</span>}
                      </div>
                    );
                  })}
                  <div className="rev-explain">
                    <div className="ex-lbl">解説</div>
                    <div className="ex-jp">{q.explain}</div>
                  </div>
                  {q.why_wrong && Object.keys(q.why_wrong).length>0 && (
                    <div className="rev-why-wrong">
                      {Object.entries(q.why_wrong).sort((a,b)=>a[0]-b[0]).map(([i,reason])=>(
                        <div key={i} style={{marginTop:4}}><b>{"ABCD"[Number(i)]} が誤りの理由：</b>{reason}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div className="foot-note">
          出典：一般社団法人日本フードサービス協会 特定技能2号 学習テキスト<br/>
          問題は4つの公式テキストに基づき作成 · 本アプリは練習用であり公式試験ではありません
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);

</script>
</body>
</html>
