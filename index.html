<style>

  .panel { margin-top:20px; border:1px solid var(--line); background:var(--paper-2);

  .panel h2 { margin:0 0 4px; font-size:15px; display:flex; align-items:center; gap:8px; }

  label.field { display:block; margin-bottom:14px; }

  input[type=text], input[type=url], select { width:100%; padding:11px 12px; border:1px solid var(--line);

  .rev-badge { flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:grid; place-items:center;

  .rev-qmeta { font-size:10.5px; color:var(--indigo); font-weight:800; text-transform:uppercase; letter-spacing:.4px; }
  .rev-q { font-size:14px; font-weight:700; margin-top:3px; }
  .rev-qvn { font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .rev-body { padding:0 15px 15px; }
  .rev-opt { font-size:12.5px; padding:8px 11px; border-radius:var(--radius); margin-top:6px;
    border:1px solid var(--line-soft); background:var(--paper); }

  .rev-opt.chosen-wrong { border-color:rgba(178,58,46,.4); background:rgba(178,58,46,.06); }
  .rev-opt .tag { font-size:10px; font-weight:800; padding:1px 6px; border-radius:10px; margin-left:6px; }
  .rev-opt.correct .tag { background:var(--pass); color:#fff; }
  .rev-opt.chosen-wrong .tag { background:var(--fail); color:#fff; }
  .rev-opt .ovn { display:block; color:var(--ink-soft); font-size:11px; margin-top:2px; }

    border-radius:0 var(--radius) var(--radius) 0; }
  .rev-explain .ex-lbl { font-size:10.5px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; }
  .rev-explain .ex-jp { font-size:13px; margin-top:5px; }
  .rev-explain .ex-vn { font-size:12.5px; color:var(--ink-soft); margin-top:7px; padding-top:7px; border-top:1px dashed var(--line); }
  .rev-why-wrong { margin-top:8px; font-size:12px; color:var(--ink-soft); }
  .rev-why-wrong b { color:var(--seal-deep); }
  .foot-note { text-align:center; font-size:11px; color:var(--ink-soft); margin-top:26px; line-height:1.7; }
  .err-box { margin-top:14px; padding:12px 14px; border-radius:var(--radius); background:rgba(178,58,46,.06);
    border:1px solid rgba(178,58,46,.3); color:var(--seal-deep); font-size:12.5px; }
  @media (max-width:560px) {
    .exam-facts { grid-template-columns:repeat(2,1fr); }
    .sect-breakdown { grid-template-columns:1fr; }
    .ss-name { flex-basis:108px; }

</style>

<body>
<div id="app-root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============================================================
// GO-LIVE CONFIG — đổi domain API production ở đúng 1 chỗ này
// ============================================================
const PRODUCTION_API_BASE = "https://api.avecvous-evolve.com";

const DATA_BASE = new URLSearchParams(location.search).get("data_base") || ".";
const API_BASE = new URLSearchParams(location.search).get("api_base") || PRODUCTION_API_BASE;

const CODE_REASON_MESSAGES = {
  invalid_request: "リクエストが正しくありません。コードをご確認ください。",
  not_found: "アクセスコードが見つかりません。コードをご確認ください。",
  revoked: "このアクセスコードは無効化されています。担当者にご連絡ください。",
  expired: "このアクセスコードの有効期限が切れています。担当者にご連絡ください。",
  exhausted: "受験可能回数の上限に達しています。担当者にご連絡ください。",
  exam_type_mismatch: "試験区分が一致しません。担当者にご連絡ください。",
};

// TRIAL = 40問の体験版（合否判定なし）。FULL = 本番同一の55問（既存の合否判定）。
// plan_type がどちらにも属さない場合はエラーで受験をブロックする（当て推量しない）。
const TRIAL_PLAN_TYPES = ["trial"];
const FULL_PLAN_TYPES = ["staff","one_time","subscription"];
const TRIAL_EXAM_MINUTES = 30;
const UPGRADE_URL_PLACEHOLDER = "#upgrade-phase5-todo";

const AGE_RANGES = ["10代","20代","30代","40代","50代以上"];

const NATIONALITIES = ["ベトナム","インドネシア","フィリピン","ミャンマー","カンボジア","ネパール","タイ","中国","その他"];

const PREFECTURES = ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県",
  "埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県",
  "岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県",
  "鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県",
  "佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県","海外"];

let QUESTION_BANK = [];
let BLUEPRINT = { gakka: [], jitsugi: [] };
let SECT_LABEL = {};
let PASS_MARK = null, TOTAL_MARK = null, EXAM_MINUTES = null;
let EXAM_LABEL = { industryLabel:"", tierLabel:"" };
// REAL_* = bản gốc 55問/250点/163点(PASS_MARK)/70分, chụp lại trước khi bị ghi đè cho chế độ TRIAL.
// Dùng để hiển thị khối "本番の試験構成" trên màn kết quả trial — không bao giờ bị buildExam/finishExam đọc tới.
let REAL_BLUEPRINT = null, REAL_PASS_MARK = null, REAL_TOTAL_MARK = null;

async function loadExamData(examType){
  const manifest = await (await fetch(`${DATA_BASE}/data/manifest.json`)).json();
  const cfg = manifest[examType];
  if(!cfg) throw new Error(`Unknown exam_type: ${examType}`);
  const data = await (await fetch(`${DATA_BASE}/${cfg.file}`)).json();
  QUESTION_BANK = data.questions;
  BLUEPRINT = data.blueprint;
  SECT_LABEL = data.sectLabels;
  PASS_MARK = cfg.passMark;
  TOTAL_MARK = cfg.totalMark;
  EXAM_MINUTES = cfg.examMinutes;
  EXAM_LABEL = { industryLabel: cfg.industryLabel, tierLabel: cfg.tierLabel };
}

// TRIAL専用: 本番のBLUEPRINTと同じsect構成を使い、各sectをn=5・per=1に固定した「入力データ」を作るだけ。
// buildExam()のアルゴリズム（選定・シャッフル・remap）は一切変更しない — 呼び出し前にBLUEPRINTを差し替えるだけ。
function deriveTrialBlueprint(full){
  const shrink = arr => arr.map(s => ({...s, n:5, per:1}));
  return { gakka: shrink(full.gakka), jitsugi: shrink(full.jitsugi) };
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildExam(){
  const out=[];
  ["gakka","jitsugi"].forEach(part=>{
    BLUEPRINT[part].forEach(sect=>{
      let pool=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part===part);
      let extra=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part!==part);
      let picks=shuffle(pool).slice(0,sect.n);
      if(picks.length<sect.n){ picks=picks.concat(shuffle(extra).slice(0,sect.n-picks.length)); }
      picks.forEach(q=>{
        const order=shuffle([0,1,2,3]);
        const newOptions=order.map(i=>q.options[i]);
        const newAnswer=order.indexOf(q.answer);
        const remap={}; order.forEach((oldI,newI)=>{ remap[oldI]=newI; });
        const newWhy={};
        if(q.why_wrong){ Object.entries(q.why_wrong).forEach(([oldI,txt])=>{ newWhy[remap[oldI]]=txt; }); }
        out.push({ part, sect:sect.key, per:sect.per, _sectJP:sect.jp, qid:q.qid,
          q:q.q, img:q.img, options:newOptions, answer:newAnswer, explain:q.explain, why_wrong:newWhy });
      });
    });
  });
  return out.map((q,i)=>({...q,id:i}));
}

// ============================================================
// Kết quả gửi đi (sendResult) — chống mất dữ liệu khi network lỗi:
// idempotency key (server dedup theo access_code+client_submission_id,
// xem submit_exam_result phía corporate-site) + lưu tạm localStorage
// trước khi fetch + retry có backoff + báo "bỏ cuộc" qua sendBeacon.
// Không đụng tới buildExam()/finishExam() — chỉ nằm ở tầng gửi kết quả.
// ============================================================
const PENDING_RESULT_KEY = "ssw2exam_pending_result";
const RETRY_DELAYS_MS = [0, 2000, 5000];

function genSubmissionId(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return Date.now()+"-"+Math.random().toString(36).slice(2);
}

function loadPendingResult(){
  try{
    const raw=localStorage.getItem(PENDING_RESULT_KEY);
    return raw?JSON.parse(raw):null;
  }catch(e){ return null; }
}

function savePendingResult(entry){
  try{ localStorage.setItem(PENDING_RESULT_KEY, JSON.stringify(entry)); }catch(e){}
}

function clearPendingResult(){
  try{ localStorage.removeItem(PENDING_RESULT_KEY); }catch(e){}
}

// 呼ばれるのはリトライを使い果たした後の最後の手段 — レスポンスは読まない
// (sendBeaconは読めない)。corporate-site側がoutbox経由でこの「送信断念」を
// 記録し、ユーザーからの申告なしに検知できるようにするための最終手段。
function reportGiveUp(apiBase, payload){
  try{
    if(!navigator.sendBeacon) return;
    const blob=new Blob([JSON.stringify({
      access_code:payload.access_code, exam_type:payload.exam_type,
      client_submission_id:payload.client_submission_id,
    })], {type:"application/json"});
    navigator.sendBeacon(`${apiBase}/api/exam-results/report-failure`, blob);
  }catch(e){}
}

// 500系はネットワーク/サーバー側の一時的な問題として扱いretryする。それ以外の
// ステータスでbodyがJSONとして読めない場合(api_base設定ミス・WAF/CDNのブロック
// ページ等)は「リトライしても絶対に直らない」設定エラーの一種であり、ネットワーク
// エラーと区別してすぐに諦める(NonRetryableSubmitError) — 3回分のリトライ待機
// (最大7秒)を無駄にしない。
class NonRetryableSubmitError extends Error {}

async function postExamResultOnce(apiBase, payload){
  const r=await fetch(`${apiBase}/api/exam-results`,{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)
  });
  if(r.status>=500) throw new Error("server_error_"+r.status);
  try{
    return await r.json();
  }catch(e){
    throw new NonRetryableSubmitError("invalid_response_status_"+r.status);
  }
}

// Trả về {done:true, body} khi có phản hồi từ server (accepted true hoặc
// false — cả 2 đều là "done", vì false là quyết định nghiệp vụ không nên
// retry). {done:false} khi hết cả 3 lần thử vì lỗi mạng/server 5xx, hoặc
// ngay lập tức (không đợi hết 3 lần) khi gặp NonRetryableSubmitError.
async function submitExamPayload(apiBase, payload, onStatus){
  for(let attempt=0; attempt<RETRY_DELAYS_MS.length; attempt++){
    if(attempt===0){
      onStatus({status:"sending", msg:"送信中…"});
    }else{
      onStatus({status:"sending", msg:`通信エラーのため再試行しています…（${attempt+1}/${RETRY_DELAYS_MS.length}）`});
    }
    if(RETRY_DELAYS_MS[attempt]>0){
      await new Promise(res=>setTimeout(res, RETRY_DELAYS_MS[attempt]));
    }
    try{
      const body=await postExamResultOnce(apiBase, payload);
      return {done:true, body};
    }catch(e){
      if(e instanceof NonRetryableSubmitError || attempt===RETRY_DELAYS_MS.length-1){
        reportGiveUp(apiBase, payload);
        return {done:false};
      }
    }
  }
}

function App(){
  const [screen,setScreen]=useState("gate");
  const [examMode,setExamMode]=useState("full");
  const [code,setCode]=useState(()=>new URLSearchParams(location.search).get("code")||"");
  const [gateStatus,setGateStatus]=useState("idle");
  const [gateError,setGateError]=useState("");
  const [verifyInfo,setVerifyInfo]=useState(null);
  const [surveyAgeRange,setSurveyAgeRange]=useState("");
  const [surveyNationality,setSurveyNationality]=useState("");
  const [surveyPrefecture,setSurveyPrefecture]=useState("");
  const [surveyOptIn,setSurveyOptIn]=useState(false);
  const [survey,setSurvey]=useState(null);
  const [questions,setQuestions]=useState([]);
  const [answers,setAnswers]=useState({});
  const [cur,setCur]=useState(0);
  const [remaining,setRemaining]=useState(0);
  const [result,setResult]=useState(null);
  const [resultMeta,setResultMeta]=useState({});
  const [saveState,setSaveState]=useState({status:"idle",msg:""});
  const [resumeState,setResumeState]=useState(null);
  const timerRef=useRef(null);
  // Chặn finishExam() bị gọi 2 lần cho cùng 1 lượt thi (double-tap trên 2 nút
  // submit, hoặc tap trùng lúc hết giờ tự nộp) — mỗi lần gọi sinh 1
  // client_submission_id khác nhau nên server không dedup được, dẫn đến tốn
  // 2 lượt thi + race ghi đè localStorage. Dùng ref (không phải state) vì
  // cần chặn đồng bộ, không đợi re-render. Không sửa finishExam() — chỉ bọc
  // ở nơi gọi.
  const submittingRef=useRef(false);

  async function resumePendingSubmission(){
    const pending=loadPendingResult();
    if(!pending){
      // resumeState が非nullなら手動「再送信」経由の呼び出し(初回mount時は
      // まだnullなのでここは通らない) — 他タブが既に送信済みにしていた場合、
      // 無反応にせず解決済みである旨を表示する。
      setResumeState(prev => prev ? {status:"ok", msg:"送信対象が見つかりません(既に送信済みの可能性があります)。"} : null);
      return;
    }
    setResumeState({status:"sending", msg:"前回の受験結果を送信しています…"});
    const outcome=await submitExamPayload(pending.api_base || API_BASE, pending.payload, setResumeState);
    if(!outcome.done){
      setResumeState({status:"err", retryable:true,
        msg:"前回の受験結果がまだ送信できていません。ネットワーク状況をご確認のうえ「再送信」を押してください。"});
      return;
    }
    clearPendingResult();
    const body=outcome.body;
    if(!body.accepted){
      setResumeState({status:"err",
        msg:CODE_REASON_MESSAGES[body.reason] || "前回の受験結果の送信に失敗しました。担当者にご連絡ください。"});
      return;
    }
    setResumeState({status:"ok", msg:"前回の受験結果を送信しました。"});
  }

  useEffect(()=>{ resumePendingSubmission(); },[]); // eslint-disable-line

  useEffect(()=>{
    if(screen!=="quiz") return;
    timerRef.current=setInterval(()=>{
      setRemaining(r=>{ if(r<=1){clearInterval(timerRef.current); if(!submittingRef.current){submittingRef.current=true; finishExam();} return 0;} return r-1; });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[screen]); // eslint-disable-line

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  async function verifyCode(){
    const trimmed=code.trim();
    if(!trimmed){ setGateError("アクセスコードを入力してください。"); return; }
    setGateStatus("verifying"); setGateError("");
    try{
      const r=await fetch(`${API_BASE}/api/verify-code`,{
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({access_code:trimmed})
      });
      const info=await r.json();
      if(!info.valid){
        setGateStatus("error");
        setGateError(CODE_REASON_MESSAGES[info.reason] || "アクセスコードを確認できませんでした。コードをご確認のうえ再度お試しください。");
        return;
      }
      if(!info.exam_type){
        setGateStatus("error");
        setGateError("この受験コードには試験区分が設定されていません。担当者にご連絡ください。");
        return;
      }
      const mode = TRIAL_PLAN_TYPES.includes(info.plan_type) ? "trial"
        : FULL_PLAN_TYPES.includes(info.plan_type) ? "full" : null;
      if(!mode){
        setGateStatus("error");
        setGateError("不明なプランです。運営にお問い合わせください。");
        return;
      }
      await loadExamData(info.exam_type);
      if(mode==="trial"){
        REAL_BLUEPRINT=BLUEPRINT; REAL_PASS_MARK=PASS_MARK; REAL_TOTAL_MARK=TOTAL_MARK;
        BLUEPRINT=deriveTrialBlueprint(REAL_BLUEPRINT);
        TOTAL_MARK=[...BLUEPRINT.gakka,...BLUEPRINT.jitsugi].reduce((s,x)=>s+x.n*x.per,0);
        PASS_MARK=null;
        EXAM_MINUTES=TRIAL_EXAM_MINUTES;
      }
      setExamMode(mode);
      setVerifyInfo({...info, access_code:trimmed});
      setGateStatus("idle");
      setScreen(info.is_first_attempt?"survey":"start");
      window.scrollTo(0,0);
    }catch(e){
      setGateStatus("error");
      setGateError("通信エラーが発生しました。しばらくしてから再度お試しください。");
    }
  }

  function proceedFromSurvey(skip){
    if(skip){ setSurvey(null); }
    else{ setSurvey({ age_range: surveyAgeRange||null, nationality: surveyNationality||null, region: surveyPrefecture||null, marketing_opt_in: surveyOptIn }); }
    setScreen("start");
    window.scrollTo(0,0);
  }

  function startExam(){
    const q=buildExam();
    setQuestions(q); setAnswers({}); setCur(0); setRemaining(EXAM_MINUTES*60);
    submittingRef.current=false;
    setScreen("quiz");
    window.scrollTo(0,0);
  }

  function handleSubmitClick(){
    if(submittingRef.current) return;
    submittingRef.current=true;
    finishExam();
  }

  function finishExam(){
    clearInterval(timerRef.current);
    const sectScore={}; let total=0, maxTotal=0;
    questions.forEach(q=>{
      const s=(sectScore[q.sect] ||= {got:0,max:0});
      s.max+=q.per; maxTotal+=q.per;
      if(answers[q.id]===q.answer){ s.got+=q.per; total+=q.per; }
    });
    const passed=total>=PASS_MARK;
    const res={
      datetime:new Date().toISOString(), datetimeLocal:new Date().toLocaleString("ja-JP"),
      total, maxTotal, passMark:PASS_MARK, passed, sectScore,
      answered:Object.keys(answers).length, questionCount:questions.length,
      detail:questions.map(q=>({ id:q.id, part:q.part, sect:q.sect, q:q.q,
        chosen:answers[q.id]??null, correct:q.answer, isCorrect:answers[q.id]===q.answer, points:q.per })),
    };
    setResult(res); setScreen("result"); window.scrollTo(0,0);
    sendResult(res);
  }

  async function attemptResultSubmission(payload){
    savePendingResult({payload, api_base:API_BASE, created_at:new Date().toISOString()});
    const outcome=await submitExamPayload(API_BASE, payload, setSaveState);
    if(!outcome.done){
      setSaveState({status:"err", retryable:true,
        msg:"通信状況が悪いため結果の送信が完了していません。画面を閉じずに「再送信」を押すか、時間をおいて再度お試しください。"});
      return;
    }
    const body=outcome.body;
    if(!body.accepted){
      clearPendingResult();
      setSaveState({status:"err",msg:CODE_REASON_MESSAGES[body.reason] || "結果の送信に失敗しました。担当者にご連絡ください。"});
      return;
    }
    clearPendingResult();
    setResultMeta({attemptNumber:body.attempt_number, remainingAttempts:body.remaining_attempts});
    setSaveState({status:"ok",msg:"結果を送信しました。"});
  }

  function retryResultSubmission(){
    const pending=loadPendingResult();
    if(pending){
      attemptResultSubmission(pending.payload);
    }else{
      // Already resolved elsewhere (e.g. another tab's resumePendingSubmission
      // beat us to it) — say so instead of silently doing nothing.
      setSaveState({status:"ok", msg:"送信対象が見つかりません(既に送信済みの可能性があります)。"});
    }
  }

  // まだ再送信できていない結果(saveState.retryable)を残したまま次に進むと
  // ssw2exam_pending_result が新しい受験のペイロードで上書きされ、前回の結果が
  // 復元不能になる — 次に進む前に必ず確認を挟む。
  function handleRetake(){
    if(saveState.retryable){
      const proceed=window.confirm("前回の受験結果がまだ送信できていません。このまま進むと結果が失われる可能性があります。よろしいですか？");
      if(!proceed) return;
    }
    setScreen("gate"); setResult(null); setResultMeta({}); setSurvey(null);
    setSaveState({status:"idle",msg:""});
  }

  async function sendResult(res){
    const sections=Object.keys(res.sectScore).map(sect=>{
      const items=res.detail.filter(d=>d.sect===sect);
      return { topic:SECT_LABEL[sect], correct:items.filter(d=>d.isCorrect).length, total:items.length };
    });
    const wrong_questions=res.detail.filter(d=>!d.isCorrect).map(d=>({
      id:questions[d.id].qid,
      topic:SECT_LABEL[d.sect],
      question:d.q,
      user_answer:d.chosen!=null?questions[d.id].options[d.chosen]:null,
      correct_answer:questions[d.id].options[d.correct],
    }));
    const payload={
      access_code:verifyInfo.access_code, exam_type:verifyInfo.exam_type,
      total_score:res.total, sections, wrong_questions,
      client_submission_id:genSubmissionId(),
      ...(verifyInfo.is_first_attempt && survey ? { survey } : {}),
    };
    await attemptResultSubmission(payload);
  }

  // TRIAL専用の集計。finishExam()のsectScore（sect単位、part混在）とは別物 — finishExam()本体は未変更。
  // questions/answersはfinishExam()実行後もstateに残っているため、ここで独立に part+sect単位へ再集計する。
  function trialBreakdown(qs, ans){
    const buckets = {};
    qs.forEach(q=>{
      const key = q.part+"_"+q.sect;
      const b = (buckets[key] ||= {part:q.part, sect:q.sect, correct:0, total:0});
      b.total++;
      if(ans[q.id]===q.answer) b.correct++;
    });
    return Object.values(buckets);
  }
  function trialTierColor(rate){
    if(rate<0.6) return "red";
    if(rate<0.8) return "yellow";
    return "green";
  }

  function Masthead(){
    const totalQuestions=[...BLUEPRINT.gakka,...BLUEPRINT.jitsugi].reduce((s,x)=>s+x.n,0);
    return (
      <div className="masthead">
        <div className="brandline">
          <div className="seal">{EXAM_LABEL.industryLabel}<br/>{EXAM_LABEL.tierLabel}</div>
          <div className="titles">
            <h1>{EXAM_LABEL.industryLabel} {EXAM_LABEL.tierLabel} 技能測定試験</h1>
            <div className="romaji">練習アプリ</div>
          </div>
        </div>
        <div className="exam-facts">
          <div className="fact"><div className="num">{totalQuestions}</div><div className="lab">問</div></div>
          <div className="fact"><div className="num">{EXAM_MINUTES}</div><div className="lab">分</div></div>
          <div className="fact"><div className="num">{TOTAL_MARK}</div><div className="lab">満点</div></div>
          {PASS_MARK!=null
            ? <div className="fact"><div className="num">{PASS_MARK}</div><div className="lab">合格点</div></div>
            : <div className="fact"><div className="num">体験</div><div className="lab">版</div></div>}
        </div>
      </div>
    );
  }

  // 送信が終わるまで「結果画面がもう完了したように見える」ことを防ぐための
  // 全面オーバーレイ。screen==="result"のスコア表示部分にのみ重ねる —
  // finishExam()のscreen遷移そのものには触れない。
  function SavingOverlay(){
    return (
      <div style={{position:"absolute",inset:0,background:"rgba(247,243,236,.94)",
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        gap:8,borderRadius:"var(--radius)",zIndex:5,textAlign:"center",padding:20}}>
        <div style={{fontSize:15,fontWeight:800,color:"var(--indigo)"}}>結果を送信しています…</div>
        <div style={{fontSize:12.5,color:"var(--ink-soft)"}}>画面を閉じずにそのままお待ちください。</div>
      </div>
    );
  }

  if(screen==="gate"){
    const resumeBusy=resumeState && resumeState.status==="sending";
    return (
      <div className="wrap">
        {resumeState && resumeState.status!=="idle" && (
          <div className="panel">
            <h2>前回の受験結果の送信</h2>
            <div className={"save-status "+(resumeState.status==="ok"?"ok":resumeState.status==="err"?"err":"")}>
              {resumeState.status==="sending" && "⏳ "}{resumeState.msg}
            </div>
            {resumeState.retryable && (
              <button className="btn btn-seal" style={{width:"100%",marginTop:10}} onClick={resumePendingSubmission}>再送信</button>
            )}
          </div>
        )}
        <div className="panel">
          <h2>アクセスコード</h2>
          <p className="hint">受験するにはアクセスコードを入力してください。</p>
          <label className="field" style={{marginBottom:4}}>
            <span className="lbl">アクセスコード <span className="vn-s">（必須）</span></span>
            <input type="text" value={code} onChange={e=>setCode(e.target.value)} placeholder="例：ABCD-1234"
              disabled={gateStatus==="verifying"||resumeBusy}
              onKeyDown={e=>{ if(e.key==="Enter") verifyCode(); }} />
          </label>
          {gateError && <div className="err-box">{gateError}</div>}
          <button className="btn btn-seal" style={{width:"100%",marginTop:10}} disabled={gateStatus==="verifying"||resumeBusy} onClick={verifyCode}>
            {gateStatus==="verifying"?"確認中…":"認証する"}
          </button>
        </div>
      </div>
    );
  }

  if(screen==="survey"){
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <h2>簡単なアンケート</h2>
          <p className="hint">初めての受験のみお伺いします。回答は任意です（スキップできます）。</p>
          <label className="field">
            <span className="lbl">年代</span>
            <select value={surveyAgeRange} onChange={e=>setSurveyAgeRange(e.target.value)}>
              <option value="">選択してください</option>
              {AGE_RANGES.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </label>
          <label className="field">
            <span className="lbl">国籍</span>
            <select value={surveyNationality} onChange={e=>setSurveyNationality(e.target.value)}>
              <option value="">選択してください</option>
              {NATIONALITIES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </label>
          <label className="field" style={{marginBottom:4}}>
            <span className="lbl">お住まい</span>
            <select value={surveyPrefecture} onChange={e=>setSurveyPrefecture(e.target.value)}>
              <option value="">選択してください</option>
              {PREFECTURES.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </label>
          <label className="field" style={{display:"flex",gap:8,alignItems:"flex-start",marginTop:12}}>
            <input type="checkbox" checked={surveyOptIn} onChange={e=>setSurveyOptIn(e.target.checked)} style={{marginTop:3}} />
            <span style={{fontSize:12.5}}>試験やお仕事のご案内をメールでお送りしてもよい場合はチェックしてください。</span>
          </label>
          <div className="btn-row" style={{marginTop:10}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>proceedFromSurvey(true)}>スキップ</button>
            <button className="btn btn-seal" style={{flex:1}} onClick={()=>proceedFromSurvey(false)}>次へ</button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==="start"){
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <h2>受験者情報</h2>
          <p className="hint">試験を始める前にご確認ください。</p>
          <label className="field" style={{marginBottom:4}}>
            <span className="lbl">お名前</span>
            <div style={{padding:"11px 12px",background:"var(--paper)",border:"1px solid var(--line)",borderRadius:"var(--radius)",fontSize:14.5}}>{verifyInfo?.display_name}</div>
          </label>
          <p className="hint" style={{marginTop:8}}>
            提出すると結果は運営システムに自動送信され、担当者が確認できます。
          </p>
          <button className="btn btn-seal" style={{width:"100%",marginTop:10}} onClick={startExam}>試験を始める</button>
        </div>
        <div className="panel">
          <h2>出題構成</h2>
          <p className="hint">
            学科{BLUEPRINT.gakka.reduce((s,x)=>s+x.n*x.per,0)}点分＋実技{BLUEPRINT.jitsugi.reduce((s,x)=>s+x.n*x.per,0)}点分＝{TOTAL_MARK}点満点。
            {PASS_MARK!=null ? `合格基準は合計${PASS_MARK}点以上。` : "体験版のため合否判定はありません。結果は正答率でお伝えします。"}
          </p>
          <div style={{fontSize:12.5,fontWeight:700,margin:"4px 0 6px",color:"var(--indigo)"}}>
            学科試験 — {BLUEPRINT.gakka.reduce((s,x)=>s+x.n,0)}問 / {BLUEPRINT.gakka.reduce((s,x)=>s+x.n*x.per,0)}点
          </div>
          <div className="sect-breakdown">
            {BLUEPRINT.gakka.map(s=>(
              <div className="sect-row" key={"g"+s.key}>
                <span className="jp">{s.jp}</span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:12.5,fontWeight:700,margin:"14px 0 6px",color:"var(--indigo)"}}>
            実技試験 — {BLUEPRINT.jitsugi.reduce((s,x)=>s+x.n,0)}問 / {BLUEPRINT.jitsugi.reduce((s,x)=>s+x.n*x.per,0)}点（判断・計画立案）
          </div>
          <div className="sect-breakdown">
            {BLUEPRINT.jitsugi.map(s=>(
              <div className="sect-row" key={"j"+s.key}>
                <span className="jp">{s.jp}</span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <p className="hint" style={{marginTop:14,marginBottom:0}}>
            出典：一般社団法人日本フードサービス協会 学習テキスト（衛生管理・飲食物調理・接客全般・店舗運営）。問題と解説は当該テキストに基づき作成。
          </p>
        </div>
      </div>
    );
  }

  if(screen==="quiz"){
    const q=questions[cur];
    const answeredCount=Object.keys(answers).length;
    const partJP=q.part==="gakka"?"学科":"実技";
    return (
      <div className="wrap">
        <div className="panel">
          <div className="quiz-top">
            <div>
              <div className={"timer"+(remaining<=300?" warn":"")}>{fmt(remaining)}</div>
              <div className="progress-text">残り時間</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="progress-text">{answeredCount} / {questions.length} 回答済</div>
              <div className="progress-bar" style={{width:120}}>
                <span style={{width:(answeredCount/questions.length*100)+"%"}}/>
              </div>
            </div>
          </div>
          <div className="q-card">
            <span className="q-eyebrow">{partJP} <span className="div">·</span> {q._sectJP} <span className="div">·</span> {q.per}点</span>
            <div className="q-num">問 {cur+1} / {questions.length}</div>
            <div className="q-jp">{q.q}</div>
            {q.img && <div style={{margin:"14px 0",textAlign:"center"}} dangerouslySetInnerHTML={{__html:q.img}} />}
            <div className="choices">
              {q.options.map((opt,i)=>(
                <button key={i} className={"choice"+(answers[q.id]===i?" sel":"")}
                  onClick={()=>setAnswers(a=>({...a,[q.id]:i}))}>
                  <span className="key">{"ABCD"[i]}</span>
                  <span className="ctext">{opt}</span>
                </button>
              ))}
            </div>
            <div className="nav-row">
              <button className="btn btn-ghost" style={{flex:1}} disabled={cur===0} onClick={()=>setCur(c=>Math.max(0,c-1))}>← 前へ</button>
              {cur<questions.length-1 ? (
                <button className="btn btn-primary" style={{flex:1}} onClick={()=>setCur(c=>Math.min(questions.length-1,c+1))}>次へ →</button>
              ) : (
                <button className="btn btn-seal" style={{flex:1}} onClick={handleSubmitClick}>提出する</button>
              )}
            </div>
            <div className="palette">
              {questions.map((qq,i)=>(
                <button key={i} className={"pnum"+(answers[qq.id]!=null?" done":"")+(i===cur?" cur":"")} onClick={()=>setCur(i)}>{i+1}</button>
              ))}
            </div>
            <button className="btn btn-seal" style={{width:"100%",marginTop:18}} onClick={handleSubmitClick}>採点する（提出）</button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==="result" && result){
    const pct=Math.round(result.total/result.maxTotal*100);
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          {examMode==="trial" ? (
            <>
              <div style={{position:"relative"}}>
                <div className="sect-scores">
                  {trialBreakdown(questions,answers).map((b,i)=>{
                    const rate=b.correct/b.total, tier=trialTierColor(rate);
                    return (
                      <div className={"ss-row tb-"+tier} key={i}>
                        <div className="ss-name">{b.part==="gakka"?"学科":"実技"}・{SECT_LABEL[b.sect]}</div>
                        <div className="ss-track"><div className="ss-fill tb-fill" style={{width:(rate*100)+"%"}}/></div>
                        <div className="ss-pts tb-pct">{b.correct}/{b.total}（{Math.round(rate*100)}%）</div>
                      </div>
                    );
                  })}
                </div>
                <div className="rev-explain" style={{marginTop:16}}>
                  <div className="ex-lbl">本番の試験構成</div>
                  <div className="ex-jp">
                    本番は学科{REAL_BLUEPRINT.gakka.reduce((s,x)=>s+x.n,0)}問{REAL_BLUEPRINT.gakka.reduce((s,x)=>s+x.n*x.per,0)}点＋実技{REAL_BLUEPRINT.jitsugi.reduce((s,x)=>s+x.n,0)}問{REAL_BLUEPRINT.jitsugi.reduce((s,x)=>s+x.n*x.per,0)}点＝{REAL_TOTAL_MARK}点満点、合格基準{REAL_PASS_MARK}点。
                  </div>
                  <div className="ex-vn" style={{borderTop:"none",paddingTop:0}}>
                    この40問体験の正答率をもとにした目安です。本番形式(55問)では出題範囲が広がるため、結果は変わる可能性があります。しっかり対策するには有料プランがおすすめです。
                  </div>
                </div>
                {saveState.status==="sending" && <SavingOverlay/>}
              </div>
              {saveState.status!=="idle" && (
                <div className={"save-status "+(saveState.status==="ok"?"ok":saveState.status==="err"?"err":"")}>
                  {saveState.status==="sending" && "⏳ "}{saveState.msg}
                </div>
              )}
              {saveState.retryable && (
                <button className="btn btn-seal" style={{width:"100%",marginTop:8}} onClick={retryResultSubmission}>再送信</button>
              )}
              <div className="btn-row">
                <a className="btn btn-seal" style={{flex:1,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center"}} href={UPGRADE_URL_PLACEHOLDER}>有料プランで対策する</a>
                <button className="btn btn-ghost" style={{flex:1}} onClick={handleRetake}>もう一度</button>
              </div>
            </>
          ) : (
            <>
              <div style={{position:"relative"}}>
                <div className={"score-hero "+(result.passed?"pass":"fail")}>
                  <div className="verdict-seal">{result.passed?"合":"否"}</div>
                  <div className="score-big">{result.total}<span className="of"> / {result.maxTotal}</span></div>
                  <div className="score-sub">{verifyInfo?.display_name} 様{resultMeta.attemptNumber?` · 受験 ${resultMeta.attemptNumber}回目`:""}{resultMeta.remainingAttempts!=null?` · 残り${resultMeta.remainingAttempts}回`:""} · {pct}% · 合格基準 {PASS_MARK}点</div>
                  <div className="verdict-label">{result.passed?"合格":"不合格"}</div>
                </div>
                <div className="sect-scores">
                  {Object.entries(result.sectScore).map(([k,v])=>(
                    <div className="ss-row" key={k}>
                      <div className="ss-name">{SECT_LABEL[k]}</div>
                      <div className="ss-track"><div className="ss-fill" style={{width:(v.got/v.max*100)+"%"}}/></div>
                      <div className="ss-pts">{v.got}/{v.max}</div>
                    </div>
                  ))}
                </div>
                {saveState.status==="sending" && <SavingOverlay/>}
              </div>
              {saveState.status!=="idle" && (
                <div className={"save-status "+(saveState.status==="ok"?"ok":saveState.status==="err"?"err":"")}>
                  {saveState.status==="sending" && "⏳ "}{saveState.msg}
                </div>
              )}
              {saveState.retryable && (
                <button className="btn btn-seal" style={{width:"100%",marginTop:8}} onClick={retryResultSubmission}>再送信</button>
              )}
              <div className="btn-row">
                <button className="btn btn-ghost" onClick={handleRetake}>もう一度（新しい問題）</button>
              </div>
            </>
          )}
        </div>
        <div className="panel">
          <h2>解説</h2>
          <p className="hint">正解の理由と、各誤答が違う理由を確認しましょう。</p>
          {questions.map((q,idx)=>{
            const chosen=answers[q.id]; const ok=chosen===q.answer;
            return (
              <div className="rev-item" key={q.id}>
                <div className="rev-head">
                  <div className={"rev-badge "+(ok?"ok":"no")}>{ok?"✓":"✕"}</div>
                  <div>
                    <div className="rev-qmeta">問{idx+1} · {q.part==="gakka"?"学科":"実技"} · {q._sectJP} · {q.per}点</div>
                    <div className="rev-q">{q.q}</div>
                  </div>
                </div>
                <div className="rev-body">
                  {q.img && <div style={{margin:"4px 0 10px",textAlign:"center"}} dangerouslySetInnerHTML={{__html:q.img}} />}
                  {q.options.map((opt,i)=>{
                    const isCorrect=i===q.answer;
                    const isChosenWrong=i===chosen && chosen!==q.answer;
                    return (
                      <div key={i} className={"rev-opt"+(isCorrect?" correct":"")+(isChosenWrong?" chosen-wrong":"")}>
                        <b>{"ABCD"[i]}.</b> {opt}
                        {isCorrect && <span className="tag">正解</span>}
                        {isChosenWrong && <span className="tag">あなたの解答</span>}
                      </div>
                    );
                  })}
                  <div className="rev-explain">
                    <div className="ex-lbl">解説</div>
                    <div className="ex-jp">{q.explain}</div>
                  </div>
                  {q.why_wrong && Object.keys(q.why_wrong).length>0 && (
                    <div className="rev-why-wrong">
                      {Object.entries(q.why_wrong).sort((a,b)=>a[0]-b[0]).map(([i,reason])=>(
                        <div key={i} style={{marginTop:4}}><b>{"ABCD"[Number(i)]} が誤りの理由：</b>{reason}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div className="foot-note">
          出典：一般社団法人日本フードサービス協会 特定技能2号 学習テキスト<br/>
          問題は4つの公式テキストに基づき作成 · 本アプリは練習用であり公式試験ではありません
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);

</script>
</body>
</html>
