<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外食業 特定技能2号 技能測定試験 練習アプリ</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink:#1a1410; --ink-soft:#4a4038; --paper:#f7f3ec; --paper-2:#fffdf8;
    --line:#d9cfc0; --line-soft:#e8e0d2; --seal:#b23a2e; --seal-deep:#8f2c22;
    --indigo:#2f4858; --indigo-soft:#45647a; --gold:#b8893a;
    --pass:#2f7a4d; --fail:#b23a2e; --amber-bg:#fbf4e4;
    --shadow:0 1px 2px rgba(26,20,16,.08), 0 8px 30px rgba(26,20,16,.10); --radius:4px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 600px at 15% -10%, rgba(47,72,88,.05), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(178,58,46,.05), transparent 55%), var(--paper);
    min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:760px; margin:0 auto; padding:28px 20px 80px; }
  .masthead { position:relative; border:1px solid var(--line); background:var(--paper-2);
    border-radius:var(--radius); padding:22px 24px; box-shadow:var(--shadow); overflow:hidden; }
  .brandline { display:flex; align-items:center; gap:12px; }
  .seal { flex:0 0 auto; width:46px; height:46px; border-radius:6px; border:2px solid var(--seal);
    color:var(--seal); display:grid; place-items:center; font-weight:800; font-size:15px;
    line-height:1.05; text-align:center; transform:rotate(-3deg); background:rgba(178,58,46,.05); }
  .titles h1 { margin:0; font-size:20px; letter-spacing:.5px; font-weight:800; }
  .titles .romaji { margin:2px 0 0; font-size:12.5px; color:var(--indigo-soft); font-weight:600; }
  .titles .vn { margin:3px 0 0; font-size:13px; color:var(--ink-soft); }
  .exam-facts { margin-top:16px; display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
    background:var(--line-soft); border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden; }
  .fact { background:var(--paper-2); padding:10px 12px; text-align:center; }
  .fact .num { font-size:18px; font-weight:800; color:var(--indigo); }
  .fact .lab { font-size:10.5px; color:var(--ink-soft); margin-top:2px; }
  .panel { margin-top:20px; border:1px solid var(--line); background:var(--paper-2);
    border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); }
  .panel h2 { margin:0 0 4px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .panel h2 .vn-h { color:var(--ink-soft); font-weight:600; font-size:12.5px; }
  .hint { font-size:12.5px; color:var(--ink-soft); margin:4px 0 16px; }
  label.field { display:block; margin-bottom:14px; }
  label.field .lbl { display:block; font-size:12.5px; font-weight:700; margin-bottom:5px; }
  label.field .lbl .vn-s { color:var(--ink-soft); font-weight:500; }
  input[type=text], input[type=url] { width:100%; padding:11px 12px; border:1px solid var(--line);
    border-radius:var(--radius); background:var(--paper); font-size:14.5px; color:var(--ink);
    font-family:inherit; transition:border-color .15s, box-shadow .15s; }
  input:focus { outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px rgba(47,72,88,.12); }
  .sect-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  .sect-row { display:flex; justify-content:space-between; align-items:baseline; padding:9px 12px;
    background:var(--paper); border:1px solid var(--line-soft); border-radius:var(--radius); font-size:12.5px; }
  .sect-row .jp { font-weight:700; }
  .sect-row .vn2 { color:var(--ink-soft); font-size:11px; display:block; margin-top:1px; font-weight:400; }
  .sect-row .pts { color:var(--indigo); font-weight:800; white-space:nowrap; }
  .btn { appearance:none; border:none; cursor:pointer; font-family:inherit; font-weight:800;
    letter-spacing:.3px; border-radius:var(--radius); padding:13px 20px; font-size:14.5px;
    transition:transform .08s, box-shadow .15s, background .15s; }
  .btn:active { transform:translateY(1px); }
  .btn-primary { background:var(--indigo); color:#fff; width:100%; box-shadow:0 2px 0 var(--indigo-soft); }
  .btn-primary:hover { background:#263a47; }
  .btn-primary:disabled { background:#9aa8b0; box-shadow:none; cursor:not-allowed; }
  .btn-seal { background:var(--seal); color:#fff; box-shadow:0 2px 0 var(--seal-deep); }
  .btn-seal:hover { background:#9d3229; }
  .btn-ghost { background:transparent; color:var(--indigo); border:1px solid var(--line); }
  .btn-ghost:hover { background:var(--paper); }
  .btn-row { display:flex; gap:10px; margin-top:8px; }
  .btn-row .btn { flex:1; }
  .vn-btn { display:block; font-weight:500; font-size:11px; opacity:.85; margin-top:1px; }
  .quiz-top { position:sticky; top:0; z-index:20; margin:-22px -22px 18px; padding:14px 22px;
    background:var(--paper-2); border-bottom:1px solid var(--line); display:flex; align-items:center;
    justify-content:space-between; gap:12px; border-radius:var(--radius) var(--radius) 0 0; }
  .timer { font-variant-numeric:tabular-nums; font-weight:800; font-size:20px; color:var(--indigo); letter-spacing:1px; }
  .timer.warn { color:var(--seal); }
  .progress-text { font-size:12px; color:var(--ink-soft); font-weight:600; }
  .progress-bar { height:4px; background:var(--line-soft); border-radius:3px; overflow:hidden; margin-top:8px; }
  .progress-bar > span { display:block; height:100%; background:var(--indigo); transition:width .3s; }
  .q-card { padding:4px 2px 2px; }
  .q-eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:800;
    letter-spacing:.5px; text-transform:uppercase; color:var(--indigo); background:rgba(47,72,88,.07);
    padding:4px 10px; border-radius:20px; margin-bottom:12px; }
  .q-eyebrow .div { color:var(--line); }
  .q-num { font-size:12px; color:var(--ink-soft); font-weight:700; margin-bottom:6px; }
  .q-jp { font-size:16px; font-weight:700; line-height:1.7; }
  .q-vn { font-size:13.5px; color:var(--ink-soft); margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .choices { margin-top:18px; display:flex; flex-direction:column; gap:10px; }
  .choice { display:flex; gap:12px; align-items:flex-start; text-align:left; padding:13px 15px;
    border:1px solid var(--line); border-radius:var(--radius); background:var(--paper); cursor:pointer;
    font-family:inherit; width:100%; transition:border-color .12s, background .12s, box-shadow .12s; }
  .choice:hover { border-color:var(--indigo-soft); background:var(--paper-2); }
  .choice.sel { border-color:var(--indigo); background:rgba(47,72,88,.06); box-shadow:0 0 0 2px rgba(47,72,88,.14); }
  .choice .key { flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:1.5px solid var(--line);
    display:grid; place-items:center; font-weight:800; font-size:12.5px; color:var(--ink-soft); }
  .choice.sel .key { background:var(--indigo); color:#fff; border-color:var(--indigo); }
  .choice .ctext { font-size:14px; }
  .choice .ctext .cvn { display:block; color:var(--ink-soft); font-size:12px; margin-top:3px; }
  .nav-row { display:flex; gap:10px; margin-top:22px; }
  .palette { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
  .pnum { width:30px; height:30px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--paper); font-size:11.5px; font-weight:700; cursor:pointer; color:var(--ink-soft); font-family:inherit; }
  .pnum.done { background:var(--indigo); color:#fff; border-color:var(--indigo); }
  .pnum.cur { outline:2px solid var(--seal); outline-offset:1px; }
  .score-hero { text-align:center; padding:26px 20px; border-radius:var(--radius); border:1px solid var(--line);
    position:relative; overflow:hidden; }
  .score-hero.pass { background:linear-gradient(180deg, rgba(47,122,77,.10), var(--paper-2)); }
  .score-hero.fail { background:linear-gradient(180deg, rgba(178,58,46,.08), var(--paper-2)); }
  .verdict-seal { width:76px; height:76px; margin:0 auto 10px; border-radius:50%; display:grid;
    place-items:center; font-weight:900; font-size:26px; border:3px solid; transform:rotate(-6deg); }
  .score-hero.pass .verdict-seal { color:var(--pass); border-color:var(--pass); background:rgba(47,122,77,.06); }
  .score-hero.fail .verdict-seal { color:var(--fail); border-color:var(--fail); background:rgba(178,58,46,.06); }
  .score-big { font-size:44px; font-weight:900; line-height:1; font-variant-numeric:tabular-nums; }
  .score-big .of { font-size:20px; color:var(--ink-soft); font-weight:700; }
  .score-sub { font-size:13px; color:var(--ink-soft); margin-top:6px; }
  .verdict-label { font-size:15px; font-weight:800; margin-top:10px; }
  .score-hero.pass .verdict-label { color:var(--pass); }
  .score-hero.fail .verdict-label { color:var(--fail); }
  .sect-scores { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
  .ss-row { display:flex; align-items:center; gap:12px; }
  .ss-name { flex:0 0 132px; font-size:12px; }
  .ss-name .vn3 { display:block; color:var(--ink-soft); font-size:10.5px; }
  .ss-track { flex:1; height:8px; background:var(--line-soft); border-radius:5px; overflow:hidden; }
  .ss-fill { height:100%; background:var(--indigo); border-radius:5px; }
  .ss-pts { flex:0 0 auto; font-size:12px; font-weight:800; color:var(--indigo); font-variant-numeric:tabular-nums; }
  .save-status { margin-top:14px; font-size:12.5px; padding:10px 12px; border-radius:var(--radius);
    background:var(--amber-bg); border:1px solid var(--line-soft); color:var(--ink-soft); }
  .save-status.ok { background:rgba(47,122,77,.08); border-color:rgba(47,122,77,.25); color:var(--pass); }
  .save-status.err { background:rgba(178,58,46,.07); border-color:rgba(178,58,46,.25); color:var(--seal-deep); }
  .rev-item { margin-top:14px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-2); overflow:hidden; }
  .rev-head { padding:13px 15px; display:flex; gap:10px; align-items:flex-start; }
  .rev-badge { flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:grid; place-items:center;
    font-weight:900; font-size:13px; color:#fff; }
  .rev-badge.ok { background:var(--pass); }
  .rev-badge.no { background:var(--fail); }
  .rev-qmeta { font-size:10.5px; color:var(--indigo); font-weight:800; text-transform:uppercase; letter-spacing:.4px; }
  .rev-q { font-size:14px; font-weight:700; margin-top:3px; }
  .rev-qvn { font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .rev-body { padding:0 15px 15px; }
  .rev-opt { font-size:12.5px; padding:8px 11px; border-radius:var(--radius); margin-top:6px;
    border:1px solid var(--line-soft); background:var(--paper); }
  .rev-opt.correct { border-color:rgba(47,122,77,.4); background:rgba(47,122,77,.07); }
  .rev-opt.chosen-wrong { border-color:rgba(178,58,46,.4); background:rgba(178,58,46,.06); }
  .rev-opt .tag { font-size:10px; font-weight:800; padding:1px 6px; border-radius:10px; margin-left:6px; }
  .rev-opt.correct .tag { background:var(--pass); color:#fff; }
  .rev-opt.chosen-wrong .tag { background:var(--fail); color:#fff; }
  .rev-opt .ovn { display:block; color:var(--ink-soft); font-size:11px; margin-top:2px; }
  .rev-explain { margin-top:12px; padding:12px 14px; background:var(--amber-bg); border-left:3px solid var(--gold);
    border-radius:0 var(--radius) var(--radius) 0; }
  .rev-explain .ex-lbl { font-size:10.5px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; }
  .rev-explain .ex-jp { font-size:13px; margin-top:5px; }
  .rev-explain .ex-vn { font-size:12.5px; color:var(--ink-soft); margin-top:7px; padding-top:7px; border-top:1px dashed var(--line); }
  .rev-why-wrong { margin-top:8px; font-size:12px; color:var(--ink-soft); }
  .rev-why-wrong b { color:var(--seal-deep); }
  .foot-note { text-align:center; font-size:11px; color:var(--ink-soft); margin-top:26px; line-height:1.7; }
  .err-box { margin-top:14px; padding:12px 14px; border-radius:var(--radius); background:rgba(178,58,46,.06);
    border:1px solid rgba(178,58,46,.3); color:var(--seal-deep); font-size:12.5px; }
  @media (max-width:560px) {
    .exam-facts { grid-template-columns:repeat(2,1fr); }
    .sect-breakdown { grid-template-columns:1fr; }
    .ss-name { flex-basis:108px; }
  }
</style>
</head>

<script type="application/json" id="question-bank">[{"sect":"eisei","part":"gakka","q":"食中毒予防の3原則として正しいものはどれか。","options":["つけない・増やさない・やっつける","洗う・炒める・冷ます","見る・嗅ぐ・味わう","買う・保管する・提供する"],"answer":0,"explain":"食中毒予防の3原則は「つけない（清潔・二次汚染防止）」「増やさない（迅速・冷却）」「やっつける（加熱）」です。","why_wrong":{"1":"調理手順であって食中毒予防の原則ではない。","2":"官能検査の表現で原則ではない。","3":"流通の流れであり原則ではない。"}},{"sect":"eisei","part":"gakka","q":"食中毒予防で「増やさない」ために、冷蔵保存の温度として適切なものはどれか。","options":["10℃以下","20℃前後","30℃以下","40℃前後"],"answer":0,"explain":"細菌が増えやすい危険温度帯は約10〜60℃。冷蔵は10℃以下、温蔵は60℃以上に保つことで増殖を抑えます。","why_wrong":{"1":"20℃は危険温度帯で細菌が増える。","2":"30℃も危険温度帯内で不適切。","3":"40℃は最も細菌が増えやすい温度帯。"}},{"sect":"eisei","part":"gakka","q":"加熱調理で食中毒菌を「やっつける」ための中心温度と時間の目安はどれか。","options":["中心部75℃で1分以上","表面50℃で30秒","中心部60℃で10秒","表面100℃で瞬間"],"answer":0,"explain":"一般に中心部75℃1分以上で加熱します。ノロウイルスのおそれがある二枚貝などは85〜90℃で90秒以上が目安です。","why_wrong":{"1":"50℃では殺菌に不十分。","2":"60℃10秒では中心殺菌に足りない。","3":"表面だけでは中心部まで加熱されない。"}},{"sect":"eisei","part":"gakka","q":"HACCPに沿った衛生管理を構成する2つの基準の組み合わせとして正しいものはどれか。","options":["一般的な衛生管理基準と重要工程管理基準","接客基準と調理基準","発注基準と検収基準","防火基準と避難基準"],"answer":0,"explain":"HACCPに沿った衛生管理は「一般的な衛生管理基準」と「重要工程（重要管理点）管理基準」の2つで構成されます。","why_wrong":{"1":"接客・調理は衛生管理の構成要素ではない。","2":"発注・検収は店舗運営の項目。","3":"防火・避難は防災管理の項目。"}},{"sect":"eisei","part":"gakka","q":"表示が義務付けられている特定原材料8品目に含まれないものはどれか。","options":["大豆","卵","えび","そば"],"answer":0,"explain":"表示義務の特定原材料8品目は、えび・かに・くるみ・小麦・そば・卵・乳・落花生。大豆は「準ずるもの（推奨表示）」に含まれます。","why_wrong":{"1":"卵は8品目に含まれる。","2":"えびは8品目に含まれる。","3":"そばは8品目に含まれる。"}},{"sect":"eisei","part":"gakka","q":"衛生管理の基礎となる「5S活動」に含まれないものはどれか。","options":["接客","整理","清掃","清潔"],"answer":0,"explain":"5Sは整理・整頓・清掃・清潔・習慣（しつけ）。接客は含まれません。","why_wrong":{"1":"整理は5Sの1つ。","2":"清掃は5Sの1つ。","3":"清潔は5Sの1つ。"}},{"sect":"eisei","part":"gakka","q":"手洗いが特に必要なタイミングとして適切でないものはどれか。","options":["同じ盛り付け作業を続けている最中、汚染がない場合","トイレの後","生の食肉・魚介・卵を扱った後","調理場に入る前"],"answer":0,"explain":"トイレ後、生鮮食材を扱った後、入室前などは必須。ノロ食中毒はトイレ後の手洗い不十分が原因の事例が多いです。","why_wrong":{"1":"トイレ後は最重要の手洗いタイミング。","2":"生鮮食材後は二次汚染防止で必須。","3":"入室前は持ち込み防止で必須。"}},{"sect":"eisei","part":"gakka","q":"飲用に適する水（井戸水など）を使用する場合の管理として正しいものはどれか。","options":["年1回以上の水質検査と残留塩素0.1ppm以上の確認","検査は不要で使用してよい","月1回、色だけ確認すればよい","沸騰させれば検査は不要"],"answer":0,"explain":"飲用に適する水を使う場合は年1回以上の水質検査を行い、残留塩素0.1ppm以上を確認します。","why_wrong":{"1":"検査は必要。","2":"色だけの確認では不十分。","3":"沸騰だけでは水質管理の代わりにならない。"}},{"sect":"eisei","part":"gakka","q":"洗浄と消毒の違いについて正しいものはどれか。","options":["洗浄は汚れを落とすこと、消毒は有害微生物を除くこと","洗浄と消毒は同じ意味である","消毒は汚れを落とすことである","洗浄は微生物を除くことである"],"answer":0,"explain":"洗浄は汚れ・異物を落とす作業、消毒は有害微生物を除去・減少させる作業で、目的が異なります。","why_wrong":{"1":"同じではない。","2":"汚れ落としは洗浄の役割。","3":"微生物除去は消毒の役割。"}},{"sect":"eisei","part":"gakka","q":"ねずみや昆虫の駆除について、法令上の目安として正しいものはどれか。","options":["年2回以上駆除し、記録を1年間保管する","見つけたときだけ駆除すればよい","駆除は5年に1回でよい","記録は不要である"],"answer":0,"explain":"ねずみ・昆虫の駆除は年2回以上実施し、記録を1年間保管するのが目安です。","why_wrong":{"1":"発見時のみでは不十分。","2":"5年に1回では頻度不足。","3":"記録保管は必要。"}},{"sect":"eisei","part":"gakka","q":"加熱してもすぐには死滅せず、加熱後の温度管理が特に重要となる菌はどれか。","options":["芽胞をつくるウエルシュ菌など","腸炎ビブリオ","サルモネラ","カンピロバクター"],"answer":0,"explain":"ウエルシュ菌・セレウス菌・ボツリヌス菌などは芽胞をつくり、100℃加熱でも死滅しにくいため、加熱後の急速冷却など温度管理が重要です。","why_wrong":{"1":"腸炎ビブリオは加熱に弱い。","2":"サルモネラは通常の加熱で死滅する。","3":"カンピロバクターは加熱に弱い。"}},{"sect":"eisei","part":"gakka","q":"冷凍食品の解凍方法として最も適切なものはどれか。","options":["冷蔵庫内で低温のまま解凍する","常温に長時間放置して解凍する","直射日光に当てて解凍する","ぬるま湯に長時間つける"],"answer":0,"explain":"解凍は冷蔵庫内での緩慢解凍が基本。常温・室温放置は危険温度帯で細菌が増えるため不可です。","why_wrong":{"1":"常温放置は細菌増殖の原因。","2":"直射日光は品質劣化と菌増殖を招く。","3":"ぬるま湯長時間も危険温度帯になりやすい。"}},{"sect":"eisei","part":"jitsugi","q":"厨房で生の鶏肉を切ったまな板で、次に生野菜のサラダを切ろうとしている。最も適切な対応はどれか。","options":["まな板と包丁を洗浄・消毒してから、または別のものに替えて使う","そのまま続けて切る","軽く水で流すだけで切る","布きんで拭いてから切る"],"answer":0,"explain":"生の食肉を扱った器具をそのまま使うと二次汚染（つけてしまう）になります。洗浄・消毒するか、肉用・野菜用に器具を使い分けます。","why_wrong":{"1":"二次汚染の典型例で危険。","2":"水洗いだけでは菌が残る。","3":"拭くだけでは菌が除去できない。"}},{"sect":"eisei","part":"jitsugi","q":"大量に加熱調理したカレーを当日提供せず保存する。ウエルシュ菌対策として最も適切な冷却はどれか。","options":["小分けして急速に冷却し、危険温度帯を短くする","鍋のまま常温でゆっくり冷ます","温かいまま冷蔵庫に大鍋ごと入れる","翌日まで室温で放置する"],"answer":0,"explain":"ウエルシュ菌は芽胞をつくり加熱で死なないため、加熱後は小分けして急速冷却し、危険温度帯（10〜60℃）を素早く通過させます。","why_wrong":{"1":"大鍋のまま常温放置は菌が増える最悪の条件。","2":"大鍋のまま冷蔵は中心が冷えにくい。","3":"室温放置は最も危険。"}},{"sect":"eisei","part":"jitsugi","q":"お客様から「そばアレルギーがある」と申告があった。うどんとそばを同じ釜でゆでている店の対応として適切なものはどれか。","options":["同じ釜を使用している旨を必ず伝える","少量なら問題ないと伝えて提供する","黙ってうどんだけ提供する","アレルギーは自己責任と伝える"],"answer":0,"explain":"そばとうどんを同じ釜でゆでるとそば成分が混入するおそれがあります。同じ釜使用の事実を必ず伝え、お客様が判断できるようにします。","why_wrong":{"1":"微量でもアナフィラキシーの危険がある。","2":"情報を隠すのは重大な危険。","3":"店として情報提供の配慮が必要。"}},{"sect":"eisei","part":"jitsugi","q":"衛生管理計画に基づき「使用水の残留塩素」を確認したところ0.05ppmだった。最も適切な対応はどれか。","options":["基準（0.1ppm以上）を満たさないため使用を止め、原因を確認する","問題ないのでそのまま使う","色が透明なら気にしない","記録だけして使い続ける"],"answer":0,"explain":"残留塩素は0.1ppm以上が目安。0.05ppmは基準未満のため、使用を止め原因を確認・改善措置を取ります。","why_wrong":{"1":"基準未満のまま使うのは不適切。","2":"透明でも塩素不足は問題。","3":"改善せず使い続けるのは危険。"}},{"sect":"eisei","part":"jitsugi","q":"HACCPの考え方に基づき、日々の衛生管理で営業者が行うべきこととして適切でないものはどれか。","options":["問題がなければ記録は残さない","衛生管理計画を作成する","実施状況を記録・保存する","定期的に内容を検証・見直す"],"answer":0,"explain":"HACCPに沿った管理では、計画作成・実施・記録・検証がセット。問題の有無にかかわらず記録を残すことが重要です。","why_wrong":{"1":"計画作成は必要な取り組み。","2":"記録・保存は必須。","3":"検証・見直しは必須。"}},{"sect":"chori","part":"gakka","q":"青菜（ほうれん草など）をゆでるときの方法として適切なものはどれか。","options":["たっぷりの湯で蓋をせずさっとゆで、水にとる","少量の水で蓋をして長時間煮る","油でじっくり揚げる","生のまま冷凍する"],"answer":0,"explain":"青菜のクロロフィルは熱に弱いため、たっぷりの湯で蓋をせず短時間でゆで、すぐ水にとって色と食感を保ちます。","why_wrong":{"1":"長時間煮ると色・栄養が損なわれる。","2":"揚げる調理は青菜のゆで方ではない。","3":"生の話は調理法として不適切。"}},{"sect":"chori","part":"gakka","q":"ごぼうやれんこんを切った後、褐変を防ぐための下処理として適切なものはどれか。","options":["切ったらすぐ水につける","切ったまま空気にさらす","塩をたっぷりまぶす","油をかけておく"],"answer":0,"explain":"ごぼう・れんこんは切り口が空気に触れると褐変します。切ったらすぐ水（または酢水）につけて変色を防ぎます。","why_wrong":{"1":"空気にさらすと褐変が進む。","2":"塩は褐変防止の方法ではない。","3":"油は褐変防止に適さない。"}},{"sect":"chori","part":"gakka","q":"包丁とまな板の衛生的な使い方として適切なものはどれか。","options":["肉用・野菜用・下処理用に分類して使い分ける","すべての食材で同じ包丁を使い続ける","洗うのは1日1回でよい","鋼の包丁は洗った後ぬれたまま保管する"],"answer":0,"explain":"包丁・まな板は肉用・野菜用・下処理用に使い分け、使用後すぐ洗浄します。鋼の包丁は錆びやすいので水気をふき取ります。","why_wrong":{"1":"使い回しは二次汚染の原因。","2":"使用後すぐ洗うのが基本。","3":"ぬれたまま保管は錆の原因。"}},{"sect":"chori","part":"gakka","q":"牛肉のうち、長時間の加熱でコラーゲンが分解し柔らかくなる部位はどれか。","options":["すね肉","ヒレ","サーロイン","リブロース"],"answer":0,"explain":"すね肉などのよく動く部位はコラーゲンが多く、長時間加熱で分解してやわらかくなり、煮込み料理に向きます。","why_wrong":{"1":"ヒレは元々やわらかく長時間加熱には不向き。","2":"サーロインは霜降りで焼き向き。","3":"リブロースも焼き向きの部位。"}},{"sect":"chori","part":"gakka","q":"揚げ油の劣化（酸化）を防ぐ方法として適切でないものはどれか。","options":["油を長時間高温のまま放置する","使わないときは空気にさらさない","直射日光を避けて保管する","不純物を混ぜない"],"answer":0,"explain":"油は空気・高温・光・不純物で酸化が進みます。長時間高温放置は劣化を早めるため避けます。","why_wrong":{"1":"空気を避けるのは正しい対策。","2":"直射日光を避けるのは正しい。","3":"不純物を混ぜないのは正しい。"}},{"sect":"chori","part":"gakka","q":"ガスレンジを使用する厨房で特に注意すべき安全対策はどれか。","options":["十分な換気を行い一酸化炭素中毒を防ぐ","換気は不要である","窓は常に閉め切る","火のそばに油を大量に置く"],"answer":0,"explain":"ガス機器は換気が不十分だと不完全燃焼で一酸化炭素中毒の危険があります。十分な換気が必須です。","why_wrong":{"1":"換気は必須。","2":"閉め切ると危険。","3":"火のそばに大量の油は火災リスク。"}},{"sect":"chori","part":"jitsugi","q":"フライヤーの油のAV値（酸価）が3.2だった。営業中の対応として適切なものはどれか。","options":["3.0以上のため、その日の営業終了時に油を交換する","まだ新しいので1週間使い続ける","水を足して薄める","色が濃くなるまで放置する"],"answer":0,"explain":"揚げ油のAV値3.0未満が正常。3.0以上はその日の営業終了時に交換します（3.2は交換の目安）。","why_wrong":{"1":"3.0以上は劣化しており継続使用は不適切。","2":"油に水を足すのは危険で誤り。","3":"放置は品質・安全上不可。"}},{"sect":"chori","part":"jitsugi","q":"食器洗浄機を使う際の温度管理として適切な組み合わせはどれか。","options":["洗浄60〜70℃・すすぎ80〜90℃","洗浄20℃・すすぎ30℃","洗浄10℃・すすぎ15℃","洗浄100℃・すすぎ100℃"],"answer":0,"explain":"食器洗浄機は洗浄60〜70℃、すすぎ80〜90℃が目安。高温のすすぎで加熱消毒の効果もあります。","why_wrong":{"1":"低温では洗浄・消毒効果が不十分。","2":"低温すぎて不適切。","3":"常時100℃は現実的でなく設定として誤り。"}},{"sect":"chori","part":"jitsugi","q":"飲食店での労働災害で最も多い事故は何か。現場の安全対策を考えるうえで正しいものはどれか。","options":["「転倒」が最も多く、床の水・油や整理整頓に注意する","「火災」が最も多い","「感電」が最も多い","「墜落」が最も多い"],"answer":0,"explain":"飲食店の労災で最も多いのは「転倒」で全体の約3割。次いで「切れ・こすれ」「高温低温物との接触」。床の水・油の除去や5S活動が有効です。","why_wrong":{"1":"火災が最多ではない。","2":"感電が最多ではない。","3":"墜落が最多ではない。"}},{"sect":"chori","part":"jitsugi","q":"魚を焼くとき、うまみを逃がさず中まで火を通す方法として適切なものはどれか。","options":["強火や中火で表面を焼き固め、弱火で中まで火を通す","最初から最後まで弱火だけで焼く","強火のまま短時間だけ焼く","水につけながら焼く"],"answer":0,"explain":"表面を強火・中火で焼き固めてうまみを閉じ込め、その後弱火で中心まで火を通します。","why_wrong":{"1":"弱火だけでは表面が固まらずうまみが逃げやすい。","2":"強火短時間では中まで火が通らない。","3":"水につけながら焼くのは調理法として誤り。"}},{"sect":"sekkyaku","part":"gakka","q":"店舗の評価を高めるために重視される「QSCA」の意味として正しいものはどれか。","options":["品質・サービス・清潔感・雰囲気","数量・速度・費用・面積","品質・安全・費用・在庫","接客・調理・清掃・会計"],"answer":0,"explain":"QSCAはQuality(品質)・Service(サービス)・Cleanliness(清潔感)・Atmosphere(雰囲気)。1つも欠かさず高めることが大切です。","why_wrong":{"1":"数量・速度等はQSCAの内容ではない。","2":"安全・在庫はQSCAではない。","3":"業務名でありQSCAの定義ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"接客の基本動作「ニコニコ・ハキハキ・キビキビ」のうち「キビキビ」の意味はどれか。","options":["ダラダラせず、てきぱきと動く","大きな声で怒る","ゆっくり丁寧すぎるほど動く","笑わずに真顔でいる"],"answer":0,"explain":"ニコニコ＝笑顔、ハキハキ＝的確に答える、キビキビ＝ダラダラせずてきぱき動く、が接客の基本動作です。","why_wrong":{"1":"怒ることではない。","2":"遅い動作ではない。","3":"笑顔（ニコニコ）は別の要素。"}},{"sect":"sekkyaku","part":"gakka","q":"「消費期限」の説明として正しいものはどれか。","options":["過ぎたら安全性を欠くおそれがあり食べない方がよい期限","過ぎても品質はほぼ変わらない期限","開封後の保証期間のこと","製造した日のこと"],"answer":0,"explain":"消費期限は弁当や惣菜など傷みやすい食品に表示され、過ぎたら安全性を欠くおそれがあるため食べない方がよい期限です。","why_wrong":{"1":"品質が変わらないのは賞味期限の説明。","2":"開封後の保証期間ではない。","3":"製造日ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"「賞味期限」の説明として正しいものはどれか。","options":["おいしく食べられる期限で、過ぎても必ずしも食べられなくなるわけではない","過ぎたら必ず廃棄しなければならない期限","開封しても保証が続く期限","最も傷みやすい食品にだけ付く期限"],"answer":0,"explain":"賞味期限は缶詰やスナックなど比較的日持ちする食品の「おいしく食べられる」目安で、過ぎても直ちに食べられなくなるわけではありません。ただし開封するとメーカー保証はなくなります。","why_wrong":{"1":"必ず廃棄は消費期限に近い誤解。","2":"開封後は保証されない。","3":"傷みやすい食品は消費期限が付く。"}},{"sect":"sekkyaku","part":"gakka","q":"食物アレルギーで最悪の場合に起こりうる、生命に関わる重篤な症状はどれか。","options":["アナフィラキシーショック","軽いくしゃみ","一時的な眠気","食欲増進"],"answer":0,"explain":"食物アレルギーは最悪の場合アナフィラキシーショックを起こし、死に至ることもあります。アレルゲンの確認は非常に重要です。","why_wrong":{"1":"軽いくしゃみは重篤症状ではない。","2":"眠気は該当しない。","3":"食欲増進は症状ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"イスラム教のお客様（ムスリム）への対応として適切なものはどれか。","options":["食べられないものを確認し、ハラールに配慮して提供する","アルコールを勧める","豚肉料理を積極的に勧める","配慮せず通常どおり提供する"],"answer":0,"explain":"ムスリムは宗教上、豚肉やアルコールを避けます。食べられないものを確認し、ハラールに配慮した提供が求められます。","why_wrong":{"1":"アルコールは避けるべき。","2":"豚肉は避けるべき。","3":"配慮は必要。"}},{"sect":"sekkyaku","part":"gakka","q":"顧客満足とリピートについて正しい説明はどれか。","options":["期待を上回れば満足しリピーターになりやすい","期待を下回っても必ず再来店する","満足度は再来店に関係しない","クレームは無視してよい"],"answer":0,"explain":"お客様は期待を持って来店し、期待を上回れば満足しリピーターになりやすく、下回れば不満で再来店が減り口コミも広がります。","why_wrong":{"1":"期待を下回れば再来店は減る。","2":"満足度は再来店に大きく関係する。","3":"クレームは改善材料として重要。"}},{"sect":"sekkyaku","part":"gakka","q":"クレーム対応の考え方として最も適切なものはどれか。","options":["店の質を改善する材料と捉え、小さな苦情も報告し迅速に対応する","小さな苦情は無視する","お客様のせいにする","できるだけ時間をかけて後回しにする"],"answer":0,"explain":"クレームは店の質的改善の材料です。小さな苦情も報告し、店長など責任者が迅速・直接に対応することが大切です。","why_wrong":{"1":"小さな苦情も見逃さない。","2":"客のせいにするのは不適切。","3":"後回しは不満を拡大させる。"}},{"sect":"sekkyaku","part":"gakka","q":"未成年のお客様や車を運転するお客様への対応として正しいものはどれか。","options":["お酒を提供しない","少量ならお酒を提供する","確認せず提供する","本人が希望すれば提供する"],"answer":0,"explain":"未成年者や運転者にはお酒を提供しません。法令・安全上、確認して対応します。","why_wrong":{"1":"少量でも提供不可。","2":"確認は必要。","3":"本人希望でも不可。"}},{"sect":"sekkyaku","part":"gakka","q":"配慮が必要なお客様への対応として適切でないものはどれか。","options":["補助犬（盲導犬など）の同伴を断る","食物アレルギーの有無を伺う","車椅子でも利用しやすい席を案内する","子供の料理を先に提供する配慮をする"],"answer":0,"explain":"補助犬は同伴が認められており、断るのは不適切です。アレルギー確認、車椅子席の案内、子供への配慮などが求められます。","why_wrong":{"1":"アレルギー確認は適切な配慮。","2":"車椅子席の案内は適切。","3":"子供への配慮は適切。"}},{"sect":"sekkyaku","part":"jitsugi","q":"ランチのピーク時、複数の対応が重なった。優先順位として最も適切なものはどれか。","options":["出来上がった料理の提供を優先する","新規の注文受けを最優先する","下げ物を最優先する","レジ精算だけを続ける"],"answer":0,"explain":"料理提供は冷めると価値が下がり満足度・リピートに直結するため優先。レジは「少々お待ちください」と声掛けで待ってもらえます。","why_wrong":{"1":"注文受けは料理提供より後でよい。","2":"下げ物は優先度が低い。","3":"レジだけに固執するのは不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q":"料理から髪の毛が見つかったとお客様から申告があった。最も適切な初期対応はどれか。","options":["すぐに謝罪し、作り直してよいか確認して迅速に対応する","お客様の思い違いだと説明する","見なかったことにする","後で対応すると伝えて放置する"],"answer":0,"explain":"異物混入で最も多いのは髪の毛です。まず謝罪し、作り直しの要否を確認して迅速・誠実に対応し、責任者へ報告します。","why_wrong":{"1":"思い違い扱いは不誠実で不適切。","2":"無視は信頼を失う。","3":"放置は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q":"店内でお客様が突然倒れ、意識がない。最も適切な対応はどれか。","options":["すぐに救急車を呼び、むやみに抱き起こさず必要ならAEDを使う","すぐに立たせて歩かせる","水を飲ませて様子を見る","営業を優先し放置する"],"answer":0,"explain":"意識がない場合はすぐ救急車を呼び、むやみに抱き起こさないこと。心停止の疑いがあればAEDを使用します。日頃からAED訓練を行います。","why_wrong":{"1":"意識不明者を立たせるのは危険。","2":"水を飲ませるのは誤嚥の危険。","3":"放置は許されない。"}},{"sect":"sekkyaku","part":"jitsugi","q":"割引券をお客様に渡すタイミングとして、販売促進の効果が高いのはどれか。","options":["次回来店を促すため、レジ精算時に渡す","来店時にすぐ渡す","注文を受ける前に渡す","料理提供と同時に渡す"],"answer":0,"explain":"割引券はレジ精算時に渡すと次回来店の動機づけになります。来店時に渡すと単なる当日の値引きになりがちで再来店効果が薄れます。","why_wrong":{"1":"来店時だと当日値引きになりやすい。","2":"注文前は再来店効果が薄い。","3":"提供時は動機づけになりにくい。"}},{"sect":"tenpo","part":"gakka","q":"「粗（荒）利益」の計算式として正しいものはどれか。","options":["売上高 − 原価","売上高 + 原価","原価 − 人件費","売上高 × 原価率"],"answer":0,"explain":"粗（荒）利益＝売上高−原価。また原価率＋荒利益率＝100%の関係があります。","why_wrong":{"1":"加算ではなく減算。","2":"人件費を引く式ではない。","3":"それは原価高の求め方に近く荒利益の定義ではない。"}},{"sect":"tenpo","part":"gakka","q":"「原価率」と「荒利益率」の関係として正しいものはどれか。","options":["原価率 + 荒利益率 = 100%","原価率 − 荒利益率 = 100%","原価率 × 荒利益率 = 100%","原価率 = 荒利益率"],"answer":0,"explain":"売上を100%としたとき、原価率と荒利益率を合わせると100%になります。原価率32%なら荒利益率は68%です。","why_wrong":{"1":"引き算の関係ではない。","2":"掛け算の関係ではない。","3":"両者は等しくない。"}},{"sect":"tenpo","part":"gakka","q":"「労働分配率」の適正値の目安として正しいものはどれか。","options":["おおむね35〜40%","おおむね5〜10%","おおむね70〜80%","おおむね90%以上"],"answer":0,"explain":"労働分配率＝人件費÷粗利益。適正値の目安はおおむね35〜40%です。高すぎると利益を圧迫します。","why_wrong":{"1":"5〜10%は低すぎる目安で誤り。","2":"70〜80%は高すぎる。","3":"90%以上は経営を圧迫する水準。"}},{"sect":"tenpo","part":"gakka","q":"検収（検品収納）で確認すべき3つの事項に含まれないものはどれか。","options":["お客様の来店予約数","発注した数量","納品書の数量","現品の数量と品質"],"answer":0,"explain":"検収では、発注数量・納品書の数量・現品の数量と品質の3つを照合します。来店予約数は検収の項目ではありません。","why_wrong":{"1":"発注数量は確認事項。","2":"納品書の数量は確認事項。","3":"現品の数量・品質は確認事項。"}},{"sect":"tenpo","part":"gakka","q":"在庫管理について、過剰在庫がもたらす問題として正しいものはどれか。","options":["品質劣化によるロスや資金繰りの悪化","販売機会の損失（チャンスロス）","原価率の低下","客単価の上昇"],"answer":0,"explain":"過剰在庫は品質劣化によるロスや資金繰り悪化を招きます。逆に品切れは販売機会の損失（チャンスロス）になります。","why_wrong":{"1":"チャンスロスは品切れ側の問題。","2":"原価率低下とは直接結びつかない。","3":"客単価上昇とは無関係。"}},{"sect":"tenpo","part":"gakka","q":"人材育成の「OJT」の説明として正しいものはどれか。","options":["現場で実地に、マンツーマンで訓練すること","座学で理念や知識を集合教育すること","外部セミナーに一斉参加すること","マニュアルを配るだけのこと"],"answer":0,"explain":"OJT（On the Job Training）は現場で実地に、マンツーマンで行う訓練。理念・知識の集合教育はOFF-JTです。","why_wrong":{"1":"集合教育はOFF-JT。","2":"外部セミナーはOFF-JT寄り。","3":"配布だけは訓練とは言えない。"}},{"sect":"tenpo","part":"gakka","q":"防火管理について、燃焼の三要素として正しい組み合わせはどれか。","options":["可燃物・酸素・熱源","水・空気・光","煙・音・振動","塩・砂糖・油"],"answer":0,"explain":"燃焼の三要素は可燃物・酸素・熱源。いずれかを取り除くこと（除去・窒息・冷却）が消火の基本です。","why_wrong":{"1":"水・空気・光は三要素ではない。","2":"煙・音・振動は関係ない。","3":"調味料は無関係。"}},{"sect":"tenpo","part":"gakka","q":"労働時間について、原則として正しいものはどれか（一般的な場合）。","options":["1日8時間・週40時間が原則","1日12時間・週60時間が原則","1日6時間・週30時間が原則","上限はない"],"answer":0,"explain":"法定労働時間は原則1日8時間・週40時間。常時10人未満の飲食店では週44時間まで認められる特例があります。","why_wrong":{"1":"12時間・60時間は原則ではない。","2":"6時間・30時間は原則ではない。","3":"上限がないは誤り。"}},{"sect":"tenpo","part":"gakka","q":"ABC分析で、売上構成比の累計が70%までに入る商品の区分はどれか。","options":["A","B","C","D"],"answer":0,"explain":"ABC分析では売上の高い順に累計し、70%まで＝A、70〜90%＝B、90〜100%＝C。Cは改定で外す検討対象になります。","why_wrong":{"1":"Bは70〜90%の区分。","2":"Cは90〜100%の区分。","3":"Dの区分はない。"}},{"sect":"tenpo","part":"gakka","q":"時間帯責任者の役割として正しいものはどれか。","options":["その時間帯において店長の職務を代行する","調理だけを担当する","清掃だけを担当する","来客の案内だけを担当する"],"answer":0,"explain":"時間帯責任者は、その時間帯において店長の職務を代行する店舗責任者です。","why_wrong":{"1":"調理だけではない。","2":"清掃だけではない。","3":"案内だけではない。"}},{"sect":"tenpo","part":"jitsugi","q":"ある日の売上が300,000円、その日の総労働時間が50時間だった。人時売上高はいくらか。","options":["6,000円","600円","15,000円","3,000円"],"answer":0,"explain":"人時売上高＝1日の売上高÷総労働時間＝300,000÷50＝6,000円。目安の最低5,000円以上を満たしています。","why_wrong":{"1":"600円は桁の誤り。","2":"15,000円は割り方を誤っている。","3":"3,000円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"人件費が80,000円、粗利益が200,000円のとき、労働分配率はいくらか。","options":["40%","25%","60%","250%"],"answer":0,"explain":"労働分配率＝人件費÷粗利益＝80,000÷200,000＝40%。適正値（35〜40%）の範囲内です。","why_wrong":{"1":"25%は計算違い。","2":"60%は計算違い。","3":"250%は分母分子を逆にした誤り。"}},{"sect":"tenpo","part":"jitsugi","q":"売価600円のハンバーグの原価が190円のとき、原価率に最も近いものはどれか。","options":["約31.7%","約19.0%","約68.3%","約41.0%"],"answer":0,"explain":"原価率＝原価÷売価×100＝190÷600×100≒31.7%。荒利益は600−190＝410円、荒利益率は約68.3%です。","why_wrong":{"1":"19.0%は売価と混同した誤り。","2":"68.3%は荒利益率の値。","3":"41.0%は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"1品平均単価400円、1人あたりの注文点数が平均3点のとき、客単価はいくらか。","options":["1,200円","400円","133円","4,000円"],"answer":0,"explain":"客単価＝注文点数×一品平均単価＝3×400＝1,200円。売上＝客数×客単価で求められます。","why_wrong":{"1":"400円は1品分のみ。","2":"133円は割り算にした誤り。","3":"4,000円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"前月末棚卸50,000円、当月仕入350,000円、当月末棚卸40,000円、当月売上1,200,000円のとき、実際原価率はいくらか。","options":["30%","35%","25%","33%"],"answer":0,"explain":"実際原価＝50,000+350,000−40,000＝360,000円。実際原価率＝360,000÷1,200,000×100＝30%。","why_wrong":{"1":"35%は棚卸の加減を誤った値。","2":"25%は計算違い。","3":"33%は概算の誤り。"}},{"sect":"tenpo","part":"jitsugi","q":"実際原価率が31%、標準原価率が30%だった。原価率差異の評価として正しいものはどれか（基準±0.5%）。","options":["差異は+1%で基準を超えており、ロスが発生している","差異は−1%で問題ない","差異は0%で完全に一致している","基準内なので対策は不要"],"answer":0,"explain":"原価率差異＝実際−標準＝31−30＝+1%。基準±0.5%を超えており、ポーション超過や廃棄・棚卸ミスなどロスの発生が疑われます。","why_wrong":{"1":"差異は+1%であり−1%ではない。","2":"0%ではない。","3":"基準を超えているので対策が必要。"}},{"sect":"tenpo","part":"jitsugi","q":"月間売上予算が9,000,000円、目標の人時売上高を6,000円とするとき、月間計画総労働時間はおよそ何時間か。","options":["1,500時間","150時間","54,000時間","600時間"],"answer":0,"explain":"月間計画総労働時間＝月間売上予算÷人時売上高＝9,000,000÷6,000＝1,500時間。","why_wrong":{"1":"150時間は桁の誤り。","2":"54,000時間は掛け算にした誤り。","3":"600時間は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q":"労働時間が8時間を超える勤務の場合、与えるべき休憩時間として正しいものはどれか。","options":["少なくとも60分","少なくとも30分","少なくとも15分","休憩は不要"],"answer":0,"explain":"休憩は労働時間が6時間を超える場合45分以上、8時間を超える場合は60分以上を労働時間の途中に与えます。","why_wrong":{"1":"30分は6時間超の水準で8時間超には不足。","2":"15分は法定に満たない。","3":"休憩は必要。"}},{"sect":"tenpo","part":"jitsugi","q":"深夜（22時〜翌5時）に労働させた場合の割増賃金の最低率として正しいものはどれか。","options":["25%以上","10%以上","50%以上","割増は不要"],"answer":0,"explain":"深夜労働（22時〜5時）は25%以上の割増。時間外労働も25%以上で、時間外かつ深夜は合わせて50%以上になります。","why_wrong":{"1":"10%は法定率に満たない。","2":"50%は時間外＋深夜が重なる場合の率。","3":"割増は必要。"}},{"sect":"tenpo","part":"jitsugi","q":"年次有給休暇について、一般の労働者に付与される要件として正しいものはどれか。","options":["雇入れの日から6か月継続勤務し、全労働日の8割以上出勤したとき","入社初日から自動的に20日付与される","1年勤務しないと一切付与されない","出勤率に関係なく付与される"],"answer":0,"explain":"年次有給休暇は、雇入れから6か月継続勤務し全労働日の8割以上出勤で発生します。一般労働者は6か月で10日付与され、10日以上付与される者は年5日の取得義務があります。","why_wrong":{"1":"初日から20日ではない。","2":"6か月で発生するため1年不要。","3":"8割以上の出勤要件がある。"}},{"sect":"sekkyaku","part":"gakka","q":"「おもてなし（ホスピタリティ）」を実現するうえで最も大切な考え方はどれか。","options":["お客様への配慮や気づかいという「おもてなしの心」を持つ","できるだけ早く帰ってもらう","必要最低限の会話だけにする","料金を高く見せる"],"answer":0,"explain":"おもてなしを実現するには、お客様への配慮や気づかいといった「おもてなしの心」が土台になります。","why_wrong":{"1":"早く帰す発想はおもてなしではない。","2":"会話を削ることが目的ではない。","3":"料金を高く見せることとは無関係。"}},{"sect":"sekkyaku","part":"gakka","q":"接客用語を使う目的として最も適切なものはどれか。","options":["お客様と意思疎通を図り、歓迎や要望対応の気持ちを伝えること","難しい言葉で店の格を上げること","できるだけ声を小さくすること","お客様を急かすこと"],"answer":0,"explain":"接客用語はお客様とのコミュニケーションの手段で、歓迎の気持ちを伝え、要望を聞き対応することが目的です。丁寧な言葉遣い（敬語）も大切です。","why_wrong":{"1":"格を上げるためではない。","2":"声を小さくするのは逆効果。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様に配膳（サービング）するときの配慮として適切なものはどれか。","options":["同じテーブルの料理はできるだけ同時に提供する","作れた順にバラバラに提供する","最後に来た人から提供する","料理を長く温蔵してからまとめて出す"],"answer":0,"explain":"同じテーブルのお客様にはできるだけ同時に提供し、子供の料理を先に出すなどの配慮をします。適正な温度・時間での提供が大切です。","why_wrong":{"1":"バラバラ提供は不満のもと。","2":"順番の配慮を欠く。","3":"温蔵しすぎは品質低下を招く。"}},{"sect":"sekkyaku","part":"jitsugi","q":"夜間、レジの売上金を金庫に入れる作業を行う。防犯上、最も適切な方法はどれか。","options":["必ず二人以上で行う","一人で素早く行う","店の入口を開けたまま行う","翌朝まで放置する"],"answer":0,"explain":"夜間金庫への現金取り扱いは防犯上、必ず二人以上で行います。ロール上の金額と実際の現金の一致も確認します。","why_wrong":{"1":"一人での取り扱いは防犯上危険。","2":"入口を開けたままは危険。","3":"放置は紛失・盗難のリスク。"}},{"sect":"chori","part":"gakka","q":"和牛のうち、脂肪交雑（サシ）に優れ全体の大半を占める品種はどれか。","options":["黒毛和種","褐毛和種","日本短角種","無角和種"],"answer":0,"explain":"和牛4品種のうち黒毛和種が95%以上を占め、脂肪交雑（サシ）に優れています。","why_wrong":{"1":"褐毛和種は主流ではない。","2":"日本短角種は少数。","3":"無角和種は少数。"}},{"sect":"chori","part":"gakka","q":"食品添加物の用途として適切でないものはどれか。","options":["food在庫の発注量を自動計算する","保存料として保存性を高める","着色料として色をつける","甘味料として甘みをつける"],"answer":0,"explain":"食品添加物の用途は甘味料・着色料・保存料・酸化防止剤・香料などです。発注量の計算は添加物の用途ではありません。","why_wrong":{"1":"保存料は正しい用途。","2":"着色料は正しい用途。","3":"甘味料は正しい用途。"}},{"sect":"chori","part":"jitsugi","q":"下処理中に食材の微生物を「増やさない・二次汚染させない」ために適切な行動はどれか。","options":["手洗い後に使い捨て手袋を使い、洗浄済みの器具を用いる","素手のまま複数の食材を続けて扱う","常温で長く放置しながら作業する","同じ器具を洗わず使い回す"],"answer":0,"explain":"和える・混ぜるなどの非加熱作業は交差汚染リスクが高いため、手洗い後に使い捨て手袋を使い、洗浄済みの器具を用います。","why_wrong":{"1":"素手で続けると二次汚染しやすい。","2":"常温放置は菌を増やす。","3":"洗わず使い回すのは二次汚染の原因。"}},{"sect":"eisei","part":"gakka","q":"サルモネラ菌による食中毒の主な原因食品はどれか。","options":["鶏卵や食肉","海産の生魚","缶詰","焼き飯"],"answer":0,"explain":"サルモネラは鶏卵・食肉が主原因で、十分な加熱（中心75℃1分以上）で死滅します。","why_wrong":{"1":"海産の生魚は腸炎ビブリオの原因。","2":"缶詰はボツリヌス菌に関係。","3":"焼き飯はセレウス菌に関係。"}},{"sect":"eisei","part":"gakka","q":"海産魚介類が原因で、真水や加熱に弱い好塩性の食中毒菌はどれか。","options":["腸炎ビブリオ","サルモネラ","ボツリヌス菌","黄色ブドウ球菌"],"answer":0,"explain":"腸炎ビブリオは海産魚介が原因の好塩菌。真水でよく洗い、加熱すれば防げます。夏に多発します。","why_wrong":{"1":"サルモネラは卵・食肉が主。","2":"ボツリヌスは缶詰・真空パック。","3":"黄色ブドウ球菌は手指の傷が原因。"}},{"sect":"eisei","part":"gakka","q":"鶏肉が主な原因で少量でも発症し、ギラン・バレー症候群を起こすことがある菌はどれか。","options":["カンピロバクター","腸炎ビブリオ","セレウス菌","ノロウイルス"],"answer":0,"explain":"カンピロバクターは鶏肉が主原因で少量発症。加熱に弱いので中心までよく加熱します。","why_wrong":{"1":"腸炎ビブリオは海産魚介。","2":"セレウスは焼飯・パスタ。","3":"ノロはウイルスで二枚貝・人から人。"}},{"sect":"eisei","part":"gakka","q":"手指の傷（化膿創）から食品を汚染し、その毒素（エンテロトキシン）が加熱に強い菌はどれか。","options":["黄色ブドウ球菌","サルモネラ","カンピロバクター","腸管出血性大腸菌"],"answer":0,"explain":"黄色ブドウ球菌は手指の傷が原因。毒素は加熱に強いため、菌を「つけない・増やさない」ことが重要です。おにぎり・弁当で多発。","why_wrong":{"1":"サルモネラの毒素は加熱で問題になりにくい。","2":"カンピロバクターは加熱に弱い。","3":"O157は加熱に弱い。"}},{"sect":"eisei","part":"gakka","q":"ベロ毒素を産生し、少量でも感染して溶血性尿毒症症候群（HUS）を起こすことがある菌はどれか。","options":["腸管出血性大腸菌O157","ウエルシュ菌","セレウス菌","腸炎ビブリオ"],"answer":0,"explain":"O157はベロ毒素を出し少量で感染。生肉・加熱不足が原因で、加熱に弱く中心75℃1分で死滅します。","why_wrong":{"1":"ウエルシュ菌はベロ毒素を出さない。","2":"セレウスは焼飯型。","3":"腸炎ビブリオは好塩菌。"}},{"sect":"eisei","part":"gakka","q":"冬季に多く、二枚貝（かきなど）や人から人へ感染し、アルコールが効きにくいのはどれか。","options":["ノロウイルス","サルモネラ","黄色ブドウ球菌","アニサキス"],"answer":0,"explain":"ノロウイルスは冬に多く少量で感染。加熱は85〜90℃90秒以上、消毒は次亜塩素酸ナトリウムが有効（アルコールは効きにくい）。","why_wrong":{"1":"サルモネラは細菌で卵・食肉。","2":"黄色ブドウ球菌は手指の傷。","3":"アニサキスは寄生虫。"}},{"sect":"eisei","part":"gakka","q":"まぐろ・さば・いわしなどの赤身魚で増え、加熱しても分解されずアレルギー様症状を起こす物質はどれか。","options":["ヒスタミン","ソラニン","テトロドトキシン","アフラトキシン"],"answer":0,"explain":"ヒスタミンは赤身魚の不適切な温度管理で増え、加熱でも分解されません。低温保存で予防します。","why_wrong":{"1":"ソラニンはじゃがいもの芽・緑皮。","2":"テトロドトキシンはフグ毒。","3":"アフラトキシンはカビ毒。"}},{"sect":"eisei","part":"gakka","q":"さば・いか・さんまなどに寄生し、-20℃で24時間以上の冷凍や十分な加熱で対策する寄生虫はどれか。","options":["アニサキス","ノロウイルス","サルモネラ","ボツリヌス菌"],"answer":0,"explain":"アニサキスは魚介の寄生虫。-20℃24時間以上の冷凍、または60℃1分・70℃以上の加熱、目視除去で対策します。","why_wrong":{"1":"ノロはウイルス。","2":"サルモネラは細菌。","3":"ボツリヌスは細菌。"}},{"sect":"eisei","part":"gakka","q":"缶詰・真空パック・保存食品などの酸素の少ない環境で増え、強い神経毒をつくる菌はどれか。","options":["ボツリヌス菌","腸炎ビブリオ","カンピロバクター","サルモネラ"],"answer":0,"explain":"ボツリヌス菌は嫌気性で芽胞をつくり、強い神経毒を産生します。乳児にははちみつを与えないことも重要です。","why_wrong":{"1":"腸炎ビブリオは好塩・好気寄り。","2":"カンピロバクターは微好気。","3":"サルモネラは嫌気の代表ではない。"}},{"sect":"eisei","part":"gakka","q":"焼き飯やパスタなどを室温に長く置くと増え、嘔吐型の食中毒を起こす芽胞菌はどれか。","options":["セレウス菌","サルモネラ","腸炎ビブリオ","ノロウイルス"],"answer":0,"explain":"セレウス菌は米飯・パスタなどで増え、嘔吐型・下痢型があります。芽胞をつくるため、作り置きの室温放置を避けます。","why_wrong":{"1":"サルモネラは卵・食肉。","2":"腸炎ビブリオは海産。","3":"ノロはウイルス。"}},{"sect":"eisei","part":"gakka","q":"まな板やふきん、ノロウイルスの消毒に有効な薬剤はどれか。","options":["次亜塩素酸ナトリウム","逆性石けんのみ","食塩水","砂糖水"],"answer":0,"explain":"次亜塩素酸ナトリウムはまな板・ふきん・ノロ対策に有効。手指にはアルコールや逆性石けんを使い分けます。","why_wrong":{"1":"逆性石けんは洗浄力が弱く単独では不十分。","2":"食塩水に消毒効果はない。","3":"砂糖水に消毒効果はない。"}},{"sect":"eisei","part":"gakka","q":"手指の消毒に用いるが、ノロウイルスには効果が弱い消毒剤はどれか。","options":["アルコール（消毒用エタノール）","次亜塩素酸ナトリウム","煮沸","熱湯"],"answer":0,"explain":"アルコールは手指・器具の消毒に有効ですが、ノロウイルスには効果が弱いため、ノロ対策は次亜塩素酸や加熱を用います。","why_wrong":{"1":"次亜塩素酸はノロに有効。","2":"煮沸はノロに有効。","3":"熱湯（加熱）はノロに有効。"}},{"sect":"eisei","part":"gakka","q":"冷蔵庫内の温度管理として一般的な目安はどれか。","options":["10℃以下（望ましくは5℃以下）","15〜20℃","25℃前後","30℃以上"],"answer":0,"explain":"冷蔵は10℃以下（望ましくは5℃以下）、冷凍は-15℃以下（望ましくは-18℃以下）が目安です。","why_wrong":{"1":"15〜20℃は危険温度帯。","2":"25℃は危険温度帯。","3":"30℃は最も細菌が増える。"}},{"sect":"eisei","part":"gakka","q":"冷凍庫内の温度管理として一般的な目安はどれか。","options":["-15℃以下（望ましくは-18℃以下）","0℃前後","5℃以下","-5℃前後"],"answer":0,"explain":"冷凍は-15℃以下、望ましくは-18℃以下に保ちます。0℃や-5℃では凍結・保存が不十分です。","why_wrong":{"1":"0℃前後は冷蔵〜チルド帯。","2":"5℃以下は冷蔵帯。","3":"-5℃では凍結が不十分。"}},{"sect":"eisei","part":"gakka","q":"厨房を汚染度で分ける「作業区域（ゾーニング）」で、検収や下処理を行うのはどの区域か。","options":["汚染作業区域","清潔作業区域","準清潔作業区域","提供区域"],"answer":0,"explain":"検収・下処理・洗浄は汚染作業区域、加熱調理は準清潔作業区域、盛付・製品保管は清潔作業区域に分けます。","why_wrong":{"1":"清潔作業区域は盛付・保管。","2":"準清潔は加熱調理。","3":"提供区域は区分の名称として不適。"}},{"sect":"eisei","part":"gakka","q":"盛り付けや製品の一時保管を行うのはどの作業区域か。","options":["清潔作業区域","汚染作業区域","準清潔作業区域","検収区域"],"answer":0,"explain":"盛付・製品保管は最も清潔さが求められる清潔作業区域で行います。区域間の交差を避け二次汚染を防ぎます。","why_wrong":{"1":"汚染作業区域は検収・下処理。","2":"準清潔は加熱。","3":"検収は汚染区域。"}},{"sect":"eisei","part":"gakka","q":"食品衛生法に基づき、飲食店の各施設に必ず1名置かなければならない者はどれか。","options":["食品衛生責任者","防火管理者のみ","栄養士","調理師（必須）"],"answer":0,"explain":"営業施設ごとに食品衛生責任者を1名置く必要があります。調理師や栄養士の設置は必須ではありません。","why_wrong":{"1":"防火管理者は消防法上の別制度。","2":"栄養士は必須ではない。","3":"調理師の配置は義務ではない。"}},{"sect":"eisei","part":"gakka","q":"HACCPの手順で、健康被害を防ぐために特に管理が必要な工程を何というか。","options":["重要管理点（CCP）","一般衛生管理","検収点","提供点"],"answer":0,"explain":"CCP（重要管理点）は加熱など、危害を確実に減らす特に重要な工程で、基準値・監視・記録を行います。","why_wrong":{"1":"一般衛生管理は土台となる管理。","2":"検収点はCCPの一般名ではない。","3":"提供点はCCPの用語ではない。"}},{"sect":"eisei","part":"gakka","q":"「消費期限」が表示される食品として最も適切なものはどれか。","options":["弁当や生菓子など傷みやすい食品","缶詰","スナック菓子","レトルト食品"],"answer":0,"explain":"消費期限はおおむね5日以内で急速に劣化する食品に表示。日持ちする食品には賞味期限が表示されます。","why_wrong":{"1":"缶詰は賞味期限。","2":"スナックは賞味期限。","3":"レトルトは賞味期限。"}},{"sect":"eisei","part":"gakka","q":"従業員の健康管理として、下痢や嘔吐の症状がある場合の対応で正しいものはどれか。","options":["調理業務から外し、責任者に報告する","マスクをして調理を続ける","症状を隠して働く","手袋をすれば問題ない"],"answer":0,"explain":"下痢・嘔吐・発熱などがある場合は調理から外し報告します。ノロなどは症状のある人が調理すると集団食中毒の原因になります。","why_wrong":{"1":"マスクだけでは不十分。","2":"隠すのは最も危険。","3":"手袋だけでは防げない。"}},{"sect":"eisei","part":"gakka","q":"じゃがいもの芽や緑色に変色した皮に含まれ、食中毒を起こす有毒成分はどれか。","options":["ソラニン（チャコニン）","ヒスタミン","テトロドトキシン","エンテロトキシン"],"answer":0,"explain":"じゃがいもの芽・緑変部にはソラニン等が含まれます。芽や緑の部分を十分に取り除きます。","why_wrong":{"1":"ヒスタミンは赤身魚。","2":"テトロドトキシンはフグ毒。","3":"エンテロトキシンは黄色ブドウ球菌の毒素。"}},{"sect":"eisei","part":"gakka","q":"フグの毒（テトロドトキシン）の特徴として正しいものはどれか。","options":["加熱しても分解されず、専門の資格が必要である","加熱すれば安全になる","冷凍で無毒化できる","水洗いで除去できる"],"answer":0,"explain":"テトロドトキシンは加熱・冷凍・水洗いで無毒化できません。フグ調理にはふぐ調理師など専門資格が必要です。","why_wrong":{"1":"加熱では無毒化できない。","2":"冷凍では無毒化できない。","3":"水洗いでは除去できない。"}},{"sect":"eisei","part":"gakka","q":"在庫の使用順序として、食品衛生上望ましいのはどれか。","options":["先入れ先出し（古いものから使う）","後入れ先出し","高いものから使う","好きな順に使う"],"answer":0,"explain":"先入れ先出し（FIFO）で古いものから使い、期限切れや廃棄ロスを防ぎます。","why_wrong":{"1":"後入れ先出しは古い在庫が残る。","2":"価格順は衛生管理と無関係。","3":"好きな順では期限管理ができない。"}},{"sect":"eisei","part":"gakka","q":"食品を扱う人の身だしなみとして適切でないものはどれか。","options":["指輪や腕時計をつけて調理する","爪を短く切る","清潔な作業着を着る","髪を帽子に入れる"],"answer":0,"explain":"指輪・腕時計・マニキュアは異物混入や汚れの原因になるため外します。爪は短く、髪は帽子に収めます。","why_wrong":{"1":"爪を短く切るのは正しい。","2":"清潔な作業着は正しい。","3":"髪を帽子に入れるのは正しい。"}},{"sect":"eisei","part":"gakka","q":"食品の「二次汚染（交差汚染）」の説明として正しいものはどれか。","options":["汚染された食材や器具・手指を介して他の食品が汚染されること","食品が自然に腐ること","加熱しすぎること","冷凍による変質"],"answer":0,"explain":"二次汚染は、生肉を扱った手や器具を介して他の食品が汚染されること。手洗い・器具の使い分け・消毒で防ぎます。","why_wrong":{"1":"自然腐敗は二次汚染ではない。","2":"加熱しすぎとは無関係。","3":"冷凍変質とは別。"}},{"sect":"eisei","part":"gakka","q":"ノロウイルス感染者の嘔吐物を処理するときの対応として適切なものはどれか。","options":["使い捨て手袋・マスクをし、次亜塩素酸で消毒して密閉して捨てる","水拭きだけで済ませる","素手で拭き取る","アルコールだけで消毒する"],"answer":0,"explain":"嘔吐物は感染源。使い捨て手袋・マスクを着け、ペーパーで拭き取り次亜塩素酸で消毒、密閉して廃棄します。","why_wrong":{"1":"水拭きだけではウイルスが残る。","2":"素手は感染の危険。","3":"アルコールはノロに効きにくい。"}},{"sect":"eisei","part":"gakka","q":"食中毒が疑われる事故が発生した場合、営業者が行うべき対応として正しいものはどれか。","options":["速やかに保健所へ連絡し、原因食品を保存して指示に従う","証拠を廃棄して隠す","営業を続け様子を見る","お客様のせいにする"],"answer":0,"explain":"食中毒が疑われたら速やかに保健所へ連絡し、原因究明のため食品を保存、指示に従います。隠蔽は重大な問題です。","why_wrong":{"1":"証拠廃棄は違法・危険。","2":"営業継続は被害拡大の恐れ。","3":"責任転嫁は不適切。"}},{"sect":"eisei","part":"gakka","q":"検便（検便検査）を行う主な目的はどれか。","options":["保菌者（症状のない感染者）を見つけ食中毒を防ぐ","体重を測るため","視力を確認するため","血圧を測るため"],"answer":0,"explain":"検便は症状のない保菌者を見つけるために行い、調理従事者から食中毒が広がるのを防ぎます。","why_wrong":{"1":"体重測定は目的ではない。","2":"視力とは無関係。","3":"血圧とは無関係。"}},{"sect":"eisei","part":"gakka","q":"温かい料理を提供まで保温する場合の温度の目安はどれか。","options":["65℃以上を保つ","40℃前後を保つ","30℃以下を保つ","温度は気にしない"],"answer":0,"explain":"温蔵は65℃以上を保ち、危険温度帯（10〜60℃）を避けます。長時間の常温放置は避けます。","why_wrong":{"1":"40℃は危険温度帯。","2":"30℃以下は危険温度帯（温蔵にならない）。","3":"温度管理は必須。"}},{"sect":"eisei","part":"gakka","q":"食品を扱う施設で使用する水として原則となるものはどれか。","options":["飲用に適する水（水道水など）","川の水をそのまま","雨水","使い回しの水"],"answer":0,"explain":"調理には飲用に適する水を使います。井戸水など水道水以外は水質検査と残留塩素の確認が必要です。","why_wrong":{"1":"川の水は不衛生。","2":"雨水は不適。","3":"使い回しの水は不衛生。"}},{"sect":"eisei","part":"gakka","q":"まな板を肉・魚・野菜で色分けして使う主な目的はどれか。","options":["二次汚染（交差汚染）を防ぐため","見た目をきれいにするため","作業を遅くするため","コストを下げるため"],"answer":0,"explain":"色分けは肉・魚・野菜の器具を使い分け、二次汚染を防ぐためです。","why_wrong":{"1":"見た目のためではない。","2":"作業効率を落とす目的ではない。","3":"コスト削減が目的ではない。"}},{"sect":"eisei","part":"gakka","q":"食品表示で、アレルギー表示が推奨されている「特定原材料に準ずるもの」の品目数はおよそいくつか。","options":["20品目","8品目","3品目","50品目"],"answer":0,"explain":"表示義務は8品目、表示が推奨される準ずるものは20品目です（合計で幅広く配慮します）。","why_wrong":{"1":"8品目は表示義務のほう。","2":"3品目は誤り。","3":"50品目は誤り。"}},{"sect":"eisei","part":"gakka","q":"食品の解凍を室温で長時間行うことが不適切な理由として正しいものはどれか。","options":["表面が危険温度帯になり細菌が増えるから","栄養が増えるから","色が良くなるから","重量が増えるから"],"answer":0,"explain":"室温解凍は表面が危険温度帯（10〜60℃）になり細菌が増殖します。冷蔵庫内での解凍が基本です。","why_wrong":{"1":"栄養が増えることはない。","2":"色改善が理由ではない。","3":"重量増加は理由ではない。"}},{"sect":"eisei","part":"gakka","q":"手洗いの手順として最も適切なものはどれか。","options":["石けんで指先・爪・指の間・手首まで洗い、流水ですすぎ、清潔なもので拭く","水でさっと流すだけ","共用のタオルで拭く","手のひらだけ洗う"],"answer":0,"explain":"手洗いは石けんで指先・爪・指の間・手首まで丁寧に洗い、流水で流し、ペーパー等清潔なもので拭きます。二度洗いが効果的です。","why_wrong":{"1":"水だけでは不十分。","2":"共用タオルは汚染源。","3":"手のひらだけでは不十分。"}},{"sect":"eisei","part":"gakka","q":"食品の腐敗を防ぐ基本的な考え方として正しいものはどれか。","options":["低温・清潔・迅速を心がける","常温で長く置く","何度も温め直す","作り置きを推奨する"],"answer":0,"explain":"腐敗・食中毒防止は「低温・清潔・迅速」が基本。危険温度帯に置く時間を短くします。","why_wrong":{"1":"常温放置は増殖を招く。","2":"再加熱の繰り返しは品質・安全上不利。","3":"過度の作り置きは危険。"}},{"sect":"eisei","part":"gakka","q":"化学性食中毒の原因として正しいものはどれか。","options":["洗剤や農薬などの化学物質の混入","サルモネラ菌","ノロウイルス","アニサキス"],"answer":0,"explain":"化学性食中毒は洗剤・農薬・有害金属などの混入が原因。容器の取り違えなどに注意します。","why_wrong":{"1":"サルモネラは細菌性。","2":"ノロはウイルス性。","3":"アニサキスは寄生虫。"}},{"sect":"eisei","part":"jitsugi","q":"冷蔵庫の温度を確認したら12℃だった。最も適切な対応はどれか。","options":["基準（10℃以下）を超えているため原因を確認し、食材の状態を点検する","問題ないのでそのまま使う","扉を開けたままにする","温度計を外す"],"answer":0,"explain":"12℃は冷蔵の基準（10℃以下）を超えています。原因（詰め込み過ぎ・故障・扉開放）を確認し、食材の状態を点検・記録します。","why_wrong":{"1":"基準超過を放置してはいけない。","2":"扉開放は温度をさらに上げる。","3":"温度計を外すのは管理放棄。"}},{"sect":"eisei","part":"jitsugi","q":"鶏の刺身（加熱不十分な鶏肉）の提供を求められた。衛生上の対応として最も適切なものはどれか。","options":["カンピロバクター等のリスクを説明し、十分加熱したものを勧める","要望どおり生で提供する","表面だけ焼いて提供する","確認せず提供する"],"answer":0,"explain":"鶏肉はカンピロバクターやサルモネラのリスクが高く、加熱不十分は危険です。中心まで十分加熱したものを勧めます。","why_wrong":{"1":"生提供は食中毒リスクが高い。","2":"表面だけでは中心が加熱されない。","3":"確認なしは不適切。"}},{"sect":"eisei","part":"jitsugi","q":"作業中に絆創膏をした指の傷が気になった。盛り付け作業を続ける際の対応として適切なものはどれか。","options":["使い捨て手袋を着けて作業し、責任者に報告する","そのまま素手で続ける","傷を隠して黙って続ける","傷口をなめてから続ける"],"answer":0,"explain":"手指の傷は黄色ブドウ球菌の汚染源。絆創膏の上から使い捨て手袋を着け、責任者に報告します。","why_wrong":{"1":"素手は汚染の危険。","2":"隠すのは危険。","3":"なめる行為は不衛生で危険。"}},{"sect":"eisei","part":"jitsugi","q":"生の魚を扱った後、同じ手で生野菜を触ろうとしている。適切な対応はどれか。","options":["手を洗ってから、または手袋を替えてから触る","そのまま触る","エプロンで拭いてから触る","手をズボンで拭く"],"answer":0,"explain":"生の魚を扱った手で生野菜を触ると二次汚染になります。手洗い、または手袋の交換を行います。","why_wrong":{"1":"そのままは二次汚染。","2":"エプロンで拭くだけでは菌が残る。","3":"ズボンで拭くのは不衛生。"}},{"sect":"eisei","part":"jitsugi","q":"厨房で使うふきんが濡れて生乾きの状態が続いている。衛生上、最も適切な対応はどれか。","options":["洗浄・消毒し、よく乾燥させて清潔なものと交換する","そのまま使い続ける","軽く絞って使う","色が変わるまで使う"],"answer":0,"explain":"生乾きのふきんは菌の温床。洗浄・消毒（次亜塩素酸や煮沸）し、よく乾燥、清潔なものと交換します。","why_wrong":{"1":"そのまま使用は不衛生。","2":"絞るだけでは菌が残る。","3":"色が変わるまで使うのは不適切。"}},{"sect":"eisei","part":"jitsugi","q":"大量の煮込み料理を翌日も提供する。安全のための再加熱として適切なものはどれか。","options":["中心部までしっかり再加熱（75℃1分以上）する","表面だけ温める","常温に戻して提供する","再加熱せず提供する"],"answer":0,"explain":"作り置きは中心部まで75℃1分以上に再加熱します。ウエルシュ菌対策として、冷却は小分け急速冷却が基本です。","why_wrong":{"1":"表面だけでは中心が加熱されない。","2":"常温提供は危険。","3":"再加熱なしは危険。"}},{"sect":"eisei","part":"jitsugi","q":"検収時に、冷蔵品が生ぬるい状態で届いた。適切な対応はどれか。","options":["温度を確認し、基準を満たさなければ受け取りを保留・返品する","とりあえず全部受け取る","冷蔵庫で冷やせば問題ない","確認せずサインする"],"answer":0,"explain":"検収では温度・鮮度・期限・数量を確認します。冷蔵品が適温でなければ受け取りを保留・返品し記録します。","why_wrong":{"1":"無条件受領は危険。","2":"温度履歴が不明なものは冷やしても安全とは限らない。","3":"確認せずサインは不適切。"}},{"sect":"eisei","part":"jitsugi","q":"アレルギーのあるお客様に、原材料を確認できない料理を求められた。適切な対応はどれか。","options":["確実に確認できない旨を正直に伝え、無理に提供しない","たぶん大丈夫と伝えて提供する","少量なら平気と伝える","確認せず提供する"],"answer":0,"explain":"アレルギーは命に関わるため、確認できない場合は正直に伝え、無理に提供しません。可能なら代替を案内します。","why_wrong":{"1":"憶測での提供は危険。","2":"少量でも重篤化の恐れ。","3":"確認なしは危険。"}},{"sect":"eisei","part":"jitsugi","q":"厨房でゴキブリを見かけた。衛生管理として適切な対応はどれか。","options":["駆除と侵入経路の遮断を行い、清掃・記録する","見なかったことにする","食品の近くで殺虫剤を大量散布する","翌月まで放置する"],"answer":0,"explain":"そ族・昆虫は駆除と侵入経路の遮断（隙間封鎖・清掃）が基本。殺虫剤は食品を汚染しないよう配慮し、年2回以上の駆除と記録を行います。","why_wrong":{"1":"放置は衛生上不可。","2":"食品近くの大量散布は化学性汚染の危険。","3":"放置は不適切。"}},{"sect":"eisei","part":"jitsugi","q":"衛生管理計画の記録を毎日つける意義として最も適切なものはどれか。","options":["問題の早期発見と、事故時の原因追及・改善に役立てるため","書類を増やすため","お客様に見せるため","記録は意味がない"],"answer":0,"explain":"記録は日々の管理状況を見える化し、問題の早期発見や事故時の原因追及・改善につながります。","why_wrong":{"1":"書類を増やすのが目的ではない。","2":"顧客提示が主目的ではない。","3":"記録は重要である。"}},{"sect":"eisei","part":"gakka","q":"食中毒予防の「増やさない」に該当する行動として正しいものはどれか。","options":["食材を速やかに冷蔵・冷凍し、常温放置を避ける","手をよく洗う","中心まで加熱する","器具を消毒する"],"answer":0,"explain":"「増やさない」は迅速・冷却が中心で、速やかな冷蔵・冷凍が該当します。手洗い・器具消毒は「つけない」、加熱は「やっつける」です。","why_wrong":{"1":"手洗いは「つけない」。","2":"加熱は「やっつける」。","3":"器具消毒は「つけない」。"}},{"sect":"eisei","part":"gakka","q":"消毒用アルコールの効果が最も高くなる濃度の目安はどれか。","options":["およそ70〜80%","およそ10%","およそ100%","およそ30%"],"answer":0,"explain":"消毒用エタノールは約70〜80%で効果が高くなります。濃度が高すぎても低すぎても効果が下がります。","why_wrong":{"1":"10%では消毒効果が不十分。","2":"100%はかえって効果が下がる。","3":"30%では不十分。"}},{"sect":"eisei","part":"jitsugi","q":"盛り付け済みの料理を提供までしばらく置く必要がある。安全な扱いはどれか。","options":["温かい料理は温蔵、冷たい料理は冷蔵し危険温度帯を避ける","すべて常温に置く","日光の当たる場所に置く","重ねて放置する"],"answer":0,"explain":"提供までの間も温かい料理は65℃以上で温蔵、冷たい料理は10℃以下で冷蔵し、危険温度帯（10〜60℃）を避けます。","why_wrong":{"1":"常温放置は菌が増える。","2":"日光下は品質劣化・菌増殖。","3":"重ねて放置は不衛生。"}},{"sect":"eisei","part":"gakka","q":"食品を扱う施設のトイレの管理として適切でないものはどれか。","options":["手洗い設備がなくてもよい","定期的に清掃・消毒する","手洗い・消毒設備を設ける","調理場と適切に区分する"],"answer":0,"explain":"トイレには手洗い・消毒設備が必要で、定期清掃・消毒し、調理場と適切に区分します。手洗い設備がないのは不適切です。","why_wrong":{"1":"定期清掃・消毒は正しい。","2":"手洗い・消毒設備の設置は正しい。","3":"調理場との区分は正しい。"}},{"sect":"chori","part":"gakka","q":"和食の基本の調味順序「さしすせそ」で、最初に入れるものはどれか。","options":["砂糖","塩","酢","醤油"],"answer":0,"explain":"「さしすせそ」は砂糖→塩→酢→醤油→味噌の順。分子の大きい砂糖を先に入れて味を染み込ませます。","why_wrong":{"1":"塩は2番目。","2":"酢は3番目。","3":"醤油は4番目。"}},{"sect":"chori","part":"gakka","q":"計量の目安として正しいものはどれか。","options":["大さじ1=15ml、小さじ1=5ml","大さじ1=5ml、小さじ1=15ml","大さじ1=10ml、小さじ1=1ml","大さじ1=20ml、小さじ1=10ml"],"answer":0,"explain":"大さじ1=15ml、小さじ1=5ml、1カップ=200mlが基本の計量です。","why_wrong":{"1":"大小が逆。","2":"数値が誤り。","3":"数値が誤り。"}},{"sect":"chori","part":"gakka","q":"計量カップ1杯（1カップ）の容量として正しいものはどれか。","options":["200ml","100ml","500ml","1000ml"],"answer":0,"explain":"日本の計量カップは1カップ=200mlが基本です（米用の合は約180ml）。","why_wrong":{"1":"100mlは半カップ。","2":"500mlは誤り。","3":"1000mlは1リットル。"}},{"sect":"chori","part":"gakka","q":"揚げ物の油温で「中温」の目安はどれか。","options":["170〜180℃","120〜130℃","200〜210℃","90〜100℃"],"answer":0,"explain":"揚げ油は低温150〜160℃、中温170〜180℃、高温180〜190℃が目安。天ぷらやフライは中温が多いです。","why_wrong":{"1":"120〜130℃は低すぎる。","2":"200℃超は高すぎて焦げやすい。","3":"90〜100℃では揚がらない。"}},{"sect":"chori","part":"gakka","q":"だしをとる材料として、うま味成分「グルタミン酸」を多く含むものはどれか。","options":["昆布","かつお節","煮干し","干し椎茸"],"answer":0,"explain":"昆布のうま味はグルタミン酸、かつお節はイノシン酸、干し椎茸はグアニル酸。合わせると相乗効果で味が増します。","why_wrong":{"1":"かつお節はイノシン酸。","2":"煮干しはイノシン酸系。","3":"干し椎茸はグアニル酸。"}},{"sect":"chori","part":"gakka","q":"「一番だし」の特徴として正しいものはどれか。","options":["昆布とかつお節から短時間でとる、香りと風味のよいだし","だしがらを煮出した濃いだし","水だけを煮たもの","油を加えたもの"],"answer":0,"explain":"一番だしは昆布とかつお節から短時間でとる香り高いだしで、吸い物などに使います。だしがらから取るのが二番だし。","why_wrong":{"1":"だしがらからは二番だし。","2":"水だけではだしにならない。","3":"油は加えない。"}},{"sect":"chori","part":"gakka","q":"米を炊く際の一般的な水加減（米の容量に対する水）はどれか。","options":["米の約1.2倍","米の約0.5倍","米の約3倍","米の約5倍"],"answer":0,"explain":"白米は容量で米の約1.2倍、重量では約1.5倍が目安。洗米後の吸水も大切です。","why_wrong":{"1":"0.5倍では水が少なすぎる。","2":"3倍は多すぎる（雑炊向き）。","3":"5倍はお粥の水加減。"}},{"sect":"chori","part":"gakka","q":"日本料理の切り方で、繊維に沿って細く切る「せん切り」に近いものはどれか。","options":["細長い糸状に切る","さいの目に切る","薄い輪切りにする","乱切りにする"],"answer":0,"explain":"せん切りは細い糸状に切る方法。さいの目切り・輪切り・乱切りはそれぞれ別の切り方です。","why_wrong":{"1":"さいの目は立方体。","2":"輪切りは丸い薄切り。","3":"乱切りは不規則な塊。"}},{"sect":"chori","part":"gakka","q":"肉を焼く前に常温に戻す（室温に少し置く）主な理由はどれか。","options":["中心まで均一に火を通しやすくするため","色を変えるため","重さを増やすため","菌を増やすため"],"answer":0,"explain":"冷たいまま焼くと表面が焦げても中心が生になりやすいため、少し室温に戻すと均一に火が通ります（衛生上、長時間の放置は避ける）。","why_wrong":{"1":"色替えが目的ではない。","2":"重量増加は目的ではない。","3":"菌を増やす目的ではない（長時間放置は逆にNG）。"}},{"sect":"chori","part":"gakka","q":"魚をおろす前に「水洗い（血や汚れを落とす）」を行う主な目的はどれか。","options":["生臭みや汚れを取り、衛生と風味を保つため","重量を増やすため","色を濃くするため","骨を柔らかくするため"],"answer":0,"explain":"水洗いで血合いやぬめり・汚れを落とし、生臭みを抑えて衛生と風味を保ちます。手早く行い水気を拭きます。","why_wrong":{"1":"重量増加ではない。","2":"色を濃くする目的ではない。","3":"骨を柔らかくする効果はない。"}},{"sect":"chori","part":"gakka","q":"卵の調理で、加熱により固まる性質を何というか。","options":["熱凝固性","起泡性","乳化性","保水性"],"answer":0,"explain":"卵は加熱で固まる熱凝固性を持ちます。ほかに泡立つ起泡性、油と水をつなぐ乳化性（マヨネーズ）もあります。","why_wrong":{"1":"起泡性は泡立ちの性質。","2":"乳化性はマヨネーズの性質。","3":"保水性は別の性質。"}},{"sect":"chori","part":"gakka","q":"マヨネーズが油と酢（水分）を混ぜて安定するのは卵のどの性質によるか。","options":["乳化性","熱凝固性","起泡性","防腐性"],"answer":0,"explain":"卵黄の乳化性により、本来混ざらない油と水（酢）が安定して混ざり、マヨネーズができます。","why_wrong":{"1":"熱凝固は加熱で固まる性質。","2":"起泡性はメレンゲの性質。","3":"防腐性という性質ではない。"}},{"sect":"chori","part":"gakka","q":"「廃棄率」の説明として正しいものはどれか。","options":["食材のうち、皮や骨など食べられず捨てる部分の割合","売れ残りの割合","利益の割合","人件費の割合"],"answer":0,"explain":"廃棄率は皮・種・骨など食べられない部分の割合。可食部＝購入量×(1−廃棄率)で、仕入量の計算に使います。","why_wrong":{"1":"売れ残りは在庫ロス。","2":"利益率とは別。","3":"人件費率とは別。"}},{"sect":"chori","part":"gakka","q":"食品の「五味」に含まれないものはどれか。","options":["辛味","甘味","酸味","うま味"],"answer":0,"explain":"基本五味は甘味・塩味・酸味・苦味・うま味。辛味は痛覚に近く、基本五味には含まれません。","why_wrong":{"1":"甘味は五味の1つ。","2":"酸味は五味の1つ。","3":"うま味は五味の1つ。"}},{"sect":"chori","part":"gakka","q":"献立の基本「主食・主菜・副菜」で、ご飯やパン・麺にあたるのはどれか。","options":["主食","主菜","副菜","汁物"],"answer":0,"explain":"主食はご飯・パン・麺など炭水化物源、主菜は肉・魚・卵・大豆などたんぱく質源、副菜は野菜中心のおかずです。","why_wrong":{"1":"主菜はたんぱく質のおかず。","2":"副菜は野菜のおかず。","3":"汁物はスープ・味噌汁。"}},{"sect":"chori","part":"gakka","q":"食材を無駄なく使い「食品ロス」を減らす取り組みとして適切なものはどれか。","options":["適正な仕入れと使い切り、端材の活用を行う","多めに仕入れて余りは捨てる","使えるものも新しくする","在庫を管理しない"],"answer":0,"explain":"食品ロス削減には、需要に合った仕入れ、先入れ先出し、端材の活用、適量提供などが有効です。","why_wrong":{"1":"多めに仕入れて捨てるのはロス増。","2":"使えるものを捨てるのはロス。","3":"在庫無管理はロスの原因。"}},{"sect":"chori","part":"gakka","q":"野菜をゆでる際、根菜類（じゃがいも・大根など）の一般的なゆで方はどれか。","options":["水から入れてゆでる","熱湯に入れてさっとゆでる","油でゆでる","ゆでずに生で出す"],"answer":0,"explain":"根菜は火が通りにくいので水からゆで、中心まで均一に加熱します。葉物はお湯からさっとゆでます。","why_wrong":{"1":"根菜を熱湯だと外だけ煮えて中が生になりやすい。","2":"油でゆでるは誤り。","3":"生で出すは調理法でない。"}},{"sect":"chori","part":"gakka","q":"食材の保存で「常温保存」が適するものはどれか。","options":["未開封の乾物・缶詰など","生の鶏肉","刺身","生クリーム"],"answer":0,"explain":"乾物・未開封の缶詰・調味料などは常温保存が可能。生鮮の肉・魚・乳製品は冷蔵・冷凍が必要です。","why_wrong":{"1":"生の鶏肉は要冷蔵。","2":"刺身は要冷蔵。","3":"生クリームは要冷蔵。"}},{"sect":"chori","part":"gakka","q":"加熱調理「蒸す」の特徴として正しいものはどれか。","options":["水蒸気で加熱し、栄養や形が崩れにくい","直火で表面を焦がす","油で高温加熱する","生のまま提供する"],"answer":0,"explain":"蒸すは水蒸気で加熱する方法で、栄養や形が崩れにくく、茶碗蒸しやシュウマイなどに向きます。","why_wrong":{"1":"直火で焦がすのは焼く。","2":"油で高温は揚げる。","3":"生提供は調理法でない。"}},{"sect":"chori","part":"gakka","q":"「煮る」調理で味を染み込ませるコツとして正しいものはどれか。","options":["一度冷ます過程で味が染み込む","強火で一気に煮る","味付けは最後に一気に行う","冷たいまま提供する"],"answer":0,"explain":"煮物は冷める過程で味が染み込みます。落とし蓋を使い、弱〜中火でじっくり煮ると均一に仕上がります。","why_wrong":{"1":"強火一気は煮崩れやすい。","2":"味付けのタイミングだけでは不十分。","3":"冷たい提供が目的ではない。"}},{"sect":"chori","part":"gakka","q":"「炒める」調理の特徴として正しいものはどれか。","options":["少量の油で強火で手早く加熱する","大量の油で長時間揚げる","水蒸気で加熱する","低温で長時間煮る"],"answer":0,"explain":"炒めるは少量の油で強火・短時間で加熱し、食感と彩りを保ちます。手早く混ぜるのがコツです。","why_wrong":{"1":"大量の油で長時間は揚げる。","2":"水蒸気は蒸す。","3":"低温長時間は煮る。"}},{"sect":"chori","part":"gakka","q":"豚肉を扱う際に特に注意すべき点として正しいものはどれか。","options":["中心まで十分に加熱する","生でも安全に食べられる","表面だけ焼けばよい","加熱は不要である"],"answer":0,"explain":"豚肉は寄生虫や食中毒菌のリスクがあるため、必ず中心まで十分に加熱します。","why_wrong":{"1":"生食は危険。","2":"表面だけでは中心が生。","3":"加熱は必須。"}},{"sect":"chori","part":"gakka","q":"調理器具のうち、焦げつきにくく扱いやすいが強い金属たわしで傷つきやすいものはどれか。","options":["フッ素樹脂加工のフライパン","鉄のフライパン","ステンレス鍋","土鍋"],"answer":0,"explain":"フッ素樹脂加工は焦げつきにくいが、金属たわしや高温の空焚きで加工が傷みます。柔らかいスポンジで洗います。","why_wrong":{"1":"鉄は傷より錆に注意。","2":"ステンレスは比較的丈夫。","3":"土鍋は割れに注意で性質が異なる。"}},{"sect":"chori","part":"gakka","q":"食材の「旬」を意識する利点として正しいものはどれか。","options":["味・栄養がよく価格も安定しやすい","必ず高価になる","衛生管理が不要になる","廃棄率が必ず上がる"],"answer":0,"explain":"旬の食材は味・栄養価が高く、流通量が多いため価格も安定しやすい利点があります。","why_wrong":{"1":"旬は安くなりやすい。","2":"衛生管理は常に必要。","3":"廃棄率が上がるとは限らない。"}},{"sect":"chori","part":"gakka","q":"だしの「二番だし」の使い方として適切なものはどれか。","options":["煮物や味噌汁などしっかり味をつける料理に使う","香りを最優先する吸い物に使う","だしとして使えない","生のまま飲む"],"answer":0,"explain":"二番だしはだしがらから取る風味控えめのだしで、煮物や味噌汁など味をしっかりつける料理に向きます。","why_wrong":{"1":"香り優先は一番だし。","2":"だしとして使える。","3":"生で飲むものではない。"}},{"sect":"chori","part":"gakka","q":"食材の計量で「重量」を量るのに使う器具はどれか。","options":["はかり（秤）","計量カップ","温度計","タイマー"],"answer":0,"explain":"重量ははかりで量ります。計量カップ・スプーンは容量、温度計は温度、タイマーは時間を計ります。","why_wrong":{"1":"計量カップは容量用。","2":"温度計は温度用。","3":"タイマーは時間用。"}},{"sect":"chori","part":"gakka","q":"油の「発煙点」を超えて加熱するとどうなるか。","options":["煙が出て劣化が進み、風味も悪くなる","栄養価が上がる","油が無害化する","何も変わらない"],"answer":0,"explain":"発煙点を超えると煙が出て酸化・劣化が進み、風味が悪くなります。適正温度で使います。","why_wrong":{"1":"栄養は上がらない。","2":"無害化しない。","3":"変化する。"}},{"sect":"chori","part":"gakka","q":"ゼラチンと寒天の違いとして正しいものはどれか。","options":["寒天は海藻由来で常温でも固まり、ゼラチンは動物由来で口どけがよい","両方とも動物由来である","寒天は固まらない","ゼラチンは海藻由来である"],"answer":0,"explain":"寒天は海藻（テングサ等）由来で常温でも固まり食感は硬め。ゼラチンは動物のコラーゲン由来で口どけがよく、体温付近で溶けます。","why_wrong":{"1":"寒天は植物（海藻）由来。","2":"寒天は固まる。","3":"ゼラチンは動物由来。"}},{"sect":"chori","part":"gakka","q":"揚げ物の衣（ころも）に使う小麦粉のうち、天ぷらに向くのはどれか。","options":["薄力粉","強力粉","上新粉","片栗粉のみ"],"answer":0,"explain":"天ぷらはグルテンの少ない薄力粉が向きます。混ぜすぎるとグルテンが出て衣が重くなるため、さっくり混ぜます。","why_wrong":{"1":"強力粉はパン向きでグルテンが多い。","2":"上新粉は団子等の米粉。","3":"片栗粉のみは衣の主材に不向き。"}},{"sect":"chori","part":"gakka","q":"食材の切り方を揃える主な目的はどれか。","options":["火の通りを均一にし、見た目も整えるため","重量を増やすため","廃棄を増やすため","味を消すため"],"answer":0,"explain":"大きさを揃えると火の通りが均一になり、盛り付けもきれいになります。","why_wrong":{"1":"重量増加は目的でない。","2":"廃棄増加は目的でない。","3":"味を消す目的でない。"}},{"sect":"chori","part":"gakka","q":"「霜降り（下処理）」の目的として正しいものはどれか。","options":["表面をさっと加熱し、臭みやぬめり・血合いを取り除く","中心まで完全に火を通す","味を濃くつける","油で揚げる"],"answer":0,"explain":"霜降りは熱湯にさっと通し、表面の臭み・ぬめり・血合いを除く下処理。魚や肉の下ごしらえに使います。","why_wrong":{"1":"完全加熱ではない。","2":"味付けではない。","3":"揚げる調理ではない。"}},{"sect":"chori","part":"gakka","q":"食品の栄養素で、体を動かすエネルギー源として最も主要なものはどれか。","options":["炭水化物（糖質）","ビタミン","ミネラル","水"],"answer":0,"explain":"炭水化物（糖質）は主要なエネルギー源。三大栄養素は炭水化物・たんぱく質・脂質です。","why_wrong":{"1":"ビタミンは調整役。","2":"ミネラルは調整役。","3":"水はエネルギー源ではない。"}},{"sect":"chori","part":"gakka","q":"体をつくる主成分となり、肉・魚・卵・大豆に多い栄養素はどれか。","options":["たんぱく質","炭水化物","ビタミンC","食物繊維"],"answer":0,"explain":"たんぱく質は筋肉や体の組織をつくる主成分で、肉・魚・卵・大豆製品に多く含まれます。","why_wrong":{"1":"炭水化物はエネルギー源。","2":"ビタミンCは調整役。","3":"食物繊維は整腸など。"}},{"sect":"chori","part":"gakka","q":"みそ汁のみそを入れた後、長く煮立たせない方がよい理由はどれか。","options":["香りが飛び、風味が損なわれるから","色が変わらないから","塩分が増えるから","固まるから"],"answer":0,"explain":"みそは煮立たせると香りが飛び風味が損なわれます。火を止める直前に溶き入れるのがコツです。","why_wrong":{"1":"色の問題ではない。","2":"塩分が増えるわけではない。","3":"固まるわけではない。"}},{"sect":"chori","part":"gakka","q":"「隠し包丁」を入れる目的として正しいものはどれか。","options":["火の通りや味の染み込みをよくするため","見た目を悪くするため","重さを増やすため","廃棄を増やすため"],"answer":0,"explain":"隠し包丁は見えない部分に切れ目を入れ、火の通りや味の染み込みをよくする下処理です。","why_wrong":{"1":"見た目を損なう目的ではない。","2":"重量とは無関係。","3":"廃棄を増やす目的ではない。"}},{"sect":"chori","part":"gakka","q":"揚げ油をこして保存するとよい理由はどれか。","options":["揚げかすを除いて酸化・劣化を遅らせるため","油を増やすため","色を濃くするため","味を消すため"],"answer":0,"explain":"揚げかすは酸化を早めるため、こして除くと油の劣化を遅らせられます。冷暗所で密閉保存します。","why_wrong":{"1":"油は増えない。","2":"色を濃くする目的ではない。","3":"味を消す目的ではない。"}},{"sect":"chori","part":"gakka","q":"食材のアク抜きの目的として正しいものはどれか。","options":["えぐみ・苦味・変色を抑え、口当たりをよくするため","必ず栄養を増やすため","重量を増やすため","色を濃くするため"],"answer":0,"explain":"アク抜きはえぐみ・苦味・変色を抑えて口当たりをよくします。水さらし・ゆでこぼしなどで行います。","why_wrong":{"1":"栄養増加が目的ではない。","2":"重量増加ではない。","3":"色を濃くする目的ではない。"}},{"sect":"chori","part":"jitsugi","q":"1kgの魚を仕入れ、廃棄率が40%のとき、可食部はおよそ何gか。","options":["600g","400g","1000g","140g"],"answer":0,"explain":"可食部＝購入量×(1−廃棄率)＝1000g×(1−0.4)＝600g。仕入量を決めるときに使います。","why_wrong":{"1":"400gは廃棄量のほう。","2":"1000gは廃棄を引いていない。","3":"140gは計算違い。"}},{"sect":"chori","part":"jitsugi","q":"揚げ物の中心温度を確認したら70℃だった。安全提供のための対応はどれか。","options":["中心75℃1分以上になるよう追加加熱する","そのまま提供する","表面だけ再加熱する","冷ましてから出す"],"answer":0,"explain":"中心75℃1分以上が加熱の目安。70℃では不十分なので、中心温度が基準に達するまで追加加熱します。","why_wrong":{"1":"70℃提供は加熱不足。","2":"表面だけでは中心が上がらない。","3":"冷ますと危険温度帯に入る。"}},{"sect":"chori","part":"jitsugi","q":"多くの料理を同時に仕込む際、作業を効率化する考え方として適切なものはどれか。","options":["下処理をまとめ、加熱に時間のかかるものから始める段取りをする","思いついた順に作る","すべて最後にまとめて作る","一品ずつ完成させてから次に進む"],"answer":0,"explain":"段取り（仕込みの計画）が重要で、下処理をまとめ、加熱に時間のかかるものから着手すると効率的です。","why_wrong":{"1":"思いつき順は非効率。","2":"最後にまとめると間に合わない。","3":"一品ずつは時間の無駄が多い。"}},{"sect":"chori","part":"jitsugi","q":"だしを大量にとった後、当日使い切れない分の保存として適切なものはどれか。","options":["速やかに冷却し、冷蔵または冷凍で保存する","鍋のまま常温で置く","日光に当てる","何日も継ぎ足して使う"],"answer":0,"explain":"だしも腐敗するため、速やかに冷却し冷蔵・冷凍で保存します。常温放置や無管理の継ぎ足しは避けます。","why_wrong":{"1":"常温放置は腐敗の原因。","2":"日光は品質劣化。","3":"無管理の継ぎ足しは危険。"}},{"sect":"chori","part":"jitsugi","q":"注文が集中し、揚げ油の温度が下がってしまった。適切な対応はどれか。","options":["一度に入れる量を減らし、適温に戻してから揚げる","低温のまま大量に入れて揚げる","水を足して温度を上げる","油を減らす"],"answer":0,"explain":"一度に入れる量が多いと油温が下がりべたつきます。量を減らし適温に戻してから揚げると、カラッと仕上がります。","why_wrong":{"1":"低温大量は仕上がりが悪い。","2":"油に水は危険。","3":"油を減らすは解決にならない。"}},{"sect":"chori","part":"jitsugi","q":"作り置きのサラダ（非加熱）を提供する際の衛生対応として適切なものはどれか。","options":["清潔な器具・手袋で扱い、10℃以下で冷蔵保存する","常温で長時間置く","素手で盛り付ける","前日の残りを確認せず出す"],"answer":0,"explain":"非加熱料理は二次汚染リスクが高いため、清潔な器具・手袋で扱い、冷蔵（10℃以下）で保存します。","why_wrong":{"1":"常温放置は危険。","2":"素手は二次汚染。","3":"確認せず提供は危険。"}},{"sect":"chori","part":"jitsugi","q":"複数の料理を同じコンロで作るとき、味や香りの移りを防ぐ工夫として適切なものはどれか。","options":["器具を使い分け・洗浄し、香りの強いものは順番を工夫する","同じ器具で洗わずに続ける","すべて一緒の鍋で作る","味見をしない"],"answer":0,"explain":"器具を使い分け・洗浄し、香りの強い料理の順番を工夫すると、味や香りの移りを防げます。味見で確認します。","why_wrong":{"1":"洗わず続けると味が移る。","2":"一緒の鍋では混ざる。","3":"味見をしないのは品質管理不足。"}},{"sect":"chori","part":"jitsugi","q":"提供直前に盛り付けを行う利点として最も適切なものはどれか。","options":["適温・見た目・食感を保ちやすい","必ずコストが下がる","廃棄が必ず増える","衛生管理が不要になる"],"answer":0,"explain":"提供直前の盛り付けは、適温・彩り・食感を保ちやすく、料理の価値を高めます。","why_wrong":{"1":"コスト低下が主目的ではない。","2":"廃棄増加ではない。","3":"衛生管理は常に必要。"}},{"sect":"chori","part":"jitsugi","q":"包丁で手を切る事故を防ぐための行動として適切なものはどれか。","options":["よく切れる包丁を使い、猫の手で食材を押さえ集中して作業する","切れない包丁を無理に使う","ぬれた床で急いで作業する","よそ見をしながら切る"],"answer":0,"explain":"切れない包丁は余計な力が入り危険。よく切れる包丁で「猫の手」で押さえ、集中して作業すると事故を防げます。","why_wrong":{"1":"切れない包丁は力が入り危険。","2":"ぬれた床・急ぎは転倒・けがの元。","3":"よそ見は事故の原因。"}},{"sect":"chori","part":"gakka","q":"「湯せん」の説明として正しいものはどれか。","options":["湯を張った鍋の中で容器ごと間接的に温める方法","直火で強く加熱する方法","油で揚げる方法","冷水で冷やす方法"],"answer":0,"explain":"湯せんは湯の中で容器ごと間接的に温める方法で、チョコレートを溶かすなど焦がしたくない加熱に向きます。","why_wrong":{"1":"直火の強加熱ではない。","2":"揚げる方法ではない。","3":"冷やす方法ではない。"}},{"sect":"chori","part":"gakka","q":"食材の「歩留まり」の説明として正しいものはどれか。","options":["仕入れた量に対して実際に使える（可食部の）割合","売上に対する利益の割合","人件費の割合","来客数の割合"],"answer":0,"explain":"歩留まりは仕入量に対する可食部の割合で、廃棄率の裏返し（歩留まり＝1−廃棄率）。原価計算や仕入量決定に使います。","why_wrong":{"1":"利益率とは別。","2":"人件費率とは別。","3":"来客数とは無関係。"}},{"sect":"chori","part":"gakka","q":"焼き物で「強火の遠火」がよいとされる理由はどれか。","options":["表面を焦がさず、中まで均一に火を通せるから","燃料を節約できるから","時間を長くできるから","色を消せるから"],"answer":0,"explain":"強火の遠火は、強い熱を離して当てることで表面を焦がさず中心まで均一に火を通せる、焼き物の基本です。","why_wrong":{"1":"燃料節約が主目的ではない。","2":"時間延長が目的ではない。","3":"色を消す目的ではない。"}},{"sect":"chori","part":"jitsugi","q":"冷めた料理を温め直して提供する際、品質を保つ工夫として適切なものはどれか。","options":["料理に合った方法で中心まで再加熱し、加熱しすぎを避ける","何度も繰り返し温め直す","表面だけ温める","常温に戻すだけにする"],"answer":0,"explain":"再加熱は中心まで十分（75℃1分以上）に、かつ加熱しすぎて食感が損なわれないよう料理に合った方法で行います。","why_wrong":{"1":"繰り返しの再加熱は品質・安全に不利。","2":"表面だけでは中心が不十分。","3":"常温に戻すだけでは危険。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様が来店したときの最初の接客用語として正しいものはどれか。","options":["いらっしゃいませ","ありがとうございました","申し訳ございません","かしこまりました"],"answer":0,"explain":"来店時は「いらっしゃいませ」で歓迎します。接客7大用語の一つで、明るくはっきりと伝えます。","why_wrong":{"1":"「ありがとうございました」は退店時。","2":"「申し訳ございません」は謝罪時。","3":"「かしこまりました」は承諾時。"}},{"sect":"sekkyaku","part":"gakka","q":"注文を承ったときに使う接客用語として最も適切なものはどれか。","options":["かしこまりました","いらっしゃいませ","少々お待ちください","恐れ入ります"],"answer":0,"explain":"注文などを承ったときは「かしこまりました」と応じます。丁寧に承諾の意思を伝えます。","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「少々お待ちください」は待ってもらうとき。","3":"「恐れ入ります」は依頼・恐縮時。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様を待たせた後に使う接客用語として正しいものはどれか。","options":["お待たせいたしました","いらっしゃいませ","かしこまりました","ありがとうございました"],"answer":0,"explain":"待たせた後は「お待たせいたしました」と一言添えます。配慮を示す基本用語です。","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「かしこまりました」は承諾時。","3":"「ありがとうございました」は退店時。"}},{"sect":"sekkyaku","part":"gakka","q":"敬語の種類で、相手の動作を高めて敬意を表すものはどれか。","options":["尊敬語","謙譲語","丁寧語","命令形"],"answer":0,"explain":"尊敬語は相手の動作を高める敬語（例: いらっしゃる）。自分をへりくだるのは謙譲語、です・ますは丁寧語です。","why_wrong":{"1":"謙譲語は自分をへりくだる。","2":"丁寧語はです・ます。","3":"命令形は敬語ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"「言う」の尊敬語として正しいものはどれか。","options":["おっしゃる","申す","言います","言っておく"],"answer":0,"explain":"「言う」の尊敬語は「おっしゃる」。謙譲語は「申す・申し上げる」、丁寧語は「言います」です。","why_wrong":{"1":"「申す」は謙譲語。","2":"「言います」は丁寧語。","3":"「言っておく」は敬語ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"「食べる」の尊敬語として正しいものはどれか。","options":["召し上がる","いただく","食べます","食っておく"],"answer":0,"explain":"「食べる」の尊敬語は「召し上がる」。謙譲語は「いただく」です。お客様には「お召し上がりください」と使います。","why_wrong":{"1":"「いただく」は謙譲語。","2":"「食べます」は丁寧語。","3":"「食っておく」は乱暴で不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"接客時の身だしなみとして適切なものはどれか。","options":["清潔な服装・整えた髪・短い爪を保つ","強い香水をつける","派手なアクセサリーをつける","髪を整えない"],"answer":0,"explain":"身だしなみは清潔感が第一。清潔な服装、整えた髪、短い爪を保ち、強い香りや派手なアクセサリーは避けます。","why_wrong":{"1":"強い香水は不快感を与える。","2":"派手なアクセサリーは異物混入等の恐れ。","3":"髪を整えないのは不衛生・不快。"}},{"sect":"sekkyaku","part":"gakka","q":"料理をお客様の右側から提供するのが基本とされる理由に近いものはどれか。","options":["一般に配膳は右から、下げ物は左からが基本とされるため","必ず左から出すのが決まりだから","どちらでもよく決まりはないから","背後から出すのが基本だから"],"answer":0,"explain":"一般的に配膳は右から、下げ物は左からが基本とされます（店の方針により異なる場合あり）。お客様に配慮した動作が大切です。","why_wrong":{"1":"必ず左からとは限らない。","2":"配慮の基本があり、無秩序ではない。","3":"背後から出すのは驚かせる恐れ。"}},{"sect":"sekkyaku","part":"gakka","q":"クレーム対応の基本手順として最も適切なものはどれか。","options":["まず謝罪し、よく聞いて事実を確認し、迅速に対応・報告する","まず言い訳をする","お客様を否定する","担当を代えず放置する"],"answer":0,"explain":"クレームはまず謝罪し、傾聴して事実を確認、迅速に対応し責任者に報告します。言い訳や否定は不満を大きくします。","why_wrong":{"1":"最初の言い訳は逆効果。","2":"お客様の否定は不適切。","3":"放置は不満を拡大させる。"}},{"sect":"sekkyaku","part":"gakka","q":"電話予約を受けるときに確認すべき事項として適切でないものはどれか。","options":["お客様の年収","日時と人数","お名前と連絡先","要望（席・アレルギー等）"],"answer":0,"explain":"予約では日時・人数・名前・連絡先・要望を確認します。年収などプライバシーに踏み込む不要な情報は聞きません。","why_wrong":{"1":"日時・人数は必須。","2":"名前・連絡先は必須。","3":"要望確認は大切。"}},{"sect":"sekkyaku","part":"gakka","q":"外国人のお客様への対応として適切なものはどれか。","options":["やさしい言葉・写真付きメニュー・指さしなどで工夫して伝える","日本語がわからないので相手にしない","早口の日本語で押し通す","注文を勝手に決める"],"answer":0,"explain":"言葉が通じにくい場合は、やさしい日本語・写真付きメニュー・指さし・翻訳アプリなどで工夫して意思疎通を図ります。","why_wrong":{"1":"相手にしないのは不適切。","2":"早口で押し通すのは伝わらない。","3":"勝手に決めるのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"ベジタリアン・ヴィーガンのお客様への配慮として正しいものはどれか。","options":["使用食材を確認し、食べられないものを避けて案内する","肉料理を勧める","だしの原料は気にしない","確認せず提供する"],"answer":0,"explain":"ベジタリアン・ヴィーガンは食べられる範囲が異なります。だし（かつお等）や調味料の動物性原料も確認し、配慮して案内します。","why_wrong":{"1":"肉料理を勧めるのは不適切。","2":"だしの原料確認は必要。","3":"確認なしは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"「QSC」に含まれないものはどれか。","options":["Cost（費用）","Quality（品質）","Service（サービス）","Cleanliness（清潔さ）"],"answer":0,"explain":"QSCはQuality（品質）・Service（サービス）・Cleanliness（清潔さ）。これに雰囲気（Atmosphere）を加えるとQSCAになります。","why_wrong":{"1":"QualityはQSCの要素。","2":"ServiceはQSCの要素。","3":"CleanlinessはQSCの要素。"}},{"sect":"sekkyaku","part":"gakka","q":"接客における「第一印象」で特に大切とされるものはどれか。","options":["表情（笑顔）・挨拶・身だしなみ","料理の値段","店の広さ","営業時間"],"answer":0,"explain":"第一印象は表情（笑顔）・挨拶・身だしなみで決まりやすく、リピートにも影響します。","why_wrong":{"1":"値段は第一印象の要素ではない。","2":"広さは主要因ではない。","3":"営業時間は第一印象と別。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様に商品を勧めて客単価を上げる「サジェスト（推奨販売）」の例として適切なものはどれか。","options":["「ご一緒にサラダはいかがですか」と一言添える","注文を勝手に増やす","高い物を無理に押し売りする","要望を無視する"],"answer":0,"explain":"サジェストはお客様に役立つ提案を一言添える方法（例: サイドやドリンクの提案）。押し売りではなく満足度を高める形で行います。","why_wrong":{"1":"勝手に増やすのは不適切。","2":"押し売りは逆効果。","3":"要望無視は不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"店内のPOP（案内・広告）を掲示する主な目的はどれか。","options":["おすすめや季節メニューを知らせ、販売を促進するため","店を暗くするため","通路をふさぐため","お客様を急かすため"],"answer":0,"explain":"POPはおすすめ・季節メニュー・キャンペーンを分かりやすく伝え、注文を後押しする販売促進ツールです。","why_wrong":{"1":"店を暗くする目的ではない。","2":"通路をふさぐのは危険で不適切。","3":"急かす目的ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"高齢のお客様への配慮として適切でないものはどれか。","options":["急かして早く食べてもらう","聞き取りやすい声で話す","段差や足元に配慮する","ゆっくり丁寧に対応する"],"answer":0,"explain":"高齢のお客様には聞き取りやすい声、足元への配慮、ゆっくり丁寧な対応が大切です。急かすのは不適切です。","why_wrong":{"1":"聞き取りやすい声は適切。","2":"足元への配慮は適切。","3":"ゆっくり丁寧は適切。"}},{"sect":"sekkyaku","part":"gakka","q":"会計（レジ）でお金を扱うときの対応として正しいものはどれか。","options":["金額を復唱し、預り金・釣り銭を声に出して確認する","無言で素早く済ませる","釣り銭を確認しない","金額を言わない"],"answer":0,"explain":"会計は金額の復唱、預り金・釣り銭の声出し確認でミスやトラブルを防ぎます。","why_wrong":{"1":"無言はミスの元。","2":"釣り銭未確認は誤差の原因。","3":"金額を言わないのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様が退店するときの接客用語として最も適切なものはどれか。","options":["ありがとうございました","いらっしゃいませ","少々お待ちください","かしこまりました"],"answer":0,"explain":"退店時は「ありがとうございました」で感謝を伝え、また来たいと思ってもらえるよう見送ります。","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「少々お待ちください」は待機時。","3":"「かしこまりました」は承諾時。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様の呼び出しに気づいたときの対応として最も適切なものはどれか。","options":["「はい、ただいま伺います」とすぐ返事をして向かう","聞こえないふりをする","手が空くまで無視する","別のお客様と話し続ける"],"answer":0,"explain":"呼び出しにはすぐ返事をし、向かえない場合も「ただいま伺います」と一声かけて待ってもらいます。無視は不満の元です。","why_wrong":{"1":"無視は不適切。","2":"放置は不満の元。","3":"応答しないのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"補助犬（盲導犬・介助犬・聴導犬）を連れたお客様への対応として正しいものはどれか。","options":["法律で同伴が認められており、受け入れて席へ案内する","衛生上の理由で断る","外につないでもらう","入店を拒否する"],"answer":0,"explain":"身体障害者補助犬法により、飲食店は補助犬の同伴を原則受け入れる必要があります。","why_wrong":{"1":"衛生を理由に断るのは不適切。","2":"外につながせるのは不適切。","3":"入店拒否は不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"車椅子のお客様への案内として適切なものはどれか。","options":["通路が広く出入りしやすい席へ案内し、必要に応じ手助けを申し出る","入口から遠い狭い席に通す","手助けは一切しない","移動を急かす"],"answer":0,"explain":"車椅子のお客様には通路の広い出入りしやすい席を案内し、必要に応じて手助けを申し出ます。","why_wrong":{"1":"狭い席は不便。","2":"必要な手助けを断るのは不適切。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"接客で「クッション言葉」を使う目的として正しいものはどれか。","options":["依頼やお断りをやわらかく丁寧に伝えるため","話を長くするため","お客様を混乱させるため","敬語をなくすため"],"answer":0,"explain":"「恐れ入りますが」「申し訳ございませんが」などのクッション言葉は、依頼やお断りをやわらかく丁寧に伝えます。","why_wrong":{"1":"話を長くする目的ではない。","2":"混乱させる目的ではない。","3":"敬語をなくす目的ではない。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様に商品説明をするとき大切なことはどれか。","options":["特徴やおすすめの理由を分かりやすく正確に伝える","事実と違う説明をする","専門用語だけで説明する","適当に答える"],"answer":0,"explain":"商品説明は特徴やおすすめ理由を分かりやすく正確に伝えます。誇大や虚偽の説明は信頼を損ないます。","why_wrong":{"1":"事実と違う説明は信頼を損なう。","2":"専門用語だけでは伝わらない。","3":"適当な回答は不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"リピーター（常連客）を増やすために大切なことはどれか。","options":["安定した品質と気持ちのよい接客で満足度を高める","来店ごとに味を変える","接客を雑にする","クレームを無視する"],"answer":0,"explain":"リピーターは安定した品質と気持ちのよい接客で満足度が高まると増えます。期待を上回る体験が再来店につながります。","why_wrong":{"1":"味が安定しないと信頼を失う。","2":"雑な接客は逆効果。","3":"クレーム無視は不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"店の口コミ（SNS等）について正しい考え方はどれか。","options":["良い体験は好意的な口コミにつながり集客に役立つ","口コミは全く影響しない","悪い口コミは気にしなくてよい","接客は口コミと無関係"],"answer":0,"explain":"満足した体験は好意的な口コミにつながり集客に役立ちます。逆に不満は悪い口コミとして広がるため、接客・品質が重要です。","why_wrong":{"1":"口コミは集客に影響する。","2":"悪い口コミは対応が必要。","3":"接客は口コミに直結する。"}},{"sect":"sekkyaku","part":"gakka","q":"未成年者と思われるお客様がお酒を注文した。適切な対応はどれか。","options":["年齢を確認し、未成年なら提供しない","見た目で判断してすぐ出す","少量なら提供する","確認せず提供する"],"answer":0,"explain":"未成年者への酒類提供は禁止です。年齢確認を行い、未成年なら提供しません。","why_wrong":{"1":"見た目だけで判断しない。","2":"少量でも提供不可。","3":"確認なしは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"接客の基本動作「ニコニコ・ハキハキ・キビキビ」の「ハキハキ」の意味はどれか。","options":["明るくはっきりと的確に受け答えする","だまって動く","ゆっくり話す","笑顔でいる"],"answer":0,"explain":"ハキハキは明るくはっきり的確に受け答えすること。ニコニコは笑顔、キビキビはてきぱき動くことです。","why_wrong":{"1":"だまって動くことではない。","2":"ゆっくり話すことではない。","3":"笑顔はニコニコ。"}},{"sect":"sekkyaku","part":"gakka","q":"メニュー表に「写真」や「説明」を載せる利点として正しいものはどれか。","options":["お客様が選びやすくなり注文が促進される","必ず原価が下がる","待ち時間が必ず短くなる","接客が不要になる"],"answer":0,"explain":"写真や説明はお客様がイメージしやすく選びやすくなるため、注文の後押しになります。外国人対応にも有効です。","why_wrong":{"1":"原価が下がるわけではない。","2":"待ち時間短縮とは限らない。","3":"接客が不要になるわけではない。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様同士のトラブルや泥酔者への対応で最も適切なものはどれか。","options":["落ち着いて安全を最優先し、責任者に報告して対応する","放置する","お客様と一緒に言い争う","他のお客様に押し付ける"],"answer":0,"explain":"トラブル時は安全を最優先し、落ち着いて対応、責任者に報告します。泥酔者への酒類提供は控えます。","why_wrong":{"1":"放置は危険。","2":"言い争いは事態悪化。","3":"他客に押し付けるのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"忘れ物（遺失物）を見つけたときの対応として正しいものはどれか。","options":["責任者に届け、店のルールに従って保管・連絡する","自分のものにする","捨てる","放置する"],"answer":0,"explain":"忘れ物は責任者に届け、店のルールに従って保管・記録し、持ち主に連絡します。個人の物にしてはいけません。","why_wrong":{"1":"自分の物にするのは不正。","2":"捨てるのは不適切。","3":"放置は不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"接客で「傾聴」が大切な理由として最も適切なものはどれか。","options":["お客様の要望を正しく把握し、満足につなげられるから","時間を稼ぐため","話さなくて済むため","注文を無視するため"],"answer":0,"explain":"傾聴によりお客様の要望を正しく把握でき、的確な対応と満足につながります。","why_wrong":{"1":"時間稼ぎが目的ではない。","2":"話さないためではない。","3":"注文無視のためではない。"}},{"sect":"sekkyaku","part":"gakka","q":"「賞味期限」と「消費期限」の違いについて、接客での案内として正しいものはどれか。","options":["消費期限は安全に食べられる期限、賞味期限はおいしく食べられる期限","両方とも同じ意味である","賞味期限は安全性の期限である","消費期限はおいしさの期限である"],"answer":0,"explain":"消費期限は安全に食べられる期限（傷みやすい食品）、賞味期限はおいしく食べられる期限（日持ちする食品）です。","why_wrong":{"1":"同じ意味ではない。","2":"賞味期限は安全性の期限ではない。","3":"消費期限は安全性の期限。"}},{"sect":"sekkyaku","part":"gakka","q":"接客での「身だしなみ」と「おしゃれ」の違いとして正しいものはどれか。","options":["身だしなみは相手のための清潔感、おしゃれは自分のための表現","両方とも自分のためである","身だしなみは自由でよい","おしゃれを優先すべきである"],"answer":0,"explain":"身だしなみは相手（お客様）に不快感を与えない清潔感が目的、おしゃれは自分の好みの表現です。接客では身だしなみを優先します。","why_wrong":{"1":"身だしなみは相手のため。","2":"身だしなみは自由ではない。","3":"接客ではおしゃれより身だしなみ優先。"}},{"sect":"sekkyaku","part":"gakka","q":"料理を運ぶ（配膳する）ときの持ち方・運び方として適切なものはどれか。","options":["料理に指や息がかからないよう、安定して丁寧に運ぶ","料理の上に手をかざして運ぶ","走って急いで運ぶ","重ねて雑に運ぶ"],"answer":0,"explain":"配膳は料理に指や息がかからないよう衛生に配慮し、安定して丁寧に運びます。走ると転倒・こぼしの危険があります。","why_wrong":{"1":"料理の上に手をかざすのは不衛生。","2":"走るのは危険。","3":"雑に運ぶのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"お子様連れのお客様への配慮として適切なものはどれか。","options":["子供用の椅子や食器を用意し、料理を先に出すなど配慮する","子供は相手にしない","熱い料理を子供の前に置く","急かして食べさせる"],"answer":0,"explain":"お子様連れには子供用椅子・食器の用意、料理を先に出す、熱い料理の置き場所への配慮などが大切です。","why_wrong":{"1":"相手にしないのは不適切。","2":"熱い料理を子供の前に置くのは危険。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q":"接客での「アイコンタクト」の効果として正しいものはどれか。","options":["お客様に安心感や誠実さを伝えられる","お客様を威圧するため","時間を稼ぐため","効果はない"],"answer":0,"explain":"適度なアイコンタクトは、お客様に安心感や誠実さ、関心を伝えます。にらむような視線は避けます。","why_wrong":{"1":"威圧のためではない。","2":"時間稼ぎではない。","3":"効果はある。"}},{"sect":"sekkyaku","part":"jitsugi","q":"料理を提供したところ「注文と違う」と言われた。最も適切な対応はどれか。","options":["すぐに謝罪し、正しい料理を確認して速やかに作り直す","お客様の勘違いだと主張する","そのまま食べてもらう","無視する"],"answer":0,"explain":"注文違いはまず謝罪し、正しい注文を確認して速やかに作り直します。責任者に報告し原因を改善します。","why_wrong":{"1":"勘違い主張は不誠実。","2":"違う料理を食べさせるのは不適切。","3":"無視は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q":"満席で待っているお客様がいる。最も適切な対応はどれか。","options":["待ち時間の目安を伝え、順番と状況を丁寧に案内する","何も伝えず放置する","帰るよう促す","順番を無視して案内する"],"answer":0,"explain":"待ち客には待ち時間の目安を伝え、順番を守って状況を丁寧に案内します。放置や順番無視は不満の元です。","why_wrong":{"1":"放置は不満の元。","2":"帰るよう促すのは不適切。","3":"順番無視は不公平。"}},{"sect":"sekkyaku","part":"jitsugi","q":"お客様から「この料理に〇〇（アレルギー食材）は入っていますか」と聞かれた。最も適切な対応はどれか。","options":["正確な情報を確認してから答え、不明なら安易に提供しない","たぶん入っていないと答える","分からないまま提供する","少量なら大丈夫と答える"],"answer":0,"explain":"アレルギーは命に関わります。原材料を正確に確認してから答え、確認できない場合は安易に提供しません。","why_wrong":{"1":"憶測の回答は危険。","2":"不明なまま提供は危険。","3":"少量でも重篤化の恐れ。"}},{"sect":"sekkyaku","part":"jitsugi","q":"レジ締めで、実際の現金がレジの記録より少なかった。最も適切な対応はどれか。","options":["再確認し、差額と状況を記録して責任者に報告する","自分のお金で補って黙っておく","記録を書き換える","放置する"],"answer":0,"explain":"現金差異は再確認のうえ、差額と状況を正確に記録して責任者に報告します。記録改ざんや隠蔽は重大な問題です。","why_wrong":{"1":"黙って補うのは不透明で問題。","2":"記録改ざんは不正。","3":"放置は不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q":"お客様に飲み物をこぼしてしまった。最も適切な対応はどれか。","options":["すぐ謝罪し、けがの有無を確認して拭き取り、必要な対応と報告をする","気づかないふりをする","お客様のせいにする","あとで対応する"],"answer":0,"explain":"すぐ謝罪し、やけどやけがの有無を確認、拭き取りやクリーニング等の対応をして責任者へ報告します。誠実で迅速な対応が信頼につながります。","why_wrong":{"1":"気づかないふりは不誠実。","2":"客のせいにするのは不適切。","3":"後回しは不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q":"外国人観光客に日本語のメニューが伝わらず困っている。最も適切な対応はどれか。","options":["写真・指さし・翻訳アプリ・やさしい言葉で工夫して伝える","日本語しか対応しないと突き放す","適当に料理を出す","無視する"],"answer":0,"explain":"写真付きメニュー・指さし・翻訳アプリ・やさしい日本語などで工夫して意思疎通を図ります。歓迎の姿勢が満足につながります。","why_wrong":{"1":"突き放すのは不適切。","2":"適当に出すのは不適切。","3":"無視は不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q":"混雑時に一人で複数のテーブルを担当している。効率と満足を両立する対応はどれか。","options":["優先順位をつけ、待たせる場合は一声かけて配膳を優先する","近いテーブルだけ対応する","声かけをしない","料理提供を後回しにする"],"answer":0,"explain":"優先順位をつけ、出来上がった料理の提供を優先します。待たせる場合は「少々お待ちください」と一声かけて不満を防ぎます。","why_wrong":{"1":"近い席だけでは不公平。","2":"声かけなしは不安を与える。","3":"料理提供を後回しは満足度を下げる。"}},{"sect":"sekkyaku","part":"jitsugi","q":"お客様から「料理が遅い」と言われた。最も適切な対応はどれか。","options":["謝罪し、状況を確認して見込み時間を伝え、厨房に急いでもらう","忙しいからと突き放す","お客様のせいにする","無視する"],"answer":0,"explain":"まず謝罪し、注文状況を確認して見込み時間を伝え、厨房に確認・急いでもらいます。誠実な対応で不満を和らげます。","why_wrong":{"1":"突き放すのは不適切。","2":"客のせいにするのは不適切。","3":"無視は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q":"常連のお客様が来店した。満足度を高める対応として適切なものはどれか。","options":["顔や好みを覚えて自然に配慮しつつ、他の客と公平に接する","特別扱いして他の客を後回しにする","覚えていないふりをする","馴れ馴れしくしすぎる"],"answer":0,"explain":"常連には好みを覚えて自然に配慮すると満足度が上がります。ただし他のお客様への公平さや節度も保ちます。","why_wrong":{"1":"他の客を後回しは不公平。","2":"覚えていないふりは冷たい印象。","3":"馴れ馴れしすぎるのは不快。"}},{"sect":"sekkyaku","part":"jitsugi","q":"お客様に割引券（次回使えるクーポン）を渡す最適なタイミングはどれか。","options":["会計時に渡し、次回来店を促す","来店直後に渡す","注文前に渡す","料理提供と同時に渡す"],"answer":0,"explain":"次回来店を促す割引券は会計時に渡すのが効果的。来店直後だと当日値引きになりやすく再来店効果が薄れます。","why_wrong":{"1":"来店直後は当日値引きになりやすい。","2":"注文前は再来店効果が薄い。","3":"提供時は動機づけになりにくい。"}},{"sect":"sekkyaku","part":"gakka","q":"「接客」と「接遇」の違いとして最も適切なものはどれか。","options":["接客は基本的な応対、接遇は相手を思いやる心のこもったもてなし","両方とも全く同じである","接遇は接客より雑なものである","接客には心配りが不要である"],"answer":0,"explain":"接客は基本的な応対、接遇はそこに相手を思いやる心を加えたもてなしです。より高い満足につながります。","why_wrong":{"1":"全く同じではない。","2":"接遇は雑ではなく丁寧。","3":"接客にも心配りは大切。"}},{"sect":"sekkyaku","part":"gakka","q":"お客様に不快感を与えないための行動として適切でないものはどれか。","options":["従業員同士で私語や大声で話す","清潔な身だしなみを保つ","明るい表情で対応する","丁寧な言葉遣いをする"],"answer":0,"explain":"接客中の私語や大声はお客様に不快感を与えます。清潔な身だしなみ・明るい表情・丁寧な言葉遣いが基本です。","why_wrong":{"1":"清潔な身だしなみは適切。","2":"明るい表情は適切。","3":"丁寧な言葉遣いは適切。"}},{"sect":"sekkyaku","part":"jitsugi","q":"クレームを受けたが自分では判断できない内容だった。最も適切な対応はどれか。","options":["勝手に判断せず、責任者に速やかに報告して対応を仰ぐ","自分の判断で勝手に返金する","分からないので放置する","お客様を追い返す"],"answer":0,"explain":"自分で判断できない場合は勝手に対応せず、責任者に速やかに報告して指示を仰ぎます。お客様には丁寧にお待ちいただきます。","why_wrong":{"1":"勝手な返金は問題になり得る。","2":"放置は不満を拡大させる。","3":"追い返すのは不適切。"}},{"sect":"tenpo","part":"gakka","q":"「売上高」を求める基本の式として正しいものはどれか。","options":["客数 × 客単価","客数 − 客単価","客数 ÷ 客単価","原価 × 人件費"],"answer":0,"explain":"売上高＝客数×客単価。客単価を上げるか客数を増やすことで売上が伸びます。","why_wrong":{"1":"引き算ではない。","2":"割り算ではない。","3":"原価×人件費は売上の式ではない。"}},{"sect":"tenpo","part":"gakka","q":"飲食店の「FLコスト」が指すものはどれか。","options":["Food（食材費）とLabor（人件費）の合計","家賃と光熱費","利益と税金","広告費と通信費"],"answer":0,"explain":"FLコストはFood（食材費）＋Labor（人件費）。売上に対するFL比率はおおむね60%以下が目安とされます。","why_wrong":{"1":"家賃・光熱費はFLに含まれない。","2":"利益・税金ではない。","3":"広告・通信費ではない。"}},{"sect":"tenpo","part":"gakka","q":"「損益分岐点」の説明として正しいものはどれか。","options":["売上と費用が等しく、利益も損失も出ない売上高","最も利益が大きい売上高","最も客が多い時間帯","原価が最も低い日"],"answer":0,"explain":"損益分岐点は売上と費用が等しくなる点。これを上回れば利益、下回れば損失が出ます。","why_wrong":{"1":"利益最大の点ではない。","2":"時間帯の話ではない。","3":"原価の日の話ではない。"}},{"sect":"tenpo","part":"gakka","q":"「変動費」に分類されるものはどれか。","options":["食材費","家賃","正社員の基本給","減価償却費"],"answer":0,"explain":"変動費は売上に応じて増減する費用（食材費など）。家賃・正社員給・減価償却費は売上に関係なくかかる固定費です。","why_wrong":{"1":"家賃は固定費。","2":"正社員給は固定費。","3":"減価償却費は固定費。"}},{"sect":"tenpo","part":"gakka","q":"「回転率」の説明として正しいものはどれか。","options":["一定時間に1つの席が何回使われたかを示す指標","料理を回す速さ","原価の割合","利益の割合"],"answer":0,"explain":"回転率＝来客数÷座席数で、1席が何回転したかを示します。回転率を上げると売上が伸びます。","why_wrong":{"1":"料理の速さではない。","2":"原価率ではない。","3":"利益率ではない。"}},{"sect":"tenpo","part":"gakka","q":"最低賃金について正しいものはどれか。","options":["都道府県ごとに定められ、それを下回る賃金は認められない","全国一律で変わらない","店が自由に決めてよい","下回っても構わない"],"answer":0,"explain":"最低賃金は都道府県ごとに定められ、毎年見直されます。これを下回る賃金で雇うことはできません。","why_wrong":{"1":"全国一律ではなく地域別。","2":"店が自由に決めることはできない。","3":"下回るのは違法。"}},{"sect":"tenpo","part":"gakka","q":"法定休日に労働させた場合の割増賃金の最低率はどれか。","options":["35%以上","25%以上","10%以上","割増は不要"],"answer":0,"explain":"法定休日労働の割増は35%以上。時間外労働・深夜労働は25%以上です。","why_wrong":{"1":"25%は時間外・深夜の率。","2":"10%は法定に満たない。","3":"割増は必要。"}},{"sect":"tenpo","part":"gakka","q":"「発注点（発注のタイミング）」を決める主な目的はどれか。","options":["品切れと過剰在庫を防ぎ、適正在庫を保つため","人件費を増やすため","客単価を下げるため","原価率を上げるため"],"answer":0,"explain":"発注点は在庫が一定量まで減ったら発注する仕組みで、品切れ（チャンスロス）と過剰在庫の両方を防ぎます。","why_wrong":{"1":"人件費増加が目的ではない。","2":"客単価とは無関係。","3":"原価率を上げる目的ではない。"}},{"sect":"tenpo","part":"gakka","q":"棚卸（在庫の実地確認）を行う主な目的はどれか。","options":["実際の在庫量を把握し、原価やロスを正確に計算するため","客数を数えるため","接客を評価するため","広告効果を測るため"],"answer":0,"explain":"棚卸で実際の在庫を確認し、実際原価やロスを正確に計算します。帳簿在庫との差からロスを把握します。","why_wrong":{"1":"客数を数える目的ではない。","2":"接客評価ではない。","3":"広告効果測定ではない。"}},{"sect":"tenpo","part":"gakka","q":"人材育成の「OFF-JT」の説明として正しいものはどれか。","options":["職場を離れて集合研修などで学ぶ教育","現場でマンツーマンで教える","教育を全くしない","作業しながら覚えさせる"],"answer":0,"explain":"OFF-JTは職場を離れた集合研修・座学など。現場で実地に教えるのはOJTです。両者を組み合わせると効果的です。","why_wrong":{"1":"現場マンツーマンはOJT。","2":"教育しないは誤り。","3":"作業しながらはOJT。"}},{"sect":"tenpo","part":"gakka","q":"消火器を使うべき初期消火の対象として正しいものはどれか。","options":["炎が天井に届く前の小さな火","天井まで燃え広がった火","火のない状態","すべての大規模火災"],"answer":0,"explain":"消火器での初期消火は、炎が天井に達する前の小さな火が対象。天井まで燃え広がったら避難と通報を優先します。","why_wrong":{"1":"天井まで達した火は避難優先。","2":"火がなければ不要。","3":"大規模火災は消火器では不十分。"}},{"sect":"tenpo","part":"gakka","q":"個人情報保護の観点で適切な行動はどれか。","options":["予約や会員の個人情報を目的外に使わず適切に管理する","顧客名簿を誰でも見られる場所に置く","許可なく他社に渡す","個人情報を放置する"],"answer":0,"explain":"個人情報は目的外利用をせず、適切に保管・管理します。無断で第三者に渡すことは禁じられています。","why_wrong":{"1":"誰でも見られる場所は不適切。","2":"無断提供は禁止。","3":"放置は不適切。"}},{"sect":"tenpo","part":"gakka","q":"「クレンリネス」の意味として最も適切なものはどれか。","options":["清掃だけでなく、清潔な状態を保ち続けること","一度だけ掃除すること","見える所だけきれいにすること","清掃をしないこと"],"answer":0,"explain":"クレンリネスは掃除して終わりではなく、清潔な状態を維持し続けること。QSCの一要素です。","why_wrong":{"1":"一度だけでは不十分。","2":"見える所だけでは不十分。","3":"清掃しないのは誤り。"}},{"sect":"tenpo","part":"gakka","q":"廃棄物（ごみ）の管理として適切なものはどれか。","options":["分別し、ふた付き容器で保管して害虫・悪
