' phù hợp nhất là?","options":[{"jp":"清掃だけでなく、清潔な状態を保ち続けること","vn":"Không chỉ dọn dẹp mà duy trì trạng thái sạch sẽ liên tục"},{"jp":"一度だけ掃除すること","vn":"Chỉ dọn một lần"},{"jp":"見える所だけきれいにすること","vn":"Chỉ làm sạch chỗ nhìn thấy"},{"jp":"清掃をしないこと","vn":"Không dọn dẹp"}],"answer":0,"explain_jp":"クレンリネスは掃除して終わりではなく、清潔な状態を維持し続けること。QSCの一要素です。","explain_vn":"Cleanliness không phải dọn xong là hết, mà duy trì trạng thái sạch liên tục — một yếu tố của QSC.","why_wrong":{"1":"一度だけでは不十分。","2":"見える所だけでは不十分。","3":"清掃しないのは誤り。"}},{"sect":"tenpo","part":"gakka","q_jp":"廃棄物（ごみ）の管理として適切なものはどれか。","q_vn":"Quản lý rác thải phù hợp là?","options":[{"jp":"分別し、ふた付き容器で保管して害虫・悪臭を防ぐ","vn":"Phân loại, đựng thùng có nắp để chống côn trùng và mùi"},{"jp":"厨房内に長時間放置する","vn":"Để lâu trong bếp"},{"jp":"分別せずまとめて置く","vn":"Không phân loại, để dồn"},{"jp":"ふたをせず放置する","vn":"Không đậy nắp, để mặc"}],"answer":0,"explain_jp":"廃棄物は分別し、ふた付き容器で保管して害虫や悪臭・二次汚染を防ぎます。速やかに処理します。","explain_vn":"Rác phải phân loại, đựng thùng có nắp để chống côn trùng, mùi và nhiễm chéo; xử lý kịp thời.","why_wrong":{"1":"長時間放置は害虫・悪臭の元。","2":"分別しないのは不適切。","3":"ふたなし放置は不衛生。"}},{"sect":"tenpo","part":"gakka","q_jp":"「原価率」の計算式として正しいものはどれか。","q_vn":"Công thức tính 'tỷ lệ giá vốn (原価率)' đúng là?","options":[{"jp":"原価 ÷ 売価 × 100","vn":"Giá vốn ÷ giá bán × 100"},{"jp":"売価 ÷ 原価 × 100","vn":"Giá bán ÷ giá vốn × 100"},{"jp":"原価 × 売価","vn":"Giá vốn × giá bán"},{"jp":"原価 − 売価","vn":"Giá vốn − giá bán"}],"answer":0,"explain_jp":"原価率＝原価÷売価×100（%）。原価率が高いほど利益が薄くなります。","explain_vn":"Tỷ lệ giá vốn = giá vốn ÷ giá bán × 100 (%). Tỷ lệ càng cao thì lãi càng mỏng.","why_wrong":{"1":"分母分子が逆。","2":"掛け算ではない。","3":"引き算ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"人時売上高の計算式として正しいものはどれか。","q_vn":"Công thức tính 'doanh thu/giờ-người (人時売上高)' đúng là?","options":[{"jp":"売上高 ÷ 総労働時間","vn":"Doanh thu ÷ tổng giờ lao động"},{"jp":"売上高 × 総労働時間","vn":"Doanh thu × tổng giờ lao động"},{"jp":"総労働時間 ÷ 売上高","vn":"Tổng giờ lao động ÷ doanh thu"},{"jp":"客数 ÷ 総労働時間","vn":"Số khách ÷ tổng giờ lao động"}],"answer":0,"explain_jp":"人時売上高＝売上高÷総労働時間。従業員1人1時間あたりの売上で、目安は最低5,000円以上とされます。","explain_vn":"Doanh thu/giờ-người = doanh thu ÷ tổng giờ lao động. Là doanh thu trên 1 người 1 giờ, mốc tối thiểu ~5.000 yên.","why_wrong":{"1":"掛け算ではない。","2":"逆にしてはいけない。","3":"客数÷労働時間は人時接客数。"}},{"sect":"tenpo","part":"gakka","q_jp":"人件費を管理する指標「労働分配率」の計算式として正しいものはどれか。","q_vn":"Công thức 'tỷ lệ phân phối lao động (労働分配率)' đúng là?","options":[{"jp":"人件費 ÷ 粗利益 × 100","vn":"Chi phí nhân sự ÷ lãi gộp × 100"},{"jp":"粗利益 ÷ 人件費 × 100","vn":"Lãi gộp ÷ chi phí nhân sự × 100"},{"jp":"人件費 ÷ 売上高 × 100","vn":"Chi phí nhân sự ÷ doanh thu × 100"},{"jp":"人件費 × 粗利益","vn":"Chi phí nhân sự × lãi gộp"}],"answer":0,"explain_jp":"労働分配率＝人件費÷粗利益×100。適正はおおむね35〜40%。人件費÷売上高は人件費率で別の指標です。","explain_vn":"Tỷ lệ phân phối lao động = chi phí nhân sự ÷ lãi gộp × 100. Mốc hợp lý ~35–40%. Chi phí nhân sự ÷ doanh thu là 'tỷ lệ nhân sự' — chỉ số khác.","why_wrong":{"1":"分母分子が逆。","2":"売上で割るのは人件費率。","3":"掛け算ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"店舗の売上を上げる要素として、客単価とともに重要なものはどれか。","q_vn":"Cùng với đơn giá/khách, yếu tố quan trọng để tăng doanh thu là?","options":[{"jp":"客数（来店数・回転率）","vn":"Số khách (lượt đến, quay vòng bàn)"},{"jp":"原価率","vn":"Tỷ lệ giá vốn"},{"jp":"人件費率","vn":"Tỷ lệ chi phí nhân sự"},{"jp":"家賃","vn":"Tiền thuê"}],"answer":0,"explain_jp":"売上＝客数×客単価。客単価とともに客数（来店数・回転率）を増やすことが売上向上の柱です。","explain_vn":"Doanh thu = số khách × đơn giá/khách. Cùng đơn giá, tăng số khách (lượt đến, quay vòng) là trụ cột tăng doanh thu.","why_wrong":{"1":"原価率は費用側の指標。","2":"人件費率は費用側の指標。","3":"家賃は固定費。"}},{"sect":"tenpo","part":"gakka","q_jp":"シフト（勤務表）を組むときに考慮すべきことはどれか。","q_vn":"Khi xếp ca (bảng phân ca), điều cần cân nhắc là?","options":[{"jp":"来客の多い時間帯に人員を厚く配置する","vn":"Bố trí nhiều người vào khung giờ đông khách"},{"jp":"暇な時間に人を集中させる","vn":"Dồn người vào giờ vắng"},{"jp":"人数は毎日同じにする","vn":"Số người mỗi ngày như nhau"},{"jp":"労働時間の上限は無視する","vn":"Bỏ qua giới hạn giờ làm"}],"answer":0,"explain_jp":"シフトは来客の多い時間帯（ピーク）に人員を厚く、暇な時間は薄く配置して人時売上高を保ちます。労働時間の上限も守ります。","explain_vn":"Xếp ca theo lượng khách: giờ cao điểm nhiều người, giờ vắng ít người để giữ doanh thu/giờ-người; đồng thời tuân thủ giới hạn giờ làm.","why_wrong":{"1":"暇な時間に集中は非効率。","2":"毎日同じ人数は非効率。","3":"労働時間の上限は守る必要がある。"}},{"sect":"tenpo","part":"gakka","q_jp":"「粗利益率（荒利益率）」の計算式として正しいものはどれか。","q_vn":"Công thức 'tỷ lệ lãi gộp (荒利益率)' đúng là?","options":[{"jp":"粗利益 ÷ 売上高 × 100","vn":"Lãi gộp ÷ doanh thu × 100"},{"jp":"売上高 ÷ 粗利益 × 100","vn":"Doanh thu ÷ lãi gộp × 100"},{"jp":"粗利益 × 売上高","vn":"Lãi gộp × doanh thu"},{"jp":"粗利益 − 売上高","vn":"Lãi gộp − doanh thu"}],"answer":0,"explain_jp":"粗利益率＝粗利益÷売上高×100。原価率＋粗利益率＝100%の関係があります。","explain_vn":"Tỷ lệ lãi gộp = lãi gộp ÷ doanh thu × 100. Có quan hệ: tỷ lệ giá vốn + tỷ lệ lãi gộp = 100%.","why_wrong":{"1":"分母分子が逆。","2":"掛け算ではない。","3":"引き算ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"防火管理者の役割として正しいものはどれか。","q_vn":"Vai trò của 'người quản lý phòng cháy (防火管理者)' đúng là?","options":[{"jp":"消防計画の作成や避難訓練など防火管理を統括する","vn":"Lập kế hoạch PCCC, tổ chức diễn tập thoát hiểm và điều phối phòng cháy"},{"jp":"調理だけを行う","vn":"Chỉ nấu ăn"},{"jp":"会計だけを行う","vn":"Chỉ thu ngân"},{"jp":"接客だけを行う","vn":"Chỉ tiếp khách"}],"answer":0,"explain_jp":"一定規模以上の施設では防火管理者を選任し、消防計画作成・避難訓練・設備点検など防火管理を統括します。","explain_vn":"Cơ sở từ quy mô nhất định phải cử người quản lý phòng cháy: lập kế hoạch PCCC, diễn tập thoát hiểm, kiểm tra thiết bị.","why_wrong":{"1":"調理担当ではない。","2":"会計担当ではない。","3":"接客担当ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"メニュー分析（ABC分析＋人気度）で、売上も人気も高い「看板商品」の扱いとして適切なものはどれか。","q_vn":"Trong phân tích thực đơn, món 'chủ lực' vừa bán chạy vừa được ưa thích nên xử lý thế nào?","options":[{"jp":"品質を維持し目立たせて売り伸ばす","vn":"Giữ chất lượng, làm nổi bật để bán nhiều hơn"},{"jp":"メニューから外す","vn":"Bỏ khỏi thực đơn"},{"jp":"値上げして売れなくする","vn":"Tăng giá cho khỏi bán"},{"jp":"品質を下げる","vn":"Giảm chất lượng"}],"answer":0,"explain_jp":"売上・人気ともに高い看板商品は品質を維持し、メニューで目立たせて積極的に売り伸ばします。","explain_vn":"Món chủ lực bán chạy và được ưa thích thì giữ chất lượng, làm nổi bật trên thực đơn để bán nhiều hơn.","why_wrong":{"1":"外すのは機会損失。","2":"売れなくするのは逆効果。","3":"品質低下は信頼を損なう。"}},{"sect":"tenpo","part":"gakka","q_jp":"従業員のモチベーションを高める取り組みとして適切なものはどれか。","q_vn":"Cách nâng động lực nhân viên phù hợp là?","options":[{"jp":"適切な評価・教育・良好な職場環境を整える","vn":"Đánh giá công bằng, đào tạo, tạo môi trường làm việc tốt"},{"jp":"評価をしない","vn":"Không đánh giá"},{"jp":"一方的に叱るだけにする","vn":"Chỉ quở trách một chiều"},{"jp":"教育をしない","vn":"Không đào tạo"}],"answer":0,"explain_jp":"適切な評価、教育（OJT/OFF-JT）、働きやすい職場環境がモチベーション向上と定着につながります。","explain_vn":"Đánh giá công bằng, đào tạo (OJT/OFF-JT), môi trường làm việc tốt giúp tăng động lực và giữ chân nhân viên.","why_wrong":{"1":"評価しないのは逆効果。","2":"叱るだけは逆効果。","3":"教育なしは成長を妨げる。"}},{"sect":"tenpo","part":"gakka","q_jp":"「客単価」を上げる方法として適切なものはどれか。","q_vn":"Cách tăng 'đơn giá bình quân/khách' phù hợp là?","options":[{"jp":"セットやサイド・ドリンクなどの提案（サジェスト）を行う","vn":"Gợi ý set, món phụ, đồ uống (suggest)"},{"jp":"料理の量を勝手に減らす","vn":"Tự ý giảm khẩu phần"},{"jp":"接客をやめる","vn":"Ngừng tiếp khách"},{"jp":"メニューを隠す","vn":"Giấu thực đơn"}],"answer":0,"explain_jp":"客単価はセット・サイド・ドリンク等の提案（サジェスト）や付加価値の高いメニューで上げられます。押し売りは避けます。","explain_vn":"Đơn giá/khách tăng nhờ gợi ý set/món phụ/đồ uống hoặc món giá trị cao; tránh ép mua.","why_wrong":{"1":"量を減らすのは信頼を損なう。","2":"接客をやめるのは逆効果。","3":"メニューを隠すのは逆効果。"}},{"sect":"tenpo","part":"gakka","q_jp":"「時間帯責任者」に求められる役割として正しいものはどれか。","q_vn":"Vai trò của 'người phụ trách theo ca' đúng là?","options":[{"jp":"その時間帯の店舗運営を統括し、判断・指示を行う","vn":"Điều phối vận hành cửa hàng trong ca, ra quyết định và chỉ đạo"},{"jp":"掃除だけを担当する","vn":"Chỉ phụ trách dọn dẹp"},{"jp":"レジだけを担当する","vn":"Chỉ phụ trách thu ngân"},{"jp":"何もしない","vn":"Không làm gì"}],"answer":0,"explain_jp":"時間帯責任者はその時間帯の店舗運営を統括し、店長に代わって判断・指示を行う責任者です。","explain_vn":"Người phụ trách theo ca điều phối vận hành trong ca, thay cửa hàng trưởng ra quyết định và chỉ đạo.","why_wrong":{"1":"掃除だけではない。","2":"レジだけではない。","3":"何もしないは誤り。"}},{"sect":"tenpo","part":"gakka","q_jp":"適正在庫を保つ利点として正しいものはどれか。","q_vn":"Lợi ích của việc giữ 'tồn kho hợp lý' là?","options":[{"jp":"品切れと廃棄ロスの両方を抑え、資金効率がよくなる","vn":"Giảm cả hết hàng lẫn hao phí, dùng vốn hiệu quả hơn"},{"jp":"必ず原価が上がる","vn":"Chắc chắn tăng giá vốn"},{"jp":"客単価が下がる","vn":"Giảm đơn giá/khách"},{"jp":"人件費が上がる","vn":"Tăng chi phí nhân sự"}],"answer":0,"explain_jp":"適正在庫は品切れ（チャンスロス）と過剰在庫（廃棄ロス・資金の固定化）の両方を抑え、資金効率を高めます。","explain_vn":"Tồn kho hợp lý giảm cả hết hàng (chance loss) lẫn tồn dư (hao phí, đọng vốn), giúp dùng vốn hiệu quả.","why_wrong":{"1":"原価が上がるとは限らない。","2":"客単価とは無関係。","3":"人件費とは無関係。"}},{"sect":"tenpo","part":"gakka","q_jp":"「マニュアル」を整備する主な目的はどれか。","q_vn":"Mục đích chính của việc xây dựng 'sổ tay hướng dẫn (manual)' là?","options":[{"jp":"作業やサービスの品質を標準化し、教育を効率化するため","vn":"Chuẩn hóa thao tác/dịch vụ và tăng hiệu quả đào tạo"},{"jp":"従業員を減らすため","vn":"Để giảm nhân viên"},{"jp":"接客をなくすため","vn":"Để bỏ tiếp khách"},{"jp":"原価を上げるため","vn":"Để tăng giá vốn"}],"answer":0,"explain_jp":"マニュアルは作業・サービスの品質を標準化し、誰が行っても一定水準を保ち、新人教育を効率化します。","explain_vn":"Manual chuẩn hóa chất lượng thao tác/dịch vụ, giữ mức đồng đều dù ai làm, và tăng hiệu quả đào tạo người mới.","why_wrong":{"1":"従業員削減が目的ではない。","2":"接客をなくす目的ではない。","3":"原価を上げる目的ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"労働条件を明示する「労働条件通知書」に記載すべきものはどれか。","q_vn":"'Thông báo điều kiện lao động' cần ghi nội dung nào?","options":[{"jp":"賃金・労働時間・休日・業務内容など","vn":"Lương, giờ làm, ngày nghỉ, nội dung công việc..."},{"jp":"お客様の個人情報","vn":"Thông tin cá nhân của khách"},{"jp":"仕入先の秘密","vn":"Bí mật nhà cung cấp"},{"jp":"競合店の売上","vn":"Doanh thu quán đối thủ"}],"answer":0,"explain_jp":"労働条件通知書には賃金・労働時間・休日・休暇・業務内容・契約期間などを明示します。採用時のトラブル防止になります。","explain_vn":"Thông báo điều kiện lao động ghi lương, giờ làm, ngày nghỉ, phép, nội dung công việc, thời hạn hợp đồng... để tránh tranh chấp khi tuyển.","why_wrong":{"1":"顧客情報は記載対象ではない。","2":"仕入先の秘密ではない。","3":"競合の売上ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"店舗の売上を分析する「日報・売上日報」の活用として適切なものはどれか。","q_vn":"Cách dùng 'báo cáo ngày/doanh thu ngày' phù hợp là?","options":[{"jp":"日々の売上・客数などを記録し、傾向を分析し改善に活かす","vn":"Ghi doanh thu/số khách hằng ngày, phân tích xu hướng để cải thiện"},{"jp":"書くだけで見返さない","vn":"Chỉ viết rồi không xem lại"},{"jp":"客に配布する","vn":"Phát cho khách"},{"jp":"適当に数字を書く","vn":"Ghi số liệu qua loa"}],"answer":0,"explain_jp":"売上日報は日々の売上・客数・客単価などを記録し、傾向を分析して仕入れ・シフト・販促の改善に活かします。","explain_vn":"Báo cáo doanh thu ngày ghi doanh thu/số khách/đơn giá..., phân tích xu hướng để cải thiện nhập hàng, xếp ca, xúc tiến.","why_wrong":{"1":"見返さないと意味がない。","2":"客に配布するものではない。","3":"適当な数字では分析できない。"}},{"sect":"tenpo","part":"gakka","q_jp":"コンプライアンス（法令遵守）の観点で適切な行動はどれか。","q_vn":"Về tuân thủ pháp luật (compliance), hành động đúng là?","options":[{"jp":"食品表示・労働法・営業許可など関係法令を守って運営する","vn":"Vận hành theo đúng luật liên quan: nhãn thực phẩm, luật lao động, giấy phép..."},{"jp":"バレなければ違反してよい","vn":"Không bị phát hiện thì vi phạm cũng được"},{"jp":"表示を偽る","vn":"Ghi nhãn gian dối"},{"jp":"無許可で営業する","vn":"Kinh doanh không giấy phép"}],"answer":0,"explain_jp":"コンプライアンスは食品表示・労働関係法令・営業許可など関係法令を守ること。違反は信頼失墜や罰則につながります。","explain_vn":"Compliance là tuân thủ luật liên quan: nhãn thực phẩm, luật lao động, giấy phép... Vi phạm dẫn tới mất uy tín và bị phạt.","why_wrong":{"1":"バレなければよいという考えは不適切。","2":"表示偽装は違法。","3":"無許可営業は違法。"}},{"sect":"tenpo","part":"gakka","q_jp":"「販売促進（販促）」の例として適切なものはどれか。","q_vn":"Ví dụ về 'xúc tiến bán hàng' phù hợp là?","options":[{"jp":"クーポン・季節フェア・SNS発信など集客の工夫","vn":"Phiếu giảm giá, hội chợ theo mùa, đăng SNS... để thu hút khách"},{"jp":"清掃をやめること","vn":"Ngừng dọn dẹp"},{"jp":"接客を減らすこと","vn":"Giảm tiếp khách"},{"jp":"メニューを隠すこと","vn":"Giấu thực đơn"}],"answer":0,"explain_jp":"販促はクーポン・季節フェア・SNS発信・POPなどで集客や客単価向上を図る取り組みです。","explain_vn":"Xúc tiến gồm phiếu giảm giá, hội chợ theo mùa, đăng SNS, POP... để thu hút khách và tăng đơn giá.","why_wrong":{"1":"清掃をやめるのは逆効果。","2":"接客を減らすのは逆効果。","3":"メニューを隠すのは逆効果。"}},{"sect":"tenpo","part":"gakka","q_jp":"設備・機器の「定期点検」を行う主な目的はどれか。","q_vn":"Mục đích chính của 'kiểm tra định kỳ' thiết bị/máy móc là?","options":[{"jp":"故障や事故を未然に防ぎ、安全と衛生を保つため","vn":"Ngăn hỏng hóc/tai nạn từ sớm, giữ an toàn và vệ sinh"},{"jp":"電気代を増やすため","vn":"Để tăng tiền điện"},{"jp":"作業を遅くするため","vn":"Để làm chậm lại"},{"jp":"点検は不要である","vn":"Không cần kiểm tra"}],"answer":0,"explain_jp":"定期点検は故障・事故を未然に防ぎ、冷蔵庫の温度維持など安全・衛生を保つために重要です。","explain_vn":"Kiểm tra định kỳ ngăn hỏng hóc/tai nạn từ sớm, giữ an toàn và vệ sinh (như duy trì nhiệt độ tủ lạnh).","why_wrong":{"1":"電気代を増やす目的ではない。","2":"作業を遅くする目的ではない。","3":"点検は必要。"}},{"sect":"tenpo","part":"gakka","q_jp":"「歩留まり」を店舗運営で使う場面として正しいものはどれか。","q_vn":"Tình huống dùng 'tỷ lệ thu hồi (歩留まり)' trong vận hành đúng là?","options":[{"jp":"仕入量や原価を計算するとき","vn":"Khi tính lượng nhập và giá vốn"},{"jp":"接客の言葉遣いを決めるとき","vn":"Khi quyết cách nói với khách"},{"jp":"営業時間を決めるとき","vn":"Khi quyết giờ mở cửa"},{"jp":"BGMを選ぶとき","vn":"Khi chọn nhạc nền"}],"answer":0,"explain_jp":"歩留まり（可食部の割合）は、必要な仕入量や正確な原価を計算するときに使います。","explain_vn":"Tỷ lệ thu hồi (phần ăn được) dùng khi tính lượng nhập cần thiết và giá vốn chính xác.","why_wrong":{"1":"接客の言葉遣いとは無関係。","2":"営業時間の決定とは無関係。","3":"BGM選びとは無関係。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"売価800円の料理の原価が240円のとき、原価率はいくらか。","q_vn":"Món bán 800 yên, giá vốn 240 yên. Tỷ lệ giá vốn là?","options":[{"jp":"30%","vn":"30%"},{"jp":"24%","vn":"24%"},{"jp":"33%","vn":"33%"},{"jp":"70%","vn":"70%"}],"answer":0,"explain_jp":"原価率＝240÷800×100＝30%。粗利益は800−240＝560円、粗利益率は70%です。","explain_vn":"Tỷ lệ giá vốn = 240 ÷ 800 × 100 = 30%. Lãi gộp = 800−240 = 560 yên, tỷ lệ lãi gộp 70%.","why_wrong":{"1":"24%は計算違い。","2":"33%は概算の誤り。","3":"70%は粗利益率のほう。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"原価率を30%にしたい料理の原価が210円のとき、売価はいくらにすればよいか。","q_vn":"Muốn tỷ lệ giá vốn 30% cho món có giá vốn 210 yên, giá bán nên là bao nhiêu?","options":[{"jp":"700円","vn":"700 yên"},{"jp":"630円","vn":"630 yên"},{"jp":"273円","vn":"273 yên"},{"jp":"300円","vn":"300 yên"}],"answer":0,"explain_jp":"売価＝原価÷原価率＝210÷0.3＝700円。原価率30%なら売価の30%が原価になります。","explain_vn":"Giá bán = giá vốn ÷ tỷ lệ giá vốn = 210 ÷ 0,3 = 700 yên. Nếu 30% thì giá vốn chiếm 30% giá bán.","why_wrong":{"1":"630円は0.3を掛けた誤り。","2":"273円は計算違い。","3":"300円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"ある日の来客数が150人、座席数が50席のとき、回転率はいくらか。","q_vn":"Một ngày có 150 khách, 50 ghế. Tỷ lệ quay vòng là?","options":[{"jp":"3回転","vn":"3 vòng"},{"jp":"0.33回転","vn":"0,33 vòng"},{"jp":"100回転","vn":"100 vòng"},{"jp":"200回転","vn":"200 vòng"}],"answer":0,"explain_jp":"回転率＝来客数÷座席数＝150÷50＝3回転。1席が平均3回使われたことを示します。","explain_vn":"Tỷ lệ quay vòng = số khách ÷ số ghế = 150 ÷ 50 = 3 vòng. Trung bình một ghế được dùng 3 lượt.","why_wrong":{"1":"0.33は逆に割った誤り。","2":"100は誤り。","3":"200は誤り。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"1か月の売上が600万円、食材費が180万円、人件費が180万円のとき、FL比率はいくらか。","q_vn":"Tháng doanh thu 6 triệu yên, nguyên liệu 1,8 triệu, nhân sự 1,8 triệu. Tỷ lệ FL là?","options":[{"jp":"60%","vn":"60%"},{"jp":"30%","vn":"30%"},{"jp":"90%","vn":"90%"},{"jp":"36%","vn":"36%"}],"answer":0,"explain_jp":"FL比率＝(食材費+人件費)÷売上×100＝(180+180)÷600×100＝60%。目安の60%程度に収まっています。","explain_vn":"Tỷ lệ FL = (nguyên liệu + nhân sự) ÷ doanh thu × 100 = (180+180) ÷ 600 × 100 = 60%. Đúng mốc khoảng 60%.","why_wrong":{"1":"30%は片方だけの割合。","2":"90%は計算違い。","3":"36%は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"1か月の粗利益が400万円、人件費が160万円のとき、労働分配率はいくらか。","q_vn":"Tháng lãi gộp 4 triệu yên, chi phí nhân sự 1,6 triệu. Tỷ lệ phân phối lao động là?","options":[{"jp":"40%","vn":"40%"},{"jp":"25%","vn":"25%"},{"jp":"64%","vn":"64%"},{"jp":"250%","vn":"250%"}],"answer":0,"explain_jp":"労働分配率＝人件費÷粗利益×100＝160÷400×100＝40%。適正値（35〜40%）の範囲内です。","explain_vn":"Tỷ lệ phân phối lao động = nhân sự ÷ lãi gộp × 100 = 160 ÷ 400 × 100 = 40%, nằm trong mốc 35–40%.","why_wrong":{"1":"25%は計算違い。","2":"64%は計算違い。","3":"250%は逆にした誤り。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"客単価を上げるため「1品平均単価」を450円から500円に上げ、注文点数が平均3点で変わらないとき、客単価はいくらになるか。","q_vn":"Để tăng đơn giá/khách, nâng đơn giá bình quân món từ 450 lên 500 yên, số món trung bình vẫn 3. Đơn giá/khách thành bao nhiêu?","options":[{"jp":"1,500円","vn":"1.500 yên"},{"jp":"1,350円","vn":"1.350 yên"},{"jp":"500円","vn":"500 yên"},{"jp":"950円","vn":"950 yên"}],"answer":0,"explain_jp":"客単価＝注文点数×一品平均単価＝3×500＝1,500円。値上げ前は3×450＝1,350円でした。","explain_vn":"Đơn giá/khách = số món × đơn giá bình quân món = 3 × 500 = 1.500 yên. Trước đó là 3 × 450 = 1.350 yên.","why_wrong":{"1":"1,350円は値上げ前の値。","2":"500円は1品分。","3":"950円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"固定費が1か月120万円、粗利益率が60%のとき、損益分岐点売上高はおよそいくらか。","q_vn":"Chi phí cố định tháng 1,2 triệu yên, tỷ lệ lãi gộp 60%. Doanh thu hòa vốn khoảng bao nhiêu?","options":[{"jp":"200万円","vn":"2 triệu yên"},{"jp":"72万円","vn":"720 nghìn yên"},{"jp":"120万円","vn":"1,2 triệu yên"},{"jp":"300万円","vn":"3 triệu yên"}],"answer":0,"explain_jp":"損益分岐点売上高＝固定費÷粗利益率＝120万÷0.6＝200万円。この売上で費用と利益がちょうど釣り合います。","explain_vn":"Doanh thu hòa vốn = chi phí cố định ÷ tỷ lệ lãi gộp = 1,2 triệu ÷ 0,6 = 2 triệu yên. Tại mức này chi phí và lợi nhuận cân bằng.","why_wrong":{"1":"72万は掛けた誤り。","2":"120万は固定費そのもの。","3":"300万は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"棚卸の結果、実際原価率が標準原価率より2%高かった。考えられる原因として適切なものはどれか。","q_vn":"Kiểm kê cho thấy tỷ lệ giá vốn thực cao hơn tiêu chuẩn 2%. Nguyên nhân có thể là?","options":[{"jp":"ポーション超過・廃棄・盗難・棚卸ミスなどのロス","vn":"Vượt định lượng, bỏ phí, mất cắp, sai kiểm kê... gây hao hụt"},{"jp":"客単価が上がったから","vn":"Vì đơn giá/khách tăng"},{"jp":"回転率が上がったから","vn":"Vì quay vòng bàn tăng"},{"jp":"接客が良かったから","vn":"Vì tiếp khách tốt"}],"answer":0,"explain_jp":"実際原価率が標準より高いのは、量の出しすぎ・廃棄・盗難・棚卸ミスなどのロスが原因。原因を特定し改善します。","explain_vn":"Giá vốn thực cao hơn tiêu chuẩn do vượt định lượng, bỏ phí, mất cắp, sai kiểm kê... Cần tìm nguyên nhân và khắc phục.","why_wrong":{"1":"客単価上昇は原価率上昇の直接原因ではない。","2":"回転率とは無関係。","3":"接客の良し悪しとは無関係。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"6時間を超え8時間以下の勤務の場合、与えるべき休憩時間はどれか。","q_vn":"Làm việc trên 6 và không quá 8 giờ, thời gian nghỉ phải bố trí là?","options":[{"jp":"少なくとも45分","vn":"Ít nhất 45 phút"},{"jp":"少なくとも60分","vn":"Ít nhất 60 phút"},{"jp":"少なくとも15分","vn":"Ít nhất 15 phút"},{"jp":"休憩は不要","vn":"Không cần nghỉ"}],"answer":0,"explain_jp":"労働時間が6時間を超える場合は45分以上、8時間を超える場合は60分以上の休憩を途中に与えます。","explain_vn":"Quá 6 giờ thì nghỉ ≥45 phút; quá 8 giờ thì ≥60 phút, bố trí trong giờ làm.","why_wrong":{"1":"60分は8時間超の場合。","2":"15分は法定に満たない。","3":"休憩は必要。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"時給1,200円の従業員が、深夜（22時〜翌5時）に2時間働いた。深夜割増(25%)を含む2時間分の賃金はいくらか。","q_vn":"Nhân viên lương 1.200 yên/giờ làm 2 giờ ban đêm (22h–5h). Tiền 2 giờ gồm phụ cấp đêm (25%) là bao nhiêu?","options":[{"jp":"3,000円","vn":"3.000 yên"},{"jp":"2,400円","vn":"2.400 yên"},{"jp":"3,600円","vn":"3.600 yên"},{"jp":"2,700円","vn":"2.700 yên"}],"answer":0,"explain_jp":"深夜割増込みの時給＝1,200×1.25＝1,500円。2時間分＝1,500×2＝3,000円。","explain_vn":"Lương giờ gồm phụ cấp đêm = 1.200 × 1,25 = 1.500 yên. 2 giờ = 1.500 × 2 = 3.000 yên.","why_wrong":{"1":"2,400円は割増なしの2時間分。","2":"3,600円は割増率を誤った値。","3":"2,700円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"在庫を発注する際、過去の売上傾向をふまえて数量を決める理由として最も適切なものはどれか。","q_vn":"Khi đặt hàng, dựa vào xu hướng doanh thu quá khứ để định số lượng vì lý do nào?","options":[{"jp":"需要に合わせ、品切れと廃棄ロスを防ぐため","vn":"Khớp với nhu cầu, tránh hết hàng và hao phí"},{"jp":"とにかく多く仕入れるため","vn":"Để nhập càng nhiều càng tốt"},{"jp":"仕入先を喜ばせるため","vn":"Để làm vui lòng nhà cung cấp"},{"jp":"倉庫を埋めるため","vn":"Để lấp đầy kho"}],"answer":0,"explain_jp":"過去の売上傾向（曜日・天候・イベント等）をふまえて発注量を決めると、需要に合い、品切れと廃棄ロスを防げます。","explain_vn":"Dựa vào xu hướng (ngày trong tuần, thời tiết, sự kiện...) để định lượng đặt giúp khớp nhu cầu, tránh hết hàng và hao phí.","why_wrong":{"1":"多く仕入れるだけでは廃棄ロスが増える。","2":"仕入先を喜ばせるためではない。","3":"倉庫を埋めるためではない。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"ピークタイムに人手が足りず提供が遅れている。店舗運営上の対応として適切なものはどれか。","q_vn":"Giờ cao điểm thiếu người, món ra chậm. Cách xử lý vận hành đúng là?","options":[{"jp":"役割分担を見直し、ピークに合わせた人員配置・段取りを改善する","vn":"Rà soát phân công, cải thiện bố trí người và trình tự cho giờ cao điểm"},{"jp":"何もしない","vn":"Không làm gì"},{"jp":"品質を落として急がせる","vn":"Hạ chất lượng để làm cho nhanh"},{"jp":"お客様を減らすため入店を断り続ける","vn":"Cứ từ chối khách để bớt khách"}],"answer":0,"explain_jp":"ピーク時の遅れは、役割分担・人員配置・仕込みの段取りを見直して改善します。シフト計画（人時売上高）とも連動させます。","explain_vn":"Chậm giờ cao điểm cần rà soát phân công, bố trí người và trình tự sơ chế; gắn với kế hoạch xếp ca (doanh thu/giờ-người).","why_wrong":{"1":"放置は改善にならない。","2":"品質低下は信頼を損なう。","3":"入店拒否は売上機会の損失。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"月間売上目標800万円、目標人時売上高を5,000円とするとき、月間の計画総労働時間はおよそ何時間か。","q_vn":"Mục tiêu doanh thu tháng 8 triệu yên, doanh thu/giờ-người mục tiêu 5.000 yên. Tổng giờ lao động kế hoạch tháng khoảng bao nhiêu?","options":[{"jp":"1,600時間","vn":"1.600 giờ"},{"jp":"160時間","vn":"160 giờ"},{"jp":"40,000時間","vn":"40.000 giờ"},{"jp":"400時間","vn":"400 giờ"}],"answer":0,"explain_jp":"計画総労働時間＝月間売上目標÷人時売上高＝8,000,000÷5,000＝1,600時間。","explain_vn":"Tổng giờ lao động kế hoạch = mục tiêu doanh thu ÷ doanh thu/giờ-người = 8.000.000 ÷ 5.000 = 1.600 giờ.","why_wrong":{"1":"160時間は桁の誤り。","2":"40,000時間は掛けた誤り。","3":"400時間は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"売価500円の商品Aが1日120個、売価800円の商品Bが1日50個売れた。Aの1日の売上はいくらか。","q_vn":"Món A giá 500 yên bán 120 cái/ngày, món B giá 800 yên bán 50 cái/ngày. Doanh thu ngày của A là?","options":[{"jp":"60,000円","vn":"60.000 yên"},{"jp":"40,000円","vn":"40.000 yên"},{"jp":"6,000円","vn":"6.000 yên"},{"jp":"100,000円","vn":"100.000 yên"}],"answer":0,"explain_jp":"Aの売上＝売価×数量＝500×120＝60,000円。ちなみにBは800×50＝40,000円です。","explain_vn":"Doanh thu A = giá × số lượng = 500 × 120 = 60.000 yên. (B = 800 × 50 = 40.000 yên).","why_wrong":{"1":"40,000円はBの売上。","2":"6,000円は桁の誤り。","3":"100,000円は計算違い。"}},{"sect":"tenpo","part":"gakka","q_jp":"「先入れ先出し（FIFO）」を在庫管理で徹底する主な目的はどれか。","q_vn":"Mục đích chính khi áp dụng triệt để 'nhập trước xuất trước (FIFO)' trong quản lý kho là?","options":[{"jp":"古い在庫から使い、期限切れや品質劣化のロスを防ぐため","vn":"Dùng hàng cũ trước, tránh hao hụt do hết hạn/xuống chất lượng"},{"jp":"新しいものから使うため","vn":"Để dùng hàng mới trước"},{"jp":"在庫を増やすため","vn":"Để tăng tồn kho"},{"jp":"原価を隠すため","vn":"Để giấu giá vốn"}],"answer":0,"explain_jp":"FIFOは先に入れた（古い）在庫から使うことで、期限切れや品質劣化による廃棄ロスを防ぎます。棚の手前に古いものを置きます。","explain_vn":"FIFO là dùng hàng nhập trước (cũ) trước, tránh hao hụt do hết hạn/xuống chất lượng; xếp hàng cũ ra phía trước kệ.","why_wrong":{"1":"新しいものから使うのは逆。","2":"在庫を増やす目的ではない。","3":"原価を隠す目的ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"店舗の「4S・5S」活動が店舗運営にもたらす効果として適切なものはどれか。","q_vn":"Hoạt động '4S/5S' mang lại hiệu quả gì cho vận hành cửa hàng?","options":[{"jp":"作業効率・安全・衛生・印象が向上する","vn":"Nâng hiệu quả làm việc, an toàn, vệ sinh và ấn tượng"},{"jp":"必ず売上が下がる","vn":"Chắc chắn giảm doanh thu"},{"jp":"作業が遅くなる","vn":"Làm việc chậm đi"},{"jp":"効果はない","vn":"Không có hiệu quả"}],"answer":0,"explain_jp":"5S（整理・整頓・清掃・清潔・しつけ）は作業効率・安全・衛生・お客様への印象を高め、店舗運営の基盤になります。","explain_vn":"5S (sàng lọc, sắp xếp, quét dọn, vệ sinh, thói quen) nâng hiệu quả, an toàn, vệ sinh và ấn tượng với khách — nền tảng vận hành.","why_wrong":{"1":"売上が下がるとは限らない。","2":"作業は効率化される。","3":"効果はある。"}}]</script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const QUESTION_BANK = JSON.parse(document.getElementById("question-bank").textContent);

const WEBHOOK_DEFAULT = "https://hook.us2.make.com/jpntp3uy57g9dtdp9r6qsqmaub263ujd";

const BLUEPRINT = {
  gakka: [
    { key:"eisei", jp:"衛生管理", vn:"Quản lý vệ sinh", n:10, per:4 },
    { key:"chori", jp:"飲食物調理", vn:"Chế biến đồ ăn uống", n:5, per:2 },
    { key:"sekkyaku", jp:"接客全般", vn:"Tiếp khách", n:10, per:3 },
    { key:"tenpo", jp:"店舗運営", vn:"Vận hành cửa hàng", n:10, per:4 },
  ],
  jitsugi: [
    { key:"eisei", jp:"衛生管理", vn:"Quản lý vệ sinh", n:5, per:8 },
    { key:"chori", jp:"飲食物調理", vn:"Chế biến đồ ăn uống", n:5, per:4 },
    { key:"sekkyaku", jp:"接客全般", vn:"Tiếp khách", n:5, per:6 },
    { key:"tenpo", jp:"店舗運営", vn:"Vận hành cửa hàng", n:5, per:8 },
  ],
};
const SECT_LABEL = {
  eisei:{jp:"衛生管理",vn:"Vệ sinh"}, chori:{jp:"飲食物調理",vn:"Chế biến"},
  sekkyaku:{jp:"接客全般",vn:"Tiếp khách"}, tenpo:{jp:"店舗運営",vn:"Vận hành"},
};
const PASS_MARK = 163, TOTAL_MARK = 250, EXAM_MINUTES = 70;

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// build a 55-question exam from the bank, prefer part match, shuffle options
function buildExam(){
  const out=[];
  ["gakka","jitsugi"].forEach(part=>{
    BLUEPRINT[part].forEach(sect=>{
      let pool=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part===part);
      let extra=QUESTION_BANK.filter(q=>q.sect===sect.key && q.part!==part);
      let picks=shuffle(pool).slice(0,sect.n);
      if(picks.length<sect.n){ picks=picks.concat(shuffle(extra).slice(0,sect.n-picks.length)); }
      picks.forEach(q=>{
        // shuffle options, track correct
        const order=shuffle([0,1,2,3]);
        const newOptions=order.map(i=>q.options[i]);
        const newAnswer=order.indexOf(q.answer);
        const remap={}; // old index -> new index (for why_wrong)
        order.forEach((oldI,newI)=>{ remap[oldI]=newI; });
        const newWhy={};
        if(q.why_wrong){ Object.entries(q.why_wrong).forEach(([oldI,txt])=>{ newWhy[remap[oldI]]=txt; }); }
        out.push({
          part, sect:sect.key, per:sect.per,
          _sectJP:sect.jp, _sectVN:sect.vn,
          q_jp:q.q_jp, q_vn:q.q_vn, options:newOptions, answer:newAnswer,
          explain_jp:q.explain_jp, explain_vn:q.explain_vn, why_wrong:newWhy,
        });
      });
    });
  });
  return out.map((q,i)=>({...q,id:i}));
}

function App(){
  const [screen,setScreen]=useState("start");
  const [name,setName]=useState("");
  const [webhook,setWebhook]=useState(WEBHOOK_DEFAULT);
  const [questions,setQuestions]=useState([]);
  const [answers,setAnswers]=useState({});
  const [cur,setCur]=useState(0);
  const [remaining,setRemaining]=useState(EXAM_MINUTES*60);
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);
  const [saveState,setSaveState]=useState({status:"idle",msg:""});
  const timerRef=useRef(null);

  useEffect(()=>{
    if(screen!=="quiz") return;
    timerRef.current=setInterval(()=>{
      setRemaining(r=>{ if(r<=1){clearInterval(timerRef.current); finishExam(); return 0;} return r-1; });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[screen]); // eslint-disable-line

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  function startExam(){
    if(!name.trim()){ setError("お名前を入力してください / Vui lòng nhập tên"); return; }
    setError("");
    const q=buildExam();
    setQuestions(q); setAnswers({}); setCur(0); setRemaining(EXAM_MINUTES*60);
    setScreen("quiz");
    window.scrollTo(0,0);
  }

  function finishExam(){
    clearInterval(timerRef.current);
    const sectScore={}; let total=0, maxTotal=0;
    questions.forEach(q=>{
      const s=(sectScore[q.sect] ||= {got:0,max:0});
      s.max+=q.per; maxTotal+=q.per;
      if(answers[q.id]===q.answer){ s.got+=q.per; total+=q.per; }
    });
    const passed=total>=PASS_MARK;
    const res={
      name:name.trim(), datetime:new Date().toISOString(), datetimeLocal:new Date().toLocaleString("ja-JP"),
      total, maxTotal, passMark:PASS_MARK, passed, sectScore,
      answered:Object.keys(answers).length, questionCount:questions.length,
      detail:questions.map(q=>({ id:q.id, part:q.part, sect:q.sect, q_jp:q.q_jp,
        chosen:answers[q.id]??null, correct:q.answer, isCorrect:answers[q.id]===q.answer, points:q.per })),
    };
    setResult(res); setScreen("result"); window.scrollTo(0,0);
    sendToDrive(res);
  }

  async function sendToDrive(res){
    const url=webhook.trim();
    if(!url){ setSaveState({status:"skip",msg:""}); return; }
    setSaveState({status:"sending",msg:"保存中… / Đang lưu lên Google Drive…"});
    const payload={
      studentName:res.name, submittedAt:res.datetime, submittedAtLocal:res.datetimeLocal,
      totalScore:res.total, maxScore:res.maxTotal, passMark:res.passMark,
      totalDisplay:`${res.total}/${res.maxTotal}`,
      result:res.passed?"合格 (Đậu)":"不合格 (Rớt)",
      answered:res.answered, questionCount:res.questionCount,
      score_eisei:res.sectScore.eisei?`${res.sectScore.eisei.got}/${res.sectScore.eisei.max}`:"",
      score_chori:res.sectScore.chori?`${res.sectScore.chori.got}/${res.sectScore.chori.max}`:"",
      score_sekkyaku:res.sectScore.sekkyaku?`${res.sectScore.sekkyaku.got}/${res.sectScore.sekkyaku.max}`:"",
      score_tenpo:res.sectScore.tenpo?`${res.sectScore.tenpo.got}/${res.sectScore.tenpo.max}`:"",
      detailJson:JSON.stringify(res.detail),
    };
    try{
      const form=new URLSearchParams();
      Object.entries(payload).forEach(([k,v])=>form.append(k, v==null?"":String(v)));
      await fetch(url,{ method:"POST", mode:"no-cors", body:form });
      setSaveState({status:"ok",msg:"結果を保存しました。先生が確認できます。/ Đã lưu kết quả — giáo viên có thể xem."});
    }catch(e){
      setSaveState({status:"err",msg:"保存に失敗しました。ネットワークまたはURLをご確認ください。/ Lưu thất bại — kiểm tra mạng hoặc URL."});
    }
  }

  function Masthead(){
    return (
      <div className="masthead">
        <div className="brandline">
          <div className="seal">外食<br/>2号</div>
          <div className="titles">
            <h1>外食業 特定技能２号 技能測定試験</h1>
            <div className="romaji">Gaishokugyō Tokutei Ginō 2-gō · Luyện thi</div>
            <div className="vn">Kỹ năng đặc định số 2 — Ngành Nhà hàng / Dịch vụ ăn uống</div>
          </div>
        </div>
        <div className="exam-facts">
          <div className="fact"><div className="num">55</div><div className="lab">問 / Câu hỏi</div></div>
          <div className="fact"><div className="num">70</div><div className="lab">分 / Phút</div></div>
          <div className="fact"><div className="num">250</div><div className="lab">満点 / Tổng điểm</div></div>
          <div className="fact"><div className="num">163</div><div className="lab">合格 / Đậu từ</div></div>
        </div>
      </div>
    );
  }

  if(screen==="start"){
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <h2>受験者情報 <span className="vn-h">· Thông tin thí sinh</span></h2>
          <p className="hint">試験を始める前にお名前を入力してください。/ Nhập tên trước khi bắt đầu thi.</p>
          <label className="field">
            <span className="lbl">氏名 <span className="vn-s">/ Họ tên (bắt buộc)</span></span>
            <input type="text" value={name} onChange={e=>setName(e.target.value)}
                   placeholder="例: グエン・ヴァン・アン / Nguyễn Văn An"/>
          </label>
          <label className="field" style={{marginBottom:4}}>
            <span className="lbl">結果保存先 Webhook URL <span className="vn-s">/ URL lưu kết quả — đã cấu hình sẵn (Google Sheet công ty)</span></span>
            <input type="url" value={webhook} onChange={e=>setWebhook(e.target.value)}
                   placeholder="https://hook.…make.com/…"/>
          </label>
          <p className="hint" style={{marginTop:8}}>
            提出すると結果は自動的に会社のGoogleスプレッドシートに保存され、先生が進捗を確認できます。/ Khi nộp bài, kết quả tự động lưu vào Google Sheet của công ty để giáo viên theo dõi. (Xóa ô này nếu chỉ muốn xem trên máy.)
          </p>
          {error && <div className="err-box">{error}</div>}
          <button className="btn btn-seal" style={{width:"100%",marginTop:10}} onClick={startExam}>
            試験を始める
            <span className="vn-btn">Bắt đầu thi — 55 câu ngẫu nhiên bám sát giáo trình</span>
          </button>
        </div>
        <div className="panel">
          <h2>出題構成 <span className="vn-h">· Cấu trúc đề</span></h2>
          <p className="hint">学科100点分＋実技150点分＝250点満点。合格基準は合計163点以上（65%）。</p>
          <div style={{fontSize:12.5,fontWeight:700,margin:"4px 0 6px",color:"var(--indigo)"}}>学科試験 · Học khoa — 35問 / 120点</div>
          <div className="sect-breakdown">
            {BLUEPRINT.gakka.map(s=>(
              <div className="sect-row" key={"g"+s.key}>
                <span className="jp">{s.jp}<span className="vn2">{s.vn}</span></span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:12.5,fontWeight:700,margin:"14px 0 6px",color:"var(--indigo)"}}>実技試験 · Thực kỹ — 20問 / 130点（判断・計画立案）</div>
          <div className="sect-breakdown">
            {BLUEPRINT.jitsugi.map(s=>(
              <div className="sect-row" key={"j"+s.key}>
                <span className="jp">{s.jp}<span className="vn2">{s.vn}</span></span>
                <span className="pts">{s.n}問 · {s.n*s.per}点</span>
              </div>
            ))}
          </div>
          <p className="hint" style={{marginTop:14,marginBottom:0}}>
            出典: 一般社団法人日本フードサービス協会 学習テキスト（衛生管理・飲食物調理・接客全般・店舗運営）。
            <br/>Nguồn: 4 giáo trình chính thức JFNET. Câu hỏi và giải thích biên soạn bám sát nội dung này.
          </p>
        </div>
      </div>
    );
  }

  if(screen==="quiz"){
    const q=questions[cur];
    const answeredCount=Object.keys(answers).length;
    const partJP=q.part==="gakka"?"学科":"実技";
    const partVN=q.part==="gakka"?"Học khoa":"Thực kỹ";
    return (
      <div className="wrap">
        <div className="panel">
          <div className="quiz-top">
            <div>
              <div className={"timer"+(remaining<=300?" warn":"")}>{fmt(remaining)}</div>
              <div className="progress-text">残り時間 / Thời gian còn lại</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="progress-text">{answeredCount} / {questions.length} 回答済</div>
              <div className="progress-bar" style={{width:120}}>
                <span style={{width:(answeredCount/questions.length*100)+"%"}}/>
              </div>
            </div>
          </div>
          <div className="q-card">
            <span className="q-eyebrow">{partJP} <span className="div">·</span> {q._sectJP} <span className="div">·</span> {q.per}点</span>
            <div className="q-num">問 {cur+1} / {questions.length} — {partVN} · {q._sectVN}</div>
            <div className="q-jp">{q.q_jp}</div>

            <div className="choices">
              {q.options.map((opt,i)=>(
                <button key={i} className={"choice"+(answers[q.id]===i?" sel":"")}
                  onClick={()=>setAnswers(a=>({...a,[q.id]:i}))}>
                  <span className="key">{"ABCD"[i]}</span>
                  <span className="ctext">{opt.jp}<span className="cvn">{opt.vn}</span></span>
                </button>
              ))}
            </div>
            <div className="nav-row">
              <button className="btn btn-ghost" style={{flex:1}} disabled={cur===0} onClick={()=>setCur(c=>Math.max(0,c-1))}>
                ← 前へ<span className="vn-btn">Câu trước</span>
              </button>
              {cur<questions.length-1 ? (
                <button className="btn btn-primary" style={{flex:1}} onClick={()=>setCur(c=>Math.min(questions.length-1,c+1))}>
                  次へ →<span className="vn-btn">Câu tiếp</span>
                </button>
              ) : (
                <button className="btn btn-seal" style={{flex:1}} onClick={finishExam}>
                  提出する<span className="vn-btn">Nộp bài</span>
                </button>
              )}
            </div>
            <div className="palette">
              {questions.map((qq,i)=>(
                <button key={i} className={"pnum"+(answers[qq.id]!=null?" done":"")+(i===cur?" cur":"")} onClick={()=>setCur(i)}>{i+1}</button>
              ))}
            </div>
            <button className="btn btn-seal" style={{width:"100%",marginTop:18}} onClick={finishExam}>
              採点する（提出）<span className="vn-btn">Chấm điểm & xem giải thích</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==="result" && result){
    const pct=Math.round(result.total/result.maxTotal*100);
    return (
      <div className="wrap">
        <Masthead/>
        <div className="panel">
          <div className={"score-hero "+(result.passed?"pass":"fail")}>
            <div className="verdict-seal">{result.passed?"合":"否"}</div>
            <div className="score-big">{result.total}<span className="of"> / {result.maxTotal}</span></div>
            <div className="score-sub">{result.name} 様 · {pct}% · 合格基準 {PASS_MARK}点</div>
            <div className="verdict-label">{result.passed?"合格 — Đậu! Xin chúc mừng 🎉":"不合格 — Chưa đạt, cố gắng thêm nhé"}</div>
          </div>
          <div className="sect-scores">
            {Object.entries(result.sectScore).map(([k,v])=>(
              <div className="ss-row" key={k}>
                <div className="ss-name">{SECT_LABEL[k].jp}<span className="vn3">{SECT_LABEL[k].vn}</span></div>
                <div className="ss-track"><div className="ss-fill" style={{width:(v.got/v.max*100)+"%"}}/></div>
                <div className="ss-pts">{v.got}/{v.max}</div>
              </div>
            ))}
          </div>
          {saveState.status!=="idle" && saveState.status!=="skip" && (
            <div className={"save-status "+(saveState.status==="ok"?"ok":saveState.status==="err"?"err":"")}>
              {saveState.status==="sending" && "⏳ "}{saveState.msg}
            </div>
          )}
          {saveState.status==="skip" && (
            <div className="save-status">Webhook chưa cấu hình — kết quả chỉ hiển thị tại đây, không lưu lên Google Drive.</div>
          )}
          <div className="btn-row">
            <button className="btn btn-ghost" onClick={()=>{setScreen("start"); setResult(null);}}>
              もう一度<span className="vn-btn">Thi lại (đề mới)</span>
            </button>
          </div>
        </div>
        <div className="panel">
          <h2>解説 <span className="vn-h">· Giải thích từng câu</span></h2>
          <p className="hint">正解の理由と、各誤答が違う理由を確認しましょう。/ Xem lý do đáp án đúng và vì sao các phương án khác sai.</p>
          {questions.map((q,idx)=>{
            const chosen=answers[q.id]; const ok=chosen===q.answer;
            return (
              <div className="rev-item" key={q.id}>
                <div className="rev-head">
                  <div className={"rev-badge "+(ok?"ok":"no")}>{ok?"✓":"✕"}</div>
                  <div>
                    <div className="rev-qmeta">問{idx+1} · {q.part==="gakka"?"学科":"実技"} · {q._sectJP} · {q.per}点</div>
                    <div className="rev-q">{q.q_jp}</div>
                    <div className="rev-qvn">{q.q_vn}</div>
                  </div>
                </div>
                <div className="rev-body">
                  {q.options.map((opt,i)=>{
                    const isCorrect=i===q.answer;
                    const isChosenWrong=i===chosen && chosen!==q.answer;
                    return (
                      <div key={i} className={"rev-opt"+(isCorrect?" correct":"")+(isChosenWrong?" chosen-wrong":"")}>
                        <b>{"ABCD"[i]}.</b> {opt.jp}
                        {isCorrect && <span className="tag">正解 · Đúng</span>}
                        {isChosenWrong && <span className="tag">あなたの解答 · Bạn chọn</span>}
                        <span className="ovn">{opt.vn}</span>
                      </div>
                    );
                  })}
                  <div className="rev-explain">
                    <div className="ex-lbl">解説 · Giải thích</div>
                    <div className="ex-jp">{q.explain_jp}</div>
                    <div className="ex-vn">{q.explain_vn}</div>
                  </div>
                  {q.why_wrong && Object.keys(q.why_wrong).length>0 && (
                    <div className="rev-why-wrong">
                      {Object.entries(q.why_wrong).sort((a,b)=>a[0]-b[0]).map(([i,reason])=>(
                        <div key={i} style={{marginTop:4}}><b>{"ABCD"[Number(i)]} が誤りの理由:</b> {reason}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div className="foot-note">
          出典: 一般社団法人日本フードサービス協会 特定技能2号 学習テキスト<br/>
          問題は4つの公式テキストに基づき作成 · Công cụ luyện tập, không phải đề thi chính thức
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);

</script>
</body>
</html>
