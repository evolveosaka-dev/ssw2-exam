":"Giữ lạnh · sạch · nhanh"},{"jp":"常温で長く置く","vn":"Để lâu ở nhiệt độ phòng"},{"jp":"何度も温め直す","vn":"Hâm đi hâm lại nhiều lần"},{"jp":"作り置きを推奨する","vn":"Khuyến khích nấu để sẵn nhiều"}],"answer":0,"explain_jp":"腐敗・食中毒防止は「低温・清潔・迅速」が基本。危険温度帯に置く時間を短くします。","explain_vn":"Chống hỏng/ngộ độc: 'lạnh – sạch – nhanh'. Rút ngắn thời gian ở vùng nhiệt nguy hiểm.","why_wrong":{"1":"常温放置は増殖を招く。","2":"再加熱の繰り返しは品質・安全上不利。","3":"過度の作り置きは危険。"}},{"sect":"eisei","part":"gakka","q_jp":"化学性食中毒の原因として正しいものはどれか。","q_vn":"Nguyên nhân ngộ độc thực phẩm dạng hóa học đúng là?","options":[{"jp":"洗剤や農薬などの化学物質の混入","vn":"Lẫn hóa chất như chất tẩy rửa, thuốc trừ sâu"},{"jp":"サルモネラ菌","vn":"Vi khuẩn Salmonella"},{"jp":"ノロウイルス","vn":"Norovirus"},{"jp":"アニサキス","vn":"Anisakis"}],"answer":0,"explain_jp":"化学性食中毒は洗剤・農薬・有害金属などの混入が原因。容器の取り違えなどに注意します。","explain_vn":"Ngộ độc hóa học do lẫn chất tẩy, thuốc trừ sâu, kim loại độc... Chú ý tránh nhầm lẫn hộp đựng.","why_wrong":{"1":"サルモネラは細菌性。","2":"ノロはウイルス性。","3":"アニサキスは寄生虫。"}},{"sect":"eisei","part":"jitsugi","q_jp":"冷蔵庫の温度を確認したら12℃だった。最も適切な対応はどれか。","q_vn":"Kiểm tra tủ lạnh thấy 12℃. Xử lý đúng nhất là?","options":[{"jp":"基準（10℃以下）を超えているため原因を確認し、食材の状態を点検する","vn":"Vượt chuẩn (≤10℃) nên tìm nguyên nhân và kiểm tra tình trạng thực phẩm"},{"jp":"問題ないのでそのまま使う","vn":"Không sao, dùng tiếp"},{"jp":"扉を開けたままにする","vn":"Cứ để mở cửa tủ"},{"jp":"温度計を外す","vn":"Tháo nhiệt kế đi"}],"answer":0,"explain_jp":"12℃は冷蔵の基準（10℃以下）を超えています。原因（詰め込み過ぎ・故障・扉開放）を確認し、食材の状態を点検・記録します。","explain_vn":"12℃ vượt chuẩn lạnh (≤10℃). Kiểm nguyên nhân (nhét quá đầy, hỏng máy, mở cửa), kiểm tra và ghi lại tình trạng thực phẩm.","why_wrong":{"1":"基準超過を放置してはいけない。","2":"扉開放は温度をさらに上げる。","3":"温度計を外すのは管理放棄。"}},{"sect":"eisei","part":"jitsugi","q_jp":"鶏の刺身（加熱不十分な鶏肉）の提供を求められた。衛生上の対応として最も適切なものはどれか。","q_vn":"Khách yêu cầu gà tái (thịt gà chưa chín kỹ). Cách xử lý vệ sinh đúng nhất?","options":[{"jp":"カンピロバクター等のリスクを説明し、十分加熱したものを勧める","vn":"Giải thích rủi ro Campylobacter... và mời món đã đun chín kỹ"},{"jp":"要望どおり生で提供する","vn":"Phục vụ sống theo yêu cầu"},{"jp":"表面だけ焼いて提供する","vn":"Chỉ áp mặt ngoài rồi phục vụ"},{"jp":"確認せず提供する","vn":"Không xác nhận, cứ phục vụ"}],"answer":0,"explain_jp":"鶏肉はカンピロバクターやサルモネラのリスクが高く、加熱不十分は危険です。中心まで十分加熱したものを勧めます。","explain_vn":"Thịt gà nguy cơ cao Campylobacter/Salmonella; chưa chín kỹ rất nguy hiểm. Nên mời món chín tới tâm.","why_wrong":{"1":"生提供は食中毒リスクが高い。","2":"表面だけでは中心が加熱されない。","3":"確認なしは不適切。"}},{"sect":"eisei","part":"jitsugi","q_jp":"作業中に絆創膏をした指の傷が気になった。盛り付け作業を続ける際の対応として適切なものはどれか。","q_vn":"Đang làm, ngón tay có vết thương dán băng. Khi tiếp tục bày món nên làm gì?","options":[{"jp":"使い捨て手袋を着けて作業し、責任者に報告する","vn":"Đeo găng dùng một lần và báo người phụ trách"},{"jp":"そのまま素手で続ける","vn":"Cứ để tay trần làm tiếp"},{"jp":"傷を隠して黙って続ける","vn":"Giấu vết thương, im lặng làm tiếp"},{"jp":"傷口をなめてから続ける","vn":"Liếm vết thương rồi làm tiếp"}],"answer":0,"explain_jp":"手指の傷は黄色ブドウ球菌の汚染源。絆創膏の上から使い捨て手袋を着け、責任者に報告します。","explain_vn":"Vết thương ở tay là nguồn tụ cầu vàng; dán băng rồi đeo găng dùng một lần và báo người phụ trách.","why_wrong":{"1":"素手は汚染の危険。","2":"隠すのは危険。","3":"なめる行為は不衛生で危険。"}},{"sect":"eisei","part":"jitsugi","q_jp":"生の魚を扱った後、同じ手で生野菜を触ろうとしている。適切な対応はどれか。","q_vn":"Vừa xử lý cá sống, định dùng chính tay đó chạm rau sống. Cách đúng?","options":[{"jp":"手を洗ってから、または手袋を替えてから触る","vn":"Rửa tay hoặc thay găng rồi mới chạm"},{"jp":"そのまま触る","vn":"Cứ thế chạm"},{"jp":"エプロンで拭いてから触る","vn":"Lau vào tạp dề rồi chạm"},{"jp":"手をズボンで拭く","vn":"Lau tay vào quần"}],"answer":0,"explain_jp":"生の魚を扱った手で生野菜を触ると二次汚染になります。手洗い、または手袋の交換を行います。","explain_vn":"Tay đã dính cá sống chạm rau sống sẽ nhiễm chéo; phải rửa tay hoặc thay găng.","why_wrong":{"1":"そのままは二次汚染。","2":"エプロンで拭くだけでは菌が残る。","3":"ズボンで拭くのは不衛生。"}},{"sect":"eisei","part":"jitsugi","q_jp":"厨房で使うふきんが濡れて生乾きの状態が続いている。衛生上、最も適切な対応はどれか。","q_vn":"Khăn lau trong bếp cứ ẩm, bán khô kéo dài. Cách xử lý vệ sinh đúng nhất?","options":[{"jp":"洗浄・消毒し、よく乾燥させて清潔なものと交換する","vn":"Giặt–khử trùng, phơi khô kỹ và thay khăn sạch"},{"jp":"そのまま使い続ける","vn":"Cứ dùng tiếp"},{"jp":"軽く絞って使う","vn":"Vắt nhẹ rồi dùng"},{"jp":"色が変わるまで使う","vn":"Dùng đến khi đổi màu"}],"answer":0,"explain_jp":"生乾きのふきんは菌の温床。洗浄・消毒（次亜塩素酸や煮沸）し、よく乾燥、清潔なものと交換します。","explain_vn":"Khăn ẩm là ổ vi khuẩn; giặt–khử trùng (hypoclorit/đun sôi), phơi khô kỹ, thay khăn sạch.","why_wrong":{"1":"そのまま使用は不衛生。","2":"絞るだけでは菌が残る。","3":"色が変わるまで使うのは不適切。"}},{"sect":"eisei","part":"jitsugi","q_jp":"大量の煮込み料理を翌日も提供する。安全のための再加熱として適切なものはどれか。","q_vn":"Món hầm lượng lớn dùng cả hôm sau. Cách hâm lại an toàn là?","options":[{"jp":"中心部までしっかり再加熱（75℃1分以上）する","vn":"Hâm nóng tới tâm (≥75℃, ≥1 phút)"},{"jp":"表面だけ温める","vn":"Chỉ hâm mặt ngoài"},{"jp":"常温に戻して提供する","vn":"Để về nhiệt độ phòng rồi phục vụ"},{"jp":"再加熱せず提供する","vn":"Không hâm, phục vụ luôn"}],"answer":0,"explain_jp":"作り置きは中心部まで75℃1分以上に再加熱します。ウエルシュ菌対策として、冷却は小分け急速冷却が基本です。","explain_vn":"Món để sẵn phải hâm tới tâm ≥75℃×1 phút. Chống Welchii: làm nguội bằng cách chia nhỏ, làm lạnh nhanh.","why_wrong":{"1":"表面だけでは中心が加熱されない。","2":"常温提供は危険。","3":"再加熱なしは危険。"}},{"sect":"eisei","part":"jitsugi","q_jp":"検収時に、冷蔵品が生ぬるい状態で届いた。適切な対応はどれか。","q_vn":"Khi nghiệm thu, hàng lạnh giao đến trong tình trạng âm ấm. Xử lý đúng là?","options":[{"jp":"温度を確認し、基準を満たさなければ受け取りを保留・返品する","vn":"Kiểm nhiệt độ; không đạt chuẩn thì tạm giữ/trả hàng"},{"jp":"とりあえず全部受け取る","vn":"Cứ nhận hết đã"},{"jp":"冷蔵庫で冷やせば問題ない","vn":"Cho vào tủ lạnh là ổn"},{"jp":"確認せずサインする","vn":"Không kiểm, ký nhận luôn"}],"answer":0,"explain_jp":"検収では温度・鮮度・期限・数量を確認します。冷蔵品が適温でなければ受け取りを保留・返品し記録します。","explain_vn":"Nghiệm thu phải kiểm nhiệt độ, độ tươi, hạn, số lượng. Hàng lạnh không đạt nhiệt thì tạm giữ/trả và ghi lại.","why_wrong":{"1":"無条件受領は危険。","2":"温度履歴が不明なものは冷やしても安全とは限らない。","3":"確認せずサインは不適切。"}},{"sect":"eisei","part":"jitsugi","q_jp":"アレルギーのあるお客様に、原材料を確認できない料理を求められた。適切な対応はどれか。","q_vn":"Khách dị ứng yêu cầu món không thể xác nhận nguyên liệu. Cách đúng là?","options":[{"jp":"確実に確認できない旨を正直に伝え、無理に提供しない","vn":"Trung thực nói không thể xác nhận chắc chắn, không cố phục vụ"},{"jp":"たぶん大丈夫と伝えて提供する","vn":"Nói chắc ổn rồi phục vụ"},{"jp":"少量なら平気と伝える","vn":"Bảo ít thì không sao"},{"jp":"確認せず提供する","vn":"Không xác nhận, phục vụ luôn"}],"answer":0,"explain_jp":"アレルギーは命に関わるため、確認できない場合は正直に伝え、無理に提供しません。可能なら代替を案内します。","explain_vn":"Dị ứng có thể nguy hiểm tính mạng; nếu không xác nhận được phải nói thật, không cố phục vụ. Nếu được thì gợi ý món thay thế.","why_wrong":{"1":"憶測での提供は危険。","2":"少量でも重篤化の恐れ。","3":"確認なしは危険。"}},{"sect":"eisei","part":"jitsugi","q_jp":"厨房でゴキブリを見かけた。衛生管理として適切な対応はどれか。","q_vn":"Thấy gián trong bếp. Cách quản lý vệ sinh đúng là?","options":[{"jp":"駆除と侵入経路の遮断を行い、清掃・記録する","vn":"Diệt và chặn đường xâm nhập, dọn vệ sinh và ghi hồ sơ"},{"jp":"見なかったことにする","vn":"Coi như không thấy"},{"jp":"食品の近くで殺虫剤を大量散布する","vn":"Xịt nhiều thuốc sát trùng gần thực phẩm"},{"jp":"翌月まで放置する","vn":"Để đến tháng sau"}],"answer":0,"explain_jp":"そ族・昆虫は駆除と侵入経路の遮断（隙間封鎖・清掃）が基本。殺虫剤は食品を汚染しないよう配慮し、年2回以上の駆除と記録を行います。","explain_vn":"Chuột/côn trùng: diệt và chặn đường vào (bịt khe, dọn dẹp). Xịt thuốc phải tránh nhiễm thực phẩm; diệt ≥2 lần/năm và ghi hồ sơ.","why_wrong":{"1":"放置は衛生上不可。","2":"食品近くの大量散布は化学性汚染の危険。","3":"放置は不適切。"}},{"sect":"eisei","part":"jitsugi","q_jp":"衛生管理計画の記録を毎日つける意義として最も適切なものはどれか。","q_vn":"Ý nghĩa việc ghi hồ sơ kế hoạch vệ sinh hằng ngày đúng nhất là?","options":[{"jp":"問題の早期発見と、事故時の原因追及・改善に役立てるため","vn":"Phát hiện sớm vấn đề, và khi có sự cố thì truy nguyên–cải thiện"},{"jp":"書類を増やすため","vn":"Để tăng giấy tờ"},{"jp":"お客様に見せるため","vn":"Để cho khách xem"},{"jp":"記録は意味がない","vn":"Ghi chép vô nghĩa"}],"answer":0,"explain_jp":"記録は日々の管理状況を見える化し、問題の早期発見や事故時の原因追及・改善につながります。","explain_vn":"Hồ sơ giúp thấy rõ tình trạng quản lý hằng ngày, phát hiện sớm vấn đề và truy nguyên–cải thiện khi có sự cố.","why_wrong":{"1":"書類を増やすのが目的ではない。","2":"顧客提示が主目的ではない。","3":"記録は重要である。"}},{"sect":"eisei","part":"gakka","q_jp":"食中毒予防の「増やさない」に該当する行動として正しいものはどれか。","q_vn":"Hành động thuộc nguyên tắc 'không để tăng lên' là?","options":[{"jp":"食材を速やかに冷蔵・冷凍し、常温放置を避ける","vn":"Làm lạnh/đông nhanh, tránh để nhiệt độ phòng"},{"jp":"手をよく洗う","vn":"Rửa tay kỹ"},{"jp":"中心まで加熱する","vn":"Đun chín tới tâm"},{"jp":"器具を消毒する","vn":"Khử trùng dụng cụ"}],"answer":0,"explain_jp":"「増やさない」は迅速・冷却が中心で、速やかな冷蔵・冷凍が該当します。手洗い・器具消毒は「つけない」、加熱は「やっつける」です。","explain_vn":"'Không để tăng' là nhanh và làm lạnh; làm lạnh/đông nhanh thuộc nhóm này. Rửa tay/khử trùng là 'không để dính', đun là 'tiêu diệt'.","why_wrong":{"1":"手洗いは「つけない」。","2":"加熱は「やっつける」。","3":"器具消毒は「つけない」。"}},{"sect":"eisei","part":"gakka","q_jp":"消毒用アルコールの効果が最も高くなる濃度の目安はどれか。","q_vn":"Nồng độ cồn khử trùng hiệu quả nhất khoảng bao nhiêu?","options":[{"jp":"およそ70〜80%","vn":"Khoảng 70–80%"},{"jp":"およそ10%","vn":"Khoảng 10%"},{"jp":"およそ100%","vn":"Khoảng 100%"},{"jp":"およそ30%","vn":"Khoảng 30%"}],"answer":0,"explain_jp":"消毒用エタノールは約70〜80%で効果が高くなります。濃度が高すぎても低すぎても効果が下がります。","explain_vn":"Ethanol khử trùng hiệu quả nhất ở ~70–80%. Quá cao hoặc quá thấp đều giảm hiệu quả.","why_wrong":{"1":"10%では消毒効果が不十分。","2":"100%はかえって効果が下がる。","3":"30%では不十分。"}},{"sect":"eisei","part":"jitsugi","q_jp":"盛り付け済みの料理を提供までしばらく置く必要がある。安全な扱いはどれか。","q_vn":"Món đã bày cần để một lúc trước khi phục vụ. Cách xử lý an toàn là?","options":[{"jp":"温かい料理は温蔵、冷たい料理は冷蔵し危険温度帯を避ける","vn":"Món nóng giữ nóng, món lạnh giữ lạnh, tránh vùng nhiệt nguy hiểm"},{"jp":"すべて常温に置く","vn":"Tất cả để nhiệt độ phòng"},{"jp":"日光の当たる場所に置く","vn":"Đặt nơi có nắng chiếu"},{"jp":"重ねて放置する","vn":"Xếp chồng để đó"}],"answer":0,"explain_jp":"提供までの間も温かい料理は65℃以上で温蔵、冷たい料理は10℃以下で冷蔵し、危険温度帯（10〜60℃）を避けます。","explain_vn":"Trong lúc chờ phục vụ, món nóng giữ ≥65℃, món lạnh giữ ≤10℃, tránh vùng nguy hiểm (10–60℃).","why_wrong":{"1":"常温放置は菌が増える。","2":"日光下は品質劣化・菌増殖。","3":"重ねて放置は不衛生。"}},{"sect":"eisei","part":"gakka","q_jp":"食品を扱う施設のトイレの管理として適切でないものはどれか。","q_vn":"Quản lý nhà vệ sinh ở cơ sở chế biến, điều nào KHÔNG phù hợp?","options":[{"jp":"手洗い設備がなくてもよい","vn":"Không cần bồn rửa tay cũng được"},{"jp":"定期的に清掃・消毒する","vn":"Vệ sinh–khử trùng định kỳ"},{"jp":"手洗い・消毒設備を設ける","vn":"Có bồn rửa tay và khử trùng"},{"jp":"調理場と適切に区分する","vn":"Ngăn cách hợp lý với khu bếp"}],"answer":0,"explain_jp":"トイレには手洗い・消毒設備が必要で、定期清掃・消毒し、調理場と適切に区分します。手洗い設備がないのは不適切です。","explain_vn":"Nhà vệ sinh phải có bồn rửa tay/khử trùng, vệ sinh định kỳ và ngăn cách với khu bếp. Không có bồn rửa tay là sai.","why_wrong":{"1":"定期清掃・消毒は正しい。","2":"手洗い・消毒設備の設置は正しい。","3":"調理場との区分は正しい。"}},{"sect":"chori","part":"gakka","q_jp":"和食の基本の調味順序「さしすせそ」で、最初に入れるものはどれか。","q_vn":"Trong thứ tự nêm cơ bản 'sa-shi-su-se-so', gia vị cho vào đầu tiên là?","options":[{"jp":"砂糖","vn":"Đường"},{"jp":"塩","vn":"Muối"},{"jp":"酢","vn":"Giấm"},{"jp":"醤油","vn":"Nước tương"}],"answer":0,"explain_jp":"「さしすせそ」は砂糖→塩→酢→醤油→味噌の順。分子の大きい砂糖を先に入れて味を染み込ませます。","explain_vn":"'Sa-shi-su-se-so' là đường→muối→giấm→tương→miso. Đường phân tử lớn cho trước để thấm vị.","why_wrong":{"1":"塩は2番目。","2":"酢は3番目。","3":"醤油は4番目。"}},{"sect":"chori","part":"gakka","q_jp":"計量の目安として正しいものはどれか。","q_vn":"Mốc định lượng đúng là?","options":[{"jp":"大さじ1=15ml、小さじ1=5ml","vn":"1 muỗng canh = 15ml, 1 muỗng cà phê = 5ml"},{"jp":"大さじ1=5ml、小さじ1=15ml","vn":"1 muỗng canh = 5ml, 1 muỗng cà phê = 15ml"},{"jp":"大さじ1=10ml、小さじ1=1ml","vn":"1 muỗng canh = 10ml, 1 muỗng cà phê = 1ml"},{"jp":"大さじ1=20ml、小さじ1=10ml","vn":"1 muỗng canh = 20ml, 1 muỗng cà phê = 10ml"}],"answer":0,"explain_jp":"大さじ1=15ml、小さじ1=5ml、1カップ=200mlが基本の計量です。","explain_vn":"1 muỗng canh = 15ml, 1 muỗng cà phê = 5ml, 1 cốc = 200ml.","why_wrong":{"1":"大小が逆。","2":"数値が誤り。","3":"数値が誤り。"}},{"sect":"chori","part":"gakka","q_jp":"計量カップ1杯（1カップ）の容量として正しいものはどれか。","q_vn":"Dung tích 1 cốc đong (1 cup) đúng là?","options":[{"jp":"200ml","vn":"200ml"},{"jp":"100ml","vn":"100ml"},{"jp":"500ml","vn":"500ml"},{"jp":"1000ml","vn":"1000ml"}],"answer":0,"explain_jp":"日本の計量カップは1カップ=200mlが基本です（米用の合は約180ml）。","explain_vn":"Cốc đong ở Nhật: 1 cup = 200ml (còn 'gō' đong gạo ≈ 180ml).","why_wrong":{"1":"100mlは半カップ。","2":"500mlは誤り。","3":"1000mlは1リットル。"}},{"sect":"chori","part":"gakka","q_jp":"揚げ物の油温で「中温」の目安はどれか。","q_vn":"Nhiệt độ dầu chiên mức 'trung bình' khoảng bao nhiêu?","options":[{"jp":"170〜180℃","vn":"170–180℃"},{"jp":"120〜130℃","vn":"120–130℃"},{"jp":"200〜210℃","vn":"200–210℃"},{"jp":"90〜100℃","vn":"90–100℃"}],"answer":0,"explain_jp":"揚げ油は低温150〜160℃、中温170〜180℃、高温180〜190℃が目安。天ぷらやフライは中温が多いです。","explain_vn":"Dầu chiên: thấp 150–160℃, trung bình 170–180℃, cao 180–190℃. Tempura, đồ chiên xù thường dùng mức trung bình.","why_wrong":{"1":"120〜130℃は低すぎる。","2":"200℃超は高すぎて焦げやすい。","3":"90〜100℃では揚がらない。"}},{"sect":"chori","part":"gakka","q_jp":"だしをとる材料として、うま味成分「グルタミン酸」を多く含むものはどれか。","q_vn":"Nguyên liệu nấu dashi giàu vị umami 'glutamate' là?","options":[{"jp":"昆布","vn":"Tảo bẹ (konbu)"},{"jp":"かつお節","vn":"Cá bào (katsuobushi)"},{"jp":"煮干し","vn":"Cá cơm khô (niboshi)"},{"jp":"干し椎茸","vn":"Nấm đông cô khô"}],"answer":0,"explain_jp":"昆布のうま味はグルタミン酸、かつお節はイノシン酸、干し椎茸はグアニル酸。合わせると相乗効果で味が増します。","explain_vn":"Umami: konbu là glutamate, katsuobushi là inosinate, nấm khô là guanylate. Kết hợp tạo hiệu ứng cộng hưởng.","why_wrong":{"1":"かつお節はイノシン酸。","2":"煮干しはイノシン酸系。","3":"干し椎茸はグアニル酸。"}},{"sect":"chori","part":"gakka","q_jp":"「一番だし」の特徴として正しいものはどれか。","q_vn":"Đặc điểm của 'ichiban dashi (nước dashi đầu)' là?","options":[{"jp":"昆布とかつお節から短時間でとる、香りと風味のよいだし","vn":"Lấy nhanh từ konbu và cá bào, thơm và đậm vị"},{"jp":"だしがらを煮出した濃いだし","vn":"Nước dashi đặc hầm từ bã dashi"},{"jp":"水だけを煮たもの","vn":"Chỉ đun nước lã"},{"jp":"油を加えたもの","vn":"Có thêm dầu"}],"answer":0,"explain_jp":"一番だしは昆布とかつお節から短時間でとる香り高いだしで、吸い物などに使います。だしがらから取るのが二番だし。","explain_vn":"Ichiban dashi lấy nhanh từ konbu và cá bào, thơm, dùng cho canh trong. Lấy lại từ bã là niban dashi.","why_wrong":{"1":"だしがらからは二番だし。","2":"水だけではだしにならない。","3":"油は加えない。"}},{"sect":"chori","part":"gakka","q_jp":"米を炊く際の一般的な水加減（米の容量に対する水）はどれか。","q_vn":"Tỷ lệ nước khi nấu cơm (so với thể tích gạo) thông thường là?","options":[{"jp":"米の約1.2倍","vn":"Khoảng 1,2 lần thể tích gạo"},{"jp":"米の約0.5倍","vn":"Khoảng 0,5 lần"},{"jp":"米の約3倍","vn":"Khoảng 3 lần"},{"jp":"米の約5倍","vn":"Khoảng 5 lần"}],"answer":0,"explain_jp":"白米は容量で米の約1.2倍、重量では約1.5倍が目安。洗米後の吸水も大切です。","explain_vn":"Gạo trắng: theo thể tích ~1,2 lần gạo, theo khối lượng ~1,5 lần. Ngâm sau khi vo cũng quan trọng.","why_wrong":{"1":"0.5倍では水が少なすぎる。","2":"3倍は多すぎる（雑炊向き）。","3":"5倍はお粥の水加減。"}},{"sect":"chori","part":"gakka","q_jp":"日本料理の切り方で、繊維に沿って細く切る「せん切り」に近いものはどれか。","q_vn":"Kiểu thái sợi mảnh theo thớ, gần với 'sen-giri' là?","options":[{"jp":"細長い糸状に切る","vn":"Thái sợi dài mảnh như chỉ"},{"jp":"さいの目に切る","vn":"Thái hạt lựu"},{"jp":"薄い輪切りにする","vn":"Thái lát tròn mỏng"},{"jp":"乱切りにする","vn":"Thái miếng vát tùy ý (rangiri)"}],"answer":0,"explain_jp":"せん切りは細い糸状に切る方法。さいの目切り・輪切り・乱切りはそれぞれ別の切り方です。","explain_vn":"Sen-giri là thái sợi mảnh như chỉ. Thái hạt lựu, lát tròn, miếng vát là các kiểu khác.","why_wrong":{"1":"さいの目は立方体。","2":"輪切りは丸い薄切り。","3":"乱切りは不規則な塊。"}},{"sect":"chori","part":"gakka","q_jp":"肉を焼く前に常温に戻す（室温に少し置く）主な理由はどれか。","q_vn":"Lý do chính để thịt về nhiệt độ phòng trước khi nướng là?","options":[{"jp":"中心まで均一に火を通しやすくするため","vn":"Để chín đều tới tâm dễ hơn"},{"jp":"色を変えるため","vn":"Để đổi màu"},{"jp":"重さを増やすため","vn":"Để tăng cân nặng"},{"jp":"菌を増やすため","vn":"Để vi khuẩn tăng"}],"answer":0,"explain_jp":"冷たいまま焼くと表面が焦げても中心が生になりやすいため、少し室温に戻すと均一に火が通ります（衛生上、長時間の放置は避ける）。","explain_vn":"Thịt lạnh nướng dễ cháy ngoài mà sống trong; để về nhiệt độ phòng một chút giúp chín đều (nhưng không để quá lâu vì vệ sinh).","why_wrong":{"1":"色替えが目的ではない。","2":"重量増加は目的ではない。","3":"菌を増やす目的ではない（長時間放置は逆にNG）。"}},{"sect":"chori","part":"gakka","q_jp":"魚をおろす前に「水洗い（血や汚れを落とす）」を行う主な目的はどれか。","q_vn":"Trước khi phi lê cá, 'rửa (loại máu/bẩn)' nhằm mục đích chính gì?","options":[{"jp":"生臭みや汚れを取り、衛生と風味を保つため","vn":"Loại mùi tanh/bẩn, giữ vệ sinh và hương vị"},{"jp":"重量を増やすため","vn":"Để tăng khối lượng"},{"jp":"色を濃くするため","vn":"Để màu đậm hơn"},{"jp":"骨を柔らかくするため","vn":"Để xương mềm"}],"answer":0,"explain_jp":"水洗いで血合いやぬめり・汚れを落とし、生臭みを抑えて衛生と風味を保ちます。手早く行い水気を拭きます。","explain_vn":"Rửa để loại máu, nhớt, bẩn, giảm tanh, giữ vệ sinh và vị. Làm nhanh rồi lau khô.","why_wrong":{"1":"重量増加ではない。","2":"色を濃くする目的ではない。","3":"骨を柔らかくする効果はない。"}},{"sect":"chori","part":"gakka","q_jp":"卵の調理で、加熱により固まる性質を何というか。","q_vn":"Trứng đông lại khi gia nhiệt — tính chất này gọi là gì?","options":[{"jp":"熱凝固性","vn":"Tính đông tụ khi nhiệt"},{"jp":"起泡性","vn":"Tính tạo bọt"},{"jp":"乳化性","vn":"Tính nhũ hóa"},{"jp":"保水性","vn":"Tính giữ nước"}],"answer":0,"explain_jp":"卵は加熱で固まる熱凝固性を持ちます。ほかに泡立つ起泡性、油と水をつなぐ乳化性（マヨネーズ）もあります。","explain_vn":"Trứng có tính đông tụ khi nhiệt. Ngoài ra còn tính tạo bọt, và tính nhũ hóa nối dầu–nước (mayonnaise).","why_wrong":{"1":"起泡性は泡立ちの性質。","2":"乳化性はマヨネーズの性質。","3":"保水性は別の性質。"}},{"sect":"chori","part":"gakka","q_jp":"マヨネーズが油と酢（水分）を混ぜて安定するのは卵のどの性質によるか。","q_vn":"Mayonnaise trộn ổn định dầu và giấm (nước) nhờ tính chất nào của trứng?","options":[{"jp":"乳化性","vn":"Tính nhũ hóa"},{"jp":"熱凝固性","vn":"Tính đông tụ nhiệt"},{"jp":"起泡性","vn":"Tính tạo bọt"},{"jp":"防腐性","vn":"Tính chống thối"}],"answer":0,"explain_jp":"卵黄の乳化性により、本来混ざらない油と水（酢）が安定して混ざり、マヨネーズができます。","explain_vn":"Nhờ tính nhũ hóa của lòng đỏ, dầu và nước (giấm) vốn không trộn được lại hòa ổn định thành mayonnaise.","why_wrong":{"1":"熱凝固は加熱で固まる性質。","2":"起泡性はメレンゲの性質。","3":"防腐性という性質ではない。"}},{"sect":"chori","part":"gakka","q_jp":"「廃棄率」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'tỷ lệ hao hụt (bỏ đi)' là?","options":[{"jp":"食材のうち、皮や骨など食べられず捨てる部分の割合","vn":"Tỷ lệ phần không ăn được (vỏ, xương...) phải bỏ trong nguyên liệu"},{"jp":"売れ残りの割合","vn":"Tỷ lệ hàng ế"},{"jp":"利益の割合","vn":"Tỷ lệ lợi nhuận"},{"jp":"人件費の割合","vn":"Tỷ lệ chi phí nhân sự"}],"answer":0,"explain_jp":"廃棄率は皮・種・骨など食べられない部分の割合。可食部＝購入量×(1−廃棄率)で、仕入量の計算に使います。","explain_vn":"Tỷ lệ hao hụt là phần không ăn được (vỏ, hạt, xương). Phần ăn được = lượng mua ×(1−tỷ lệ hao), dùng để tính lượng nhập.","why_wrong":{"1":"売れ残りは在庫ロス。","2":"利益率とは別。","3":"人件費率とは別。"}},{"sect":"chori","part":"gakka","q_jp":"食品の「五味」に含まれないものはどれか。","q_vn":"Đâu KHÔNG thuộc 'ngũ vị' của món ăn?","options":[{"jp":"辛味","vn":"Vị cay"},{"jp":"甘味","vn":"Vị ngọt"},{"jp":"酸味","vn":"Vị chua"},{"jp":"うま味","vn":"Vị umami"}],"answer":0,"explain_jp":"基本五味は甘味・塩味・酸味・苦味・うま味。辛味は痛覚に近く、基本五味には含まれません。","explain_vn":"Ngũ vị cơ bản: ngọt, mặn, chua, đắng, umami. Cay gần với cảm giác đau, không thuộc ngũ vị cơ bản.","why_wrong":{"1":"甘味は五味の1つ。","2":"酸味は五味の1つ。","3":"うま味は五味の1つ。"}},{"sect":"chori","part":"gakka","q_jp":"献立の基本「主食・主菜・副菜」で、ご飯やパン・麺にあたるのはどれか。","q_vn":"Trong bố cục thực đơn 'món chính tinh bột – món chính đạm – món phụ', cơm/bánh mì/mì thuộc phần nào?","options":[{"jp":"主食","vn":"Món tinh bột chính (shushoku)"},{"jp":"主菜","vn":"Món đạm chính (shusai)"},{"jp":"副菜","vn":"Món phụ (fukusai)"},{"jp":"汁物","vn":"Món canh"}],"answer":0,"explain_jp":"主食はご飯・パン・麺など炭水化物源、主菜は肉・魚・卵・大豆などたんぱく質源、副菜は野菜中心のおかずです。","explain_vn":"Shushoku là cơm/bánh mì/mì (tinh bột), shusai là thịt/cá/trứng/đậu (đạm), fukusai là món rau.","why_wrong":{"1":"主菜はたんぱく質のおかず。","2":"副菜は野菜のおかず。","3":"汁物はスープ・味噌汁。"}},{"sect":"chori","part":"gakka","q_jp":"食材を無駄なく使い「食品ロス」を減らす取り組みとして適切なものはどれか。","q_vn":"Cách giảm 'lãng phí thực phẩm' bằng cách dùng hết nguyên liệu, đúng là?","options":[{"jp":"適正な仕入れと使い切り、端材の活用を行う","vn":"Nhập đúng lượng, dùng hết, tận dụng phần thừa"},{"jp":"多めに仕入れて余りは捨てる","vn":"Nhập dư rồi bỏ phần thừa"},{"jp":"使えるものも新しくする","vn":"Còn dùng được vẫn thay mới"},{"jp":"在庫を管理しない","vn":"Không quản lý tồn kho"}],"answer":0,"explain_jp":"食品ロス削減には、需要に合った仕入れ、先入れ先出し、端材の活用、適量提供などが有効です。","explain_vn":"Giảm lãng phí: nhập đúng nhu cầu, FIFO, tận dụng phần thừa, phục vụ đúng khẩu phần.","why_wrong":{"1":"多めに仕入れて捨てるのはロス増。","2":"使えるものを捨てるのはロス。","3":"在庫無管理はロスの原因。"}},{"sect":"chori","part":"gakka","q_jp":"野菜をゆでる際、根菜類（じゃがいも・大根など）の一般的なゆで方はどれか。","q_vn":"Khi luộc rau củ, cách luộc thông thường của củ (khoai tây, củ cải) là?","options":[{"jp":"水から入れてゆでる","vn":"Cho vào từ nước lạnh rồi đun"},{"jp":"熱湯に入れてさっとゆでる","vn":"Cho vào nước sôi luộc nhanh"},{"jp":"油でゆでる","vn":"Luộc bằng dầu"},{"jp":"ゆでずに生で出す","vn":"Không luộc, để sống"}],"answer":0,"explain_jp":"根菜は火が通りにくいので水からゆで、中心まで均一に加熱します。葉物はお湯からさっとゆでます。","explain_vn":"Củ khó chín nên luộc từ nước lạnh để chín đều tới tâm. Rau lá thì cho vào nước sôi luộc nhanh.","why_wrong":{"1":"根菜を熱湯だと外だけ煮えて中が生になりやすい。","2":"油でゆでるは誤り。","3":"生で出すは調理法でない。"}},{"sect":"chori","part":"gakka","q_jp":"食材の保存で「常温保存」が適するものはどれか。","q_vn":"Nguyên liệu nào phù hợp 'bảo quản nhiệt độ phòng'?","options":[{"jp":"未開封の乾物・缶詰など","vn":"Đồ khô/đồ hộp chưa mở"},{"jp":"生の鶏肉","vn":"Thịt gà sống"},{"jp":"刺身","vn":"Cá sống (sashimi)"},{"jp":"生クリーム","vn":"Kem tươi"}],"answer":0,"explain_jp":"乾物・未開封の缶詰・調味料などは常温保存が可能。生鮮の肉・魚・乳製品は冷蔵・冷凍が必要です。","explain_vn":"Đồ khô, đồ hộp chưa mở, gia vị có thể để nhiệt độ phòng. Thịt/cá tươi, sản phẩm sữa phải lạnh/đông.","why_wrong":{"1":"生の鶏肉は要冷蔵。","2":"刺身は要冷蔵。","3":"生クリームは要冷蔵。"}},{"sect":"chori","part":"gakka","q_jp":"加熱調理「蒸す」の特徴として正しいものはどれか。","q_vn":"Đặc điểm của phương pháp 'hấp' đúng là?","options":[{"jp":"水蒸気で加熱し、栄養や形が崩れにくい","vn":"Đun bằng hơi nước, ít mất dinh dưỡng và giữ hình dạng"},{"jp":"直火で表面を焦がす","vn":"Lửa trực tiếp làm cháy mặt ngoài"},{"jp":"油で高温加熱する","vn":"Dùng dầu gia nhiệt cao"},{"jp":"生のまま提供する","vn":"Để sống rồi phục vụ"}],"answer":0,"explain_jp":"蒸すは水蒸気で加熱する方法で、栄養や形が崩れにくく、茶碗蒸しやシュウマイなどに向きます。","explain_vn":"Hấp dùng hơi nước, ít mất dinh dưỡng, giữ hình dạng, hợp món chawanmushi, shumai.","why_wrong":{"1":"直火で焦がすのは焼く。","2":"油で高温は揚げる。","3":"生提供は調理法でない。"}},{"sect":"chori","part":"gakka","q_jp":"「煮る」調理で味を染み込ませるコツとして正しいものはどれか。","q_vn":"Mẹo để món 'ninh/kho' thấm vị đúng là?","options":[{"jp":"一度冷ます過程で味が染み込む","vn":"Trong lúc để nguội một lần, vị sẽ thấm vào"},{"jp":"強火で一気に煮る","vn":"Lửa to đun một mạch"},{"jp":"味付けは最後に一気に行う","vn":"Nêm hết một lượt vào cuối"},{"jp":"冷たいまま提供する","vn":"Để lạnh rồi phục vụ"}],"answer":0,"explain_jp":"煮物は冷める過程で味が染み込みます。落とし蓋を使い、弱〜中火でじっくり煮ると均一に仕上がります。","explain_vn":"Món kho thấm vị trong lúc nguội. Dùng nắp đè (otoshibuta), lửa nhỏ–vừa để chín đều.","why_wrong":{"1":"強火一気は煮崩れやすい。","2":"味付けのタイミングだけでは不十分。","3":"冷たい提供が目的ではない。"}},{"sect":"chori","part":"gakka","q_jp":"「炒める」調理の特徴として正しいものはどれか。","q_vn":"Đặc điểm của phương pháp 'xào' đúng là?","options":[{"jp":"少量の油で強火で手早く加熱する","vn":"Ít dầu, lửa to, đảo nhanh"},{"jp":"大量の油で長時間揚げる","vn":"Nhiều dầu, chiên lâu"},{"jp":"水蒸気で加熱する","vn":"Đun bằng hơi nước"},{"jp":"低温で長時間煮る","vn":"Ninh lâu ở nhiệt độ thấp"}],"answer":0,"explain_jp":"炒めるは少量の油で強火・短時間で加熱し、食感と彩りを保ちます。手早く混ぜるのがコツです。","explain_vn":"Xào dùng ít dầu, lửa to, thời gian ngắn để giữ độ giòn và màu; đảo nhanh là mẹo.","why_wrong":{"1":"大量の油で長時間は揚げる。","2":"水蒸気は蒸す。","3":"低温長時間は煮る。"}},{"sect":"chori","part":"gakka","q_jp":"豚肉を扱う際に特に注意すべき点として正しいものはどれか。","q_vn":"Điều cần đặc biệt chú ý khi xử lý thịt heo là?","options":[{"jp":"中心まで十分に加熱する","vn":"Đun chín kỹ tới tâm"},{"jp":"生でも安全に食べられる","vn":"Ăn sống vẫn an toàn"},{"jp":"表面だけ焼けばよい","vn":"Chỉ áp mặt ngoài là được"},{"jp":"加熱は不要である","vn":"Không cần gia nhiệt"}],"answer":0,"explain_jp":"豚肉は寄生虫や食中毒菌のリスクがあるため、必ず中心まで十分に加熱します。","explain_vn":"Thịt heo có nguy cơ ký sinh trùng và vi khuẩn ngộ độc nên phải đun chín kỹ tới tâm.","why_wrong":{"1":"生食は危険。","2":"表面だけでは中心が生。","3":"加熱は必須。"}},{"sect":"chori","part":"gakka","q_jp":"調理器具のうち、焦げつきにくく扱いやすいが強い金属たわしで傷つきやすいものはどれか。","q_vn":"Dụng cụ chống dính, dễ dùng nhưng dễ trầy nếu cọ bằng búi kim loại mạnh là?","options":[{"jp":"フッ素樹脂加工のフライパン","vn":"Chảo phủ chống dính (Teflon)"},{"jp":"鉄のフライパン","vn":"Chảo sắt"},{"jp":"ステンレス鍋","vn":"Nồi inox"},{"jp":"土鍋","vn":"Nồi đất"}],"answer":0,"explain_jp":"フッ素樹脂加工は焦げつきにくいが、金属たわしや高温の空焚きで加工が傷みます。柔らかいスポンジで洗います。","explain_vn":"Chảo phủ chống dính ít cháy nhưng dễ hỏng lớp phủ nếu cọ búi kim loại hoặc đun khô nhiệt cao; rửa bằng miếng mềm.","why_wrong":{"1":"鉄は傷より錆に注意。","2":"ステンレスは比較的丈夫。","3":"土鍋は割れに注意で性質が異なる。"}},{"sect":"chori","part":"gakka","q_jp":"食材の「旬」を意識する利点として正しいものはどれか。","q_vn":"Lợi ích của việc chú ý 'mùa vụ (shun)' của nguyên liệu là?","options":[{"jp":"味・栄養がよく価格も安定しやすい","vn":"Ngon, giàu dinh dưỡng và giá ổn định hơn"},{"jp":"必ず高価になる","vn":"Chắc chắn đắt hơn"},{"jp":"衛生管理が不要になる","vn":"Khỏi cần quản lý vệ sinh"},{"jp":"廃棄率が必ず上がる","vn":"Tỷ lệ hao hụt chắc chắn tăng"}],"answer":0,"explain_jp":"旬の食材は味・栄養価が高く、流通量が多いため価格も安定しやすい利点があります。","explain_vn":"Nguyên liệu đúng mùa ngon, giàu dinh dưỡng, nguồn cung nhiều nên giá ổn định.","why_wrong":{"1":"旬は安くなりやすい。","2":"衛生管理は常に必要。","3":"廃棄率が上がるとは限らない。"}},{"sect":"chori","part":"gakka","q_jp":"だしの「二番だし」の使い方として適切なものはどれか。","q_vn":"Cách dùng 'niban dashi (nước dashi thứ hai)' phù hợp là?","options":[{"jp":"煮物や味噌汁などしっかり味をつける料理に使う","vn":"Dùng cho món kho, canh miso... cần nêm đậm"},{"jp":"香りを最優先する吸い物に使う","vn":"Dùng cho canh trong ưu tiên mùi thơm"},{"jp":"だしとして使えない","vn":"Không dùng làm dashi được"},{"jp":"生のまま飲む","vn":"Uống sống"}],"answer":0,"explain_jp":"二番だしはだしがらから取る風味控えめのだしで、煮物や味噌汁など味をしっかりつける料理に向きます。","explain_vn":"Niban dashi lấy từ bã, vị nhạt hơn, hợp món kho, canh miso cần nêm đậm.","why_wrong":{"1":"香り優先は一番だし。","2":"だしとして使える。","3":"生で飲むものではない。"}},{"sect":"chori","part":"gakka","q_jp":"食材の計量で「重量」を量るのに使う器具はどれか。","q_vn":"Dụng cụ dùng để cân 'khối lượng' nguyên liệu là?","options":[{"jp":"はかり（秤）","vn":"Cân"},{"jp":"計量カップ","vn":"Cốc đong"},{"jp":"温度計","vn":"Nhiệt kế"},{"jp":"タイマー","vn":"Đồng hồ hẹn giờ"}],"answer":0,"explain_jp":"重量ははかりで量ります。計量カップ・スプーンは容量、温度計は温度、タイマーは時間を計ります。","explain_vn":"Khối lượng cân bằng cân. Cốc/muỗng đong đo thể tích, nhiệt kế đo nhiệt, timer đo thời gian.","why_wrong":{"1":"計量カップは容量用。","2":"温度計は温度用。","3":"タイマーは時間用。"}},{"sect":"chori","part":"gakka","q_jp":"油の「発煙点」を超えて加熱するとどうなるか。","q_vn":"Đun dầu vượt 'điểm bốc khói' sẽ thế nào?","options":[{"jp":"煙が出て劣化が進み、風味も悪くなる","vn":"Bốc khói, dầu xuống cấp và vị kém đi"},{"jp":"栄養価が上がる","vn":"Giá trị dinh dưỡng tăng"},{"jp":"油が無害化する","vn":"Dầu trở nên vô hại"},{"jp":"何も変わらない","vn":"Không thay đổi gì"}],"answer":0,"explain_jp":"発煙点を超えると煙が出て酸化・劣化が進み、風味が悪くなります。適正温度で使います。","explain_vn":"Vượt điểm bốc khói thì dầu bốc khói, oxy hóa/xuống cấp và vị kém đi; nên dùng ở nhiệt độ phù hợp.","why_wrong":{"1":"栄養は上がらない。","2":"無害化しない。","3":"変化する。"}},{"sect":"chori","part":"gakka","q_jp":"ゼラチンと寒天の違いとして正しいものはどれか。","q_vn":"Khác biệt giữa gelatin và rau câu (agar) đúng là?","options":[{"jp":"寒天は海藻由来で常温でも固まり、ゼラチンは動物由来で口どけがよい","vn":"Agar từ tảo, đông ở nhiệt độ phòng; gelatin từ động vật, tan mềm trong miệng"},{"jp":"両方とも動物由来である","vn":"Cả hai đều từ động vật"},{"jp":"寒天は固まらない","vn":"Agar không đông được"},{"jp":"ゼラチンは海藻由来である","vn":"Gelatin từ tảo"}],"answer":0,"explain_jp":"寒天は海藻（テングサ等）由来で常温でも固まり食感は硬め。ゼラチンは動物のコラーゲン由来で口どけがよく、体温付近で溶けます。","explain_vn":"Agar từ tảo, đông ngay ở nhiệt độ phòng, giòn hơn. Gelatin từ collagen động vật, tan mềm, chảy gần nhiệt độ cơ thể.","why_wrong":{"1":"寒天は植物（海藻）由来。","2":"寒天は固まる。","3":"ゼラチンは動物由来。"}},{"sect":"chori","part":"gakka","q_jp":"揚げ物の衣（ころも）に使う小麦粉のうち、天ぷらに向くのはどれか。","q_vn":"Loại bột mì làm vỏ chiên, hợp với tempura là?","options":[{"jp":"薄力粉","vn":"Bột mì yếu (hakurikiko)"},{"jp":"強力粉","vn":"Bột mì mạnh (kyorikiko)"},{"jp":"上新粉","vn":"Bột gạo tẻ (joshinko)"},{"jp":"片栗粉のみ","vn":"Chỉ bột năng"}],"answer":0,"explain_jp":"天ぷらはグルテンの少ない薄力粉が向きます。混ぜすぎるとグルテンが出て衣が重くなるため、さっくり混ぜます。","explain_vn":"Tempura hợp bột mì yếu (ít gluten). Trộn quá kỹ sẽ ra gluten làm vỏ nặng, nên trộn nhẹ tay.","why_wrong":{"1":"強力粉はパン向きでグルテンが多い。","2":"上新粉は団子等の米粉。","3":"片栗粉のみは衣の主材に不向き。"}},{"sect":"chori","part":"gakka","q_jp":"食材の切り方を揃える主な目的はどれか。","q_vn":"Mục đích chính của việc cắt nguyên liệu đều nhau là?","options":[{"jp":"火の通りを均一にし、見た目も整えるため","vn":"Để chín đều và trình bày đẹp"},{"jp":"重量を増やすため","vn":"Để tăng khối lượng"},{"jp":"廃棄を増やすため","vn":"Để tăng phần bỏ"},{"jp":"味を消すため","vn":"Để mất vị"}],"answer":0,"explain_jp":"大きさを揃えると火の通りが均一になり、盛り付けもきれいになります。","explain_vn":"Cắt đều giúp chín đều và trình bày đẹp.","why_wrong":{"1":"重量増加は目的でない。","2":"廃棄増加は目的でない。","3":"味を消す目的でない。"}},{"sect":"chori","part":"gakka","q_jp":"「霜降り（下処理）」の目的として正しいものはどれか。","q_vn":"Mục đích của 'shimofuri' (chần sơ) trong sơ chế là?","options":[{"jp":"表面をさっと加熱し、臭みやぬめり・血合いを取り除く","vn":"Chần nhanh mặt ngoài để loại mùi, nhớt, máu"},{"jp":"中心まで完全に火を通す","vn":"Đun chín hoàn toàn tới tâm"},{"jp":"味を濃くつける","vn":"Nêm đậm vị"},{"jp":"油で揚げる","vn":"Chiên ngập dầu"}],"answer":0,"explain_jp":"霜降りは熱湯にさっと通し、表面の臭み・ぬめり・血合いを除く下処理。魚や肉の下ごしらえに使います。","explain_vn":"Shimofuri là chần qua nước sôi để loại mùi, nhớt, máu ở bề mặt; dùng khi sơ chế cá/thịt.","why_wrong":{"1":"完全加熱ではない。","2":"味付けではない。","3":"揚げる調理ではない。"}},{"sect":"chori","part":"gakka","q_jp":"食品の栄養素で、体を動かすエネルギー源として最も主要なものはどれか。","q_vn":"Chất dinh dưỡng là nguồn năng lượng chính cho hoạt động cơ thể là?","options":[{"jp":"炭水化物（糖質）","vn":"Carbohydrate (đường bột)"},{"jp":"ビタミン","vn":"Vitamin"},{"jp":"ミネラル","vn":"Khoáng chất"},{"jp":"水","vn":"Nước"}],"answer":0,"explain_jp":"炭水化物（糖質）は主要なエネルギー源。三大栄養素は炭水化物・たんぱく質・脂質です。","explain_vn":"Carbohydrate là nguồn năng lượng chính. Ba nhóm dinh dưỡng lớn: carbohydrate, đạm, chất béo.","why_wrong":{"1":"ビタミンは調整役。","2":"ミネラルは調整役。","3":"水はエネルギー源ではない。"}},{"sect":"chori","part":"gakka","q_jp":"体をつくる主成分となり、肉・魚・卵・大豆に多い栄養素はどれか。","q_vn":"Chất dinh dưỡng tạo nên cơ thể, nhiều trong thịt/cá/trứng/đậu là?","options":[{"jp":"たんぱく質","vn":"Chất đạm (protein)"},{"jp":"炭水化物","vn":"Carbohydrate"},{"jp":"ビタミンC","vn":"Vitamin C"},{"jp":"食物繊維","vn":"Chất xơ"}],"answer":0,"explain_jp":"たんぱく質は筋肉や体の組織をつくる主成分で、肉・魚・卵・大豆製品に多く含まれます。","explain_vn":"Đạm là thành phần chính tạo cơ và mô cơ thể, nhiều trong thịt, cá, trứng, đậu.","why_wrong":{"1":"炭水化物はエネルギー源。","2":"ビタミンCは調整役。","3":"食物繊維は整腸など。"}},{"sect":"chori","part":"gakka","q_jp":"みそ汁のみそを入れた後、長く煮立たせない方がよい理由はどれか。","q_vn":"Vì sao sau khi cho miso vào canh không nên đun sôi lâu?","options":[{"jp":"香りが飛び、風味が損なわれるから","vn":"Mùi thơm bay mất, vị bị giảm"},{"jp":"色が変わらないから","vn":"Vì màu không đổi"},{"jp":"塩分が増えるから","vn":"Vì độ mặn tăng"},{"jp":"固まるから","vn":"Vì bị đông cứng"}],"answer":0,"explain_jp":"みそは煮立たせると香りが飛び風味が損なわれます。火を止める直前に溶き入れるのがコツです。","explain_vn":"Đun sôi lâu làm miso bay mùi và giảm vị; nên hòa miso vào ngay trước khi tắt bếp.","why_wrong":{"1":"色の問題ではない。","2":"塩分が増えるわけではない。","3":"固まるわけではない。"}},{"sect":"chori","part":"gakka","q_jp":"「隠し包丁」を入れる目的として正しいものはどれか。","q_vn":"Mục đích của 'kakushi-bōchō' (khía dao ẩn) là?","options":[{"jp":"火の通りや味の染み込みをよくするため","vn":"Giúp chín nhanh và thấm vị tốt hơn"},{"jp":"見た目を悪くするため","vn":"Để trông xấu đi"},{"jp":"重さを増やすため","vn":"Để tăng cân nặng"},{"jp":"廃棄を増やすため","vn":"Để tăng phần bỏ"}],"answer":0,"explain_jp":"隠し包丁は見えない部分に切れ目を入れ、火の通りや味の染み込みをよくする下処理です。","explain_vn":"Kakushi-bōchō là khía nhẹ ở phần khuất để món chín nhanh và thấm vị hơn.","why_wrong":{"1":"見た目を損なう目的ではない。","2":"重量とは無関係。","3":"廃棄を増やす目的ではない。"}},{"sect":"chori","part":"gakka","q_jp":"揚げ油をこして保存するとよい理由はどれか。","q_vn":"Vì sao nên lọc dầu chiên trước khi cất?","options":[{"jp":"揚げかすを除いて酸化・劣化を遅らせるため","vn":"Loại vụn chiên để làm chậm oxy hóa/xuống cấp"},{"jp":"油を増やすため","vn":"Để tăng lượng dầu"},{"jp":"色を濃くするため","vn":"Để màu đậm hơn"},{"jp":"味を消すため","vn":"Để mất vị"}],"answer":0,"explain_jp":"揚げかすは酸化を早めるため、こして除くと油の劣化を遅らせられます。冷暗所で密閉保存します。","explain_vn":"Vụn chiên làm dầu oxy hóa nhanh; lọc bỏ giúp dầu lâu hỏng. Cất nơi tối mát, đậy kín.","why_wrong":{"1":"油は増えない。","2":"色を濃くする目的ではない。","3":"味を消す目的ではない。"}},{"sect":"chori","part":"gakka","q_jp":"食材のアク抜きの目的として正しいものはどれか。","q_vn":"Mục đích của việc 'khử vị chát/đắng (aku)' là?","options":[{"jp":"えぐみ・苦味・変色を抑え、口当たりをよくするため","vn":"Giảm vị chát/đắng, chống thâm, cải thiện độ ngon"},{"jp":"必ず栄養を増やすため","vn":"Chắc chắn tăng dinh dưỡng"},{"jp":"重量を増やすため","vn":"Tăng khối lượng"},{"jp":"色を濃くするため","vn":"Làm màu đậm hơn"}],"answer":0,"explain_jp":"アク抜きはえぐみ・苦味・変色を抑えて口当たりをよくします。水さらし・ゆでこぼしなどで行います。","explain_vn":"Khử aku giảm vị chát/đắng và chống thâm, giúp ngon hơn; làm bằng cách ngâm nước, luộc đổ nước.","why_wrong":{"1":"栄養増加が目的ではない。","2":"重量増加ではない。","3":"色を濃くする目的ではない。"}},{"sect":"chori","part":"jitsugi","q_jp":"1kgの魚を仕入れ、廃棄率が40%のとき、可食部はおよそ何gか。","q_vn":"Nhập 1kg cá, tỷ lệ hao hụt 40%. Phần ăn được khoảng bao nhiêu gam?","options":[{"jp":"600g","vn":"600g"},{"jp":"400g","vn":"400g"},{"jp":"1000g","vn":"1000g"},{"jp":"140g","vn":"140g"}],"answer":0,"explain_jp":"可食部＝購入量×(1−廃棄率)＝1000g×(1−0.4)＝600g。仕入量を決めるときに使います。","explain_vn":"Phần ăn được = lượng mua ×(1−tỷ lệ hao) = 1000g ×(1−0,4) = 600g. Dùng khi tính lượng nhập.","why_wrong":{"1":"400gは廃棄量のほう。","2":"1000gは廃棄を引いていない。","3":"140gは計算違い。"}},{"sect":"chori","part":"jitsugi","q_jp":"揚げ物の中心温度を確認したら70℃だった。安全提供のための対応はどれか。","q_vn":"Kiểm tra nhiệt độ tâm món chiên thấy 70℃. Để phục vụ an toàn nên làm gì?","options":[{"jp":"中心75℃1分以上になるよう追加加熱する","vn":"Chiên thêm để tâm đạt ≥75℃×1 phút"},{"jp":"そのまま提供する","vn":"Phục vụ luôn"},{"jp":"表面だけ再加熱する","vn":"Chỉ hâm mặt ngoài"},{"jp":"冷ましてから出す","vn":"Để nguội rồi bưng ra"}],"answer":0,"explain_jp":"中心75℃1分以上が加熱の目安。70℃では不十分なので、中心温度が基準に達するまで追加加熱します。","explain_vn":"Mốc gia nhiệt là tâm ≥75℃×1 phút. 70℃ chưa đủ nên phải chiên thêm cho tới khi đạt chuẩn.","why_wrong":{"1":"70℃提供は加熱不足。","2":"表面だけでは中心が上がらない。","3":"冷ますと危険温度帯に入る。"}},{"sect":"chori","part":"jitsugi","q_jp":"多くの料理を同時に仕込む際、作業を効率化する考え方として適切なものはどれか。","q_vn":"Khi chuẩn bị nhiều món cùng lúc, tư duy giúp tăng hiệu quả là?","options":[{"jp":"下処理をまとめ、加熱に時間のかかるものから始める段取りをする","vn":"Gộp sơ chế, lên trình tự bắt đầu từ món cần đun lâu"},{"jp":"思いついた順に作る","vn":"Nghĩ ra món nào làm món đó"},{"jp":"すべて最後にまとめて作る","vn":"Dồn hết làm vào cuối"},{"jp":"一品ずつ完成させてから次に進む","vn":"Xong hẳn từng món mới sang món khác"}],"answer":0,"explain_jp":"段取り（仕込みの計画）が重要で、下処理をまとめ、加熱に時間のかかるものから着手すると効率的です。","explain_vn":"Lên trình tự (segbari) quan trọng: gộp sơ chế và bắt đầu từ món cần đun lâu sẽ hiệu quả.","why_wrong":{"1":"思いつき順は非効率。","2":"最後にまとめると間に合わない。","3":"一品ずつは時間の無駄が多い。"}},{"sect":"chori","part":"jitsugi","q_jp":"だしを大量にとった後、当日使い切れない分の保存として適切なものはどれか。","q_vn":"Nấu dashi lượng lớn, phần không dùng hết trong ngày nên bảo quản thế nào?","options":[{"jp":"速やかに冷却し、冷蔵または冷凍で保存する","vn":"Làm nguội nhanh rồi bảo quản lạnh hoặc đông"},{"jp":"鍋のまま常温で置く","vn":"Để nguyên nồi ở nhiệt độ phòng"},{"jp":"日光に当てる","vn":"Phơi nắng"},{"jp":"何日も継ぎ足して使う","vn":"Cứ chêm thêm dùng nhiều ngày"}],"answer":0,"explain_jp":"だしも腐敗するため、速やかに冷却し冷蔵・冷凍で保存します。常温放置や無管理の継ぎ足しは避けます。","explain_vn":"Dashi cũng hỏng nên phải làm nguội nhanh, bảo quản lạnh/đông. Tránh để nhiệt độ phòng hay chêm bừa nhiều ngày.","why_wrong":{"1":"常温放置は腐敗の原因。","2":"日光は品質劣化。","3":"無管理の継ぎ足しは危険。"}},{"sect":"chori","part":"jitsugi","q_jp":"注文が集中し、揚げ油の温度が下がってしまった。適切な対応はどれか。","q_vn":"Order dồn dập, nhiệt độ dầu chiên bị tụt. Cách xử lý đúng là?","options":[{"jp":"一度に入れる量を減らし、適温に戻してから揚げる","vn":"Giảm lượng thả mỗi lần, chờ dầu về nhiệt độ rồi chiên"},{"jp":"低温のまま大量に入れて揚げる","vn":"Cứ để nhiệt thấp thả nhiều vào chiên"},{"jp":"水を足して温度を上げる","vn":"Thêm nước để tăng nhiệt"},{"jp":"油を減らす","vn":"Giảm dầu đi"}],"answer":0,"explain_jp":"一度に入れる量が多いと油温が下がりべたつきます。量を減らし適温に戻してから揚げると、カラッと仕上がります。","explain_vn":"Thả quá nhiều làm tụt nhiệt, đồ chiên bị ỉu. Giảm lượng, chờ dầu về nhiệt rồi chiên sẽ giòn.","why_wrong":{"1":"低温大量は仕上がりが悪い。","2":"油に水は危険。","3":"油を減らすは解決にならない。"}},{"sect":"chori","part":"jitsugi","q_jp":"作り置きのサラダ（非加熱）を提供する際の衛生対応として適切なものはどれか。","q_vn":"Khi phục vụ salad làm sẵn (không gia nhiệt), cách xử lý vệ sinh đúng là?","options":[{"jp":"清潔な器具・手袋で扱い、10℃以下で冷蔵保存する","vn":"Dùng dụng cụ/găng sạch, bảo quản lạnh ≤10℃"},{"jp":"常温で長時間置く","vn":"Để nhiệt độ phòng lâu"},{"jp":"素手で盛り付ける","vn":"Bày bằng tay trần"},{"jp":"前日の残りを確認せず出す","vn":"Bưng đồ thừa hôm trước, không kiểm tra"}],"answer":0,"explain_jp":"非加熱料理は二次汚染リスクが高いため、清潔な器具・手袋で扱い、冷蔵（10℃以下）で保存します。","explain_vn":"Món không gia nhiệt dễ nhiễm chéo nên dùng dụng cụ/găng sạch và bảo quản lạnh (≤10℃).","why_wrong":{"1":"常温放置は危険。","2":"素手は二次汚染。","3":"確認せず提供は危険。"}},{"sect":"chori","part":"jitsugi","q_jp":"複数の料理を同じコンロで作るとき、味や香りの移りを防ぐ工夫として適切なものはどれか。","q_vn":"Nấu nhiều món trên cùng bếp, cách tránh lẫn mùi vị đúng là?","options":[{"jp":"器具を使い分け・洗浄し、香りの強いものは順番を工夫する","vn":"Dùng/rửa dụng cụ riêng và sắp thứ tự cho món nặng mùi"},{"jp":"同じ器具で洗わずに続ける","vn":"Dùng chung dụng cụ, không rửa"},{"jp":"すべて一緒の鍋で作る","vn":"Nấu tất cả trong một nồi"},{"jp":"味見をしない","vn":"Không nếm thử"}],"answer":0,"explain_jp":"器具を使い分け・洗浄し、香りの強い料理の順番を工夫すると、味や香りの移りを防げます。味見で確認します。","explain_vn":"Dùng/rửa dụng cụ riêng và sắp thứ tự món nặng mùi để tránh lẫn; nếm thử để kiểm tra.","why_wrong":{"1":"洗わず続けると味が移る。","2":"一緒の鍋では混ざる。","3":"味見をしないのは品質管理不足。"}},{"sect":"chori","part":"jitsugi","q_jp":"提供直前に盛り付けを行う利点として最も適切なものはどれか。","q_vn":"Lợi ích chính của việc bày món ngay trước khi phục vụ là?","options":[{"jp":"適温・見た目・食感を保ちやすい","vn":"Giữ đúng nhiệt độ, hình thức và độ ngon"},{"jp":"必ずコストが下がる","vn":"Chắc chắn giảm chi phí"},{"jp":"廃棄が必ず増える","vn":"Chắc chắn tăng hao phí"},{"jp":"衛生管理が不要になる","vn":"Khỏi cần quản lý vệ sinh"}],"answer":0,"explain_jp":"提供直前の盛り付けは、適温・彩り・食感を保ちやすく、料理の価値を高めます。","explain_vn":"Bày ngay trước khi phục vụ giúp giữ nhiệt độ, màu sắc và độ ngon, nâng giá trị món.","why_wrong":{"1":"コスト低下が主目的ではない。","2":"廃棄増加ではない。","3":"衛生管理は常に必要。"}},{"sect":"chori","part":"jitsugi","q_jp":"包丁で手を切る事故を防ぐための行動として適切なものはどれか。","q_vn":"Hành động phòng tránh đứt tay bằng dao đúng là?","options":[{"jp":"よく切れる包丁を使い、猫の手で食材を押さえ集中して作業する","vn":"Dùng dao sắc, giữ nguyên liệu kiểu 'tay mèo', tập trung khi làm"},{"jp":"切れない包丁を無理に使う","vn":"Cố dùng dao cùn"},{"jp":"ぬれた床で急いで作業する","vn":"Làm vội trên sàn ướt"},{"jp":"よそ見をしながら切る","vn":"Vừa nhìn chỗ khác vừa cắt"}],"answer":0,"explain_jp":"切れない包丁は余計な力が入り危険。よく切れる包丁で「猫の手」で押さえ、集中して作業すると事故を防げます。","explain_vn":"Dao cùn phải dùng lực nhiều nên nguy hiểm. Dao sắc, giữ nguyên liệu kiểu 'tay mèo', tập trung sẽ an toàn.","why_wrong":{"1":"切れない包丁は力が入り危険。","2":"ぬれた床・急ぎは転倒・けがの元。","3":"よそ見は事故の原因。"}},{"sect":"chori","part":"gakka","q_jp":"「湯せん」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'yusen (chưng cách thủy)' là?","options":[{"jp":"湯を張った鍋の中で容器ごと間接的に温める方法","vn":"Đặt vật đựng vào nồi nước nóng để làm nóng gián tiếp"},{"jp":"直火で強く加熱する方法","vn":"Đun lửa trực tiếp thật mạnh"},{"jp":"油で揚げる方法","vn":"Chiên ngập dầu"},{"jp":"冷水で冷やす方法","vn":"Làm lạnh bằng nước lạnh"}],"answer":0,"explain_jp":"湯せんは湯の中で容器ごと間接的に温める方法で、チョコレートを溶かすなど焦がしたくない加熱に向きます。","explain_vn":"Yusen là làm nóng gián tiếp bằng cách đặt vật đựng vào nồi nước nóng, hợp khi cần đun mà không muốn cháy (làm chảy sô-cô-la).","why_wrong":{"1":"直火の強加熱ではない。","2":"揚げる方法ではない。","3":"冷やす方法ではない。"}},{"sect":"chori","part":"gakka","q_jp":"食材の「歩留まり」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'butomari (tỷ lệ thu hồi)' của nguyên liệu là?","options":[{"jp":"仕入れた量に対して実際に使える（可食部の）割合","vn":"Tỷ lệ phần thực sự dùng được (ăn được) so với lượng nhập"},{"jp":"売上に対する利益の割合","vn":"Tỷ lệ lợi nhuận trên doanh thu"},{"jp":"人件費の割合","vn":"Tỷ lệ chi phí nhân sự"},{"jp":"来客数の割合","vn":"Tỷ lệ số khách"}],"answer":0,"explain_jp":"歩留まりは仕入量に対する可食部の割合で、廃棄率の裏返し（歩留まり＝1−廃棄率）。原価計算や仕入量決定に使います。","explain_vn":"Butomari là tỷ lệ phần ăn được trên lượng nhập, ngược với tỷ lệ hao (butomari = 1 − tỷ lệ hao); dùng tính giá vốn và lượng nhập.","why_wrong":{"1":"利益率とは別。","2":"人件費率とは別。","3":"来客数とは無関係。"}},{"sect":"chori","part":"gakka","q_jp":"焼き物で「強火の遠火」がよいとされる理由はどれか。","q_vn":"Vì sao 'lửa to nhưng để xa' được cho là tốt khi nướng?","options":[{"jp":"表面を焦がさず、中まで均一に火を通せるから","vn":"Không cháy mặt ngoài mà chín đều tới trong"},{"jp":"燃料を節約できるから","vn":"Vì tiết kiệm nhiên liệu"},{"jp":"時間を長くできるから","vn":"Vì kéo dài thời gian"},{"jp":"色を消せるから","vn":"Vì làm mất màu"}],"answer":0,"explain_jp":"強火の遠火は、強い熱を離して当てることで表面を焦がさず中心まで均一に火を通せる、焼き物の基本です。","explain_vn":"Lửa to để xa giúp nhiệt mạnh nhưng không cháy mặt ngoài mà vẫn chín đều tới tâm — nguyên tắc cơ bản khi nướng.","why_wrong":{"1":"燃料節約が主目的ではない。","2":"時間延長が目的ではない。","3":"色を消す目的ではない。"}},{"sect":"chori","part":"jitsugi","q_jp":"冷めた料理を温め直して提供する際、品質を保つ工夫として適切なものはどれか。","q_vn":"Khi hâm lại món đã nguội để phục vụ, cách giữ chất lượng đúng là?","options":[{"jp":"料理に合った方法で中心まで再加熱し、加熱しすぎを避ける","vn":"Hâm tới tâm bằng cách phù hợp món, tránh hâm quá kỹ"},{"jp":"何度も繰り返し温め直す","vn":"Hâm đi hâm lại nhiều lần"},{"jp":"表面だけ温める","vn":"Chỉ hâm mặt ngoài"},{"jp":"常温に戻すだけにする","vn":"Chỉ để về nhiệt độ phòng"}],"answer":0,"explain_jp":"再加熱は中心まで十分（75℃1分以上）に、かつ加熱しすぎて食感が損なわれないよう料理に合った方法で行います。","explain_vn":"Hâm lại phải tới tâm đủ (≥75℃×1 phút) nhưng tránh hâm quá làm mất độ ngon; chọn cách phù hợp từng món.","why_wrong":{"1":"繰り返しの再加熱は品質・安全に不利。","2":"表面だけでは中心が不十分。","3":"常温に戻すだけでは危険。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様が来店したときの最初の接客用語として正しいものはどれか。","q_vn":"Câu tiếp khách đầu tiên khi khách vào quán đúng là?","options":[{"jp":"いらっしゃいませ","vn":"Irasshaimase (Xin mời quý khách)"},{"jp":"ありがとうございました","vn":"Cảm ơn quý khách"},{"jp":"申し訳ございません","vn":"Xin lỗi quý khách"},{"jp":"かしこまりました","vn":"Vâng, tôi đã rõ"}],"answer":0,"explain_jp":"来店時は「いらっしゃいませ」で歓迎します。接客7大用語の一つで、明るくはっきりと伝えます。","explain_vn":"Khi khách vào dùng 'irasshaimase' để chào đón — một trong 7 câu tiếp khách, nói rõ ràng, tươi tắn.","why_wrong":{"1":"「ありがとうございました」は退店時。","2":"「申し訳ございません」は謝罪時。","3":"「かしこまりました」は承諾時。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"注文を承ったときに使う接客用語として最も適切なものはどれか。","q_vn":"Câu dùng khi đã nhận order phù hợp nhất là?","options":[{"jp":"かしこまりました","vn":"Kashikomarimashita (Vâng, tôi đã rõ)"},{"jp":"いらっしゃいませ","vn":"Xin mời quý khách"},{"jp":"少々お待ちください","vn":"Xin đợi một lát"},{"jp":"恐れ入ります","vn":"Xin phép/làm phiền"}],"answer":0,"explain_jp":"注文などを承ったときは「かしこまりました」と応じます。丁寧に承諾の意思を伝えます。","explain_vn":"Khi nhận order dùng 'kashikomarimashita' để thể hiện đã tiếp nhận một cách lịch sự.","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「少々お待ちください」は待ってもらうとき。","3":"「恐れ入ります」は依頼・恐縮時。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様を待たせた後に使う接客用語として正しいものはどれか。","q_vn":"Câu dùng sau khi để khách đợi đúng là?","options":[{"jp":"お待たせいたしました","vn":"Xin lỗi đã để quý khách đợi"},{"jp":"いらっしゃいませ","vn":"Xin mời quý khách"},{"jp":"かしこまりました","vn":"Vâng, tôi đã rõ"},{"jp":"ありがとうございました","vn":"Cảm ơn quý khách"}],"answer":0,"explain_jp":"待たせた後は「お待たせいたしました」と一言添えます。配慮を示す基本用語です。","explain_vn":"Sau khi để khách đợi, thêm câu 'omataseitashimashita' để thể hiện sự quan tâm.","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「かしこまりました」は承諾時。","3":"「ありがとうございました」は退店時。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"敬語の種類で、相手の動作を高めて敬意を表すものはどれか。","q_vn":"Loại kính ngữ nào nâng hành động của đối phương để tỏ kính trọng?","options":[{"jp":"尊敬語","vn":"Tôn kính ngữ (sonkeigo)"},{"jp":"謙譲語","vn":"Khiêm nhường ngữ (kenjougo)"},{"jp":"丁寧語","vn":"Lịch sự ngữ (teineigo)"},{"jp":"命令形","vn":"Thể mệnh lệnh"}],"answer":0,"explain_jp":"尊敬語は相手の動作を高める敬語（例: いらっしゃる）。自分をへりくだるのは謙譲語、です・ますは丁寧語です。","explain_vn":"Tôn kính ngữ nâng hành động của đối phương (vd: irassharu). Hạ mình là khiêm nhường ngữ; desu/masu là lịch sự ngữ.","why_wrong":{"1":"謙譲語は自分をへりくだる。","2":"丁寧語はです・ます。","3":"命令形は敬語ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「言う」の尊敬語として正しいものはどれか。","q_vn":"Tôn kính ngữ của 'iu (nói)' đúng là?","options":[{"jp":"おっしゃる","vn":"Ossharu"},{"jp":"申す","vn":"Mousu"},{"jp":"言います","vn":"Iimasu"},{"jp":"言っておく","vn":"Itteoku"}],"answer":0,"explain_jp":"「言う」の尊敬語は「おっしゃる」。謙譲語は「申す・申し上げる」、丁寧語は「言います」です。","explain_vn":"Tôn kính ngữ của 'iu' là 'ossharu'. Khiêm nhường ngữ là 'mousu'; lịch sự ngữ là 'iimasu'.","why_wrong":{"1":"「申す」は謙譲語。","2":"「言います」は丁寧語。","3":"「言っておく」は敬語ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「食べる」の尊敬語として正しいものはどれか。","q_vn":"Tôn kính ngữ của 'taberu (ăn)' đúng là?","options":[{"jp":"召し上がる","vn":"Meshiagaru"},{"jp":"いただく","vn":"Itadaku"},{"jp":"食べます","vn":"Tabemasu"},{"jp":"食っておく","vn":"Kutteoku"}],"answer":0,"explain_jp":"「食べる」の尊敬語は「召し上がる」。謙譲語は「いただく」です。お客様には「お召し上がりください」と使います。","explain_vn":"Tôn kính ngữ của 'taberu' là 'meshiagaru'. Khiêm nhường ngữ là 'itadaku'. Với khách dùng 'omeshiagari kudasai'.","why_wrong":{"1":"「いただく」は謙譲語。","2":"「食べます」は丁寧語。","3":"「食っておく」は乱暴で不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客時の身だしなみとして適切なものはどれか。","q_vn":"Về trang phục/vệ sinh khi tiếp khách, điều phù hợp là?","options":[{"jp":"清潔な服装・整えた髪・短い爪を保つ","vn":"Trang phục sạch, tóc gọn, móng ngắn"},{"jp":"強い香水をつける","vn":"Xịt nước hoa nồng"},{"jp":"派手なアクセサリーをつける","vn":"Đeo phụ kiện lòe loẹt"},{"jp":"髪を整えない","vn":"Không chỉnh tóc"}],"answer":0,"explain_jp":"身だしなみは清潔感が第一。清潔な服装、整えた髪、短い爪を保ち、強い香りや派手なアクセサリーは避けます。","explain_vn":"Trang phục ưu tiên sự sạch sẽ: đồ sạch, tóc gọn, móng ngắn; tránh mùi nồng và phụ kiện lòe loẹt.","why_wrong":{"1":"強い香水は不快感を与える。","2":"派手なアクセサリーは異物混入等の恐れ。","3":"髪を整えないのは不衛生・不快。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"料理をお客様の右側から提供するのが基本とされる理由に近いものはどれか。","q_vn":"Lý do cơ bản thường bưng món ra từ phía bên phải của khách gần với điều nào?","options":[{"jp":"一般に配膳は右から、下げ物は左からが基本とされるため","vn":"Thông thường bưng ra từ phải, dọn đi từ trái"},{"jp":"必ず左から出すのが決まりだから","vn":"Bắt buộc luôn bưng từ trái"},{"jp":"どちらでもよく決まりはないから","vn":"Sao cũng được, không có quy tắc"},{"jp":"背後から出すのが基本だから","vn":"Cơ bản là bưng từ phía sau lưng"}],"answer":0,"explain_jp":"一般的に配膳は右から、下げ物は左からが基本とされます（店の方針により異なる場合あり）。お客様に配慮した動作が大切です。","explain_vn":"Thông thường bưng món từ bên phải, dọn đi từ bên trái (có thể khác tùy quán). Quan trọng là thao tác quan tâm đến khách.","why_wrong":{"1":"必ず左からとは限らない。","2":"配慮の基本があり、無秩序ではない。","3":"背後から出すのは驚かせる恐れ。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"クレーム対応の基本手順として最も適切なものはどれか。","q_vn":"Quy trình cơ bản xử lý khiếu nại đúng nhất là?","options":[{"jp":"まず謝罪し、よく聞いて事実を確認し、迅速に対応・報告する","vn":"Xin lỗi trước, lắng nghe, xác nhận sự thật, xử lý nhanh và báo cáo"},{"jp":"まず言い訳をする","vn":"Trước tiên biện minh"},{"jp":"お客様を否定する","vn":"Phủ nhận khách"},{"jp":"担当を代えず放置する","vn":"Không chuyển người, để mặc"}],"answer":0,"explain_jp":"クレームはまず謝罪し、傾聴して事実を確認、迅速に対応し責任者に報告します。言い訳や否定は不満を大きくします。","explain_vn":"Khiếu nại: xin lỗi trước, lắng nghe, xác nhận sự thật, xử lý nhanh và báo người phụ trách. Biện minh/phủ nhận làm khách bất mãn hơn.","why_wrong":{"1":"最初の言い訳は逆効果。","2":"お客様の否定は不適切。","3":"放置は不満を拡大させる。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"電話予約を受けるときに確認すべき事項として適切でないものはどれか。","q_vn":"Khi nhận đặt bàn qua điện thoại, việc nào KHÔNG cần xác nhận?","options":[{"jp":"お客様の年収","vn":"Thu nhập của khách"},{"jp":"日時と人数","vn":"Ngày giờ và số người"},{"jp":"お名前と連絡先","vn":"Tên và số liên lạc"},{"jp":"要望（席・アレルギー等）","vn":"Yêu cầu (chỗ ngồi, dị ứng...)"}],"answer":0,"explain_jp":"予約では日時・人数・名前・連絡先・要望を確認します。年収などプライバシーに踏み込む不要な情報は聞きません。","explain_vn":"Đặt bàn cần xác nhận ngày giờ, số người, tên, liên lạc, yêu cầu. Không hỏi thông tin riêng tư không cần thiết như thu nhập.","why_wrong":{"1":"日時・人数は必須。","2":"名前・連絡先は必須。","3":"要望確認は大切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"外国人のお客様への対応として適切なものはどれか。","q_vn":"Cách phục vụ khách nước ngoài phù hợp là?","options":[{"jp":"やさしい言葉・写真付きメニュー・指さしなどで工夫して伝える","vn":"Dùng từ đơn giản, thực đơn có ảnh, chỉ tay... để truyền đạt"},{"jp":"日本語がわからないので相手にしない","vn":"Không biết tiếng Nhật thì mặc kệ"},{"jp":"早口の日本語で押し通す","vn":"Nói tiếng Nhật thật nhanh cho xong"},{"jp":"注文を勝手に決める","vn":"Tự quyết order thay khách"}],"answer":0,"explain_jp":"言葉が通じにくい場合は、やさしい日本語・写真付きメニュー・指さし・翻訳アプリなどで工夫して意思疎通を図ります。","explain_vn":"Khi khó giao tiếp, dùng tiếng Nhật đơn giản, thực đơn có ảnh, chỉ tay, app dịch... để hiểu nhau.","why_wrong":{"1":"相手にしないのは不適切。","2":"早口で押し通すのは伝わらない。","3":"勝手に決めるのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"ベジタリアン・ヴィーガンのお客様への配慮として正しいものはどれか。","q_vn":"Cách quan tâm khách ăn chay/thuần chay (vegetarian/vegan) đúng là?","options":[{"jp":"使用食材を確認し、食べられないものを避けて案内する","vn":"Xác nhận nguyên liệu, tránh món khách không ăn khi tư vấn"},{"jp":"肉料理を勧める","vn":"Mời món thịt"},{"jp":"だしの原料は気にしない","vn":"Không quan tâm nguyên liệu dashi"},{"jp":"確認せず提供する","vn":"Không xác nhận, phục vụ luôn"}],"answer":0,"explain_jp":"ベジタリアン・ヴィーガンは食べられる範囲が異なります。だし（かつお等）や調味料の動物性原料も確認し、配慮して案内します。","explain_vn":"Người ăn chay/thuần chay có phạm vi ăn khác nhau. Cần kiểm cả nguyên liệu động vật trong dashi (cá bào...) và gia vị để tư vấn.","why_wrong":{"1":"肉料理を勧めるのは不適切。","2":"だしの原料確認は必要。","3":"確認なしは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「QSC」に含まれないものはどれか。","q_vn":"Đâu KHÔNG thuộc 'QSC'?","options":[{"jp":"Cost（費用）","vn":"Cost (chi phí)"},{"jp":"Quality（品質）","vn":"Quality (chất lượng)"},{"jp":"Service（サービス）","vn":"Service (dịch vụ)"},{"jp":"Cleanliness（清潔さ）","vn":"Cleanliness (sạch sẽ)"}],"answer":0,"explain_jp":"QSCはQuality（品質）・Service（サービス）・Cleanliness（清潔さ）。これに雰囲気（Atmosphere）を加えるとQSCAになります。","explain_vn":"QSC = Quality (chất lượng), Service (dịch vụ), Cleanliness (sạch sẽ). Thêm Atmosphere (không khí) thành QSCA.","why_wrong":{"1":"QualityはQSCの要素。","2":"ServiceはQSCの要素。","3":"CleanlinessはQSCの要素。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客における「第一印象」で特に大切とされるものはどれか。","q_vn":"Trong tiếp khách, yếu tố đặc biệt quan trọng cho 'ấn tượng đầu' là?","options":[{"jp":"表情（笑顔）・挨拶・身だしなみ","vn":"Nét mặt (nụ cười) · chào hỏi · trang phục gọn gàng"},{"jp":"料理の値段","vn":"Giá món ăn"},{"jp":"店の広さ","vn":"Độ rộng của quán"},{"jp":"営業時間","vn":"Giờ mở cửa"}],"answer":0,"explain_jp":"第一印象は表情（笑顔）・挨拶・身だしなみで決まりやすく、リピートにも影響します。","explain_vn":"Ấn tượng đầu phần lớn do nét mặt (cười), chào hỏi, trang phục; ảnh hưởng cả việc khách quay lại.","why_wrong":{"1":"値段は第一印象の要素ではない。","2":"広さは主要因ではない。","3":"営業時間は第一印象と別。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様に商品を勧めて客単価を上げる「サジェスト（推奨販売）」の例として適切なものはどれか。","q_vn":"Ví dụ về 'suggest (gợi ý bán thêm)' để tăng đơn giá/khách đúng là?","options":[{"jp":"「ご一緒にサラダはいかがですか」と一言添える","vn":"Thêm câu 'Quý khách dùng thêm salad nhé?'"},{"jp":"注文を勝手に増やす","vn":"Tự tăng order"},{"jp":"高い物を無理に押し売りする","vn":"Ép mua món đắt"},{"jp":"要望を無視する","vn":"Phớt lờ yêu cầu"}],"answer":0,"explain_jp":"サジェストはお客様に役立つ提案を一言添える方法（例: サイドやドリンクの提案）。押し売りではなく満足度を高める形で行います。","explain_vn":"Suggest là gợi ý hữu ích bằng một câu (món phụ, đồ uống). Không ép mua, mà làm tăng hài lòng.","why_wrong":{"1":"勝手に増やすのは不適切。","2":"押し売りは逆効果。","3":"要望無視は不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"店内のPOP（案内・広告）を掲示する主な目的はどれか。","q_vn":"Mục đích chính của việc treo POP (bảng gợi ý/quảng cáo) trong quán là?","options":[{"jp":"おすすめや季節メニューを知らせ、販売を促進するため","vn":"Giới thiệu món gợi ý/theo mùa, thúc đẩy bán hàng"},{"jp":"店を暗くするため","vn":"Để quán tối đi"},{"jp":"通路をふさぐため","vn":"Để chắn lối đi"},{"jp":"お客様を急かすため","vn":"Để thúc giục khách"}],"answer":0,"explain_jp":"POPはおすすめ・季節メニュー・キャンペーンを分かりやすく伝え、注文を後押しする販売促進ツールです。","explain_vn":"POP truyền đạt món gợi ý/theo mùa/khuyến mãi rõ ràng, là công cụ xúc tiến bán hàng thúc đẩy order.","why_wrong":{"1":"店を暗くする目的ではない。","2":"通路をふさぐのは危険で不適切。","3":"急かす目的ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"高齢のお客様への配慮として適切でないものはどれか。","q_vn":"Cách quan tâm khách lớn tuổi, điều nào KHÔNG phù hợp?","options":[{"jp":"急かして早く食べてもらう","vn":"Thúc giục để khách ăn nhanh"},{"jp":"聞き取りやすい声で話す","vn":"Nói bằng giọng dễ nghe"},{"jp":"段差や足元に配慮する","vn":"Chú ý bậc thềm và lối đi"},{"jp":"ゆっくり丁寧に対応する","vn":"Đối ứng chậm rãi, chu đáo"}],"answer":0,"explain_jp":"高齢のお客様には聞き取りやすい声、足元への配慮、ゆっくり丁寧な対応が大切です。急かすのは不適切です。","explain_vn":"Với khách lớn tuổi cần nói dễ nghe, chú ý lối đi, đối ứng chậm rãi chu đáo. Thúc giục là không phù hợp.","why_wrong":{"1":"聞き取りやすい声は適切。","2":"足元への配慮は適切。","3":"ゆっくり丁寧は適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"会計（レジ）でお金を扱うときの対応として正しいものはどれか。","q_vn":"Khi xử lý tiền tại quầy thu ngân, cách đúng là?","options":[{"jp":"金額を復唱し、預り金・釣り銭を声に出して確認する","vn":"Nhắc lại số tiền, đọc to tiền nhận và tiền thối để xác nhận"},{"jp":"無言で素早く済ませる","vn":"Im lặng làm cho nhanh"},{"jp":"釣り銭を確認しない","vn":"Không kiểm tiền thối"},{"jp":"金額を言わない","vn":"Không nói số tiền"}],"answer":0,"explain_jp":"会計は金額の復唱、預り金・釣り銭の声出し確認でミスやトラブルを防ぎます。","explain_vn":"Thu ngân: nhắc lại số tiền, đọc to tiền nhận/tiền thối để tránh nhầm và tranh cãi.","why_wrong":{"1":"無言はミスの元。","2":"釣り銭未確認は誤差の原因。","3":"金額を言わないのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様が退店するときの接客用語として最も適切なものはどれか。","q_vn":"Câu tiếp khách phù hợp nhất khi khách rời quán là?","options":[{"jp":"ありがとうございました","vn":"Cảm ơn quý khách"},{"jp":"いらっしゃいませ","vn":"Xin mời quý khách"},{"jp":"少々お待ちください","vn":"Xin đợi một lát"},{"jp":"かしこまりました","vn":"Vâng, tôi đã rõ"}],"answer":0,"explain_jp":"退店時は「ありがとうございました」で感謝を伝え、また来たいと思ってもらえるよう見送ります。","explain_vn":"Khi khách về dùng 'arigatou gozaimashita' để cảm ơn và tiễn để khách muốn quay lại.","why_wrong":{"1":"「いらっしゃいませ」は来店時。","2":"「少々お待ちください」は待機時。","3":"「かしこまりました」は承諾時。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様の呼び出しに気づいたときの対応として最も適切なものはどれか。","q_vn":"Khi nhận ra khách gọi, cách đối ứng phù hợp nhất là?","options":[{"jp":"「はい、ただいま伺います」とすぐ返事をして向かう","vn":"'Vâng, tôi tới ngay' rồi lập tức đến"},{"jp":"聞こえないふりをする","vn":"Giả vờ không nghe"},{"jp":"手が空くまで無視する","vn":"Lờ đi tới khi rảnh tay"},{"jp":"別のお客様と話し続ける","vn":"Cứ tiếp tục nói với khách khác"}],"answer":0,"explain_jp":"呼び出しにはすぐ返事をし、向かえない場合も「ただいま伺います」と一声かけて待ってもらいます。無視は不満の元です。","explain_vn":"Khi khách gọi phải đáp ngay; nếu chưa tới được thì nói 'tôi tới ngay' để khách chờ. Lờ đi gây bất mãn.","why_wrong":{"1":"無視は不適切。","2":"放置は不満の元。","3":"応答しないのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"補助犬（盲導犬・介助犬・聴導犬）を連れたお客様への対応として正しいものはどれか。","q_vn":"Cách đối ứng khách dẫn theo chó hỗ trợ (dẫn đường/hỗ trợ/nghe) đúng là?","options":[{"jp":"法律で同伴が認められており、受け入れて席へ案内する","vn":"Luật cho phép đi cùng, tiếp nhận và hướng dẫn vào chỗ"},{"jp":"衛生上の理由で断る","vn":"Từ chối vì lý do vệ sinh"},{"jp":"外につないでもらう","vn":"Bảo buộc chó bên ngoài"},{"jp":"入店を拒否する","vn":"Từ chối cho vào"}],"answer":0,"explain_jp":"身体障害者補助犬法により、飲食店は補助犬の同伴を原則受け入れる必要があります。","explain_vn":"Theo Luật chó hỗ trợ người khuyết tật, nhà hàng về nguyên tắc phải tiếp nhận chó hỗ trợ đi cùng.","why_wrong":{"1":"衛生を理由に断るのは不適切。","2":"外につながせるのは不適切。","3":"入店拒否は不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"車椅子のお客様への案内として適切なものはどれか。","q_vn":"Cách hướng dẫn khách đi xe lăn phù hợp là?","options":[{"jp":"通路が広く出入りしやすい席へ案内し、必要に応じ手助けを申し出る","vn":"Hướng dẫn tới chỗ lối rộng dễ ra vào, đề nghị giúp nếu cần"},{"jp":"入口から遠い狭い席に通す","vn":"Đưa vào chỗ hẹp xa cửa"},{"jp":"手助けは一切しない","vn":"Không giúp gì cả"},{"jp":"移動を急かす","vn":"Thúc giục di chuyển"}],"answer":0,"explain_jp":"車椅子のお客様には通路の広い出入りしやすい席を案内し、必要に応じて手助けを申し出ます。","explain_vn":"Với khách xe lăn, hướng dẫn tới chỗ lối rộng dễ ra vào và đề nghị giúp khi cần.","why_wrong":{"1":"狭い席は不便。","2":"必要な手助けを断るのは不適切。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客で「クッション言葉」を使う目的として正しいものはどれか。","q_vn":"Mục đích dùng 'từ đệm (kushon kotoba)' trong tiếp khách là?","options":[{"jp":"依頼やお断りをやわらかく丁寧に伝えるため","vn":"Truyền đạt yêu cầu/từ chối một cách mềm mại, lịch sự"},{"jp":"話を長くするため","vn":"Để nói dài ra"},{"jp":"お客様を混乱させるため","vn":"Để làm khách bối rối"},{"jp":"敬語をなくすため","vn":"Để bỏ kính ngữ"}],"answer":0,"explain_jp":"「恐れ入りますが」「申し訳ございませんが」などのクッション言葉は、依頼やお断りをやわらかく丁寧に伝えます。","explain_vn":"Từ đệm như 'osoreirimasu ga', 'moushiwake gozaimasen ga' giúp nói yêu cầu/từ chối mềm mại và lịch sự.","why_wrong":{"1":"話を長くする目的ではない。","2":"混乱させる目的ではない。","3":"敬語をなくす目的ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様に商品説明をするとき大切なことはどれか。","q_vn":"Điều quan trọng khi giới thiệu món cho khách là?","options":[{"jp":"特徴やおすすめの理由を分かりやすく正確に伝える","vn":"Truyền đạt đặc điểm và lý do gợi ý dễ hiểu, chính xác"},{"jp":"事実と違う説明をする","vn":"Nói sai sự thật"},{"jp":"専門用語だけで説明する","vn":"Chỉ dùng thuật ngữ chuyên môn"},{"jp":"適当に答える","vn":"Trả lời qua loa"}],"answer":0,"explain_jp":"商品説明は特徴やおすすめ理由を分かりやすく正確に伝えます。誇大や虚偽の説明は信頼を損ないます。","explain_vn":"Giới thiệu món cần nêu đặc điểm và lý do gợi ý dễ hiểu, chính xác. Nói phóng đại/sai làm mất lòng tin.","why_wrong":{"1":"事実と違う説明は信頼を損なう。","2":"専門用語だけでは伝わらない。","3":"適当な回答は不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"リピーター（常連客）を増やすために大切なことはどれか。","q_vn":"Điều quan trọng để tăng khách quen (repeater) là?","options":[{"jp":"安定した品質と気持ちのよい接客で満足度を高める","vn":"Chất lượng ổn định và tiếp khách dễ chịu để nâng hài lòng"},{"jp":"来店ごとに味を変える","vn":"Mỗi lần đến lại đổi vị"},{"jp":"接客を雑にする","vn":"Tiếp khách qua loa"},{"jp":"クレームを無視する","vn":"Phớt lờ khiếu nại"}],"answer":0,"explain_jp":"リピーターは安定した品質と気持ちのよい接客で満足度が高まると増えます。期待を上回る体験が再来店につながります。","explain_vn":"Khách quen tăng khi chất lượng ổn định và tiếp khách dễ chịu nâng hài lòng; trải nghiệm vượt kỳ vọng khiến họ quay lại.","why_wrong":{"1":"味が安定しないと信頼を失う。","2":"雑な接客は逆効果。","3":"クレーム無視は不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"店の口コミ（SNS等）について正しい考え方はどれか。","q_vn":"Quan điểm đúng về đánh giá lan truyền (SNS...) của quán là?","options":[{"jp":"良い体験は好意的な口コミにつながり集客に役立つ","vn":"Trải nghiệm tốt tạo đánh giá tích cực, giúp thu hút khách"},{"jp":"口コミは全く影響しない","vn":"Đánh giá không ảnh hưởng gì"},{"jp":"悪い口コミは気にしなくてよい","vn":"Đánh giá xấu khỏi quan tâm"},{"jp":"接客は口コミと無関係","vn":"Tiếp khách không liên quan đánh giá"}],"answer":0,"explain_jp":"満足した体験は好意的な口コミにつながり集客に役立ちます。逆に不満は悪い口コミとして広がるため、接客・品質が重要です。","explain_vn":"Trải nghiệm hài lòng tạo đánh giá tích cực giúp thu hút khách; ngược lại bất mãn lan tiếng xấu, nên tiếp khách/chất lượng rất quan trọng.","why_wrong":{"1":"口コミは集客に影響する。","2":"悪い口コミは対応が必要。","3":"接客は口コミに直結する。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"未成年者と思われるお客様がお酒を注文した。適切な対応はどれか。","q_vn":"Khách có vẻ vị thành niên gọi rượu. Cách đúng là?","options":[{"jp":"年齢を確認し、未成年なら提供しない","vn":"Xác nhận tuổi; nếu vị thành niên thì không phục vụ"},{"jp":"見た目で判断してすぐ出す","vn":"Nhìn ngoại hình rồi phục vụ ngay"},{"jp":"少量なら提供する","vn":"Ít thì vẫn phục vụ"},{"jp":"確認せず提供する","vn":"Không xác nhận, phục vụ luôn"}],"answer":0,"explain_jp":"未成年者への酒類提供は禁止です。年齢確認を行い、未成年なら提供しません。","explain_vn":"Cấm phục vụ rượu cho người chưa đủ tuổi. Phải xác nhận tuổi; nếu vị thành niên thì không phục vụ.","why_wrong":{"1":"見た目だけで判断しない。","2":"少量でも提供不可。","3":"確認なしは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客の基本動作「ニコニコ・ハキハキ・キビキビ」の「ハキハキ」の意味はどれか。","q_vn":"Trong 3 động tác cơ bản, 'hakihaki' nghĩa là gì?","options":[{"jp":"明るくはっきりと的確に受け答えする","vn":"Đáp lời rõ ràng, dứt khoát, chính xác"},{"jp":"だまって動く","vn":"Im lặng làm việc"},{"jp":"ゆっくり話す","vn":"Nói chậm rãi"},{"jp":"笑顔でいる","vn":"Giữ nụ cười"}],"answer":0,"explain_jp":"ハキハキは明るくはっきり的確に受け答えすること。ニコニコは笑顔、キビキビはてきぱき動くことです。","explain_vn":"Hakihaki là đáp lời rõ ràng, dứt khoát, chính xác. Nikoniko là cười; kibikibi là nhanh nhẹn.","why_wrong":{"1":"だまって動くことではない。","2":"ゆっくり話すことではない。","3":"笑顔はニコニコ。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"メニュー表に「写真」や「説明」を載せる利点として正しいものはどれか。","q_vn":"Lợi ích của việc để 'ảnh' và 'mô tả' trên thực đơn là?","options":[{"jp":"お客様が選びやすくなり注文が促進される","vn":"Khách dễ chọn hơn, thúc đẩy order"},{"jp":"必ず原価が下がる","vn":"Chắc chắn giảm giá vốn"},{"jp":"待ち時間が必ず短くなる","vn":"Chắc chắn giảm thời gian chờ"},{"jp":"接客が不要になる","vn":"Khỏi cần tiếp khách"}],"answer":0,"explain_jp":"写真や説明はお客様がイメージしやすく選びやすくなるため、注文の後押しになります。外国人対応にも有効です。","explain_vn":"Ảnh và mô tả giúp khách dễ hình dung và chọn món, thúc đẩy order; cũng hữu ích với khách nước ngoài.","why_wrong":{"1":"原価が下がるわけではない。","2":"待ち時間短縮とは限らない。","3":"接客が不要になるわけではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様同士のトラブルや泥酔者への対応で最も適切なものはどれか。","q_vn":"Cách đối ứng khi khách cãi nhau hoặc khách quá say đúng nhất là?","options":[{"jp":"落ち着いて安全を最優先し、責任者に報告して対応する","vn":"Bình tĩnh ưu tiên an toàn, báo người phụ trách để xử lý"},{"jp":"放置する","vn":"Để mặc"},{"jp":"お客様と一緒に言い争う","vn":"Cãi nhau cùng khách"},{"jp":"他のお客様に押し付ける","vn":"Đùn cho khách khác xử lý"}],"answer":0,"explain_jp":"トラブル時は安全を最優先し、落ち着いて対応、責任者に報告します。泥酔者への酒類提供は控えます。","explain_vn":"Khi có sự cố phải ưu tiên an toàn, bình tĩnh xử lý và báo người phụ trách; không tiếp tục phục vụ rượu cho khách quá say.","why_wrong":{"1":"放置は危険。","2":"言い争いは事態悪化。","3":"他客に押し付けるのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"忘れ物（遺失物）を見つけたときの対応として正しいものはどれか。","q_vn":"Khi phát hiện đồ khách bỏ quên, cách đúng là?","options":[{"jp":"責任者に届け、店のルールに従って保管・連絡する","vn":"Báo người phụ trách, giữ và liên hệ theo quy định quán"},{"jp":"自分のものにする","vn":"Lấy làm của mình"},{"jp":"捨てる","vn":"Vứt đi"},{"jp":"放置する","vn":"Để mặc"}],"answer":0,"explain_jp":"忘れ物は責任者に届け、店のルールに従って保管・記録し、持ち主に連絡します。個人の物にしてはいけません。","explain_vn":"Đồ bỏ quên phải báo người phụ trách, giữ và ghi lại theo quy định, liên hệ chủ. Không được lấy làm của riêng.","why_wrong":{"1":"自分の物にするのは不正。","2":"捨てるのは不適切。","3":"放置は不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客で「傾聴」が大切な理由として最も適切なものはどれか。","q_vn":"Vì sao 'lắng nghe (keichou)' quan trọng trong tiếp khách?","options":[{"jp":"お客様の要望を正しく把握し、満足につなげられるから","vn":"Nắm đúng nhu cầu của khách, dẫn đến hài lòng"},{"jp":"時間を稼ぐため","vn":"Để câu giờ"},{"jp":"話さなくて済むため","vn":"Để khỏi phải nói"},{"jp":"注文を無視するため","vn":"Để phớt lờ order"}],"answer":0,"explain_jp":"傾聴によりお客様の要望を正しく把握でき、的確な対応と満足につながります。","explain_vn":"Lắng nghe giúp nắm đúng nhu cầu của khách, dẫn tới đối ứng chính xác và hài lòng.","why_wrong":{"1":"時間稼ぎが目的ではない。","2":"話さないためではない。","3":"注文無視のためではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「賞味期限」と「消費期限」の違いについて、接客での案内として正しいものはどれか。","q_vn":"Khi tư vấn cho khách, phân biệt '賞味期限' và '消費期限' đúng là?","options":[{"jp":"消費期限は安全に食べられる期限、賞味期限はおいしく食べられる期限","vn":"消費期限 là hạn ăn an toàn; 賞味期限 là hạn ăn ngon"},{"jp":"両方とも同じ意味である","vn":"Cả hai giống nhau"},{"jp":"賞味期限は安全性の期限である","vn":"賞味期限 là hạn an toàn"},{"jp":"消費期限はおいしさの期限である","vn":"消費期限 là hạn ngon"}],"answer":0,"explain_jp":"消費期限は安全に食べられる期限（傷みやすい食品）、賞味期限はおいしく食べられる期限（日持ちする食品）です。","explain_vn":"消費期限 là hạn ăn an toàn (thực phẩm dễ hỏng); 賞味期限 là hạn ăn ngon (thực phẩm để lâu).","why_wrong":{"1":"同じ意味ではない。","2":"賞味期限は安全性の期限ではない。","3":"消費期限は安全性の期限。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客での「身だしなみ」と「おしゃれ」の違いとして正しいものはどれか。","q_vn":"Phân biệt 'trang phục nghề (mi-dashinami)' và 'thời trang cá nhân' đúng là?","options":[{"jp":"身だしなみは相手のための清潔感、おしゃれは自分のための表現","vn":"Mi-dashinami là sự sạch sẽ vì người khác; thời trang là thể hiện vì bản thân"},{"jp":"両方とも自分のためである","vn":"Cả hai đều vì bản thân"},{"jp":"身だしなみは自由でよい","vn":"Mi-dashinami tùy thích"},{"jp":"おしゃれを優先すべきである","vn":"Nên ưu tiên thời trang"}],"answer":0,"explain_jp":"身だしなみは相手（お客様）に不快感を与えない清潔感が目的、おしゃれは自分の好みの表現です。接客では身だしなみを優先します。","explain_vn":"Mi-dashinami nhằm sạch sẽ để không gây khó chịu cho khách; thời trang là sở thích cá nhân. Tiếp khách ưu tiên mi-dashinami.","why_wrong":{"1":"身だしなみは相手のため。","2":"身だしなみは自由ではない。","3":"接客ではおしゃれより身だしなみ優先。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"料理を運ぶ（配膳する）ときの持ち方・運び方として適切なものはどれか。","q_vn":"Cách cầm/bưng khi mang món ra phù hợp là?","options":[{"jp":"料理に指や息がかからないよう、安定して丁寧に運ぶ","vn":"Không để ngón tay/hơi thở chạm món, bưng chắc và cẩn thận"},{"jp":"料理の上に手をかざして運ぶ","vn":"Đưa tay che phía trên món khi bưng"},{"jp":"走って急いで運ぶ","vn":"Chạy vội để bưng"},{"jp":"重ねて雑に運ぶ","vn":"Xếp chồng bưng qua loa"}],"answer":0,"explain_jp":"配膳は料理に指や息がかからないよう衛生に配慮し、安定して丁寧に運びます。走ると転倒・こぼしの危険があります。","explain_vn":"Bưng món phải giữ vệ sinh (không để ngón tay/hơi thở chạm), bưng chắc và cẩn thận. Chạy dễ ngã/đổ.","why_wrong":{"1":"料理の上に手をかざすのは不衛生。","2":"走るのは危険。","3":"雑に運ぶのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お子様連れのお客様への配慮として適切なものはどれか。","q_vn":"Cách quan tâm khách có trẻ nhỏ phù hợp là?","options":[{"jp":"子供用の椅子や食器を用意し、料理を先に出すなど配慮する","vn":"Chuẩn bị ghế/chén cho trẻ, ưu tiên ra món của trẻ trước"},{"jp":"子供は相手にしない","vn":"Không để ý đến trẻ"},{"jp":"熱い料理を子供の前に置く","vn":"Đặt món nóng trước mặt trẻ"},{"jp":"急かして食べさせる","vn":"Thúc trẻ ăn nhanh"}],"answer":0,"explain_jp":"お子様連れには子供用椅子・食器の用意、料理を先に出す、熱い料理の置き場所への配慮などが大切です。","explain_vn":"Với khách có trẻ nhỏ: chuẩn bị ghế/chén cho trẻ, ưu tiên ra món của trẻ trước, chú ý chỗ đặt món nóng.","why_wrong":{"1":"相手にしないのは不適切。","2":"熱い料理を子供の前に置くのは危険。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客での「アイコンタクト」の効果として正しいものはどれか。","q_vn":"Tác dụng của 'giao tiếp bằng mắt (eye contact)' trong tiếp khách là?","options":[{"jp":"お客様に安心感や誠実さを伝えられる","vn":"Tạo cảm giác an tâm và chân thành cho khách"},{"jp":"お客様を威圧するため","vn":"Để áp đảo khách"},{"jp":"時間を稼ぐため","vn":"Để câu giờ"},{"jp":"効果はない","vn":"Không có tác dụng"}],"answer":0,"explain_jp":"適度なアイコンタクトは、お客様に安心感や誠実さ、関心を伝えます。にらむような視線は避けます。","explain_vn":"Giao tiếp bằng mắt vừa phải truyền cảm giác an tâm, chân thành, quan tâm. Tránh ánh nhìn như trừng.","why_wrong":{"1":"威圧のためではない。","2":"時間稼ぎではない。","3":"効果はある。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"料理を提供したところ「注文と違う」と言われた。最も適切な対応はどれか。","q_vn":"Bưng món ra thì khách nói 'không đúng món'. Cách đúng nhất là?","options":[{"jp":"すぐに謝罪し、正しい料理を確認して速やかに作り直す","vn":"Xin lỗi ngay, xác nhận đúng món và làm lại nhanh"},{"jp":"お客様の勘違いだと主張する","vn":"Khẳng định là khách nhầm"},{"jp":"そのまま食べてもらう","vn":"Bảo khách cứ ăn món đó"},{"jp":"無視する","vn":"Phớt lờ"}],"answer":0,"explain_jp":"注文違いはまず謝罪し、正しい注文を確認して速やかに作り直します。責任者に報告し原因を改善します。","explain_vn":"Sai món thì xin lỗi trước, xác nhận đúng order và làm lại nhanh; báo người phụ trách và cải thiện nguyên nhân.","why_wrong":{"1":"勘違い主張は不誠実。","2":"違う料理を食べさせるのは不適切。","3":"無視は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"満席で待っているお客様がいる。最も適切な対応はどれか。","q_vn":"Hết chỗ, có khách đang chờ. Cách đối ứng đúng nhất là?","options":[{"jp":"待ち時間の目安を伝え、順番と状況を丁寧に案内する","vn":"Báo thời gian chờ ước tính, hướng dẫn thứ tự và tình hình chu đáo"},{"jp":"何も伝えず放置する","vn":"Không nói gì, để mặc"},{"jp":"帰るよう促す","vn":"Giục khách về"},{"jp":"順番を無視して案内する","vn":"Bỏ qua thứ tự, tùy tiện dẫn khách"}],"answer":0,"explain_jp":"待ち客には待ち時間の目安を伝え、順番を守って状況を丁寧に案内します。放置や順番無視は不満の元です。","explain_vn":"Với khách chờ, báo thời gian chờ ước tính, giữ đúng thứ tự và hướng dẫn chu đáo. Bỏ mặc/lộn thứ tự gây bất mãn.","why_wrong":{"1":"放置は不満の元。","2":"帰るよう促すのは不適切。","3":"順番無視は不公平。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"お客様から「この料理に〇〇（アレルギー食材）は入っていますか」と聞かれた。最も適切な対応はどれか。","q_vn":"Khách hỏi 'món này có 〇〇 (nguyên liệu gây dị ứng) không?'. Cách đúng nhất là?","options":[{"jp":"正確な情報を確認してから答え、不明なら安易に提供しない","vn":"Xác nhận thông tin chính xác rồi trả lời; nếu không rõ thì không phục vụ tùy tiện"},{"jp":"たぶん入っていないと答える","vn":"Trả lời 'chắc là không có'"},{"jp":"分からないまま提供する","vn":"Không biết vẫn phục vụ"},{"jp":"少量なら大丈夫と答える","vn":"Bảo ít thì không sao"}],"answer":0,"explain_jp":"アレルギーは命に関わります。原材料を正確に確認してから答え、確認できない場合は安易に提供しません。","explain_vn":"Dị ứng liên quan tính mạng. Phải xác nhận nguyên liệu chính xác rồi trả lời; nếu không xác nhận được thì không phục vụ tùy tiện.","why_wrong":{"1":"憶測の回答は危険。","2":"不明なまま提供は危険。","3":"少量でも重篤化の恐れ。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"レジ締めで、実際の現金がレジの記録より少なかった。最も適切な対応はどれか。","q_vn":"Khi chốt quầy, tiền mặt thực tế ít hơn số trên máy. Cách đúng nhất là?","options":[{"jp":"再確認し、差額と状況を記録して責任者に報告する","vn":"Kiểm lại, ghi rõ chênh lệch và tình hình rồi báo người phụ trách"},{"jp":"自分のお金で補って黙っておく","vn":"Tự bù tiền rồi im lặng"},{"jp":"記録を書き換える","vn":"Sửa lại số liệu"},{"jp":"放置する","vn":"Để mặc"}],"answer":0,"explain_jp":"現金差異は再確認のうえ、差額と状況を正確に記録して責任者に報告します。記録改ざんや隠蔽は重大な問題です。","explain_vn":"Chênh lệch tiền mặt phải kiểm lại, ghi rõ chênh lệch và tình hình rồi báo người phụ trách. Sửa số/che giấu là vi phạm nghiêm trọng.","why_wrong":{"1":"黙って補うのは不透明で問題。","2":"記録改ざんは不正。","3":"放置は不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"お客様に飲み物をこぼしてしまった。最も適切な対応はどれか。","q_vn":"Lỡ làm đổ đồ uống vào khách. Cách đúng nhất là?","options":[{"jp":"すぐ謝罪し、けがの有無を確認して拭き取り、必要な対応と報告をする","vn":"Xin lỗi ngay, kiểm khách có bị thương không, lau dọn, xử lý cần thiết và báo cáo"},{"jp":"気づかないふりをする","vn":"Giả vờ không thấy"},{"jp":"お客様のせいにする","vn":"Đổ lỗi cho khách"},{"jp":"あとで対応する","vn":"Để sau xử lý"}],"answer":0,"explain_jp":"すぐ謝罪し、やけどやけがの有無を確認、拭き取りやクリーニング等の対応をして責任者へ報告します。誠実で迅速な対応が信頼につながります。","explain_vn":"Xin lỗi ngay, kiểm bỏng/thương, lau dọn hoặc đề nghị giặt đồ và báo người phụ trách. Xử lý nhanh, chân thành tạo lòng tin.","why_wrong":{"1":"気づかないふりは不誠実。","2":"客のせいにするのは不適切。","3":"後回しは不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"外国人観光客に日本語のメニューが伝わらず困っている。最も適切な対応はどれか。","q_vn":"Khách du lịch nước ngoài không hiểu thực đơn tiếng Nhật, đang lúng túng. Cách đúng nhất là?","options":[{"jp":"写真・指さし・翻訳アプリ・やさしい言葉で工夫して伝える","vn":"Dùng ảnh, chỉ tay, app dịch, từ đơn giản để truyền đạt"},{"jp":"日本語しか対応しないと突き放す","vn":"Bảo chỉ phục vụ tiếng Nhật rồi mặc kệ"},{"jp":"適当に料理を出す","vn":"Bưng đại món ra"},{"jp":"無視する","vn":"Phớt lờ"}],"answer":0,"explain_jp":"写真付きメニュー・指さし・翻訳アプリ・やさしい日本語などで工夫して意思疎通を図ります。歓迎の姿勢が満足につながります。","explain_vn":"Dùng thực đơn có ảnh, chỉ tay, app dịch, tiếng Nhật đơn giản để hiểu nhau. Thái độ chào đón tạo hài lòng.","why_wrong":{"1":"突き放すのは不適切。","2":"適当に出すのは不適切。","3":"無視は不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"混雑時に一人で複数のテーブルを担当している。効率と満足を両立する対応はどれか。","q_vn":"Lúc đông, một mình phụ trách nhiều bàn. Cách vừa hiệu quả vừa làm khách hài lòng là?","options":[{"jp":"優先順位をつけ、待たせる場合は一声かけて配膳を優先する","vn":"Sắp thứ tự ưu tiên; nếu để chờ thì nói một câu và ưu tiên bưng món"},{"jp":"近いテーブルだけ対応する","vn":"Chỉ lo bàn gần"},{"jp":"声かけをしない","vn":"Không nói gì với khách"},{"jp":"料理提供を後回しにする","vn":"Để việc bưng món sau cùng"}],"answer":0,"explain_jp":"優先順位をつけ、出来上がった料理の提供を優先します。待たせる場合は「少々お待ちください」と一声かけて不満を防ぎます。","explain_vn":"Sắp thứ tự ưu tiên và ưu tiên bưng món đã xong; nếu để khách chờ thì nói 'xin đợi một lát' để tránh bất mãn.","why_wrong":{"1":"近い席だけでは不公平。","2":"声かけなしは不安を与える。","3":"料理提供を後回しは満足度を下げる。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"お客様から「料理が遅い」と言われた。最も適切な対応はどれか。","q_vn":"Khách phàn nàn 'món ra chậm'. Cách đúng nhất là?","options":[{"jp":"謝罪し、状況を確認して見込み時間を伝え、厨房に急いでもらう","vn":"Xin lỗi, kiểm tình hình, báo thời gian dự kiến và nhờ bếp làm nhanh"},{"jp":"忙しいからと突き放す","vn":"Bảo đang bận rồi mặc kệ"},{"jp":"お客様のせいにする","vn":"Đổ lỗi cho khách"},{"jp":"無視する","vn":"Phớt lờ"}],"answer":0,"explain_jp":"まず謝罪し、注文状況を確認して見込み時間を伝え、厨房に確認・急いでもらいます。誠実な対応で不満を和らげます。","explain_vn":"Xin lỗi trước, kiểm tình trạng order, báo thời gian dự kiến và nhờ bếp làm nhanh; đối ứng chân thành giúp giảm bất mãn.","why_wrong":{"1":"突き放すのは不適切。","2":"客のせいにするのは不適切。","3":"無視は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"常連のお客様が来店した。満足度を高める対応として適切なものはどれか。","q_vn":"Khách quen đến. Cách nâng hài lòng phù hợp là?","options":[{"jp":"顔や好みを覚えて自然に配慮しつつ、他の客と公平に接する","vn":"Nhớ mặt/sở thích để quan tâm tự nhiên, vẫn công bằng với khách khác"},{"jp":"特別扱いして他の客を後回しにする","vn":"Ưu ái đến mức bỏ bê khách khác"},{"jp":"覚えていないふりをする","vn":"Giả vờ không nhớ"},{"jp":"馴れ馴れしくしすぎる","vn":"Suồng sã quá mức"}],"answer":0,"explain_jp":"常連には好みを覚えて自然に配慮すると満足度が上がります。ただし他のお客様への公平さや節度も保ちます。","explain_vn":"Với khách quen, nhớ sở thích và quan tâm tự nhiên sẽ tăng hài lòng; nhưng vẫn giữ công bằng và chừng mực với khách khác.","why_wrong":{"1":"他の客を後回しは不公平。","2":"覚えていないふりは冷たい印象。","3":"馴れ馴れしすぎるのは不快。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"お客様に割引券（次回使えるクーポン）を渡す最適なタイミングはどれか。","q_vn":"Thời điểm tối ưu để đưa phiếu giảm giá (dùng lần sau) là?","options":[{"jp":"会計時に渡し、次回来店を促す","vn":"Đưa lúc thanh toán, khuyến khích lần sau quay lại"},{"jp":"来店直後に渡す","vn":"Vừa vào là đưa ngay"},{"jp":"注文前に渡す","vn":"Đưa trước khi order"},{"jp":"料理提供と同時に渡す","vn":"Đưa cùng lúc bưng món"}],"answer":0,"explain_jp":"次回来店を促す割引券は会計時に渡すのが効果的。来店直後だと当日値引きになりやすく再来店効果が薄れます。","explain_vn":"Phiếu khuyến khích quay lại nên đưa lúc thanh toán; đưa ngay khi vào dễ thành giảm giá ngày đó, ít hiệu quả kéo khách lại.","why_wrong":{"1":"来店直後は当日値引きになりやすい。","2":"注文前は再来店効果が薄い。","3":"提供時は動機づけになりにくい。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「接客」と「接遇」の違いとして最も適切なものはどれか。","q_vn":"Phân biệt 'sekkyaku (tiếp khách)' và 'setsugu (đón tiếp chu đáo)' đúng nhất là?","options":[{"jp":"接客は基本的な応対、接遇は相手を思いやる心のこもったもてなし","vn":"Sekkyaku là đối ứng cơ bản; setsugu là sự đón tiếp chân thành, quan tâm đến người khác"},{"jp":"両方とも全く同じである","vn":"Cả hai hoàn toàn giống nhau"},{"jp":"接遇は接客より雑なものである","vn":"Setsugu qua loa hơn sekkyaku"},{"jp":"接客には心配りが不要である","vn":"Sekkyaku không cần để tâm"}],"answer":0,"explain_jp":"接客は基本的な応対、接遇はそこに相手を思いやる心を加えたもてなしです。より高い満足につながります。","explain_vn":"Sekkyaku là đối ứng cơ bản; setsugu thêm sự quan tâm chân thành — dẫn tới hài lòng cao hơn.","why_wrong":{"1":"全く同じではない。","2":"接遇は雑ではなく丁寧。","3":"接客にも心配りは大切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様に不快感を与えないための行動として適切でないものはどれか。","q_vn":"Hành động nào KHÔNG phù hợp để tránh gây khó chịu cho khách?","options":[{"jp":"従業員同士で私語や大声で話す","vn":"Nhân viên nói chuyện riêng, to tiếng với nhau"},{"jp":"清潔な身だしなみを保つ","vn":"Giữ trang phục sạch sẽ"},{"jp":"明るい表情で対応する","vn":"Đối ứng với nét mặt tươi"},{"jp":"丁寧な言葉遣いをする","vn":"Dùng lời lẽ lịch sự"}],"answer":0,"explain_jp":"接客中の私語や大声はお客様に不快感を与えます。清潔な身だしなみ・明るい表情・丁寧な言葉遣いが基本です。","explain_vn":"Nói chuyện riêng, to tiếng khi tiếp khách gây khó chịu. Cơ bản là trang phục sạch, nét mặt tươi, lời lẽ lịch sự.","why_wrong":{"1":"清潔な身だしなみは適切。","2":"明るい表情は適切。","3":"丁寧な言葉遣いは適切。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"クレームを受けたが自分では判断できない内容だった。最も適切な対応はどれか。","q_vn":"Nhận khiếu nại nhưng bản thân không tự quyết được. Cách đúng nhất là?","options":[{"jp":"勝手に判断せず、責任者に速やかに報告して対応を仰ぐ","vn":"Không tự quyết, báo ngay người phụ trách để xin hướng xử lý"},{"jp":"自分の判断で勝手に返金する","vn":"Tự ý hoàn tiền theo ý mình"},{"jp":"分からないので放置する","vn":"Không biết nên để mặc"},{"jp":"お客様を追い返す","vn":"Đuổi khách về"}],"answer":0,"explain_jp":"自分で判断できない場合は勝手に対応せず、責任者に速やかに報告して指示を仰ぎます。お客様には丁寧にお待ちいただきます。","explain_vn":"Nếu không tự quyết được thì không tự ý xử lý, báo ngay người phụ trách xin chỉ đạo; mời khách chờ một cách lịch sự.","why_wrong":{"1":"勝手な返金は問題になり得る。","2":"放置は不満を拡大させる。","3":"追い返すのは不適切。"}},{"sect":"tenpo","part":"gakka","q_jp":"「売上高」を求める基本の式として正しいものはどれか。","q_vn":"Công thức cơ bản tính 'doanh thu' đúng là?","options":[{"jp":"客数 × 客単価","vn":"Số khách × đơn giá bình quân/khách"},{"jp":"客数 − 客単価","vn":"Số khách − đơn giá/khách"},{"jp":"客数 ÷ 客単価","vn":"Số khách ÷ đơn giá/khách"},{"jp":"原価 × 人件費","vn":"Giá vốn × chi phí nhân sự"}],"answer":0,"explain_jp":"売上高＝客数×客単価。客単価を上げるか客数を増やすことで売上が伸びます。","explain_vn":"Doanh thu = số khách × đơn giá/khách. Tăng đơn giá hoặc tăng số khách thì doanh thu tăng.","why_wrong":{"1":"引き算ではない。","2":"割り算ではない。","3":"原価×人件費は売上の式ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"飲食店の「FLコスト」が指すものはどれか。","q_vn":"'FL cost' của nhà hàng chỉ điều gì?","options":[{"jp":"Food（食材費）とLabor（人件費）の合計","vn":"Tổng chi phí nguyên liệu (Food) và nhân sự (Labor)"},{"jp":"家賃と光熱費","vn":"Tiền thuê và điện nước"},{"jp":"利益と税金","vn":"Lợi nhuận và thuế"},{"jp":"広告費と通信費","vn":"Chi phí quảng cáo và liên lạc"}],"answer":0,"explain_jp":"FLコストはFood（食材費）＋Labor（人件費）。売上に対するFL比率はおおむね60%以下が目安とされます。","explain_vn":"FL cost = Food (nguyên liệu) + Labor (nhân sự). Tỷ lệ FL/doanh thu thường lấy mốc ≤60%.","why_wrong":{"1":"家賃・光熱費はFLに含まれない。","2":"利益・税金ではない。","3":"広告・通信費ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"「損益分岐点」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'điểm hòa vốn (損益分岐点)' là?","options":[{"jp":"売上と費用が等しく、利益も損失も出ない売上高","vn":"Mức doanh thu mà doanh thu = chi phí, không lãi không lỗ"},{"jp":"最も利益が大きい売上高","vn":"Mức doanh thu lãi nhiều nhất"},{"jp":"最も客が多い時間帯","vn":"Khung giờ đông khách nhất"},{"jp":"原価が最も低い日","vn":"Ngày giá vốn thấp nhất"}],"answer":0,"explain_jp":"損益分岐点は売上と費用が等しくなる点。これを上回れば利益、下回れば損失が出ます。","explain_vn":"Điểm hòa vốn là nơi doanh thu bằng chi phí; vượt lên thì lãi, thấp hơn thì lỗ.","why_wrong":{"1":"利益最大の点ではない。","2":"時間帯の話ではない。","3":"原価の日の話ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"「変動費」に分類されるものはどれか。","q_vn":"Khoản nào thuộc 'chi phí biến đổi'?","options":[{"jp":"食材費","vn":"Chi phí nguyên liệu"},{"jp":"家賃","vn":"Tiền thuê mặt bằng"},{"jp":"正社員の基本給","vn":"Lương cơ bản nhân viên chính thức"},{"jp":"減価償却費","vn":"Chi phí khấu hao"}],"answer":0,"explain_jp":"変動費は売上に応じて増減する費用（食材費など）。家賃・正社員給・減価償却費は売上に関係なくかかる固定費です。","explain_vn":"Chi phí biến đổi thay đổi theo doanh thu (như nguyên liệu). Tiền thuê, lương chính thức, khấu hao là chi phí cố định.","why_wrong":{"1":"家賃は固定費。","2":"正社員給は固定費。","3":"減価償却費は固定費。"}},{"sect":"tenpo","part":"gakka","q_jp":"「回転率」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'tỷ lệ quay vòng bàn (回転率)' là?","options":[{"jp":"一定時間に1つの席が何回使われたかを示す指標","vn":"Chỉ số cho biết một ghế được dùng bao nhiêu lượt trong một khoảng thời gian"},{"jp":"料理を回す速さ","vn":"Tốc độ xoay món ăn"},{"jp":"原価の割合","vn":"Tỷ lệ giá vốn"},{"jp":"利益の割合","vn":"Tỷ lệ lợi nhuận"}],"answer":0,"explain_jp":"回転率＝来客数÷座席数で、1席が何回転したかを示します。回転率を上げると売上が伸びます。","explain_vn":"Tỷ lệ quay vòng = số khách ÷ số ghế, cho biết một ghế được dùng bao nhiêu lượt. Tăng quay vòng thì doanh thu tăng.","why_wrong":{"1":"料理の速さではない。","2":"原価率ではない。","3":"利益率ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"最低賃金について正しいものはどれか。","q_vn":"Về mức lương tối thiểu, điều đúng là?","options":[{"jp":"都道府県ごとに定められ、それを下回る賃金は認められない","vn":"Do từng tỉnh/thành quy định, không được trả thấp hơn"},{"jp":"全国一律で変わらない","vn":"Toàn quốc như nhau, không đổi"},{"jp":"店が自由に決めてよい","vn":"Quán tự quyết tùy ý"},{"jp":"下回っても構わない","vn":"Trả thấp hơn cũng được"}],"answer":0,"explain_jp":"最低賃金は都道府県ごとに定められ、毎年見直されます。これを下回る賃金で雇うことはできません。","explain_vn":"Lương tối thiểu do từng tỉnh/thành quy định, xét lại hằng năm; không được thuê với mức thấp hơn.","why_wrong":{"1":"全国一律ではなく地域別。","2":"店が自由に決めることはできない。","3":"下回るのは違法。"}},{"sect":"tenpo","part":"gakka","q_jp":"法定休日に労働させた場合の割増賃金の最低率はどれか。","q_vn":"Làm việc vào ngày nghỉ theo luật, mức phụ cấp tối thiểu là?","options":[{"jp":"35%以上","vn":"Từ 35% trở lên"},{"jp":"25%以上","vn":"Từ 25% trở lên"},{"jp":"10%以上","vn":"Từ 10% trở lên"},{"jp":"割増は不要","vn":"Không cần phụ cấp"}],"answer":0,"explain_jp":"法定休日労働の割増は35%以上。時間外労働・深夜労働は25%以上です。","explain_vn":"Làm ngày nghỉ theo luật phụ cấp ≥35%. Làm thêm giờ và làm đêm ≥25%.","why_wrong":{"1":"25%は時間外・深夜の率。","2":"10%は法定に満たない。","3":"割増は必要。"}},{"sect":"tenpo","part":"gakka","q_jp":"「発注点（発注のタイミング）」を決める主な目的はどれか。","q_vn":"Mục đích chính của việc định 'điểm đặt hàng (発注点)' là?","options":[{"jp":"品切れと過剰在庫を防ぎ、適正在庫を保つため","vn":"Tránh hết hàng và tồn dư, giữ tồn kho hợp lý"},{"jp":"人件費を増やすため","vn":"Để tăng chi phí nhân sự"},{"jp":"客単価を下げるため","vn":"Để giảm đơn giá/khách"},{"jp":"原価率を上げるため","vn":"Để tăng tỷ lệ giá vốn"}],"answer":0,"explain_jp":"発注点は在庫が一定量まで減ったら発注する仕組みで、品切れ（チャンスロス）と過剰在庫の両方を防ぎます。","explain_vn":"Điểm đặt hàng là khi tồn giảm tới mức nhất định thì đặt, giúp tránh cả hết hàng (chance loss) lẫn tồn dư.","why_wrong":{"1":"人件費増加が目的ではない。","2":"客単価とは無関係。","3":"原価率を上げる目的ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"棚卸（在庫の実地確認）を行う主な目的はどれか。","q_vn":"Mục đích chính của việc 'kiểm kê (棚卸)' là?","options":[{"jp":"実際の在庫量を把握し、原価やロスを正確に計算するため","vn":"Nắm lượng tồn thực tế để tính đúng giá vốn và hao hụt"},{"jp":"客数を数えるため","vn":"Để đếm số khách"},{"jp":"接客を評価するため","vn":"Để đánh giá tiếp khách"},{"jp":"広告効果を測るため","vn":"Để đo hiệu quả quảng cáo"}],"answer":0,"explain_jp":"棚卸で実際の在庫を確認し、実際原価やロスを正確に計算します。帳簿在庫との差からロスを把握します。","explain_vn":"Kiểm kê để xác nhận tồn thực tế, tính đúng giá vốn thực và hao hụt; so với sổ sách để biết mức hao.","why_wrong":{"1":"客数を数える目的ではない。","2":"接客評価ではない。","3":"広告効果測定ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"人材育成の「OFF-JT」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'OFF-JT' trong đào tạo nhân sự là?","options":[{"jp":"職場を離れて集合研修などで学ぶ教育","vn":"Học ngoài công việc, qua tập huấn tập trung"},{"jp":"現場でマンツーマンで教える","vn":"Kèm 1–1 tại hiện trường"},{"jp":"教育を全くしない","vn":"Không đào tạo gì"},{"jp":"作業しながら覚えさせる","vn":"Vừa làm vừa học"}],"answer":0,"explain_jp":"OFF-JTは職場を離れた集合研修・座学など。現場で実地に教えるのはOJTです。両者を組み合わせると効果的です。","explain_vn":"OFF-JT là học tập trung/lý thuyết ngoài công việc. Kèm thực tế tại chỗ là OJT. Kết hợp cả hai hiệu quả hơn.","why_wrong":{"1":"現場マンツーマンはOJT。","2":"教育しないは誤り。","3":"作業しながらはOJT。"}},{"sect":"tenpo","part":"gakka","q_jp":"消火器を使うべき初期消火の対象として正しいものはどれか。","q_vn":"Đối tượng dập cháy ban đầu bằng bình chữa cháy đúng là?","options":[{"jp":"炎が天井に届く前の小さな火","vn":"Đám cháy nhỏ, lửa chưa lên tới trần"},{"jp":"天井まで燃え広がった火","vn":"Lửa đã lan tới trần"},{"jp":"火のない状態","vn":"Khi không có lửa"},{"jp":"すべての大規模火災","vn":"Mọi đám cháy lớn"}],"answer":0,"explain_jp":"消火器での初期消火は、炎が天井に達する前の小さな火が対象。天井まで燃え広がったら避難と通報を優先します。","explain_vn":"Dập ban đầu bằng bình chữa cháy chỉ với đám nhỏ, lửa chưa tới trần. Nếu lửa đã lan tới trần thì ưu tiên thoát và báo cháy.","why_wrong":{"1":"天井まで達した火は避難優先。","2":"火がなければ不要。","3":"大規模火災は消火器では不十分。"}},{"sect":"tenpo","part":"gakka","q_jp":"個人情報保護の観点で適切な行動はどれか。","q_vn":"Về bảo vệ thông tin cá nhân, hành động đúng là?","options":[{"jp":"予約や会員の個人情報を目的外に使わず適切に管理する","vn":"Không dùng thông tin đặt bàn/thành viên sai mục đích, quản lý đúng"},{"jp":"顧客名簿を誰でも見られる場所に置く","vn":"Để danh sách khách nơi ai cũng xem được"},{"jp":"許可なく他社に渡す","vn":"Giao cho công ty khác khi chưa được phép"},{"jp":"個人情報を放置する","vn":"Để mặc thông tin cá nhân"}],"answer":0,"explain_jp":"個人情報は目的外利用をせず、適切に保管・管理します。無断で第三者に渡すことは禁じられています。","explain_vn":"Thông tin cá nhân không dùng sai mục đích, phải lưu giữ và quản lý đúng; cấm giao cho bên thứ ba khi chưa được phép.","why_wrong":{"1":"誰でも見られる場所は不適切。","2":"無断提供は禁止。","3":"放置は不適切。"}},{"sect":"tenpo","part":"gakka","q_jp":"「クレンリネス」の意味として最も適切なものはどれか。","q_vn":"Nghĩa của 'cleanliness (クレンリネス)
