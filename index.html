<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外食業 特定技能2号 技能測定試験 練習アプリ</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink:#1a1410; --ink-soft:#4a4038; --paper:#f7f3ec; --paper-2:#fffdf8;
    --line:#d9cfc0; --line-soft:#e8e0d2; --seal:#b23a2e; --seal-deep:#8f2c22;
    --indigo:#2f4858; --indigo-soft:#45647a; --gold:#b8893a;
    --pass:#2f7a4d; --fail:#b23a2e; --amber-bg:#fbf4e4;
    --shadow:0 1px 2px rgba(26,20,16,.08), 0 8px 30px rgba(26,20,16,.10); --radius:4px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 600px at 15% -10%, rgba(47,72,88,.05), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(178,58,46,.05), transparent 55%), var(--paper);
    min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:760px; margin:0 auto; padding:28px 20px 80px; }
  .masthead { position:relative; border:1px solid var(--line); background:var(--paper-2);
    border-radius:var(--radius); padding:22px 24px; box-shadow:var(--shadow); overflow:hidden; }
  .brandline { display:flex; align-items:center; gap:12px; }
  .seal { flex:0 0 auto; width:46px; height:46px; border-radius:6px; border:2px solid var(--seal);
    color:var(--seal); display:grid; place-items:center; font-weight:800; font-size:15px;
    line-height:1.05; text-align:center; transform:rotate(-3deg); background:rgba(178,58,46,.05); }
  .titles h1 { margin:0; font-size:20px; letter-spacing:.5px; font-weight:800; }
  .titles .romaji { margin:2px 0 0; font-size:12.5px; color:var(--indigo-soft); font-weight:600; }
  .titles .vn { margin:3px 0 0; font-size:13px; color:var(--ink-soft); }
  .exam-facts { margin-top:16px; display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
    background:var(--line-soft); border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden; }
  .fact { background:var(--paper-2); padding:10px 12px; text-align:center; }
  .fact .num { font-size:18px; font-weight:800; color:var(--indigo); }
  .fact .lab { font-size:10.5px; color:var(--ink-soft); margin-top:2px; }
  .panel { margin-top:20px; border:1px solid var(--line); background:var(--paper-2);
    border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); }
  .panel h2 { margin:0 0 4px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .panel h2 .vn-h { color:var(--ink-soft); font-weight:600; font-size:12.5px; }
  .hint { font-size:12.5px; color:var(--ink-soft); margin:4px 0 16px; }
  label.field { display:block; margin-bottom:14px; }
  label.field .lbl { display:block; font-size:12.5px; font-weight:700; margin-bottom:5px; }
  label.field .lbl .vn-s { color:var(--ink-soft); font-weight:500; }
  input[type=text], input[type=url] { width:100%; padding:11px 12px; border:1px solid var(--line);
    border-radius:var(--radius); background:var(--paper); font-size:14.5px; color:var(--ink);
    font-family:inherit; transition:border-color .15s, box-shadow .15s; }
  input:focus { outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px rgba(47,72,88,.12); }
  .sect-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  .sect-row { display:flex; justify-content:space-between; align-items:baseline; padding:9px 12px;
    background:var(--paper); border:1px solid var(--line-soft); border-radius:var(--radius); font-size:12.5px; }
  .sect-row .jp { font-weight:700; }
  .sect-row .vn2 { color:var(--ink-soft); font-size:11px; display:block; margin-top:1px; font-weight:400; }
  .sect-row .pts { color:var(--indigo); font-weight:800; white-space:nowrap; }
  .btn { appearance:none; border:none; cursor:pointer; font-family:inherit; font-weight:800;
    letter-spacing:.3px; border-radius:var(--radius); padding:13px 20px; font-size:14.5px;
    transition:transform .08s, box-shadow .15s, background .15s; }
  .btn:active { transform:translateY(1px); }
  .btn-primary { background:var(--indigo); color:#fff; width:100%; box-shadow:0 2px 0 var(--indigo-soft); }
  .btn-primary:hover { background:#263a47; }
  .btn-primary:disabled { background:#9aa8b0; box-shadow:none; cursor:not-allowed; }
  .btn-seal { background:var(--seal); color:#fff; box-shadow:0 2px 0 var(--seal-deep); }
  .btn-seal:hover { background:#9d3229; }
  .btn-ghost { background:transparent; color:var(--indigo); border:1px solid var(--line); }
  .btn-ghost:hover { background:var(--paper); }
  .btn-row { display:flex; gap:10px; margin-top:8px; }
  .btn-row .btn { flex:1; }
  .vn-btn { display:block; font-weight:500; font-size:11px; opacity:.85; margin-top:1px; }
  .quiz-top { position:sticky; top:0; z-index:20; margin:-22px -22px 18px; padding:14px 22px;
    background:var(--paper-2); border-bottom:1px solid var(--line); display:flex; align-items:center;
    justify-content:space-between; gap:12px; border-radius:var(--radius) var(--radius) 0 0; }
  .timer { font-variant-numeric:tabular-nums; font-weight:800; font-size:20px; color:var(--indigo); letter-spacing:1px; }
  .timer.warn { color:var(--seal); }
  .progress-text { font-size:12px; color:var(--ink-soft); font-weight:600; }
  .progress-bar { height:4px; background:var(--line-soft); border-radius:3px; overflow:hidden; margin-top:8px; }
  .progress-bar > span { display:block; height:100%; background:var(--indigo); transition:width .3s; }
  .q-card { padding:4px 2px 2px; }
  .q-eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:800;
    letter-spacing:.5px; text-transform:uppercase; color:var(--indigo); background:rgba(47,72,88,.07);
    padding:4px 10px; border-radius:20px; margin-bottom:12px; }
  .q-eyebrow .div { color:var(--line); }
  .q-num { font-size:12px; color:var(--ink-soft); font-weight:700; margin-bottom:6px; }
  .q-jp { font-size:16px; font-weight:700; line-height:1.7; }
  .q-vn { font-size:13.5px; color:var(--ink-soft); margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .choices { margin-top:18px; display:flex; flex-direction:column; gap:10px; }
  .choice { display:flex; gap:12px; align-items:flex-start; text-align:left; padding:13px 15px;
    border:1px solid var(--line); border-radius:var(--radius); background:var(--paper); cursor:pointer;
    font-family:inherit; width:100%; transition:border-color .12s, background .12s, box-shadow .12s; }
  .choice:hover { border-color:var(--indigo-soft); background:var(--paper-2); }
  .choice.sel { border-color:var(--indigo); background:rgba(47,72,88,.06); box-shadow:0 0 0 2px rgba(47,72,88,.14); }
  .choice .key { flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:1.5px solid var(--line);
    display:grid; place-items:center; font-weight:800; font-size:12.5px; color:var(--ink-soft); }
  .choice.sel .key { background:var(--indigo); color:#fff; border-color:var(--indigo); }
  .choice .ctext { font-size:14px; }
  .choice .ctext .cvn { display:block; color:var(--ink-soft); font-size:12px; margin-top:3px; }
  .nav-row { display:flex; gap:10px; margin-top:22px; }
  .palette { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
  .pnum { width:30px; height:30px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--paper); font-size:11.5px; font-weight:700; cursor:pointer; color:var(--ink-soft); font-family:inherit; }
  .pnum.done { background:var(--indigo); color:#fff; border-color:var(--indigo); }
  .pnum.cur { outline:2px solid var(--seal); outline-offset:1px; }
  .score-hero { text-align:center; padding:26px 20px; border-radius:var(--radius); border:1px solid var(--line);
    position:relative; overflow:hidden; }
  .score-hero.pass { background:linear-gradient(180deg, rgba(47,122,77,.10), var(--paper-2)); }
  .score-hero.fail { background:linear-gradient(180deg, rgba(178,58,46,.08), var(--paper-2)); }
  .verdict-seal { width:76px; height:76px; margin:0 auto 10px; border-radius:50%; display:grid;
    place-items:center; font-weight:900; font-size:26px; border:3px solid; transform:rotate(-6deg); }
  .score-hero.pass .verdict-seal { color:var(--pass); border-color:var(--pass); background:rgba(47,122,77,.06); }
  .score-hero.fail .verdict-seal { color:var(--fail); border-color:var(--fail); background:rgba(178,58,46,.06); }
  .score-big { font-size:44px; font-weight:900; line-height:1; font-variant-numeric:tabular-nums; }
  .score-big .of { font-size:20px; color:var(--ink-soft); font-weight:700; }
  .score-sub { font-size:13px; color:var(--ink-soft); margin-top:6px; }
  .verdict-label { font-size:15px; font-weight:800; margin-top:10px; }
  .score-hero.pass .verdict-label { color:var(--pass); }
  .score-hero.fail .verdict-label { color:var(--fail); }
  .sect-scores { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
  .ss-row { display:flex; align-items:center; gap:12px; }
  .ss-name { flex:0 0 132px; font-size:12px; }
  .ss-name .vn3 { display:block; color:var(--ink-soft); font-size:10.5px; }
  .ss-track { flex:1; height:8px; background:var(--line-soft); border-radius:5px; overflow:hidden; }
  .ss-fill { height:100%; background:var(--indigo); border-radius:5px; }
  .ss-pts { flex:0 0 auto; font-size:12px; font-weight:800; color:var(--indigo); font-variant-numeric:tabular-nums; }
  .save-status { margin-top:14px; font-size:12.5px; padding:10px 12px; border-radius:var(--radius);
    background:var(--amber-bg); border:1px solid var(--line-soft); color:var(--ink-soft); }
  .save-status.ok { background:rgba(47,122,77,.08); border-color:rgba(47,122,77,.25); color:var(--pass); }
  .save-status.err { background:rgba(178,58,46,.07); border-color:rgba(178,58,46,.25); color:var(--seal-deep); }
  .rev-item { margin-top:14px; border:1px solid var(--line); border-radius:var(--radius); background:var(--paper-2); overflow:hidden; }
  .rev-head { padding:13px 15px; display:flex; gap:10px; align-items:flex-start; }
  .rev-badge { flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:grid; place-items:center;
    font-weight:900; font-size:13px; color:#fff; }
  .rev-badge.ok { background:var(--pass); }
  .rev-badge.no { background:var(--fail); }
  .rev-qmeta { font-size:10.5px; color:var(--indigo); font-weight:800; text-transform:uppercase; letter-spacing:.4px; }
  .rev-q { font-size:14px; font-weight:700; margin-top:3px; }
  .rev-qvn { font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .rev-body { padding:0 15px 15px; }
  .rev-opt { font-size:12.5px; padding:8px 11px; border-radius:var(--radius); margin-top:6px;
    border:1px solid var(--line-soft); background:var(--paper); }
  .rev-opt.correct { border-color:rgba(47,122,77,.4); background:rgba(47,122,77,.07); }
  .rev-opt.chosen-wrong { border-color:rgba(178,58,46,.4); background:rgba(178,58,46,.06); }
  .rev-opt .tag { font-size:10px; font-weight:800; padding:1px 6px; border-radius:10px; margin-left:6px; }
  .rev-opt.correct .tag { background:var(--pass); color:#fff; }
  .rev-opt.chosen-wrong .tag { background:var(--fail); color:#fff; }
  .rev-opt .ovn { display:block; color:var(--ink-soft); font-size:11px; margin-top:2px; }
  .rev-explain { margin-top:12px; padding:12px 14px; background:var(--amber-bg); border-left:3px solid var(--gold);
    border-radius:0 var(--radius) var(--radius) 0; }
  .rev-explain .ex-lbl { font-size:10.5px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; }
  .rev-explain .ex-jp { font-size:13px; margin-top:5px; }
  .rev-explain .ex-vn { font-size:12.5px; color:var(--ink-soft); margin-top:7px; padding-top:7px; border-top:1px dashed var(--line); }
  .rev-why-wrong { margin-top:8px; font-size:12px; color:var(--ink-soft); }
  .rev-why-wrong b { color:var(--seal-deep); }
  .foot-note { text-align:center; font-size:11px; color:var(--ink-soft); margin-top:26px; line-height:1.7; }
  .err-box { margin-top:14px; padding:12px 14px; border-radius:var(--radius); background:rgba(178,58,46,.06);
    border:1px solid rgba(178,58,46,.3); color:var(--seal-deep); font-size:12.5px; }
  @media (max-width:560px) {
    .exam-facts { grid-template-columns:repeat(2,1fr); }
    .sect-breakdown { grid-template-columns:1fr; }
    .ss-name { flex-basis:108px; }
  }
</style>
</head>

<script type="application/json" id="question-bank">[{"sect":"eisei","part":"gakka","q_jp":"食中毒予防の3原則として正しいものはどれか。","q_vn":"Đâu là 3 nguyên tắc phòng ngừa ngộ độc thực phẩm?","options":[{"jp":"つけない・増やさない・やっつける","vn":"Không để dính vào · Không để tăng lên · Tiêu diệt"},{"jp":"洗う・炒める・冷ます","vn":"Rửa · Xào · Làm nguội"},{"jp":"見る・嗅ぐ・味わう","vn":"Nhìn · Ngửi · Nếm"},{"jp":"買う・保管する・提供する","vn":"Mua · Bảo quản · Cung cấp"}],"answer":0,"explain_jp":"食中毒予防の3原則は「つけない（清潔・二次汚染防止）」「増やさない（迅速・冷却）」「やっつける（加熱）」です。","explain_vn":"3 nguyên tắc là: Không để vi khuẩn dính vào (vệ sinh, chống nhiễm chéo), Không để tăng lên (nhanh, làm lạnh), Tiêu diệt (gia nhiệt).","why_wrong":{"1":"調理手順であって食中毒予防の原則ではない。","2":"官能検査の表現で原則ではない。","3":"流通の流れであり原則ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"食中毒予防で「増やさない」ために、冷蔵保存の温度として適切なものはどれか。","q_vn":"Để 'không để tăng lên', nhiệt độ bảo quản lạnh phù hợp là bao nhiêu?","options":[{"jp":"10℃以下","vn":"Từ 10℃ trở xuống"},{"jp":"20℃前後","vn":"Khoảng 20℃"},{"jp":"30℃以下","vn":"Từ 30℃ trở xuống"},{"jp":"40℃前後","vn":"Khoảng 40℃"}],"answer":0,"explain_jp":"細菌が増えやすい危険温度帯は約10〜60℃。冷蔵は10℃以下、温蔵は60℃以上に保つことで増殖を抑えます。","explain_vn":"Vùng nhiệt độ nguy hiểm khoảng 10–60℃. Giữ lạnh ≤10℃, giữ nóng ≥60℃ để ức chế vi khuẩn sinh sôi.","why_wrong":{"1":"20℃は危険温度帯で細菌が増える。","2":"30℃も危険温度帯内で不適切。","3":"40℃は最も細菌が増えやすい温度帯。"}},{"sect":"eisei","part":"gakka","q_jp":"加熱調理で食中毒菌を「やっつける」ための中心温度と時間の目安はどれか。","q_vn":"Mốc nhiệt độ và thời gian tại tâm thực phẩm để 'tiêu diệt' vi khuẩn khi gia nhiệt là?","options":[{"jp":"中心部75℃で1分以上","vn":"Tâm đạt 75℃ trong ít nhất 1 phút"},{"jp":"表面50℃で30秒","vn":"Bề mặt 50℃ trong 30 giây"},{"jp":"中心部60℃で10秒","vn":"Tâm 60℃ trong 10 giây"},{"jp":"表面100℃で瞬間","vn":"Bề mặt 100℃ tức thời"}],"answer":0,"explain_jp":"一般に中心部75℃1分以上で加熱します。ノロウイルスのおそれがある二枚貝などは85〜90℃で90秒以上が目安です。","explain_vn":"Thông thường tâm đạt 75℃ ≥1 phút. Với hai mảnh vỏ có nguy cơ Norovirus thì 85–90℃ ≥90 giây.","why_wrong":{"1":"50℃では殺菌に不十分。","2":"60℃10秒では中心殺菌に足りない。","3":"表面だけでは中心部まで加熱されない。"}},{"sect":"eisei","part":"gakka","q_jp":"HACCPに沿った衛生管理を構成する2つの基準の組み合わせとして正しいものはどれか。","q_vn":"HACCP gồm 2 tiêu chuẩn nào?","options":[{"jp":"一般的な衛生管理基準と重要工程管理基準","vn":"Tiêu chuẩn quản lý vệ sinh chung và quản lý công đoạn trọng yếu"},{"jp":"接客基準と調理基準","vn":"Tiêu chuẩn tiếp khách và tiêu chuẩn nấu ăn"},{"jp":"発注基準と検収基準","vn":"Tiêu chuẩn đặt hàng và nghiệm thu"},{"jp":"防火基準と避難基準","vn":"Tiêu chuẩn phòng cháy và thoát hiểm"}],"answer":0,"explain_jp":"HACCPに沿った衛生管理は「一般的な衛生管理基準」と「重要工程（重要管理点）管理基準」の2つで構成されます。","explain_vn":"Quản lý theo HACCP gồm 'quản lý vệ sinh chung' và 'quản lý công đoạn/điểm kiểm soát trọng yếu (CCP)'.","why_wrong":{"1":"接客・調理は衛生管理の構成要素ではない。","2":"発注・検収は店舗運営の項目。","3":"防火・避難は防災管理の項目。"}},{"sect":"eisei","part":"gakka","q_jp":"表示が義務付けられている特定原材料8品目に含まれないものはどれか。","q_vn":"Đâu KHÔNG thuộc 8 nguyên liệu bắt buộc ghi nhãn dị ứng?","options":[{"jp":"大豆","vn":"Đậu nành"},{"jp":"卵","vn":"Trứng"},{"jp":"えび","vn":"Tôm"},{"jp":"そば","vn":"Kiều mạch (soba)"}],"answer":0,"explain_jp":"表示義務の特定原材料8品目は、えび・かに・くるみ・小麦・そば・卵・乳・落花生。大豆は「準ずるもの（推奨表示）」に含まれます。","explain_vn":"8 nguyên liệu bắt buộc: tôm, cua, óc chó, lúa mì, kiều mạch, trứng, sữa, đậu phộng. Đậu nành chỉ thuộc nhóm khuyến nghị ghi nhãn.","why_wrong":{"1":"卵は8品目に含まれる。","2":"えびは8品目に含まれる。","3":"そばは8品目に含まれる。"}},{"sect":"eisei","part":"gakka","q_jp":"衛生管理の基礎となる「5S活動」に含まれないものはどれか。","q_vn":"Đâu KHÔNG thuộc hoạt động '5S'?","options":[{"jp":"接客","vn":"Tiếp khách"},{"jp":"整理","vn":"Sàng lọc (seiri)"},{"jp":"清掃","vn":"Sạch sẽ/quét dọn (seisou)"},{"jp":"清潔","vn":"Vệ sinh (seiketsu)"}],"answer":0,"explain_jp":"5Sは整理・整頓・清掃・清潔・習慣（しつけ）。接客は含まれません。","explain_vn":"5S gồm: Sàng lọc, Sắp xếp, Quét dọn, Vệ sinh, Thói quen. Tiếp khách không thuộc 5S.","why_wrong":{"1":"整理は5Sの1つ。","2":"清掃は5Sの1つ。","3":"清潔は5Sの1つ。"}},{"sect":"eisei","part":"gakka","q_jp":"手洗いが特に必要なタイミングとして適切でないものはどれか。","q_vn":"Thời điểm nào KHÔNG bắt buộc phải rửa tay kỹ?","options":[{"jp":"同じ盛り付け作業を続けている最中、汚染がない場合","vn":"Đang làm liên tục cùng một thao tác bày món, không có nhiễm bẩn"},{"jp":"トイレの後","vn":"Sau khi đi vệ sinh"},{"jp":"生の食肉・魚介・卵を扱った後","vn":"Sau khi xử lý thịt/hải sản/trứng sống"},{"jp":"調理場に入る前","vn":"Trước khi vào khu bếp"}],"answer":0,"explain_jp":"トイレ後、生鮮食材を扱った後、入室前などは必須。ノロ食中毒はトイレ後の手洗い不十分が原因の事例が多いです。","explain_vn":"Bắt buộc rửa tay: sau WC, sau khi xử lý thực phẩm sống, trước khi vào bếp. Nhiều ca Norovirus do rửa tay không kỹ sau WC.","why_wrong":{"1":"トイレ後は最重要の手洗いタイミング。","2":"生鮮食材後は二次汚染防止で必須。","3":"入室前は持ち込み防止で必須。"}},{"sect":"eisei","part":"gakka","q_jp":"飲用に適する水（井戸水など）を使用する場合の管理として正しいものはどれか。","q_vn":"Khi dùng nước giếng (nước đủ tiêu chuẩn uống), việc quản lý đúng là?","options":[{"jp":"年1回以上の水質検査と残留塩素0.1ppm以上の確認","vn":"Kiểm nghiệm nước ≥1 lần/năm và xác nhận clo dư ≥0,1ppm"},{"jp":"検査は不要で使用してよい","vn":"Không cần kiểm nghiệm, dùng thoải mái"},{"jp":"月1回、色だけ確認すればよい","vn":"Mỗi tháng chỉ cần nhìn màu"},{"jp":"沸騰させれば検査は不要","vn":"Đun sôi là khỏi cần kiểm nghiệm"}],"answer":0,"explain_jp":"飲用に適する水を使う場合は年1回以上の水質検査を行い、残留塩素0.1ppm以上を確認します。","explain_vn":"Khi dùng nước đạt tiêu chuẩn uống: kiểm nghiệm ≥1 lần/năm và xác nhận clo dư ≥0,1ppm.","why_wrong":{"1":"検査は必要。","2":"色だけの確認では不十分。","3":"沸騰だけでは水質管理の代わりにならない。"}},{"sect":"eisei","part":"gakka","q_jp":"洗浄と消毒の違いについて正しいものはどれか。","q_vn":"Sự khác nhau giữa 'rửa (rửa sạch)' và 'khử trùng' là gì?","options":[{"jp":"洗浄は汚れを落とすこと、消毒は有害微生物を除くこと","vn":"Rửa là loại bỏ bẩn/dị vật; khử trùng là loại bỏ vi sinh vật có hại"},{"jp":"洗浄と消毒は同じ意味である","vn":"Rửa và khử trùng là như nhau"},{"jp":"消毒は汚れを落とすことである","vn":"Khử trùng là để loại bỏ bẩn"},{"jp":"洗浄は微生物を除くことである","vn":"Rửa là để loại vi sinh vật"}],"answer":0,"explain_jp":"洗浄は汚れ・異物を落とす作業、消毒は有害微生物を除去・減少させる作業で、目的が異なります。","explain_vn":"Rửa nhằm loại bẩn/dị vật; khử trùng nhằm loại/giảm vi sinh vật có hại — mục đích khác nhau.","why_wrong":{"1":"同じではない。","2":"汚れ落としは洗浄の役割。","3":"微生物除去は消毒の役割。"}},{"sect":"eisei","part":"gakka","q_jp":"ねずみや昆虫の駆除について、法令上の目安として正しいものはどれか。","q_vn":"Về diệt chuột và côn trùng, mốc theo quy định đúng là?","options":[{"jp":"年2回以上駆除し、記録を1年間保管する","vn":"Diệt ≥2 lần/năm và lưu hồ sơ 1 năm"},{"jp":"見つけたときだけ駆除すればよい","vn":"Chỉ diệt khi phát hiện"},{"jp":"駆除は5年に1回でよい","vn":"5 năm diệt 1 lần là đủ"},{"jp":"記録は不要である","vn":"Không cần lưu hồ sơ"}],"answer":0,"explain_jp":"ねずみ・昆虫の駆除は年2回以上実施し、記録を1年間保管するのが目安です。","explain_vn":"Diệt chuột/côn trùng ≥2 lần/năm, lưu hồ sơ 1 năm.","why_wrong":{"1":"発見時のみでは不十分。","2":"5年に1回では頻度不足。","3":"記録保管は必要。"}},{"sect":"eisei","part":"gakka","q_jp":"加熱してもすぐには死滅せず、加熱後の温度管理が特に重要となる菌はどれか。","q_vn":"Vi khuẩn nào KHÔNG chết ngay khi đun, nên phải quản lý nhiệt độ sau khi gia nhiệt?","options":[{"jp":"芽胞をつくるウエルシュ菌など","vn":"Vi khuẩn tạo bào tử như Welchii (Clostridium perfringens)"},{"jp":"腸炎ビブリオ","vn":"Vibrio parahaemolyticus"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"カンピロバクター","vn":"Campylobacter"}],"answer":0,"explain_jp":"ウエルシュ菌・セレウス菌・ボツリヌス菌などは芽胞をつくり、100℃加熱でも死滅しにくいため、加熱後の急速冷却など温度管理が重要です。","explain_vn":"Welchii, Cereus, Botulinum tạo bào tử, đun 100℃ vẫn khó chết nên phải làm lạnh nhanh sau khi nấu.","why_wrong":{"1":"腸炎ビブリオは加熱に弱い。","2":"サルモネラは通常の加熱で死滅する。","3":"カンピロバクターは加熱に弱い。"}},{"sect":"eisei","part":"gakka","q_jp":"冷凍食品の解凍方法として最も適切なものはどれか。","q_vn":"Cách rã đông thực phẩm đông lạnh phù hợp nhất là?","options":[{"jp":"冷蔵庫内で低温のまま解凍する","vn":"Rã đông trong tủ lạnh ở nhiệt độ thấp"},{"jp":"常温に長時間放置して解凍する","vn":"Để nhiệt độ phòng rã đông trong thời gian dài"},{"jp":"直射日光に当てて解凍する","vn":"Phơi nắng trực tiếp cho tan"},{"jp":"ぬるま湯に長時間つける","vn":"Ngâm nước ấm lâu"}],"answer":0,"explain_jp":"解凍は冷蔵庫内での緩慢解凍が基本。常温・室温放置は危険温度帯で細菌が増えるため不可です。","explain_vn":"Rã đông chậm trong tủ lạnh là cơ bản. Để nhiệt độ phòng khiến vi khuẩn tăng trong vùng nhiệt nguy hiểm.","why_wrong":{"1":"常温放置は細菌増殖の原因。","2":"直射日光は品質劣化と菌増殖を招く。","3":"ぬるま湯長時間も危険温度帯になりやすい。"}},{"sect":"eisei","part":"jitsugi","q_jp":"厨房で生の鶏肉を切ったまな板で、次に生野菜のサラダを切ろうとしている。最も適切な対応はどれか。","q_vn":"Vừa thái thịt gà sống trên thớt, giờ định thái rau sống làm salad. Cách xử lý đúng nhất?","options":[{"jp":"まな板と包丁を洗浄・消毒してから、または別のものに替えて使う","vn":"Rửa & khử trùng thớt/dao, hoặc đổi sang bộ khác rồi mới dùng"},{"jp":"そのまま続けて切る","vn":"Cứ thế thái tiếp"},{"jp":"軽く水で流すだけで切る","vn":"Chỉ tráng nước qua rồi thái"},{"jp":"布きんで拭いてから切る","vn":"Lau bằng khăn rồi thái"}],"answer":0,"explain_jp":"生の食肉を扱った器具をそのまま使うと二次汚染（つけてしまう）になります。洗浄・消毒するか、肉用・野菜用に器具を使い分けます。","explain_vn":"Dùng lại dụng cụ đã dính thịt sống sẽ gây nhiễm chéo. Phải rửa–khử trùng hoặc dùng riêng thớt/dao cho thịt và rau.","why_wrong":{"1":"二次汚染の典型例で危険。","2":"水洗いだけでは菌が残る。","3":"拭くだけでは菌が除去できない。"}},{"sect":"eisei","part":"jitsugi","q_jp":"大量に加熱調理したカレーを当日提供せず保存する。ウエルシュ菌対策として最も適切な冷却はどれか。","q_vn":"Nấu lượng lớn cà ri, không phục vụ ngay mà bảo quản. Cách làm nguội chống Welchii đúng nhất?","options":[{"jp":"小分けして急速に冷却し、危険温度帯を短くする","vn":"Chia nhỏ, làm nguội nhanh để rút ngắn thời gian trong vùng nhiệt nguy hiểm"},{"jp":"鍋のまま常温でゆっくり冷ます","vn":"Để nguyên nồi, nguội từ từ ở nhiệt độ phòng"},{"jp":"温かいまま冷蔵庫に大鍋ごと入れる","vn":"Để nguyên nồi lớn còn nóng vào tủ lạnh"},{"jp":"翌日まで室温で放置する","vn":"Để nhiệt độ phòng đến hôm sau"}],"answer":0,"explain_jp":"ウエルシュ菌は芽胞をつくり加熱で死なないため、加熱後は小分けして急速冷却し、危険温度帯（10〜60℃）を素早く通過させます。","explain_vn":"Welchii tạo bào tử, đun không chết; nên sau khi nấu phải chia nhỏ, làm nguội nhanh để vượt qua vùng nhiệt nguy hiểm (10–60℃) thật nhanh.","why_wrong":{"1":"大鍋のまま常温放置は菌が増える最悪の条件。","2":"大鍋のまま冷蔵は中心が冷えにくい。","3":"室温放置は最も危険。"}},{"sect":"eisei","part":"jitsugi","q_jp":"お客様から「そばアレルギーがある」と申告があった。うどんとそばを同じ釜でゆでている店の対応として適切なものはどれか。","q_vn":"Khách báo dị ứng soba. Quán luộc chung nồi udon và soba nên xử lý thế nào?","options":[{"jp":"同じ釜を使用している旨を必ず伝える","vn":"Phải thông báo rõ là dùng chung nồi"},{"jp":"少量なら問題ないと伝えて提供する","vn":"Nói ít thì không sao rồi phục vụ"},{"jp":"黙ってうどんだけ提供する","vn":"Im lặng chỉ phục vụ udon"},{"jp":"アレルギーは自己責任と伝える","vn":"Bảo dị ứng là tự chịu trách nhiệm"}],"answer":0,"explain_jp":"そばとうどんを同じ釜でゆでるとそば成分が混入するおそれがあります。同じ釜使用の事実を必ず伝え、お客様が判断できるようにします。","explain_vn":"Luộc chung nồi có thể lẫn thành phần soba. Phải thông báo rõ để khách tự quyết định.","why_wrong":{"1":"微量でもアナフィラキシーの危険がある。","2":"情報を隠すのは重大な危険。","3":"店として情報提供の配慮が必要。"}},{"sect":"eisei","part":"jitsugi","q_jp":"衛生管理計画に基づき「使用水の残留塩素」を確認したところ0.05ppmだった。最も適切な対応はどれか。","q_vn":"Theo kế hoạch vệ sinh, kiểm tra clo dư của nước thấy 0,05ppm. Xử lý đúng nhất?","options":[{"jp":"基準（0.1ppm以上）を満たさないため使用を止め、原因を確認する","vn":"Không đạt chuẩn (≥0,1ppm) nên ngừng dùng, kiểm tra nguyên nhân"},{"jp":"問題ないのでそのまま使う","vn":"Không sao, cứ dùng tiếp"},{"jp":"色が透明なら気にしない","vn":"Nước trong là được, không quan tâm"},{"jp":"記録だけして使い続ける","vn":"Chỉ ghi lại rồi vẫn dùng"}],"answer":0,"explain_jp":"残留塩素は0.1ppm以上が目安。0.05ppmは基準未満のため、使用を止め原因を確認・改善措置を取ります。","explain_vn":"Clo dư mốc ≥0,1ppm. 0,05ppm dưới chuẩn nên phải ngừng dùng, tìm nguyên nhân và khắc phục.","why_wrong":{"1":"基準未満のまま使うのは不適切。","2":"透明でも塩素不足は問題。","3":"改善せず使い続けるのは危険。"}},{"sect":"eisei","part":"jitsugi","q_jp":"HACCPの考え方に基づき、日々の衛生管理で営業者が行うべきこととして適切でないものはどれか。","q_vn":"Theo tư duy HACCP, việc nào KHÔNG phải là việc chủ cơ sở cần làm hằng ngày?","options":[{"jp":"問題がなければ記録は残さない","vn":"Không có vấn đề thì khỏi ghi hồ sơ"},{"jp":"衛生管理計画を作成する","vn":"Lập kế hoạch quản lý vệ sinh"},{"jp":"実施状況を記録・保存する","vn":"Ghi chép và lưu tình hình thực hiện"},{"jp":"定期的に内容を検証・見直す","vn":"Định kỳ kiểm chứng và rà soát"}],"answer":0,"explain_jp":"HACCPに沿った管理では、計画作成・実施・記録・検証がセット。問題の有無にかかわらず記録を残すことが重要です。","explain_vn":"Quản lý theo HACCP gồm: lập kế hoạch – thực hiện – ghi chép – kiểm chứng. Dù có vấn đề hay không vẫn phải ghi hồ sơ.","why_wrong":{"1":"計画作成は必要な取り組み。","2":"記録・保存は必須。","3":"検証・見直しは必須。"}},{"sect":"chori","part":"gakka","q_jp":"青菜（ほうれん草など）をゆでるときの方法として適切なものはどれか。","q_vn":"Cách luộc rau xanh (như cải bó xôi) phù hợp là?","options":[{"jp":"たっぷりの湯で蓋をせずさっとゆで、水にとる","vn":"Luộc nhanh trong nhiều nước, không đậy nắp, rồi thả vào nước lạnh"},{"jp":"少量の水で蓋をして長時間煮る","vn":"Ít nước, đậy nắp, ninh lâu"},{"jp":"油でじっくり揚げる","vn":"Chiên ngập dầu thật lâu"},{"jp":"生のまま冷凍する","vn":"Để sống rồi cấp đông"}],"answer":0,"explain_jp":"青菜のクロロフィルは熱に弱いため、たっぷりの湯で蓋をせず短時間でゆで、すぐ水にとって色と食感を保ちます。","explain_vn":"Chất diệp lục dễ mất màu khi nhiệt lâu, nên luộc nhanh nhiều nước không đậy nắp rồi thả nước lạnh để giữ màu và độ giòn.","why_wrong":{"1":"長時間煮ると色・栄養が損なわれる。","2":"揚げる調理は青菜のゆで方ではない。","3":"生の話は調理法として不適切。"}},{"sect":"chori","part":"gakka","q_jp":"ごぼうやれんこんを切った後、褐変を防ぐための下処理として適切なものはどれか。","q_vn":"Sau khi cắt ngưu bàng/củ sen, cách sơ chế chống thâm đúng là?","options":[{"jp":"切ったらすぐ水につける","vn":"Cắt xong ngâm nước ngay"},{"jp":"切ったまま空気にさらす","vn":"Để phơi ngoài không khí"},{"jp":"塩をたっぷりまぶす","vn":"Xát nhiều muối"},{"jp":"油をかけておく","vn":"Rưới dầu lên"}],"answer":0,"explain_jp":"ごぼう・れんこんは切り口が空気に触れると褐変します。切ったらすぐ水（または酢水）につけて変色を防ぎます。","explain_vn":"Mặt cắt ngưu bàng/củ sen tiếp xúc không khí sẽ thâm. Cắt xong ngâm nước (hoặc nước giấm) ngay để chống đổi màu.","why_wrong":{"1":"空気にさらすと褐変が進む。","2":"塩は褐変防止の方法ではない。","3":"油は褐変防止に適さない。"}},{"sect":"chori","part":"gakka","q_jp":"包丁とまな板の衛生的な使い方として適切なものはどれか。","q_vn":"Cách dùng dao và thớt hợp vệ sinh là?","options":[{"jp":"肉用・野菜用・下処理用に分類して使い分ける","vn":"Phân loại riêng cho thịt / rau / sơ chế để dùng đúng loại"},{"jp":"すべての食材で同じ包丁を使い続ける","vn":"Dùng chung một con dao cho mọi loại thực phẩm"},{"jp":"洗うのは1日1回でよい","vn":"Mỗi ngày rửa 1 lần là đủ"},{"jp":"鋼の包丁は洗った後ぬれたまま保管する","vn":"Dao thép rửa xong để ướt rồi cất"}],"answer":0,"explain_jp":"包丁・まな板は肉用・野菜用・下処理用に使い分け、使用後すぐ洗浄します。鋼の包丁は錆びやすいので水気をふき取ります。","explain_vn":"Dao/thớt nên dùng riêng cho thịt, rau, sơ chế và rửa ngay sau khi dùng. Dao thép dễ gỉ nên phải lau khô.","why_wrong":{"1":"使い回しは二次汚染の原因。","2":"使用後すぐ洗うのが基本。","3":"ぬれたまま保管は錆の原因。"}},{"sect":"chori","part":"gakka","q_jp":"牛肉のうち、長時間の加熱でコラーゲンが分解し柔らかくなる部位はどれか。","q_vn":"Phần thịt bò nào khi hầm lâu sẽ mềm ra do collagen phân giải?","options":[{"jp":"すね肉","vn":"Thịt bắp chân (gân)"},{"jp":"ヒレ","vn":"Thăn nõn (fillet)"},{"jp":"サーロイン","vn":"Thăn ngoại (sirloin)"},{"jp":"リブロース","vn":"Sườn thăn (ribroast)"}],"answer":0,"explain_jp":"すね肉などのよく動く部位はコラーゲンが多く、長時間加熱で分解してやわらかくなり、煮込み料理に向きます。","explain_vn":"Thịt bắp chân nhiều collagen; hầm lâu collagen phân giải làm thịt mềm, hợp món ninh.","why_wrong":{"1":"ヒレは元々やわらかく長時間加熱には不向き。","2":"サーロインは霜降りで焼き向き。","3":"リブロースも焼き向きの部位。"}},{"sect":"chori","part":"gakka","q_jp":"揚げ油の劣化（酸化）を防ぐ方法として適切でないものはどれか。","q_vn":"Cách nào KHÔNG giúp chống dầu chiên bị oxy hóa/xuống cấp?","options":[{"jp":"油を長時間高温のまま放置する","vn":"Để dầu ở nhiệt độ cao trong thời gian dài"},{"jp":"使わないときは空気にさらさない","vn":"Khi không dùng thì tránh để tiếp xúc không khí"},{"jp":"直射日光を避けて保管する","vn":"Bảo quản tránh nắng trực tiếp"},{"jp":"不純物を混ぜない","vn":"Không để lẫn tạp chất"}],"answer":0,"explain_jp":"油は空気・高温・光・不純物で酸化が進みます。長時間高温放置は劣化を早めるため避けます。","explain_vn":"Dầu bị oxy hóa do không khí, nhiệt cao, ánh sáng, tạp chất. Để nóng lâu làm dầu hỏng nhanh.","why_wrong":{"1":"空気を避けるのは正しい対策。","2":"直射日光を避けるのは正しい。","3":"不純物を混ぜないのは正しい。"}},{"sect":"chori","part":"gakka","q_jp":"ガスレンジを使用する厨房で特に注意すべき安全対策はどれか。","q_vn":"Khi dùng bếp gas, biện pháp an toàn cần đặc biệt chú ý là?","options":[{"jp":"十分な換気を行い一酸化炭素中毒を防ぐ","vn":"Thông gió đủ để tránh ngộ độc khí CO"},{"jp":"換気は不要である","vn":"Không cần thông gió"},{"jp":"窓は常に閉め切る","vn":"Luôn đóng kín cửa sổ"},{"jp":"火のそばに油を大量に置く","vn":"Đặt nhiều dầu sát ngọn lửa"}],"answer":0,"explain_jp":"ガス機器は換気が不十分だと不完全燃焼で一酸化炭素中毒の危険があります。十分な換気が必須です。","explain_vn":"Thiết bị gas nếu thông gió kém sẽ cháy không hoàn toàn, gây ngộ độc CO. Phải thông gió đủ.","why_wrong":{"1":"換気は必須。","2":"閉め切ると危険。","3":"火のそばに大量の油は火災リスク。"}},{"sect":"chori","part":"jitsugi","q_jp":"フライヤーの油のAV値（酸価）が3.2だった。営業中の対応として適切なものはどれか。","q_vn":"Trị số AV (chỉ số axit) của dầu chiên là 3,2. Xử lý trong ca làm phù hợp là?","options":[{"jp":"3.0以上のため、その日の営業終了時に油を交換する","vn":"Vì ≥3,0 nên đổi dầu vào cuối ca ngày hôm đó"},{"jp":"まだ新しいので1週間使い続ける","vn":"Còn mới, dùng tiếp cả tuần"},{"jp":"水を足して薄める","vn":"Thêm nước pha loãng"},{"jp":"色が濃くなるまで放置する","vn":"Cứ để đến khi sẫm màu"}],"answer":0,"explain_jp":"揚げ油のAV値3.0未満が正常。3.0以上はその日の営業終了時に交換します（3.2は交換の目安）。","explain_vn":"AV <3,0 là bình thường; ≥3,0 thì đổi dầu vào cuối ca ngày đó (3,2 là mức cần đổi).","why_wrong":{"1":"3.0以上は劣化しており継続使用は不適切。","2":"油に水を足すのは危険で誤り。","3":"放置は品質・安全上不可。"}},{"sect":"chori","part":"jitsugi","q_jp":"食器洗浄機を使う際の温度管理として適切な組み合わせはどれか。","q_vn":"Khi dùng máy rửa bát, tổ hợp nhiệt độ đúng là?","options":[{"jp":"洗浄60〜70℃・すすぎ80〜90℃","vn":"Rửa 60–70℃, tráng 80–90℃"},{"jp":"洗浄20℃・すすぎ30℃","vn":"Rửa 20℃, tráng 30℃"},{"jp":"洗浄10℃・すすぎ15℃","vn":"Rửa 10℃, tráng 15℃"},{"jp":"洗浄100℃・すすぎ100℃","vn":"Rửa 100℃, tráng 100℃"}],"answer":0,"explain_jp":"食器洗浄機は洗浄60〜70℃、すすぎ80〜90℃が目安。高温のすすぎで加熱消毒の効果もあります。","explain_vn":"Máy rửa bát: rửa 60–70℃, tráng 80–90℃. Tráng nhiệt cao còn có tác dụng khử trùng.","why_wrong":{"1":"低温では洗浄・消毒効果が不十分。","2":"低温すぎて不適切。","3":"常時100℃は現実的でなく設定として誤り。"}},{"sect":"chori","part":"jitsugi","q_jp":"飲食店での労働災害で最も多い事故は何か。現場の安全対策を考えるうえで正しいものはどれか。","q_vn":"Tai nạn lao động phổ biến nhất ở nhà hàng là gì? Điều đúng khi cân nhắc an toàn hiện trường?","options":[{"jp":"「転倒」が最も多く、床の水・油や整理整頓に注意する","vn":"'Trượt ngã' nhiều nhất; chú ý nước/dầu trên sàn và sắp xếp gọn"},{"jp":"「火災」が最も多い","vn":"'Cháy' là nhiều nhất"},{"jp":"「感電」が最も多い","vn":"'Điện giật' là nhiều nhất"},{"jp":"「墜落」が最も多い","vn":"'Rơi từ cao' là nhiều nhất"}],"answer":0,"explain_jp":"飲食店の労災で最も多いのは「転倒」で全体の約3割。次いで「切れ・こすれ」「高温低温物との接触」。床の水・油の除去や5S活動が有効です。","explain_vn":"Tai nạn nhiều nhất là trượt ngã (~30%), rồi 'đứt/trầy', 'chạm vật nóng/lạnh'. Lau nước/dầu trên sàn và 5S rất hiệu quả.","why_wrong":{"1":"火災が最多ではない。","2":"感電が最多ではない。","3":"墜落が最多ではない。"}},{"sect":"chori","part":"jitsugi","q_jp":"魚を焼くとき、うまみを逃がさず中まで火を通す方法として適切なものはどれか。","q_vn":"Khi nướng cá, cách giữ vị ngọt mà vẫn chín tới bên trong là?","options":[{"jp":"強火や中火で表面を焼き固め、弱火で中まで火を通す","vn":"Lửa to/vừa làm se mặt ngoài, rồi lửa nhỏ cho chín bên trong"},{"jp":"最初から最後まで弱火だけで焼く","vn":"Từ đầu đến cuối chỉ dùng lửa nhỏ"},{"jp":"強火のまま短時間だけ焼く","vn":"Cứ lửa to nướng thật nhanh rồi thôi"},{"jp":"水につけながら焼く","vn":"Vừa ngâm nước vừa nướng"}],"answer":0,"explain_jp":"表面を強火・中火で焼き固めてうまみを閉じ込め、その後弱火で中心まで火を通します。","explain_vn":"Làm se mặt ngoài bằng lửa to/vừa để giữ vị ngọt, sau đó lửa nhỏ cho chín tới tâm.","why_wrong":{"1":"弱火だけでは表面が固まらずうまみが逃げやすい。","2":"強火短時間では中まで火が通らない。","3":"水につけながら焼くのは調理法として誤り。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"店舗の評価を高めるために重視される「QSCA」の意味として正しいものはどれか。","q_vn":"'QSCA' — 4 yếu tố nâng cao đánh giá cửa hàng — nghĩa là gì?","options":[{"jp":"品質・サービス・清潔感・雰囲気","vn":"Chất lượng · Dịch vụ · Sạch sẽ · Không khí"},{"jp":"数量・速度・費用・面積","vn":"Số lượng · Tốc độ · Chi phí · Diện tích"},{"jp":"品質・安全・費用・在庫","vn":"Chất lượng · An toàn · Chi phí · Tồn kho"},{"jp":"接客・調理・清掃・会計","vn":"Tiếp khách · Nấu ăn · Dọn dẹp · Thu ngân"}],"answer":0,"explain_jp":"QSCAはQuality(品質)・Service(サービス)・Cleanliness(清潔感)・Atmosphere(雰囲気)。1つも欠かさず高めることが大切です。","explain_vn":"QSCA = Quality (chất lượng), Service (dịch vụ), Cleanliness (sạch sẽ), Atmosphere (không khí). Phải nâng cao đồng đều.","why_wrong":{"1":"数量・速度等はQSCAの内容ではない。","2":"安全・在庫はQSCAではない。","3":"業務名でありQSCAの定義ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客の基本動作「ニコニコ・ハキハキ・キビキビ」のうち「キビキビ」の意味はどれか。","q_vn":"Trong 3 động tác cơ bản, 'kibikibi' nghĩa là gì?","options":[{"jp":"ダラダラせず、てきぱきと動く","vn":"Không lề mề, di chuyển nhanh nhẹn dứt khoát"},{"jp":"大きな声で怒る","vn":"To tiếng cáu gắt"},{"jp":"ゆっくり丁寧すぎるほど動く","vn":"Di chuyển chậm rãi quá mức"},{"jp":"笑わずに真顔でいる","vn":"Không cười, giữ mặt nghiêm"}],"answer":0,"explain_jp":"ニコニコ＝笑顔、ハキハキ＝的確に答える、キビキビ＝ダラダラせずてきぱき動く、が接客の基本動作です。","explain_vn":"Nikoniko = tươi cười, Hakihaki = trả lời rõ ràng dứt khoát, Kibikibi = nhanh nhẹn không lề mề.","why_wrong":{"1":"怒ることではない。","2":"遅い動作ではない。","3":"笑顔（ニコニコ）は別の要素。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「消費期限」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về '消費期限 (hạn sử dụng an toàn)' là?","options":[{"jp":"過ぎたら安全性を欠くおそれがあり食べない方がよい期限","vn":"Quá hạn có nguy cơ mất an toàn, không nên ăn"},{"jp":"過ぎても品質はほぼ変わらない期限","vn":"Quá hạn thì chất lượng gần như không đổi"},{"jp":"開封後の保証期間のこと","vn":"Là thời gian bảo hành sau khi mở"},{"jp":"製造した日のこと","vn":"Là ngày sản xuất"}],"answer":0,"explain_jp":"消費期限は弁当や惣菜など傷みやすい食品に表示され、過ぎたら安全性を欠くおそれがあるため食べない方がよい期限です。","explain_vn":"'消費期限' ghi trên thực phẩm dễ hỏng (cơm hộp, món chế biến); quá hạn có thể mất an toàn nên không nên ăn.","why_wrong":{"1":"品質が変わらないのは賞味期限の説明。","2":"開封後の保証期間ではない。","3":"製造日ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「賞味期限」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về '賞味期限 (hạn dùng ngon nhất)' là?","options":[{"jp":"おいしく食べられる期限で、過ぎても必ずしも食べられなくなるわけではない","vn":"Hạn dùng ngon; quá hạn không hẳn là không ăn được"},{"jp":"過ぎたら必ず廃棄しなければならない期限","vn":"Quá hạn bắt buộc phải bỏ ngay"},{"jp":"開封しても保証が続く期限","vn":"Mở rồi vẫn được bảo đảm"},{"jp":"最も傷みやすい食品にだけ付く期限","vn":"Chỉ dán cho thực phẩm dễ hỏng nhất"}],"answer":0,"explain_jp":"賞味期限は缶詰やスナックなど比較的日持ちする食品の「おいしく食べられる」目安で、過ぎても直ちに食べられなくなるわけではありません。ただし開封するとメーカー保証はなくなります。","explain_vn":"'賞味期限' là mốc 'ăn ngon' của thực phẩm để được lâu (đồ hộp, snack); quá hạn không hẳn hỏng. Nhưng mở ra thì hết bảo đảm của nhà sản xuất.","why_wrong":{"1":"必ず廃棄は消費期限に近い誤解。","2":"開封後は保証されない。","3":"傷みやすい食品は消費期限が付く。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"食物アレルギーで最悪の場合に起こりうる、生命に関わる重篤な症状はどれか。","q_vn":"Trong dị ứng thực phẩm, triệu chứng nặng nguy hiểm tính mạng nhất là?","options":[{"jp":"アナフィラキシーショック","vn":"Sốc phản vệ (anaphylaxis)"},{"jp":"軽いくしゃみ","vn":"Hắt hơi nhẹ"},{"jp":"一時的な眠気","vn":"Buồn ngủ thoáng qua"},{"jp":"食欲増進","vn":"Tăng cảm giác thèm ăn"}],"answer":0,"explain_jp":"食物アレルギーは最悪の場合アナフィラキシーショックを起こし、死に至ることもあります。アレルゲンの確認は非常に重要です。","explain_vn":"Dị ứng thực phẩm nặng nhất có thể gây sốc phản vệ, thậm chí tử vong. Xác nhận dị nguyên rất quan trọng.","why_wrong":{"1":"軽いくしゃみは重篤症状ではない。","2":"眠気は該当しない。","3":"食欲増進は症状ではない。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"イスラム教のお客様（ムスリム）への対応として適切なものはどれか。","q_vn":"Cách phục vụ khách theo đạo Hồi (Muslim) phù hợp là?","options":[{"jp":"食べられないものを確認し、ハラールに配慮して提供する","vn":"Xác nhận món không ăn được và phục vụ theo Halal"},{"jp":"アルコールを勧める","vn":"Mời rượu bia"},{"jp":"豚肉料理を積極的に勧める","vn":"Mời tích cực món thịt heo"},{"jp":"配慮せず通常どおり提供する","vn":"Không cần để ý, phục vụ như thường"}],"answer":0,"explain_jp":"ムスリムは宗教上、豚肉やアルコールを避けます。食べられないものを確認し、ハラールに配慮した提供が求められます。","explain_vn":"Người Hồi giáo kiêng thịt heo và rượu. Cần xác nhận món kiêng và phục vụ theo Halal.","why_wrong":{"1":"アルコールは避けるべき。","2":"豚肉は避けるべき。","3":"配慮は必要。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"顧客満足とリピートについて正しい説明はどれか。","q_vn":"Về sự hài lòng và quay lại của khách, mô tả đúng là?","options":[{"jp":"期待を上回れば満足しリピーターになりやすい","vn":"Vượt kỳ vọng thì khách hài lòng và dễ quay lại"},{"jp":"期待を下回っても必ず再来店する","vn":"Dưới kỳ vọng vẫn chắc chắn quay lại"},{"jp":"満足度は再来店に関係しない","vn":"Mức hài lòng không liên quan việc quay lại"},{"jp":"クレームは無視してよい","vn":"Có thể phớt lờ khiếu nại"}],"answer":0,"explain_jp":"お客様は期待を持って来店し、期待を上回れば満足しリピーターになりやすく、下回れば不満で再来店が減り口コミも広がります。","explain_vn":"Khách đến với kỳ vọng; vượt kỳ vọng thì hài lòng, dễ thành khách quen; dưới kỳ vọng thì bất mãn, ít quay lại và lan truyền tiếng xấu.","why_wrong":{"1":"期待を下回れば再来店は減る。","2":"満足度は再来店に大きく関係する。","3":"クレームは改善材料として重要。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"クレーム対応の考え方として最も適切なものはどれか。","q_vn":"Quan điểm xử lý khiếu nại đúng nhất là?","options":[{"jp":"店の質を改善する材料と捉え、小さな苦情も報告し迅速に対応する","vn":"Coi là tư liệu cải thiện chất lượng; báo cả khiếu nại nhỏ và xử lý nhanh"},{"jp":"小さな苦情は無視する","vn":"Bỏ qua khiếu nại nhỏ"},{"jp":"お客様のせいにする","vn":"Đổ lỗi cho khách"},{"jp":"できるだけ時間をかけて後回しにする","vn":"Câu giờ, để sau xử lý"}],"answer":0,"explain_jp":"クレームは店の質的改善の材料です。小さな苦情も報告し、店長など責任者が迅速・直接に対応することが大切です。","explain_vn":"Khiếu nại là tư liệu cải thiện. Cần báo cả khiếu nại nhỏ và người phụ trách xử lý nhanh, trực tiếp.","why_wrong":{"1":"小さな苦情も見逃さない。","2":"客のせいにするのは不適切。","3":"後回しは不満を拡大させる。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"未成年のお客様や車を運転するお客様への対応として正しいものはどれか。","q_vn":"Cách phục vụ khách vị thành niên hoặc khách sẽ lái xe, điều đúng là?","options":[{"jp":"お酒を提供しない","vn":"Không phục vụ đồ uống có cồn"},{"jp":"少量ならお酒を提供する","vn":"Ít thì vẫn phục vụ rượu"},{"jp":"確認せず提供する","vn":"Không xác nhận, cứ phục vụ"},{"jp":"本人が希望すれば提供する","vn":"Khách muốn là phục vụ"}],"answer":0,"explain_jp":"未成年者や運転者にはお酒を提供しません。法令・安全上、確認して対応します。","explain_vn":"Không phục vụ cồn cho vị thành niên và người lái xe; cần xác nhận theo luật và an toàn.","why_wrong":{"1":"少量でも提供不可。","2":"確認は必要。","3":"本人希望でも不可。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"配慮が必要なお客様への対応として適切でないものはどれか。","q_vn":"Cách phục vụ khách cần quan tâm đặc biệt, điều nào KHÔNG phù hợp?","options":[{"jp":"補助犬（盲導犬など）の同伴を断る","vn":"Từ chối chó hỗ trợ (chó dẫn đường...) đi cùng"},{"jp":"食物アレルギーの有無を伺う","vn":"Hỏi về tình trạng dị ứng thực phẩm"},{"jp":"車椅子でも利用しやすい席を案内する","vn":"Hướng dẫn chỗ ngồi thuận tiện cho xe lăn"},{"jp":"子供の料理を先に提供する配慮をする","vn":"Ưu tiên phục vụ món của trẻ nhỏ trước"}],"answer":0,"explain_jp":"補助犬は同伴が認められており、断るのは不適切です。アレルギー確認、車椅子席の案内、子供への配慮などが求められます。","explain_vn":"Chó hỗ trợ được phép đi cùng, từ chối là không phù hợp. Cần hỏi dị ứng, bố trí chỗ cho xe lăn, ưu tiên trẻ nhỏ.","why_wrong":{"1":"アレルギー確認は適切な配慮。","2":"車椅子席の案内は適切。","3":"子供への配慮は適切。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"ランチのピーク時、複数の対応が重なった。優先順位として最も適切なものはどれか。","q_vn":"Giờ cao điểm trưa, nhiều việc dồn cùng lúc. Thứ tự ưu tiên đúng nhất là?","options":[{"jp":"出来上がった料理の提供を優先する","vn":"Ưu tiên bưng món đã làm xong ra cho khách"},{"jp":"新規の注文受けを最優先する","vn":"Ưu tiên nhận order mới nhất"},{"jp":"下げ物を最優先する","vn":"Ưu tiên dọn bát đĩa trước tiên"},{"jp":"レジ精算だけを続ける","vn":"Chỉ tập trung thu ngân"}],"answer":0,"explain_jp":"料理提供は冷めると価値が下がり満足度・リピートに直結するため優先。レジは「少々お待ちください」と声掛けで待ってもらえます。","explain_vn":"Bưng món ưu tiên vì để nguội sẽ giảm giá trị, ảnh hưởng hài lòng và quay lại. Thu ngân có thể xin khách chờ một chút.","why_wrong":{"1":"注文受けは料理提供より後でよい。","2":"下げ物は優先度が低い。","3":"レジだけに固執するのは不適切。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"料理から髪の毛が見つかったとお客様から申告があった。最も適切な初期対応はどれか。","q_vn":"Khách báo có tóc trong món ăn. Cách xử lý ban đầu đúng nhất là?","options":[{"jp":"すぐに謝罪し、作り直してよいか確認して迅速に対応する","vn":"Xin lỗi ngay, hỏi khách có làm lại món không và xử lý nhanh"},{"jp":"お客様の思い違いだと説明する","vn":"Giải thích là khách nhầm"},{"jp":"見なかったことにする","vn":"Coi như không thấy"},{"jp":"後で対応すると伝えて放置する","vn":"Nói để sau rồi bỏ mặc"}],"answer":0,"explain_jp":"異物混入で最も多いのは髪の毛です。まず謝罪し、作り直しの要否を確認して迅速・誠実に対応し、責任者へ報告します。","explain_vn":"Dị vật thường gặp nhất là tóc. Trước tiên xin lỗi, hỏi có làm lại không, xử lý nhanh và trung thực, báo người phụ trách.","why_wrong":{"1":"思い違い扱いは不誠実で不適切。","2":"無視は信頼を失う。","3":"放置は不満を拡大させる。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"店内でお客様が突然倒れ、意識がない。最も適切な対応はどれか。","q_vn":"Khách bất ngờ ngã trong quán, bất tỉnh. Cách xử lý đúng nhất là?","options":[{"jp":"すぐに救急車を呼び、むやみに抱き起こさず必要ならAEDを使う","vn":"Gọi cấp cứu ngay, không tùy tiện đỡ dậy, dùng AED nếu cần"},{"jp":"すぐに立たせて歩かせる","vn":"Lập tức đỡ đứng dậy và cho đi lại"},{"jp":"水を飲ませて様子を見る","vn":"Cho uống nước rồi chờ xem"},{"jp":"営業を優先し放置する","vn":"Ưu tiên buôn bán, để mặc khách"}],"answer":0,"explain_jp":"意識がない場合はすぐ救急車を呼び、むやみに抱き起こさないこと。心停止の疑いがあればAEDを使用します。日頃からAED訓練を行います。","explain_vn":"Nếu bất tỉnh, gọi cấp cứu ngay, không tùy tiện đỡ dậy; nghi ngừng tim thì dùng AED. Nên tập huấn AED định kỳ.","why_wrong":{"1":"意識不明者を立たせるのは危険。","2":"水を飲ませるのは誤嚥の危険。","3":"放置は許されない。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"割引券をお客様に渡すタイミングとして、販売促進の効果が高いのはどれか。","q_vn":"Thời điểm đưa phiếu giảm giá nào có hiệu quả xúc tiến bán hàng cao?","options":[{"jp":"次回来店を促すため、レジ精算時に渡す","vn":"Đưa lúc thanh toán để khuyến khích lần sau quay lại"},{"jp":"来店時にすぐ渡す","vn":"Vừa vào quán đưa ngay"},{"jp":"注文を受ける前に渡す","vn":"Đưa trước khi nhận order"},{"jp":"料理提供と同時に渡す","vn":"Đưa cùng lúc bưng món"}],"answer":0,"explain_jp":"割引券はレジ精算時に渡すと次回来店の動機づけになります。来店時に渡すと単なる当日の値引きになりがちで再来店効果が薄れます。","explain_vn":"Đưa phiếu lúc thanh toán tạo động lực quay lại lần sau. Đưa ngay khi vào dễ thành giảm giá ngày đó, ít hiệu quả kéo khách lại.","why_wrong":{"1":"来店時だと当日値引きになりやすい。","2":"注文前は再来店効果が薄い。","3":"提供時は動機づけになりにくい。"}},{"sect":"tenpo","part":"gakka","q_jp":"「粗（荒）利益」の計算式として正しいものはどれか。","q_vn":"Công thức tính 'lãi gộp' đúng là?","options":[{"jp":"売上高 − 原価","vn":"Doanh thu − giá vốn"},{"jp":"売上高 + 原価","vn":"Doanh thu + giá vốn"},{"jp":"原価 − 人件費","vn":"Giá vốn − chi phí nhân sự"},{"jp":"売上高 × 原価率","vn":"Doanh thu × tỷ lệ giá vốn"}],"answer":0,"explain_jp":"粗（荒）利益＝売上高−原価。また原価率＋荒利益率＝100%の関係があります。","explain_vn":"Lãi gộp = doanh thu − giá vốn. Ngoài ra: tỷ lệ giá vốn + tỷ lệ lãi gộp = 100%.","why_wrong":{"1":"加算ではなく減算。","2":"人件費を引く式ではない。","3":"それは原価高の求め方に近く荒利益の定義ではない。"}},{"sect":"tenpo","part":"gakka","q_jp":"「原価率」と「荒利益率」の関係として正しいものはどれか。","q_vn":"Quan hệ giữa 'tỷ lệ giá vốn' và 'tỷ lệ lãi gộp' đúng là?","options":[{"jp":"原価率 + 荒利益率 = 100%","vn":"Tỷ lệ giá vốn + tỷ lệ lãi gộp = 100%"},{"jp":"原価率 − 荒利益率 = 100%","vn":"Tỷ lệ giá vốn − tỷ lệ lãi gộp = 100%"},{"jp":"原価率 × 荒利益率 = 100%","vn":"Tỷ lệ giá vốn × tỷ lệ lãi gộp = 100%"},{"jp":"原価率 = 荒利益率","vn":"Tỷ lệ giá vốn = tỷ lệ lãi gộp"}],"answer":0,"explain_jp":"売上を100%としたとき、原価率と荒利益率を合わせると100%になります。原価率32%なら荒利益率は68%です。","explain_vn":"Lấy doanh thu là 100%, tỷ lệ giá vốn + tỷ lệ lãi gộp = 100%. Nếu giá vốn 32% thì lãi gộp 68%.","why_wrong":{"1":"引き算の関係ではない。","2":"掛け算の関係ではない。","3":"両者は等しくない。"}},{"sect":"tenpo","part":"gakka","q_jp":"「労働分配率」の適正値の目安として正しいものはどれか。","q_vn":"Mốc hợp lý của 'tỷ lệ phân phối lao động' là?","options":[{"jp":"おおむね35〜40%","vn":"Khoảng 35–40%"},{"jp":"おおむね5〜10%","vn":"Khoảng 5–10%"},{"jp":"おおむね70〜80%","vn":"Khoảng 70–80%"},{"jp":"おおむね90%以上","vn":"Khoảng ≥90%"}],"answer":0,"explain_jp":"労働分配率＝人件費÷粗利益。適正値の目安はおおむね35〜40%です。高すぎると利益を圧迫します。","explain_vn":"Tỷ lệ phân phối lao động = chi phí nhân sự ÷ lãi gộp. Mốc hợp lý khoảng 35–40%. Quá cao sẽ bào mòn lợi nhuận.","why_wrong":{"1":"5〜10%は低すぎる目安で誤り。","2":"70〜80%は高すぎる。","3":"90%以上は経営を圧迫する水準。"}},{"sect":"tenpo","part":"gakka","q_jp":"検収（検品収納）で確認すべき3つの事項に含まれないものはどれか。","q_vn":"Trong 3 việc cần kiểm khi nghiệm thu hàng, việc nào KHÔNG thuộc?","options":[{"jp":"お客様の来店予約数","vn":"Số lượng khách đặt bàn"},{"jp":"発注した数量","vn":"Số lượng đã đặt hàng"},{"jp":"納品書の数量","vn":"Số lượng trên phiếu giao hàng"},{"jp":"現品の数量と品質","vn":"Số lượng và chất lượng hàng thực nhận"}],"answer":0,"explain_jp":"検収では、発注数量・納品書の数量・現品の数量と品質の3つを照合します。来店予約数は検収の項目ではありません。","explain_vn":"Nghiệm thu đối chiếu 3 việc: số đã đặt, số trên phiếu giao, số/chất lượng hàng thực nhận. Số khách đặt bàn không liên quan.","why_wrong":{"1":"発注数量は確認事項。","2":"納品書の数量は確認事項。","3":"現品の数量・品質は確認事項。"}},{"sect":"tenpo","part":"gakka","q_jp":"在庫管理について、過剰在庫がもたらす問題として正しいものはどれか。","q_vn":"Về quản lý tồn kho, vấn đề do tồn kho quá mức gây ra là?","options":[{"jp":"品質劣化によるロスや資金繰りの悪化","vn":"Hao hụt do giảm chất lượng và xấu dòng tiền"},{"jp":"販売機会の損失（チャンスロス）","vn":"Mất cơ hội bán hàng (chance loss)"},{"jp":"原価率の低下","vn":"Giảm tỷ lệ giá vốn"},{"jp":"客単価の上昇","vn":"Tăng đơn giá bình quân khách"}],"answer":0,"explain_jp":"過剰在庫は品質劣化によるロスや資金繰り悪化を招きます。逆に品切れは販売機会の損失（チャンスロス）になります。","explain_vn":"Tồn quá nhiều gây hao hụt do xuống chất lượng và xấu dòng tiền. Ngược lại hết hàng gây mất cơ hội bán (chance loss).","why_wrong":{"1":"チャンスロスは品切れ側の問題。","2":"原価率低下とは直接結びつかない。","3":"客単価上昇とは無関係。"}},{"sect":"tenpo","part":"gakka","q_jp":"人材育成の「OJT」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'OJT' trong đào tạo nhân sự là?","options":[{"jp":"現場で実地に、マンツーマンで訓練すること","vn":"Đào tạo thực tế tại hiện trường, kèm 1–1"},{"jp":"座学で理念や知識を集合教育すること","vn":"Học lý thuyết/kiến thức theo lớp tập trung"},{"jp":"外部セミナーに一斉参加すること","vn":"Cùng tham gia hội thảo bên ngoài"},{"jp":"マニュアルを配るだけのこと","vn":"Chỉ phát tài liệu hướng dẫn"}],"answer":0,"explain_jp":"OJT（On the Job Training）は現場で実地に、マンツーマンで行う訓練。理念・知識の集合教育はOFF-JTです。","explain_vn":"OJT là đào tạo thực tế tại chỗ, kèm 1–1. Học lý thuyết/kiến thức theo lớp là OFF-JT.","why_wrong":{"1":"集合教育はOFF-JT。","2":"外部セミナーはOFF-JT寄り。","3":"配布だけは訓練とは言えない。"}},{"sect":"tenpo","part":"gakka","q_jp":"防火管理について、燃焼の三要素として正しい組み合わせはどれか。","q_vn":"Về phòng cháy, 3 yếu tố của sự cháy là?","options":[{"jp":"可燃物・酸素・熱源","vn":"Chất cháy · Oxy · Nguồn nhiệt"},{"jp":"水・空気・光","vn":"Nước · Không khí · Ánh sáng"},{"jp":"煙・音・振動","vn":"Khói · Âm thanh · Rung động"},{"jp":"塩・砂糖・油","vn":"Muối · Đường · Dầu"}],"answer":0,"explain_jp":"燃焼の三要素は可燃物・酸素・熱源。いずれかを取り除くこと（除去・窒息・冷却）が消火の基本です。","explain_vn":"3 yếu tố cháy: chất cháy, oxy, nguồn nhiệt. Loại bỏ một trong số đó (cách ly, làm ngạt, làm mát) là cách dập cháy cơ bản.","why_wrong":{"1":"水・空気・光は三要素ではない。","2":"煙・音・振動は関係ない。","3":"調味料は無関係。"}},{"sect":"tenpo","part":"gakka","q_jp":"労働時間について、原則として正しいものはどれか（一般的な場合）。","q_vn":"Về thời giờ làm việc, nguyên tắc đúng (trường hợp thông thường) là?","options":[{"jp":"1日8時間・週40時間が原則","vn":"Nguyên tắc 8 giờ/ngày, 40 giờ/tuần"},{"jp":"1日12時間・週60時間が原則","vn":"12 giờ/ngày, 60 giờ/tuần"},{"jp":"1日6時間・週30時間が原則","vn":"6 giờ/ngày, 30 giờ/tuần"},{"jp":"上限はない","vn":"Không có giới hạn"}],"answer":0,"explain_jp":"法定労働時間は原則1日8時間・週40時間。常時10人未満の飲食店では週44時間まで認められる特例があります。","explain_vn":"Thời giờ làm việc theo luật: 8 giờ/ngày, 40 giờ/tuần. Nhà hàng thường xuyên dưới 10 người được ngoại lệ tới 44 giờ/tuần.","why_wrong":{"1":"12時間・60時間は原則ではない。","2":"6時間・30時間は原則ではない。","3":"上限がないは誤り。"}},{"sect":"tenpo","part":"gakka","q_jp":"ABC分析で、売上構成比の累計が70%までに入る商品の区分はどれか。","q_vn":"Trong phân tích ABC, nhóm hàng nằm trong lũy kế tới 70% doanh thu là nhóm nào?","options":[{"jp":"A","vn":"Nhóm A"},{"jp":"B","vn":"Nhóm B"},{"jp":"C","vn":"Nhóm C"},{"jp":"D","vn":"Nhóm D"}],"answer":0,"explain_jp":"ABC分析では売上の高い順に累計し、70%まで＝A、70〜90%＝B、90〜100%＝C。Cは改定で外す検討対象になります。","explain_vn":"Phân tích ABC: cộng dồn theo doanh thu giảm dần; tới 70% = A, 70–90% = B, 90–100% = C. Nhóm C là đối tượng cân nhắc loại bỏ.","why_wrong":{"1":"Bは70〜90%の区分。","2":"Cは90〜100%の区分。","3":"Dの区分はない。"}},{"sect":"tenpo","part":"gakka","q_jp":"時間帯責任者の役割として正しいものはどれか。","q_vn":"Vai trò của 'người phụ trách theo ca' đúng là?","options":[{"jp":"その時間帯において店長の職務を代行する","vn":"Thay mặt cửa hàng trưởng thực hiện nhiệm vụ trong ca đó"},{"jp":"調理だけを担当する","vn":"Chỉ phụ trách nấu ăn"},{"jp":"清掃だけを担当する","vn":"Chỉ phụ trách dọn dẹp"},{"jp":"来客の案内だけを担当する","vn":"Chỉ phụ trách hướng dẫn khách"}],"answer":0,"explain_jp":"時間帯責任者は、その時間帯において店長の職務を代行する店舗責任者です。","explain_vn":"Người phụ trách theo ca là người thay cửa hàng trưởng đảm nhận nhiệm vụ trong khung giờ đó.","why_wrong":{"1":"調理だけではない。","2":"清掃だけではない。","3":"案内だけではない。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"ある日の売上が300,000円、その日の総労働時間が50時間だった。人時売上高はいくらか。","q_vn":"Doanh thu một ngày là 300.000 yên, tổng giờ lao động là 50 giờ. Doanh thu/giờ-người là?","options":[{"jp":"6,000円","vn":"6.000 yên"},{"jp":"600円","vn":"600 yên"},{"jp":"15,000円","vn":"15.000 yên"},{"jp":"3,000円","vn":"3.000 yên"}],"answer":0,"explain_jp":"人時売上高＝1日の売上高÷総労働時間＝300,000÷50＝6,000円。目安の最低5,000円以上を満たしています。","explain_vn":"Doanh thu/giờ-người = doanh thu ÷ tổng giờ lao động = 300.000 ÷ 50 = 6.000 yên, đạt mốc tối thiểu 5.000 yên.","why_wrong":{"1":"600円は桁の誤り。","2":"15,000円は割り方を誤っている。","3":"3,000円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"人件費が80,000円、粗利益が200,000円のとき、労働分配率はいくらか。","q_vn":"Chi phí nhân sự 80.000 yên, lãi gộp 200.000 yên. Tỷ lệ phân phối lao động là?","options":[{"jp":"40%","vn":"40%"},{"jp":"25%","vn":"25%"},{"jp":"60%","vn":"60%"},{"jp":"250%","vn":"250%"}],"answer":0,"explain_jp":"労働分配率＝人件費÷粗利益＝80,000÷200,000＝40%。適正値（35〜40%）の範囲内です。","explain_vn":"Tỷ lệ phân phối lao động = chi phí nhân sự ÷ lãi gộp = 80.000 ÷ 200.000 = 40%, nằm trong mốc hợp lý 35–40%.","why_wrong":{"1":"25%は計算違い。","2":"60%は計算違い。","3":"250%は分母分子を逆にした誤り。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"売価600円のハンバーグの原価が190円のとき、原価率に最も近いものはどれか。","q_vn":"Món hamburger bán 600 yên, giá vốn 190 yên. Tỷ lệ giá vốn gần nhất là?","options":[{"jp":"約31.7%","vn":"Khoảng 31,7%"},{"jp":"約19.0%","vn":"Khoảng 19,0%"},{"jp":"約68.3%","vn":"Khoảng 68,3%"},{"jp":"約41.0%","vn":"Khoảng 41,0%"}],"answer":0,"explain_jp":"原価率＝原価÷売価×100＝190÷600×100≒31.7%。荒利益は600−190＝410円、荒利益率は約68.3%です。","explain_vn":"Tỷ lệ giá vốn = giá vốn ÷ giá bán ×100 = 190 ÷ 600 ×100 ≈ 31,7%. Lãi gộp = 600−190 = 410 yên, tỷ lệ lãi gộp ≈ 68,3%.","why_wrong":{"1":"19.0%は売価と混同した誤り。","2":"68.3%は荒利益率の値。","3":"41.0%は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"1品平均単価400円、1人あたりの注文点数が平均3点のとき、客単価はいくらか。","q_vn":"Đơn giá bình quân 1 món 400 yên, mỗi khách gọi trung bình 3 món. Đơn giá bình quân/khách là?","options":[{"jp":"1,200円","vn":"1.200 yên"},{"jp":"400円","vn":"400 yên"},{"jp":"133円","vn":"133 yên"},{"jp":"4,000円","vn":"4.000 yên"}],"answer":0,"explain_jp":"客単価＝注文点数×一品平均単価＝3×400＝1,200円。売上＝客数×客単価で求められます。","explain_vn":"Đơn giá/khách = số món × đơn giá bình quân món = 3 × 400 = 1.200 yên. Doanh thu = số khách × đơn giá/khách.","why_wrong":{"1":"400円は1品分のみ。","2":"133円は割り算にした誤り。","3":"4,000円は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"前月末棚卸50,000円、当月仕入350,000円、当月末棚卸40,000円、当月売上1,200,000円のとき、実際原価率はいくらか。","q_vn":"Tồn cuối tháng trước 50.000, mua trong tháng 350.000, tồn cuối tháng này 40.000, doanh thu tháng 1.200.000 yên. Tỷ lệ giá vốn thực tế là?","options":[{"jp":"30%","vn":"30%"},{"jp":"35%","vn":"35%"},{"jp":"25%","vn":"25%"},{"jp":"33%","vn":"33%"}],"answer":0,"explain_jp":"実際原価＝50,000+350,000−40,000＝360,000円。実際原価率＝360,000÷1,200,000×100＝30%。","explain_vn":"Giá vốn thực = 50.000 + 350.000 − 40.000 = 360.000 yên. Tỷ lệ giá vốn thực = 360.000 ÷ 1.200.000 ×100 = 30%.","why_wrong":{"1":"35%は棚卸の加減を誤った値。","2":"25%は計算違い。","3":"33%は概算の誤り。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"実際原価率が31%、標準原価率が30%だった。原価率差異の評価として正しいものはどれか（基準±0.5%）。","q_vn":"Tỷ lệ giá vốn thực 31%, tiêu chuẩn 30%. Đánh giá chênh lệch đúng là (chuẩn ±0,5%)?","options":[{"jp":"差異は+1%で基準を超えており、ロスが発生している","vn":"Chênh +1%, vượt chuẩn, đang có hao hụt (loss)"},{"jp":"差異は−1%で問題ない","vn":"Chênh −1%, không vấn đề"},{"jp":"差異は0%で完全に一致している","vn":"Chênh 0%, khớp hoàn toàn"},{"jp":"基準内なので対策は不要","vn":"Trong chuẩn nên không cần xử lý"}],"answer":0,"explain_jp":"原価率差異＝実際−標準＝31−30＝+1%。基準±0.5%を超えており、ポーション超過や廃棄・棚卸ミスなどロスの発生が疑われます。","explain_vn":"Chênh lệch = thực − tiêu chuẩn = 31 − 30 = +1%. Vượt chuẩn ±0,5%, nghi có hao hụt (vượt định lượng, bỏ phí, sai kiểm kê).","why_wrong":{"1":"差異は+1%であり−1%ではない。","2":"0%ではない。","3":"基準を超えているので対策が必要。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"月間売上予算が9,000,000円、目標の人時売上高を6,000円とするとき、月間計画総労働時間はおよそ何時間か。","q_vn":"Ngân sách doanh thu tháng 9.000.000 yên, mục tiêu doanh thu/giờ-người 6.000 yên. Tổng giờ lao động kế hoạch tháng khoảng bao nhiêu?","options":[{"jp":"1,500時間","vn":"1.500 giờ"},{"jp":"150時間","vn":"150 giờ"},{"jp":"54,000時間","vn":"54.000 giờ"},{"jp":"600時間","vn":"600 giờ"}],"answer":0,"explain_jp":"月間計画総労働時間＝月間売上予算÷人時売上高＝9,000,000÷6,000＝1,500時間。","explain_vn":"Tổng giờ lao động kế hoạch = ngân sách doanh thu ÷ doanh thu/giờ-người = 9.000.000 ÷ 6.000 = 1.500 giờ.","why_wrong":{"1":"150時間は桁の誤り。","2":"54,000時間は掛け算にした誤り。","3":"600時間は計算違い。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"労働時間が8時間を超える勤務の場合、与えるべき休憩時間として正しいものはどれか。","q_vn":"Khi làm việc quá 8 giờ, thời gian nghỉ phải bố trí đúng là?","options":[{"jp":"少なくとも60分","vn":"Ít nhất 60 phút"},{"jp":"少なくとも30分","vn":"Ít nhất 30 phút"},{"jp":"少なくとも15分","vn":"Ít nhất 15 phút"},{"jp":"休憩は不要","vn":"Không cần nghỉ"}],"answer":0,"explain_jp":"休憩は労働時間が6時間を超える場合45分以上、8時間を超える場合は60分以上を労働時間の途中に与えます。","explain_vn":"Nghỉ giải lao: quá 6 giờ thì ≥45 phút, quá 8 giờ thì ≥60 phút, bố trí trong giờ làm.","why_wrong":{"1":"30分は6時間超の水準で8時間超には不足。","2":"15分は法定に満たない。","3":"休憩は必要。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"深夜（22時〜翌5時）に労働させた場合の割増賃金の最低率として正しいものはどれか。","q_vn":"Làm ban đêm (22h–5h sáng), mức phụ cấp tối thiểu đúng là?","options":[{"jp":"25%以上","vn":"Từ 25% trở lên"},{"jp":"10%以上","vn":"Từ 10% trở lên"},{"jp":"50%以上","vn":"Từ 50% trở lên"},{"jp":"割増は不要","vn":"Không cần phụ cấp"}],"answer":0,"explain_jp":"深夜労働（22時〜5時）は25%以上の割増。時間外労働も25%以上で、時間外かつ深夜は合わせて50%以上になります。","explain_vn":"Làm đêm (22h–5h) phụ cấp ≥25%. Làm thêm giờ cũng ≥25%; vừa làm thêm vừa ban đêm cộng lại ≥50%.","why_wrong":{"1":"10%は法定率に満たない。","2":"50%は時間外＋深夜が重なる場合の率。","3":"割増は必要。"}},{"sect":"tenpo","part":"jitsugi","q_jp":"年次有給休暇について、一般の労働者に付与される要件として正しいものはどれか。","q_vn":"Về nghỉ phép năm có lương, điều kiện phát sinh cho lao động thông thường đúng là?","options":[{"jp":"雇入れの日から6か月継続勤務し、全労働日の8割以上出勤したとき","vn":"Làm liên tục 6 tháng từ ngày vào làm và đi làm ≥80% số ngày công"},{"jp":"入社初日から自動的に20日付与される","vn":"Ngay ngày đầu tự động được 20 ngày"},{"jp":"1年勤務しないと一切付与されない","vn":"Chưa đủ 1 năm thì không được ngày nào"},{"jp":"出勤率に関係なく付与される","vn":"Được cấp bất kể tỷ lệ đi làm"}],"answer":0,"explain_jp":"年次有給休暇は、雇入れから6か月継続勤務し全労働日の8割以上出勤で発生します。一般労働者は6か月で10日付与され、10日以上付与される者は年5日の取得義務があります。","explain_vn":"Nghỉ phép năm phát sinh khi làm liên tục 6 tháng và đi làm ≥80% ngày công. Lao động thường được 10 ngày ở mốc 6 tháng; ai được cấp ≥10 ngày phải nghỉ ít nhất 5 ngày/năm.","why_wrong":{"1":"初日から20日ではない。","2":"6か月で発生するため1年不要。","3":"8割以上の出勤要件がある。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"「おもてなし（ホスピタリティ）」を実現するうえで最も大切な考え方はどれか。","q_vn":"Để hiện thực hóa 'omotenashi (lòng hiếu khách)', tư duy quan trọng nhất là gì?","options":[{"jp":"お客様への配慮や気づかいという「おもてなしの心」を持つ","vn":"Có 'tấm lòng hiếu khách' — sự quan tâm, để ý đến khách"},{"jp":"できるだけ早く帰ってもらう","vn":"Làm sao cho khách về càng nhanh càng tốt"},{"jp":"必要最低限の会話だけにする","vn":"Chỉ nói chuyện ở mức tối thiểu"},{"jp":"料金を高く見せる","vn":"Làm cho giá trông đắt hơn"}],"answer":0,"explain_jp":"おもてなしを実現するには、お客様への配慮や気づかいといった「おもてなしの心」が土台になります。","explain_vn":"Omotenashi bắt nguồn từ 'tấm lòng hiếu khách' — sự quan tâm và để ý đến khách.","why_wrong":{"1":"早く帰す発想はおもてなしではない。","2":"会話を削ることが目的ではない。","3":"料金を高く見せることとは無関係。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"接客用語を使う目的として最も適切なものはどれか。","q_vn":"Mục đích của việc dùng 'thuật ngữ tiếp khách' phù hợp nhất là?","options":[{"jp":"お客様と意思疎通を図り、歓迎や要望対応の気持ちを伝えること","vn":"Giao tiếp với khách, truyền đạt sự chào đón và sẵn sàng đáp ứng"},{"jp":"難しい言葉で店の格を上げること","vn":"Dùng từ khó để nâng đẳng cấp quán"},{"jp":"できるだけ声を小さくすること","vn":"Cố nói càng nhỏ càng tốt"},{"jp":"お客様を急かすこと","vn":"Thúc giục khách"}],"answer":0,"explain_jp":"接客用語はお客様とのコミュニケーションの手段で、歓迎の気持ちを伝え、要望を聞き対応することが目的です。丁寧な言葉遣い（敬語）も大切です。","explain_vn":"Thuật ngữ tiếp khách là phương tiện giao tiếp, nhằm truyền sự chào đón, lắng nghe và đáp ứng nhu cầu. Cách nói lịch sự (kính ngữ) cũng quan trọng.","why_wrong":{"1":"格を上げるためではない。","2":"声を小さくするのは逆効果。","3":"急かすのは不適切。"}},{"sect":"sekkyaku","part":"gakka","q_jp":"お客様に配膳（サービング）するときの配慮として適切なものはどれか。","q_vn":"Khi bưng món phục vụ, sự để ý phù hợp là?","options":[{"jp":"同じテーブルの料理はできるだけ同時に提供する","vn":"Cùng một bàn thì bưng các món ra gần như đồng thời"},{"jp":"作れた順にバラバラに提供する","vn":"Món nào xong trước bưng trước, rời rạc"},{"jp":"最後に来た人から提供する","vn":"Phục vụ người đến sau cùng trước"},{"jp":"料理を長く温蔵してからまとめて出す","vn":"Giữ nóng thật lâu rồi bưng ra một lượt"}],"answer":0,"explain_jp":"同じテーブルのお客様にはできるだけ同時に提供し、子供の料理を先に出すなどの配慮をします。適正な温度・時間での提供が大切です。","explain_vn":"Cùng bàn nên bưng gần như đồng thời, ưu tiên món của trẻ nhỏ trước. Phục vụ đúng nhiệt độ và kịp thời gian là quan trọng.","why_wrong":{"1":"バラバラ提供は不満のもと。","2":"順番の配慮を欠く。","3":"温蔵しすぎは品質低下を招く。"}},{"sect":"sekkyaku","part":"jitsugi","q_jp":"夜間、レジの売上金を金庫に入れる作業を行う。防犯上、最も適切な方法はどれか。","q_vn":"Ban đêm, cất tiền doanh thu vào két. Về an ninh, cách đúng nhất là?","options":[{"jp":"必ず二人以上で行う","vn":"Luôn thực hiện với từ hai người trở lên"},{"jp":"一人で素早く行う","vn":"Một người làm thật nhanh"},{"jp":"店の入口を開けたまま行う","vn":"Mở cửa ra vào rồi làm"},{"jp":"翌朝まで放置する","vn":"Để đến sáng hôm sau"}],"answer":0,"explain_jp":"夜間金庫への現金取り扱いは防犯上、必ず二人以上で行います。ロール上の金額と実際の現金の一致も確認します。","explain_vn":"Xử lý tiền mặt vào két ban đêm phải có từ 2 người vì lý do an ninh. Cần đối chiếu số trên cuộn giấy với tiền thực tế.","why_wrong":{"1":"一人での取り扱いは防犯上危険。","2":"入口を開けたままは危険。","3":"放置は紛失・盗難のリスク。"}},{"sect":"chori","part":"gakka","q_jp":"和牛のうち、脂肪交雑（サシ）に優れ全体の大半を占める品種はどれか。","q_vn":"Trong bò Wagyu, giống có vân mỡ (sashi) tốt và chiếm đa số là?","options":[{"jp":"黒毛和種","vn":"Kuroge (bò lông đen)"},{"jp":"褐毛和種","vn":"Akage (bò lông nâu)"},{"jp":"日本短角種","vn":"Nihon Tankaku"},{"jp":"無角和種","vn":"Mukaku (không sừng)"}],"answer":0,"explain_jp":"和牛4品種のうち黒毛和種が95%以上を占め、脂肪交雑（サシ）に優れています。","explain_vn":"Trong 4 giống Wagyu, Kuroge chiếm hơn 95% và có vân mỡ (sashi) vượt trội.","why_wrong":{"1":"褐毛和種は主流ではない。","2":"日本短角種は少数。","3":"無角和種は少数。"}},{"sect":"chori","part":"gakka","q_jp":"食品添加物の用途として適切でないものはどれか。","q_vn":"Đâu KHÔNG phải công dụng của phụ gia thực phẩm?","options":[{"jp":"food在庫の発注量を自動計算する","vn":"Tự động tính lượng đặt hàng tồn kho"},{"jp":"保存料として保存性を高める","vn":"Làm chất bảo quản để giữ lâu"},{"jp":"着色料として色をつける","vn":"Làm chất tạo màu"},{"jp":"甘味料として甘みをつける","vn":"Làm chất tạo ngọt"}],"answer":0,"explain_jp":"食品添加物の用途は甘味料・着色料・保存料・酸化防止剤・香料などです。発注量の計算は添加物の用途ではありません。","explain_vn":"Công dụng phụ gia: tạo ngọt, tạo màu, bảo quản, chống oxy hóa, tạo hương... Tính lượng đặt hàng không phải công dụng của phụ gia.","why_wrong":{"1":"保存料は正しい用途。","2":"着色料は正しい用途。","3":"甘味料は正しい用途。"}},{"sect":"chori","part":"jitsugi","q_jp":"下処理中に食材の微生物を「増やさない・二次汚染させない」ために適切な行動はどれか。","q_vn":"Trong lúc sơ chế, để 'không làm vi sinh tăng và không nhiễm chéo', hành động đúng là?","options":[{"jp":"手洗い後に使い捨て手袋を使い、洗浄済みの器具を用いる","vn":"Rửa tay rồi đeo găng dùng một lần, dùng dụng cụ đã rửa sạch"},{"jp":"素手のまま複数の食材を続けて扱う","vn":"Để tay trần xử lý liên tục nhiều loại thực phẩm"},{"jp":"常温で長く放置しながら作業する","vn":"Vừa để nhiệt độ phòng lâu vừa làm"},{"jp":"同じ器具を洗わず使い回す","vn":"Dùng chung dụng cụ không rửa"}],"answer":0,"explain_jp":"和える・混ぜるなどの非加熱作業は交差汚染リスクが高いため、手洗い後に使い捨て手袋を使い、洗浄済みの器具を用います。","explain_vn":"Các thao tác không gia nhiệt (trộn, bóp) dễ nhiễm chéo, nên rửa tay rồi đeo găng dùng một lần và dùng dụng cụ đã rửa sạch.","why_wrong":{"1":"素手で続けると二次汚染しやすい。","2":"常温放置は菌を増やす。","3":"洗わず使い回すのは二次汚染の原因。"}},{"sect":"eisei","part":"gakka","q_jp":"サルモネラ菌による食中毒の主な原因食品はどれか。","q_vn":"Thực phẩm nguyên nhân chính gây ngộ độc Salmonella là gì?","options":[{"jp":"鶏卵や食肉","vn":"Trứng gà và thịt"},{"jp":"海産の生魚","vn":"Cá biển sống"},{"jp":"缶詰","vn":"Đồ hộp"},{"jp":"焼き飯","vn":"Cơm chiên"}],"answer":0,"explain_jp":"サルモネラは鶏卵・食肉が主原因で、十分な加熱（中心75℃1分以上）で死滅します。","explain_vn":"Salmonella chủ yếu từ trứng gà và thịt; đun đủ (tâm ≥75℃, ≥1 phút) sẽ diệt được.","why_wrong":{"1":"海産の生魚は腸炎ビブリオの原因。","2":"缶詰はボツリヌス菌に関係。","3":"焼き飯はセレウス菌に関係。"}},{"sect":"eisei","part":"gakka","q_jp":"海産魚介類が原因で、真水や加熱に弱い好塩性の食中毒菌はどれか。","q_vn":"Vi khuẩn ưa mặn, yếu với nước ngọt và nhiệt, từ hải sản là?","options":[{"jp":"腸炎ビブリオ","vn":"Vibrio parahaemolyticus"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"ボツリヌス菌","vn":"Botulinum"},{"jp":"黄色ブドウ球菌","vn":"Tụ cầu vàng"}],"answer":0,"explain_jp":"腸炎ビブリオは海産魚介が原因の好塩菌。真水でよく洗い、加熱すれば防げます。夏に多発します。","explain_vn":"Vibrio là vi khuẩn ưa mặn từ hải sản; rửa kỹ bằng nước ngọt và đun là phòng được. Hay gặp mùa hè.","why_wrong":{"1":"サルモネラは卵・食肉が主。","2":"ボツリヌスは缶詰・真空パック。","3":"黄色ブドウ球菌は手指の傷が原因。"}},{"sect":"eisei","part":"gakka","q_jp":"鶏肉が主な原因で少量でも発症し、ギラン・バレー症候群を起こすことがある菌はどれか。","q_vn":"Vi khuẩn chủ yếu từ thịt gà, phát bệnh dù lượng nhỏ, có thể gây hội chứng Guillain-Barré?","options":[{"jp":"カンピロバクター","vn":"Campylobacter"},{"jp":"腸炎ビブリオ","vn":"Vibrio"},{"jp":"セレウス菌","vn":"Cereus"},{"jp":"ノロウイルス","vn":"Norovirus"}],"answer":0,"explain_jp":"カンピロバクターは鶏肉が主原因で少量発症。加熱に弱いので中心までよく加熱します。","explain_vn":"Campylobacter chủ yếu từ thịt gà, phát bệnh dù ít; yếu với nhiệt nên phải đun chín tới tâm.","why_wrong":{"1":"腸炎ビブリオは海産魚介。","2":"セレウスは焼飯・パスタ。","3":"ノロはウイルスで二枚貝・人から人。"}},{"sect":"eisei","part":"gakka","q_jp":"手指の傷（化膿創）から食品を汚染し、その毒素（エンテロトキシン）が加熱に強い菌はどれか。","q_vn":"Vi khuẩn lây từ vết thương mưng mủ ở tay, độc tố (enterotoxin) chịu nhiệt tốt là?","options":[{"jp":"黄色ブドウ球菌","vn":"Tụ cầu vàng"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"カンピロバクター","vn":"Campylobacter"},{"jp":"腸管出血性大腸菌","vn":"E.coli xuất huyết đường ruột"}],"answer":0,"explain_jp":"黄色ブドウ球菌は手指の傷が原因。毒素は加熱に強いため、菌を「つけない・増やさない」ことが重要です。おにぎり・弁当で多発。","explain_vn":"Tụ cầu vàng từ vết thương ở tay; độc tố chịu nhiệt nên phải 'không để dính, không để tăng'. Hay gặp ở cơm nắm, cơm hộp.","why_wrong":{"1":"サルモネラの毒素は加熱で問題になりにくい。","2":"カンピロバクターは加熱に弱い。","3":"O157は加熱に弱い。"}},{"sect":"eisei","part":"gakka","q_jp":"ベロ毒素を産生し、少量でも感染して溶血性尿毒症症候群（HUS）を起こすことがある菌はどれか。","q_vn":"Vi khuẩn sinh độc tố Vero, lượng nhỏ vẫn nhiễm, có thể gây hội chứng tan máu urê huyết (HUS)?","options":[{"jp":"腸管出血性大腸菌O157","vn":"E.coli O157 xuất huyết đường ruột"},{"jp":"ウエルシュ菌","vn":"Welchii"},{"jp":"セレウス菌","vn":"Cereus"},{"jp":"腸炎ビブリオ","vn":"Vibrio"}],"answer":0,"explain_jp":"O157はベロ毒素を出し少量で感染。生肉・加熱不足が原因で、加熱に弱く中心75℃1分で死滅します。","explain_vn":"O157 sinh độc tố Vero, lượng nhỏ vẫn nhiễm; do thịt sống/đun chưa kỹ, yếu nhiệt (tâm 75℃×1 phút là chết).","why_wrong":{"1":"ウエルシュ菌はベロ毒素を出さない。","2":"セレウスは焼飯型。","3":"腸炎ビブリオは好塩菌。"}},{"sect":"eisei","part":"gakka","q_jp":"冬季に多く、二枚貝（かきなど）や人から人へ感染し、アルコールが効きにくいのはどれか。","q_vn":"Tác nhân hay gặp mùa đông, từ nghêu sò (hàu) hoặc lây người sang người, cồn khó diệt là?","options":[{"jp":"ノロウイルス","vn":"Norovirus"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"黄色ブドウ球菌","vn":"Tụ cầu vàng"},{"jp":"アニサキス","vn":"Anisakis"}],"answer":0,"explain_jp":"ノロウイルスは冬に多く少量で感染。加熱は85〜90℃90秒以上、消毒は次亜塩素酸ナトリウムが有効（アルコールは効きにくい）。","explain_vn":"Norovirus hay gặp mùa đông, lượng nhỏ vẫn nhiễm; đun 85–90℃ ≥90 giây, khử trùng bằng natri hypoclorit (cồn kém hiệu quả).","why_wrong":{"1":"サルモネラは細菌で卵・食肉。","2":"黄色ブドウ球菌は手指の傷。","3":"アニサキスは寄生虫。"}},{"sect":"eisei","part":"gakka","q_jp":"まぐろ・さば・いわしなどの赤身魚で増え、加熱しても分解されずアレルギー様症状を起こす物質はどれか。","q_vn":"Chất sinh ra ở cá thịt đỏ (cá ngừ, cá thu, cá mòi), không bị phân hủy khi đun, gây triệu chứng giống dị ứng là?","options":[{"jp":"ヒスタミン","vn":"Histamine"},{"jp":"ソラニン","vn":"Solanine"},{"jp":"テトロドトキシン","vn":"Tetrodotoxin"},{"jp":"アフラトキシン","vn":"Aflatoxin"}],"answer":0,"explain_jp":"ヒスタミンは赤身魚の不適切な温度管理で増え、加熱でも分解されません。低温保存で予防します。","explain_vn":"Histamine tăng khi cá thịt đỏ bảo quản nhiệt độ không đúng; đun không phân hủy được. Phòng bằng bảo quản lạnh.","why_wrong":{"1":"ソラニンはじゃがいもの芽・緑皮。","2":"テトロドトキシンはフグ毒。","3":"アフラトキシンはカビ毒。"}},{"sect":"eisei","part":"gakka","q_jp":"さば・いか・さんまなどに寄生し、-20℃で24時間以上の冷凍や十分な加熱で対策する寄生虫はどれか。","q_vn":"Ký sinh trùng ở cá thu, mực, cá thu đao; xử lý bằng cấp đông -20℃ ≥24 giờ hoặc đun kỹ là?","options":[{"jp":"アニサキス","vn":"Anisakis"},{"jp":"ノロウイルス","vn":"Norovirus"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"ボツリヌス菌","vn":"Botulinum"}],"answer":0,"explain_jp":"アニサキスは魚介の寄生虫。-20℃24時間以上の冷凍、または60℃1分・70℃以上の加熱、目視除去で対策します。","explain_vn":"Anisakis là ký sinh trùng ở hải sản; xử lý bằng đông -20℃ ≥24 giờ, hoặc đun 60℃×1 phút / ≥70℃, và loại bằng mắt thường.","why_wrong":{"1":"ノロはウイルス。","2":"サルモネラは細菌。","3":"ボツリヌスは細菌。"}},{"sect":"eisei","part":"gakka","q_jp":"缶詰・真空パック・保存食品などの酸素の少ない環境で増え、強い神経毒をつくる菌はどれか。","q_vn":"Vi khuẩn phát triển trong môi trường ít oxy (đồ hộp, hút chân không), sinh độc tố thần kinh mạnh là?","options":[{"jp":"ボツリヌス菌","vn":"Botulinum"},{"jp":"腸炎ビブリオ","vn":"Vibrio"},{"jp":"カンピロバクター","vn":"Campylobacter"},{"jp":"サルモネラ","vn":"Salmonella"}],"answer":0,"explain_jp":"ボツリヌス菌は嫌気性で芽胞をつくり、強い神経毒を産生します。乳児にははちみつを与えないことも重要です。","explain_vn":"Botulinum kỵ khí, tạo bào tử và sinh độc tố thần kinh mạnh. Không cho trẻ sơ sinh ăn mật ong.","why_wrong":{"1":"腸炎ビブリオは好塩・好気寄り。","2":"カンピロバクターは微好気。","3":"サルモネラは嫌気の代表ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"焼き飯やパスタなどを室温に長く置くと増え、嘔吐型の食中毒を起こす芽胞菌はどれか。","q_vn":"Vi khuẩn tạo bào tử, tăng khi cơm chiên/mì để lâu ở nhiệt độ phòng, gây ngộ độc thể nôn là?","options":[{"jp":"セレウス菌","vn":"Bacillus cereus"},{"jp":"サルモネラ","vn":"Salmonella"},{"jp":"腸炎ビブリオ","vn":"Vibrio"},{"jp":"ノロウイルス","vn":"Norovirus"}],"answer":0,"explain_jp":"セレウス菌は米飯・パスタなどで増え、嘔吐型・下痢型があります。芽胞をつくるため、作り置きの室温放置を避けます。","explain_vn":"Cereus tăng ở cơm/mì, có thể thể nôn hoặc tiêu chảy; tạo bào tử nên tránh để món nấu sẵn ở nhiệt độ phòng.","why_wrong":{"1":"サルモネラは卵・食肉。","2":"腸炎ビブリオは海産。","3":"ノロはウイルス。"}},{"sect":"eisei","part":"gakka","q_jp":"まな板やふきん、ノロウイルスの消毒に有効な薬剤はどれか。","q_vn":"Hóa chất khử trùng hiệu quả cho thớt, khăn lau và Norovirus là?","options":[{"jp":"次亜塩素酸ナトリウム","vn":"Natri hypoclorit"},{"jp":"逆性石けんのみ","vn":"Chỉ xà phòng nghịch (cation)"},{"jp":"食塩水","vn":"Nước muối"},{"jp":"砂糖水","vn":"Nước đường"}],"answer":0,"explain_jp":"次亜塩素酸ナトリウムはまな板・ふきん・ノロ対策に有効。手指にはアルコールや逆性石けんを使い分けます。","explain_vn":"Natri hypoclorit hiệu quả cho thớt/khăn và Norovirus; với tay thì dùng cồn hoặc xà phòng cation.","why_wrong":{"1":"逆性石けんは洗浄力が弱く単独では不十分。","2":"食塩水に消毒効果はない。","3":"砂糖水に消毒効果はない。"}},{"sect":"eisei","part":"gakka","q_jp":"手指の消毒に用いるが、ノロウイルスには効果が弱い消毒剤はどれか。","q_vn":"Chất khử trùng dùng cho tay nhưng kém hiệu quả với Norovirus là?","options":[{"jp":"アルコール（消毒用エタノール）","vn":"Cồn (ethanol khử trùng)"},{"jp":"次亜塩素酸ナトリウム","vn":"Natri hypoclorit"},{"jp":"煮沸","vn":"Đun sôi"},{"jp":"熱湯","vn":"Nước sôi"}],"answer":0,"explain_jp":"アルコールは手指・器具の消毒に有効ですが、ノロウイルスには効果が弱いため、ノロ対策は次亜塩素酸や加熱を用います。","explain_vn":"Cồn hiệu quả cho tay/dụng cụ nhưng kém với Norovirus; với Norovirus dùng hypoclorit hoặc nhiệt.","why_wrong":{"1":"次亜塩素酸はノロに有効。","2":"煮沸はノロに有効。","3":"熱湯（加熱）はノロに有効。"}},{"sect":"eisei","part":"gakka","q_jp":"冷蔵庫内の温度管理として一般的な目安はどれか。","q_vn":"Mốc nhiệt độ chung của tủ lạnh là?","options":[{"jp":"10℃以下（望ましくは5℃以下）","vn":"≤10℃ (nên ≤5℃)"},{"jp":"15〜20℃","vn":"15–20℃"},{"jp":"25℃前後","vn":"Khoảng 25℃"},{"jp":"30℃以上","vn":"≥30℃"}],"answer":0,"explain_jp":"冷蔵は10℃以下（望ましくは5℃以下）、冷凍は-15℃以下（望ましくは-18℃以下）が目安です。","explain_vn":"Bảo quản lạnh ≤10℃ (nên ≤5℃), đông lạnh ≤-15℃ (nên ≤-18℃).","why_wrong":{"1":"15〜20℃は危険温度帯。","2":"25℃は危険温度帯。","3":"30℃は最も細菌が増える。"}},{"sect":"eisei","part":"gakka","q_jp":"冷凍庫内の温度管理として一般的な目安はどれか。","q_vn":"Mốc nhiệt độ chung của tủ đông là?","options":[{"jp":"-15℃以下（望ましくは-18℃以下）","vn":"≤-15℃ (nên ≤-18℃)"},{"jp":"0℃前後","vn":"Khoảng 0℃"},{"jp":"5℃以下","vn":"≤5℃"},{"jp":"-5℃前後","vn":"Khoảng -5℃"}],"answer":0,"explain_jp":"冷凍は-15℃以下、望ましくは-18℃以下に保ちます。0℃や-5℃では凍結・保存が不十分です。","explain_vn":"Đông lạnh giữ ≤-15℃, nên ≤-18℃. 0℃ hay -5℃ thì đông/bảo quản chưa đủ.","why_wrong":{"1":"0℃前後は冷蔵〜チルド帯。","2":"5℃以下は冷蔵帯。","3":"-5℃では凍結が不十分。"}},{"sect":"eisei","part":"gakka","q_jp":"厨房を汚染度で分ける「作業区域（ゾーニング）」で、検収や下処理を行うのはどの区域か。","q_vn":"Trong phân vùng bếp theo mức nhiễm bẩn, nghiệm thu và sơ chế thuộc vùng nào?","options":[{"jp":"汚染作業区域","vn":"Vùng thao tác nhiễm bẩn"},{"jp":"清潔作業区域","vn":"Vùng thao tác sạch"},{"jp":"準清潔作業区域","vn":"Vùng bán sạch"},{"jp":"提供区域","vn":"Vùng phục vụ"}],"answer":0,"explain_jp":"検収・下処理・洗浄は汚染作業区域、加熱調理は準清潔作業区域、盛付・製品保管は清潔作業区域に分けます。","explain_vn":"Nghiệm thu, sơ chế, rửa ở vùng nhiễm bẩn; nấu ở vùng bán sạch; bày món/bảo quản thành phẩm ở vùng sạch.","why_wrong":{"1":"清潔作業区域は盛付・保管。","2":"準清潔は加熱調理。","3":"提供区域は区分の名称として不適。"}},{"sect":"eisei","part":"gakka","q_jp":"盛り付けや製品の一時保管を行うのはどの作業区域か。","q_vn":"Bày món và bảo quản tạm thành phẩm thuộc vùng thao tác nào?","options":[{"jp":"清潔作業区域","vn":"Vùng thao tác sạch"},{"jp":"汚染作業区域","vn":"Vùng nhiễm bẩn"},{"jp":"準清潔作業区域","vn":"Vùng bán sạch"},{"jp":"検収区域","vn":"Vùng nghiệm thu"}],"answer":0,"explain_jp":"盛付・製品保管は最も清潔さが求められる清潔作業区域で行います。区域間の交差を避け二次汚染を防ぎます。","explain_vn":"Bày món/bảo quản thành phẩm ở vùng sạch nhất; tránh giao thoa giữa các vùng để chống nhiễm chéo.","why_wrong":{"1":"汚染作業区域は検収・下処理。","2":"準清潔は加熱。","3":"検収は汚染区域。"}},{"sect":"eisei","part":"gakka","q_jp":"食品衛生法に基づき、飲食店の各施設に必ず1名置かなければならない者はどれか。","q_vn":"Theo Luật vệ sinh thực phẩm, mỗi cơ sở ăn uống bắt buộc phải có 1 người nào?","options":[{"jp":"食品衛生責任者","vn":"Người phụ trách vệ sinh thực phẩm"},{"jp":"防火管理者のみ","vn":"Chỉ người quản lý phòng cháy"},{"jp":"栄養士","vn":"Chuyên viên dinh dưỡng"},{"jp":"調理師（必須）","vn":"Đầu bếp có chứng chỉ (bắt buộc)"}],"answer":0,"explain_jp":"営業施設ごとに食品衛生責任者を1名置く必要があります。調理師や栄養士の設置は必須ではありません。","explain_vn":"Mỗi cơ sở phải có 1 người phụ trách vệ sinh thực phẩm. Đầu bếp/dinh dưỡng không bắt buộc.","why_wrong":{"1":"防火管理者は消防法上の別制度。","2":"栄養士は必須ではない。","3":"調理師の配置は義務ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"HACCPの手順で、健康被害を防ぐために特に管理が必要な工程を何というか。","q_vn":"Trong HACCP, công đoạn đặc biệt cần kiểm soát để ngăn hại sức khỏe gọi là gì?","options":[{"jp":"重要管理点（CCP）","vn":"Điểm kiểm soát trọng yếu (CCP)"},{"jp":"一般衛生管理","vn":"Quản lý vệ sinh chung"},{"jp":"検収点","vn":"Điểm nghiệm thu"},{"jp":"提供点","vn":"Điểm phục vụ"}],"answer":0,"explain_jp":"CCP（重要管理点）は加熱など、危害を確実に減らす特に重要な工程で、基準値・監視・記録を行います。","explain_vn":"CCP là công đoạn đặc biệt quan trọng (như gia nhiệt) để giảm chắc chắn mối nguy; cần ngưỡng, giám sát, ghi chép.","why_wrong":{"1":"一般衛生管理は土台となる管理。","2":"検収点はCCPの一般名ではない。","3":"提供点はCCPの用語ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"「消費期限」が表示される食品として最も適切なものはどれか。","q_vn":"Thực phẩm nào thường ghi '消費期限 (hạn an toàn)'?","options":[{"jp":"弁当や生菓子など傷みやすい食品","vn":"Cơm hộp, bánh tươi... dễ hỏng"},{"jp":"缶詰","vn":"Đồ hộp"},{"jp":"スナック菓子","vn":"Snack"},{"jp":"レトルト食品","vn":"Đồ ăn liền retort"}],"answer":0,"explain_jp":"消費期限はおおむね5日以内で急速に劣化する食品に表示。日持ちする食品には賞味期限が表示されます。","explain_vn":"'消費期限' ghi cho thực phẩm hỏng nhanh (trong ~5 ngày). Thực phẩm để lâu ghi '賞味期限'.","why_wrong":{"1":"缶詰は賞味期限。","2":"スナックは賞味期限。","3":"レトルトは賞味期限。"}},{"sect":"eisei","part":"gakka","q_jp":"従業員の健康管理として、下痢や嘔吐の症状がある場合の対応で正しいものはどれか。","q_vn":"Quản lý sức khỏe nhân viên: khi có triệu chứng tiêu chảy/nôn, cách đúng là?","options":[{"jp":"調理業務から外し、責任者に報告する","vn":"Tách khỏi việc chế biến và báo người phụ trách"},{"jp":"マスクをして調理を続ける","vn":"Đeo khẩu trang rồi tiếp tục nấu"},{"jp":"症状を隠して働く","vn":"Giấu triệu chứng để làm"},{"jp":"手袋をすれば問題ない","vn":"Đeo găng là ổn"}],"answer":0,"explain_jp":"下痢・嘔吐・発熱などがある場合は調理から外し報告します。ノロなどは症状のある人が調理すると集団食中毒の原因になります。","explain_vn":"Có tiêu chảy/nôn/sốt thì phải rời việc chế biến và báo cáo; người bệnh nấu ăn có thể gây ngộ độc tập thể (như Norovirus).","why_wrong":{"1":"マスクだけでは不十分。","2":"隠すのは最も危険。","3":"手袋だけでは防げない。"}},{"sect":"eisei","part":"gakka","q_jp":"じゃがいもの芽や緑色に変色した皮に含まれ、食中毒を起こす有毒成分はどれか。","q_vn":"Chất độc trong mầm khoai tây và vỏ chuyển xanh, gây ngộ độc là?","options":[{"jp":"ソラニン（チャコニン）","vn":"Solanine (chaconine)"},{"jp":"ヒスタミン","vn":"Histamine"},{"jp":"テトロドトキシン","vn":"Tetrodotoxin"},{"jp":"エンテロトキシン","vn":"Enterotoxin"}],"answer":0,"explain_jp":"じゃがいもの芽・緑変部にはソラニン等が含まれます。芽や緑の部分を十分に取り除きます。","explain_vn":"Mầm và phần vỏ xanh của khoai tây chứa solanine; phải loại bỏ kỹ mầm và phần xanh.","why_wrong":{"1":"ヒスタミンは赤身魚。","2":"テトロドトキシンはフグ毒。","3":"エンテロトキシンは黄色ブドウ球菌の毒素。"}},{"sect":"eisei","part":"gakka","q_jp":"フグの毒（テトロドトキシン）の特徴として正しいものはどれか。","q_vn":"Đặc điểm độc tố cá nóc (tetrodotoxin) đúng là?","options":[{"jp":"加熱しても分解されず、専門の資格が必要である","vn":"Đun không phân hủy, cần người có chứng chỉ chuyên môn"},{"jp":"加熱すれば安全になる","vn":"Đun là an toàn"},{"jp":"冷凍で無毒化できる","vn":"Cấp đông là hết độc"},{"jp":"水洗いで除去できる","vn":"Rửa nước là loại được"}],"answer":0,"explain_jp":"テトロドトキシンは加熱・冷凍・水洗いで無毒化できません。フグ調理にはふぐ調理師など専門資格が必要です。","explain_vn":"Tetrodotoxin không mất độc khi đun/đông/rửa. Chế biến cá nóc cần người có chứng chỉ chuyên môn.","why_wrong":{"1":"加熱では無毒化できない。","2":"冷凍では無毒化できない。","3":"水洗いでは除去できない。"}},{"sect":"eisei","part":"gakka","q_jp":"在庫の使用順序として、食品衛生上望ましいのはどれか。","q_vn":"Thứ tự dùng hàng tồn hợp vệ sinh nhất là?","options":[{"jp":"先入れ先出し（古いものから使う）","vn":"Nhập trước xuất trước (dùng hàng cũ trước)"},{"jp":"後入れ先出し","vn":"Nhập sau xuất trước"},{"jp":"高いものから使う","vn":"Dùng hàng đắt trước"},{"jp":"好きな順に使う","vn":"Dùng theo ý thích"}],"answer":0,"explain_jp":"先入れ先出し（FIFO）で古いものから使い、期限切れや廃棄ロスを防ぎます。","explain_vn":"Nhập trước xuất trước (FIFO): dùng hàng cũ trước để tránh hết hạn và hao phí.","why_wrong":{"1":"後入れ先出しは古い在庫が残る。","2":"価格順は衛生管理と無関係。","3":"好きな順では期限管理ができない。"}},{"sect":"eisei","part":"gakka","q_jp":"食品を扱う人の身だしなみとして適切でないものはどれか。","q_vn":"Điều nào KHÔNG phù hợp về trang phục/vệ sinh cá nhân người chế biến?","options":[{"jp":"指輪や腕時計をつけて調理する","vn":"Đeo nhẫn, đồng hồ khi nấu"},{"jp":"爪を短く切る","vn":"Cắt móng tay ngắn"},{"jp":"清潔な作業着を着る","vn":"Mặc đồng phục sạch"},{"jp":"髪を帽子に入れる","vn":"Cho tóc vào mũ"}],"answer":0,"explain_jp":"指輪・腕時計・マニキュアは異物混入や汚れの原因になるため外します。爪は短く、髪は帽子に収めます。","explain_vn":"Nhẫn, đồng hồ, sơn móng dễ gây lẫn dị vật và bám bẩn nên phải tháo; cắt móng ngắn, cho tóc vào mũ.","why_wrong":{"1":"爪を短く切るのは正しい。","2":"清潔な作業着は正しい。","3":"髪を帽子に入れるのは正しい。"}},{"sect":"eisei","part":"gakka","q_jp":"食品の「二次汚染（交差汚染）」の説明として正しいものはどれか。","q_vn":"Mô tả đúng về 'nhiễm chéo (nhiễm thứ cấp)' thực phẩm là?","options":[{"jp":"汚染された食材や器具・手指を介して他の食品が汚染されること","vn":"Thực phẩm khác bị nhiễm qua thực phẩm/dụng cụ/tay đã nhiễm"},{"jp":"食品が自然に腐ること","vn":"Thực phẩm tự thối"},{"jp":"加熱しすぎること","vn":"Đun quá kỹ"},{"jp":"冷凍による変質","vn":"Biến chất do cấp đông"}],"answer":0,"explain_jp":"二次汚染は、生肉を扱った手や器具を介して他の食品が汚染されること。手洗い・器具の使い分け・消毒で防ぎます。","explain_vn":"Nhiễm chéo là thực phẩm khác bị nhiễm qua tay/dụng cụ đã dính thực phẩm sống; phòng bằng rửa tay, dùng dụng cụ riêng, khử trùng.","why_wrong":{"1":"自然腐敗は二次汚染ではない。","2":"加熱しすぎとは無関係。","3":"冷凍変質とは別。"}},{"sect":"eisei","part":"gakka","q_jp":"ノロウイルス感染者の嘔吐物を処理するときの対応として適切なものはどれか。","q_vn":"Xử lý chất nôn của người nhiễm Norovirus, cách đúng là?","options":[{"jp":"使い捨て手袋・マスクをし、次亜塩素酸で消毒して密閉して捨てる","vn":"Đeo găng/khẩu trang dùng 1 lần, khử bằng hypoclorit, gói kín rồi bỏ"},{"jp":"水拭きだけで済ませる","vn":"Chỉ lau nước là xong"},{"jp":"素手で拭き取る","vn":"Lau bằng tay trần"},{"jp":"アルコールだけで消毒する","vn":"Chỉ khử bằng cồn"}],"answer":0,"explain_jp":"嘔吐物は感染源。使い捨て手袋・マスクを着け、ペーパーで拭き取り次亜塩素酸で消毒、密閉して廃棄します。","explain_vn":"Chất nôn là nguồn lây; đeo găng/khẩu trang, lau bằng giấy, khử bằng hypoclorit, gói kín rồi bỏ.","why_wrong":{"1":"水拭きだけではウイルスが残る。","2":"素手は感染の危険。","3":"アルコールはノロに効きにくい。"}},{"sect":"eisei","part":"gakka","q_jp":"食中毒が疑われる事故が発生した場合、営業者が行うべき対応として正しいものはどれか。","q_vn":"Khi nghi xảy ra sự cố ngộ độc, chủ cơ sở nên làm gì?","options":[{"jp":"速やかに保健所へ連絡し、原因食品を保存して指示に従う","vn":"Báo ngay trung tâm y tế, giữ lại thực phẩm nghi ngờ và làm theo hướng dẫn"},{"jp":"証拠を廃棄して隠す","vn":"Vứt bằng chứng để giấu"},{"jp":"営業を続け様子を見る","vn":"Cứ bán tiếp rồi chờ xem"},{"jp":"お客様のせいにする","vn":"Đổ lỗi cho khách"}],"answer":0,"explain_jp":"食中毒が疑われたら速やかに保健所へ連絡し、原因究明のため食品を保存、指示に従います。隠蔽は重大な問題です。","explain_vn":"Nghi ngộ độc phải báo ngay cơ quan y tế, giữ thực phẩm để điều tra, làm theo hướng dẫn. Che giấu là vi phạm nghiêm trọng.","why_wrong":{"1":"証拠廃棄は違法・危険。","2":"営業継続は被害拡大の恐れ。","3":"責任転嫁は不適切。"}},{"sect":"eisei","part":"gakka","q_jp":"検便（検便検査）を行う主な目的はどれか。","q_vn":"Mục đích chính của xét nghiệm phân là gì?","options":[{"jp":"保菌者（症状のない感染者）を見つけ食中毒を防ぐ","vn":"Phát hiện người mang mầm (nhiễm không triệu chứng) để ngăn ngộ độc"},{"jp":"体重を測るため","vn":"Để đo cân nặng"},{"jp":"視力を確認するため","vn":"Để kiểm tra thị lực"},{"jp":"血圧を測るため","vn":"Để đo huyết áp"}],"answer":0,"explain_jp":"検便は症状のない保菌者を見つけるために行い、調理従事者から食中毒が広がるのを防ぎます。","explain_vn":"Xét nghiệm phân để phát hiện người mang mầm không triệu chứng, ngăn lây ngộ độc từ người chế biến.","why_wrong":{"1":"体重測定は目的ではない。","2":"視力とは無関係。","3":"血圧とは無関係。"}},{"sect":"eisei","part":"gakka","q_jp":"温かい料理を提供まで保温する場合の温度の目安はどれか。","q_vn":"Khi giữ nóng món ăn tới lúc phục vụ, mốc nhiệt độ là?","options":[{"jp":"65℃以上を保つ","vn":"Giữ ≥65℃"},{"jp":"40℃前後を保つ","vn":"Giữ khoảng 40℃"},{"jp":"30℃以下を保つ","vn":"Giữ ≤30℃"},{"jp":"温度は気にしない","vn":"Không cần để ý nhiệt độ"}],"answer":0,"explain_jp":"温蔵は65℃以上を保ち、危険温度帯（10〜60℃）を避けます。長時間の常温放置は避けます。","explain_vn":"Giữ nóng ≥65℃, tránh vùng nhiệt nguy hiểm (10–60℃). Không để lâu ở nhiệt độ phòng.","why_wrong":{"1":"40℃は危険温度帯。","2":"30℃以下は危険温度帯（温蔵にならない）。","3":"温度管理は必須。"}},{"sect":"eisei","part":"gakka","q_jp":"食品を扱う施設で使用する水として原則となるものはどれか。","q_vn":"Nước dùng trong cơ sở chế biến thực phẩm về nguyên tắc phải là?","options":[{"jp":"飲用に適する水（水道水など）","vn":"Nước đạt tiêu chuẩn uống (nước máy...)"},{"jp":"川の水をそのまま","vn":"Nước sông để nguyên"},{"jp":"雨水","vn":"Nước mưa"},{"jp":"使い回しの水","vn":"Nước dùng lại"}],"answer":0,"explain_jp":"調理には飲用に適する水を使います。井戸水など水道水以外は水質検査と残留塩素の確認が必要です。","explain_vn":"Chế biến phải dùng nước đạt tiêu chuẩn uống; nếu dùng nước giếng phải kiểm nghiệm và xác nhận clo dư.","why_wrong":{"1":"川の水は不衛生。","2":"雨水は不適。","3":"使い回しの水は不衛生。"}},{"sect":"eisei","part":"gakka","q_jp":"まな板を肉・魚・野菜で色分けして使う主な目的はどれか。","q_vn":"Chia màu thớt cho thịt/cá/rau nhằm mục đích chính gì?","options":[{"jp":"二次汚染（交差汚染）を防ぐため","vn":"Chống nhiễm chéo"},{"jp":"見た目をきれいにするため","vn":"Cho đẹp mắt"},{"jp":"作業を遅くするため","vn":"Để làm chậm lại"},{"jp":"コストを下げるため","vn":"Để giảm chi phí"}],"answer":0,"explain_jp":"色分けは肉・魚・野菜の器具を使い分け、二次汚染を防ぐためです。","explain_vn":"Chia màu để dùng riêng dụng cụ cho thịt/cá/rau, nhằm chống nhiễm chéo.","why_wrong":{"1":"見た目のためではない。","2":"作業効率を落とす目的ではない。","3":"コスト削減が目的ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"食品表示で、アレルギー表示が推奨されている「特定原材料に準ずるもの」の品目数はおよそいくつか。","q_vn":"Nhóm 'tương đương nguyên liệu đặc định' được khuyến nghị ghi nhãn dị ứng có khoảng bao nhiêu loại?","options":[{"jp":"20品目","vn":"20 loại"},{"jp":"8品目","vn":"8 loại"},{"jp":"3品目","vn":"3 loại"},{"jp":"50品目","vn":"50 loại"}],"answer":0,"explain_jp":"表示義務は8品目、表示が推奨される準ずるものは20品目です（合計で幅広く配慮します）。","explain_vn":"Bắt buộc 8 loại; nhóm khuyến nghị ('tương đương') khoảng 20 loại.","why_wrong":{"1":"8品目は表示義務のほう。","2":"3品目は誤り。","3":"50品目は誤り。"}},{"sect":"eisei","part":"gakka","q_jp":"食品の解凍を室温で長時間行うことが不適切な理由として正しいものはどれか。","q_vn":"Vì sao rã đông ở nhiệt độ phòng lâu là không phù hợp?","options":[{"jp":"表面が危険温度帯になり細菌が増えるから","vn":"Bề mặt vào vùng nhiệt nguy hiểm, vi khuẩn tăng"},{"jp":"栄養が増えるから","vn":"Vì dinh dưỡng tăng lên"},{"jp":"色が良くなるから","vn":"Vì màu đẹp hơn"},{"jp":"重量が増えるから","vn":"Vì khối lượng tăng"}],"answer":0,"explain_jp":"室温解凍は表面が危険温度帯（10〜60℃）になり細菌が増殖します。冷蔵庫内での解凍が基本です。","explain_vn":"Rã đông nhiệt độ phòng khiến bề mặt vào vùng nguy hiểm (10–60℃), vi khuẩn tăng. Nên rã đông trong tủ lạnh.","why_wrong":{"1":"栄養が増えることはない。","2":"色改善が理由ではない。","3":"重量増加は理由ではない。"}},{"sect":"eisei","part":"gakka","q_jp":"手洗いの手順として最も適切なものはどれか。","q_vn":"Quy trình rửa tay đúng nhất là?","options":[{"jp":"石けんで指先・爪・指の間・手首まで洗い、流水ですすぎ、清潔なもので拭く","vn":"Rửa xà phòng cả đầu ngón/móng/kẽ ngón/cổ tay, xả nước, lau bằng khăn sạch"},{"jp":"水でさっと流すだけ","vn":"Chỉ xối nước nhanh"},{"jp":"共用のタオルで拭く","vn":"Lau bằng khăn dùng chung"},{"jp":"手のひらだけ洗う","vn":"Chỉ rửa lòng bàn tay"}],"answer":0,"explain_jp":"手洗いは石けんで指先・爪・指の間・手首まで丁寧に洗い、流水で流し、ペーパー等清潔なもので拭きます。二度洗いが効果的です。","explain_vn":"Rửa xà phòng kỹ đầu ngón, móng, kẽ ngón, cổ tay; xả nước; lau bằng khăn giấy sạch. Rửa hai lần hiệu quả hơn.","why_wrong":{"1":"水だけでは不十分。","2":"共用タオルは汚染源。","3":"手のひらだけでは不十分。"}},{"sect":"eisei","part":"gakka","q_jp":"食品の腐敗を防ぐ基本的な考え方として正しいものはどれか。","q_vn":"Tư duy cơ bản để chống thực phẩm hỏng là?","options":[{"jp":"低温・清潔・迅速を心がける","vn
